<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HGI ORGANISM — Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040a14;--panel:#0a1228;--border:rgba(0,160,220,0.06);--bb:rgba(0,180,240,0.12);--cy:#00d0f0;--gn:#3cd9a0;--am:#d4a020;--wh:#d0dce8;--tx:rgba(185,205,225,0.85);--dm:rgba(145,170,195,0.3);--mc:rgba(120,145,170,0.2);--mo:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;--br:'Orbitron',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--ui);font-weight:500}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,160,200,0.1)}
#app{display:grid;width:100%;height:100%;grid-template-columns:220px 1fr 250px;grid-template-rows:36px 1fr auto 140px;grid-template-areas:"top top top" "left center right" "left tiles right" "bot bot bot"}
#top{grid-area:top;background:var(--panel);border-bottom:1px solid var(--bb);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10}
.tb{font-family:var(--br);font-size:10px;font-weight:700;color:var(--cy);letter-spacing:3px}
.ts{font-size:8px;font-family:var(--mo);color:var(--dm)}.ts b{color:var(--cy);font-family:var(--br);font-size:9px}
.tsp{width:1px;height:12px;background:var(--bb);margin:0 6px}
#left{grid-area:left;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;z-index:5}
.lh{padding:6px 12px;font-family:var(--mo);font-size:7px;letter-spacing:2px;color:var(--dm);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2}
.ag{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.012);cursor:pointer;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;transition:all .15s}
.ag:hover{background:rgba(0,180,220,0.02)}.ag.sel{background:rgba(0,200,230,0.08);border-left-color:var(--cy)}.ag.sel .an{color:#fff}
.ag.msel{background:rgba(0,180,220,0.04);border-left-color:rgba(0,200,230,0.3)}.ag.gated{border-left-color:var(--am)!important}
.an{font-size:10px;font-weight:600;color:var(--dm);transition:color .15s;flex:1}.as{font-size:7px;font-family:var(--mo);color:var(--dm)}.aw{font-size:8px;color:var(--am)}
#center{grid-area:center;position:relative;overflow:hidden;background:var(--bg)}
#cv{position:absolute;inset:0;z-index:2}
#tiles{grid-area:tiles;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:2px 8px 5px;z-index:5}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:5px 7px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
.tile.sel{border-color:rgba(0,208,240,0.5);background:rgba(0,200,230,0.10)}
.tile .tl{font-family:var(--mo);font-size:7px;letter-spacing:1px;color:var(--dm)}.tile.sel .tl{color:var(--cy)}
.tile .tv{font-size:8px;color:var(--tx);margin-top:1px}.tile .ti2{font-size:14px}
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;z-index:5}
.rb{padding:8px 12px;border-bottom:1px solid var(--border)}.rl{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px}
.ro{font-family:var(--br);font-size:28px;font-weight:900;line-height:1}.rn{font-size:12px;font-weight:700;color:var(--wh);margin-top:3px}
.ra{font-size:8px;color:var(--dm);margin-top:1px}
.rtag{font-size:7px;padding:1px 5px;border-radius:2px;font-family:var(--mo);border:1px solid var(--border);color:var(--dm);display:inline-block;margin:3px 3px 0 0}.rtag.hi{border-color:rgba(0,208,240,0.2);color:var(--cy)}
.rbar{height:2px;border-radius:1px;background:rgba(0,160,200,0.06);margin-top:2px;overflow:hidden}.rbar .f{height:100%;background:var(--cy);border-radius:1px}
.rbl{font-size:6px;color:var(--mc);font-family:var(--mo);display:flex;justify-content:space-between;margin-top:2px}
.ralt{background:rgba(200,72,72,0.04);border:1px solid rgba(200,72,72,0.12);border-radius:3px;padding:5px 8px;margin-top:4px}
#bot{grid-area:bot;background:var(--panel);border-top:1px solid var(--bb);display:grid;grid-template-columns:1.3fr 0.7fr;z-index:5}
.bz{padding:6px 12px;overflow-y:auto}.bz:first-child{border-right:1px solid var(--border)}
.bt{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
.pr{display:flex;align-items:center;gap:5px;padding:1px 0;font-size:8px;transition:opacity .3s;border-bottom:1px solid rgba(255,255,255,0.01)}.pr.faded{opacity:.12}
.pip{cursor:pointer;padding:2px 5px;display:flex;align-items:center;gap:5px;font-size:8px;border-left:3px solid transparent;transition:all .12s}
.pip:hover{background:rgba(0,180,220,0.02)}.pip.sel{background:rgba(212,160,32,0.06);border-left-color:var(--am)}.pip.sel .pn{color:var(--am)}
.pw{font-size:7px;font-family:var(--mo);font-weight:600;padding:1px 3px;border-radius:2px}.pw.m{background:rgba(0,208,240,0.08);color:var(--cy)}.pw.w{background:rgba(212,160,32,0.08);color:var(--am)}
.ctx{padding:6px 12px;border-bottom:1px solid var(--border);font-family:var(--mo);font-size:6px;letter-spacing:1px}
.ctx-row{margin-bottom:1px;display:flex;gap:4px;align-items:center}.ctx-dot{width:5px;height:5px;border-radius:50%}
#tooltip{position:absolute;z-index:20;pointer-events:none;font-family:var(--mo);font-size:10px;color:var(--cy);background:rgba(4,10,22,0.94);border:1px solid rgba(0,200,230,0.25);padding:6px 12px;border-radius:4px;opacity:0;transition:opacity .15s;box-shadow:0 2px 12px rgba(0,0,0,0.5)}
#tooltip.vis{opacity:1}.tt-label{font-size:10px;font-weight:600;color:var(--wh);margin-bottom:2px}.tt-detail{font-size:8px;color:var(--tx)}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:36px 1fr auto 180px;grid-template-areas:"top" "center" "tiles" "bot"}#left,#right{display:none}#tiles{grid-template-columns:repeat(2,1fr);padding:5px 10px 8px}#center{min-height:360px}}
</style></head><body>
<div id="app">
<div id="top"><span class="tb">HGI ORGANISM</span><span class="tsp"></span><span class="ts">Agents: <b>15</b></span><span class="tsp"></span><span class="ts">Active: <b style="color:var(--gn)">10</b></span><span class="tsp"></span><span class="ts">Gated: <b style="color:var(--am)">3</b></span><span style="margin-left:auto;display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:var(--gn);box-shadow:0 0 6px var(--gn)"></span><span class="ts">LIVE</span></span></div>
<div id="left"><div class="lh">AGENT ROSTER</div><div id="agl"></div></div>
<div id="center"><canvas id="cv"></canvas><div id="tooltip"></div></div>
<div id="tiles">
<div class="tile" data-mode="planning"><span class="ti2">&#9670;</span><div><div class="tl">PLANNING</div><div class="tv">3 agents</div></div></div>
<div class="tile" data-mode="memory"><span class="ti2">&#11041;</span><div><div class="tl">MEMORY</div><div class="tv">2 agents</div></div></div>
<div class="tile" data-mode="synthesis"><span class="ti2">&#9671;</span><div><div class="tl">SYNTHESIS</div><div class="tv">2 agents</div></div></div>
<div class="tile" data-mode="gate"><span class="ti2">&#11042;</span><div><div class="tl">QUALITY GATE</div><div class="tv">3 gated</div></div></div>
</div>
<div id="right"><div id="rr"></div></div>
<div id="bot">
<div class="bz"><div class="bt">ROUTING TIMELINE</div><div id="rtl"></div><div class="bt" style="margin-top:5px">PIPELINE</div><div id="pipl"></div></div>
<div class="bz"><div class="bt">SYSTEM STATUS</div><div style="font-family:var(--br);font-size:18px;font-weight:900;color:var(--wh);margin:3px 0">15 agents</div><div style="display:flex;gap:14px;margin-top:4px"><div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--gn)">10</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Active</div></div><div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--am)">3</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Gated</div></div><div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--cy)">5</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Pursuits</div></div><div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--wh)">5.6K</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Memories</div></div></div></div>
</div></div>
<script>
var AG=[
{n:'Intelligence Engine',s:'Scanning',mode:'planning',gated:false,c:'#00d0f0',sec:'intelligence',pl:'INTEL',task:'OPSB CM \u2014 3 competitors',finding:'CSRS confirmed'},
{n:'Financial Agent',s:'Benchmarking',mode:'planning',gated:false,c:'#3cd9a0',sec:'planning',pl:'PRICE',task:'Wash Parish \u2014 $95-165/hr',finding:'Avg $127/hr'},
{n:'Winnability Agent',s:'Scoring',mode:'planning',gated:false,c:'#d4a020',sec:'winnability',pl:'PWIN',task:'OPSB CM \u2014 PWIN 62%',finding:'Location 10/10'},
{n:'CRM Agent',s:'Mapping',mode:'memory',gated:false,c:'#a78bfa',sec:'crm',pl:'CRM',task:'NOLA \u2014 2 contacts',finding:'Ops dir warm'},
{n:'Quality Gate',s:'Auditing',mode:'gate',gated:true,c:'#d4a020',sec:'gate',pl:'GATE',task:'St. George \u2014 Exhibit D',finding:'3 blocking'},
{n:'Proposal Writer',s:'Drafting',mode:'synthesis',gated:false,c:'#60a5fa',sec:'synthesis',pl:'DRAFT',task:'NOLA summary \u2014 47K',finding:'Pending review'},
{n:'Red Team',s:'Blocked',mode:'gate',gated:true,c:'#c84848',sec:'gate',pl:'REVIEW',task:'Awaiting proposals',finding:'Blocked'},
{n:'Dashboard Agent',s:'Compiling',mode:'memory',gated:false,c:'#818cf8',sec:'memory',pl:'BRIEF',task:'8 new memories',finding:'6 events'},
{n:'Pipeline Scanner',s:'Monitoring',mode:'planning',gated:false,c:'#06b6d4',sec:'planning',pl:'SCAN',task:'5 deadlines',finding:'OPSB Apr 30'},
{n:'Staffing Agent',s:'Blocked',mode:'gate',gated:true,c:'#f59e0b',sec:'winnability',pl:'STAFF',task:'Position matching',finding:'Gated'}
];
var PIPE=[{n:'NOLA Water',opi:94,stage:'pursuing',due:'Unsolicited'},{n:'DR-4900 LA',opi:92,stage:'identified',due:'TBD'},{n:'Washington Parish',opi:88,stage:'pursuing',due:'May 8'},{n:'St. George',opi:85,stage:'watching',due:'Apr 24'},{n:'OPSB CM',opi:78,stage:'new',due:'Apr 30'}];
var EVT=[{t:'14:52',a:'Scanner',w:'Match',d:'Addendum JP SOQ',mode:'planning'},{t:'14:54',a:'Gate',w:'Warning',d:'Missing insurance',mode:'gate'},{t:'14:56',a:'Win',w:'Match',d:'OPSB winnability',mode:'planning'},{t:'14:55',a:'Writer',w:'Warning',d:'Over page limit',mode:'synthesis'},{t:'14:53',a:'Intel',w:'Match',d:'CSRS on OPSB',mode:'planning'},{t:'14:50',a:'CRM',w:'Match',d:'SWBNO responded',mode:'memory'},{t:'14:48',a:'Fin',w:'Match',d:'Rate benchmark',mode:'planning'}];

// 7 wedge sectors — angles define arc start, each gets ~49° with ~2.4° gaps
var GAP=2.4,SW=49;
var SEC=[
{id:'planning',   label:'PLANNING',    c:'0,208,240',  a0:-90,      a1:-90+SW},
{id:'intelligence',label:'INTEL',      c:'6,182,212',  a0:-90+SW+GAP, a1:-90+2*SW+GAP},
{id:'winnability', label:'WINNABILITY', c:'212,180,60', a0:-90+2*(SW+GAP), a1:-90+3*SW+2*GAP},
{id:'gate',        label:'QTY GATE',   c:'212,160,32', a0:-90+3*(SW+GAP), a1:-90+4*SW+3*GAP},
{id:'crm',         label:'CRM',        c:'167,139,250',a0:-90+4*(SW+GAP), a1:-90+5*SW+4*GAP},
{id:'memory',      label:'MEMORY',     c:'130,140,250',a0:-90+5*(SW+GAP), a1:-90+6*SW+5*GAP},
{id:'synthesis',   label:'SYNTHESIS',  c:'96,165,250', a0:-90+6*(SW+GAP), a1:-90+7*SW+6*GAP}
];
var OUTE=[{from:'synthesis',label:'PROPOSAL',c:'96,165,250',fy:0.22},{from:'gate',label:'VALIDATION',c:'212,160,32',fy:0.50},{from:'memory',label:'BRIEFING',c:'130,140,250',fy:0.78}];
var MSEC={planning:['planning','intelligence','winnability'],memory:['memory','crm'],synthesis:['synthesis','planning'],gate:['gate','winnability']};

var sA=-1,sM='',sP=-1;
function act(id){if(sA>=0)return AG[sA].sec===id?1:0.01;if(sM)return(MSEC[sM]||[]).indexOf(id)>=0?0.92:0.01;return 0.05;}
function pOn(i){if(sA>=0)return i===sA;if(sM)return AG[i]&&AG[i].mode===sM;return true;}

// Rails
(function(){var el=document.getElementById('agl');AG.forEach(function(a,i){var r=document.createElement('div');r.className='ag'+(a.gated?' gated':'');r.innerHTML='<div style="width:3px;min-height:24px;border-radius:1px;background:'+a.c+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div class="an">'+a.n+'</div><div class="as"><b style="color:'+(a.gated?'var(--am)':a.c)+'">'+a.s+'</b> \u00B7 '+a.sec+'</div></div>'+(a.gated?'<span class="aw">\u26A0</span>':'');r.onclick=function(){sA=sA===i?-1:i;sM='';aS();uR();uT();};el.appendChild(r);});})();
function aS(){document.querySelectorAll('.ag').forEach(function(e,j){e.classList.remove('sel','msel');if(sA>=0&&j===sA)e.classList.add('sel');else if(sM&&AG[j].mode===sM)e.classList.add('msel');});document.querySelectorAll('.tile').forEach(function(e){e.classList.toggle('sel',e.dataset.mode===sM);});}
document.querySelectorAll('.tile').forEach(function(el){el.onclick=function(){var m=el.dataset.mode;sM=sM===m?'':m;sA=-1;aS();uR();uT();};});
function uT(){var el=document.getElementById('rtl');el.innerHTML='';EVT.forEach(function(e){var f=sM&&e.mode!==sM;var r=document.createElement('div');r.className='pr'+(f?' faded':'');r.innerHTML='<div style="width:6px;height:6px;border-radius:2px;background:'+(e.w==='Warning'?'var(--am)':'var(--cy)')+';flex-shrink:0"></div><span style="font-family:var(--mo);color:var(--dm);min-width:28px;font-size:7px">'+e.t+'</span><span style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+e.a+'</span><span class="pw '+(e.w==='Warning'?'w':'m')+'">'+e.w+'</span><span style="font-size:7px;color:var(--dm);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.d+'</span>';el.appendChild(r);});}uT();
(function(){var el=document.getElementById('pipl');PIPE.forEach(function(p,i){var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';var r=document.createElement('div');r.className='pip';r.innerHTML='<span style="font-family:var(--br);font-weight:700;color:'+oc+';min-width:22px;font-size:8px">'+p.opi+'</span><span class="pn" style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+p.n+'</span><span class="pw m">'+p.stage+'</span><span style="font-size:7px;color:var(--dm);flex:1">'+p.due+'</span>';r.onclick=function(){sP=sP===i?-1:i;document.querySelectorAll('.pip').forEach(function(e,j){e.classList.toggle('sel',j===sP);});uR();};el.appendChild(r);});})();
function uR(){var el=document.getElementById('rr'),h='';var p=sP>=0?PIPE[sP]:PIPE[0];var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';
h+='<div class="ctx"><div class="ctx-row"><div class="ctx-dot" style="background:'+(sP>=0?'var(--am)':'var(--mc)')+'"></div><span style="color:'+(sP>=0?'var(--am)':'var(--mc)')+'">PURSUIT: '+(sP>=0?p.n:'Default')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sM?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sM?'var(--cy)':'var(--mc)')+'">MODE: '+(sM?sM.toUpperCase():'None')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sA>=0?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sA>=0?'var(--cy)':'var(--mc)')+'">AGENT: '+(sA>=0?AG[sA].n:'None')+'</span></div></div>';
h+='<div class="rb"><div class="rl">'+(sP>=0?'SELECTED':'PRIORITY')+' PURSUIT</div><div class="ro" style="color:'+oc+'">'+p.opi+'</div><div class="rn">'+p.n+'</div><span class="rtag">'+p.due+'</span><span class="rtag hi">'+p.stage+'</span></div>';
if(sA>=0){var a=AG[sA];h+='<div class="rb"><div class="rl">AGENT</div><div style="font-size:11px;font-weight:700;color:'+a.c+'">'+a.n+'</div><div class="ra">'+(a.gated?'\u26A0 GATED':a.s)+' \u00B7 '+a.sec+'</div><div style="margin-top:5px"><div class="rl">TASK</div><div style="font-size:8px;color:var(--tx)">'+a.task+'</div></div><div style="margin-top:5px"><div class="rl">FINDING</div><div style="font-size:8px;color:var(--tx)">'+a.finding+'</div></div>';if(a.gated)h+='<div class="ralt"><div style="font-family:var(--mo);font-size:7px;color:var(--am);font-weight:600">\u26A0 BLOCKED</div><div style="font-size:8px;color:var(--dm);margin-top:2px">Pending prerequisite</div></div>';h+='</div>';}
else if(sM){h+='<div class="rb"><div class="rl">'+sM.toUpperCase()+' MODE</div>';AG.filter(function(a){return a.mode===sM;}).forEach(function(a){h+='<div style="margin-bottom:5px"><div style="font-size:9px;font-weight:600;color:'+(a.gated?'var(--am)':a.c)+'">'+a.n+(a.gated?' \u26A0':'')+'</div><div style="font-size:8px;color:var(--tx);margin-top:1px">'+a.task+'</div></div>';});h+='</div>';}
else{h+='<div class="rb"><div class="rl">OPI FACTORS</div>';[['KB Match',95],['Competitive',92],['Relationship',98],['Staff',85],['Strategic',90]].forEach(function(f){h+='<div class="rbl"><span>'+f[0]+'</span><span>'+f[1]+'%</span></div><div class="rbar"><div class="f" style="width:'+f[1]+'%"></div></div>';});h+='</div>';}
el.innerHTML=h;}uR();

// ═══ CANVAS ═══
var cv=document.getElementById('cv'),X=cv.getContext('2d');
function rs(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;}
rs();window.addEventListener('resize',rs);

var PK=[];
setInterval(function(){if(PK.length<4){var i=Math.floor(Math.random()*AG.length);if(!AG[i].gated)PK.push({i:i,p:0,v:0.005+Math.random()*0.004});}},1200);

var t=0,D=Math.PI/180;
function midAng(s){return((s.a0+s.a1)/2)*D;}
function edgePt(s,cx,cy,r){var a=midAng(s);return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};}
function wedge(cx,cy,ri,ro,a0,a1){X.beginPath();X.arc(cx,cy,ro,a0*D,a1*D);X.arc(cx,cy,ri,a1*D,a0*D,true);X.closePath();}
function bz(ax,ay,mx,my,bx,by,t){var u=1-t;return{x:u*u*ax+2*u*t*mx+t*t*bx,y:u*u*ay+2*u*t*my+t*t*by};}

function draw(){
requestAnimationFrame(draw);t+=0.016;
var W=cv.width,H=cv.height;X.clearRect(0,0,W,H);
var sel=sA>=0||sM!=='';
var CX=W*0.50,CY=H*0.47;
var dm=Math.min(W,H);
var ri=dm*0.15;  // inner radius (core boundary)
var ro=dm*0.40;  // outer radius (ring edge)
var pulse=0.5+0.5*Math.sin(t*1.2);
var isP=sP>=0;
var cc=isP?'212,180,80':'0,208,240';

// ═══ WEDGE SECTORS — the ring ═══
SEC.forEach(function(s){
  var a=act(s.id);
  var isG=s.id==='gate'&&(sM==='gate'||(sA>=0&&AG[sA].gated&&AG[sA].sec==='gate'));
  var sc=isG?'212,160,32':s.c;
  var hb=0.5+0.5*Math.sin(t*(isG?4:1.3)+s.a0*0.02);
  var al=a*hb;

  // Wedge fill
  wedge(CX,CY,ri+2,ro,s.a0,s.a1);
  if(isG){
    X.fillStyle='rgba(212,160,32,'+(0.08+0.12*hb)+')';
  }else if(a>0.1){
    X.fillStyle='rgba('+sc+','+(0.04+al*0.18)+')';
  }else{
    X.fillStyle='rgba(8,14,30,0.6)';
  }
  X.fill();

  // Wedge border — outer arc
  X.beginPath();X.arc(CX,CY,ro,s.a0*D,s.a1*D);
  if(isG){
    X.strokeStyle='rgba(212,160,32,'+(0.50+0.40*hb)+')';X.lineWidth=3;X.setLineDash([5,4]);
  }else if(a>0.1){
    X.strokeStyle='rgba('+sc+','+(0.35+0.50*al)+')';X.lineWidth=2;
  }else{
    X.strokeStyle='rgba('+sc+',0.10)';X.lineWidth=1;
  }
  X.stroke();X.setLineDash([]);

  // Radial edge lines
  var r0s=s.a0*D,r1s=s.a1*D;
  X.beginPath();X.moveTo(CX+Math.cos(r0s)*ri,CY+Math.sin(r0s)*ri);X.lineTo(CX+Math.cos(r0s)*ro,CY+Math.sin(r0s)*ro);
  X.strokeStyle='rgba('+sc+','+(a>0.1?0.15:0.04)+')';X.lineWidth=1;X.stroke();
  X.beginPath();X.moveTo(CX+Math.cos(r1s)*ri,CY+Math.sin(r1s)*ri);X.lineTo(CX+Math.cos(r1s)*ro,CY+Math.sin(r1s)*ro);
  X.stroke();

  // Inner activity arc (heat indicator inside wedge)
  if(a>0.1){
    var actW=(s.a1-s.a0)*al*0.8;
    var actStart=s.a0+(s.a1-s.a0)*0.1;
    X.beginPath();X.arc(CX,CY,ri+6,actStart*D,(actStart+actW)*D);
    X.strokeStyle='rgba('+sc+','+(0.3+0.5*al)+')';X.lineWidth=4;X.stroke();
  }

  // BLOCKED overlay for gated wedges
  if(isG){
    var ma=midAng(s);
    var lR=(ri+ro)/2;
    var lx=CX+Math.cos(ma)*lR,ly=CY+Math.sin(ma)*lR;
    X.font='900 '+Math.round(dm*0.018)+'px "Orbitron",sans-serif';
    X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='rgba(212,160,32,'+(0.55+0.40*hb)+')';
    X.fillText('BLOCKED',lx,ly-dm*0.012);
    // Barrier hash marks across the wedge
    for(var bi=0;bi<3;bi++){
      var ba=(s.a0+4+bi*15)*D;
      X.beginPath();X.moveTo(CX+Math.cos(ba)*(ri+8),CY+Math.sin(ba)*(ri+8));X.lineTo(CX+Math.cos(ba)*(ro-4),CY+Math.sin(ba)*(ro-4));
      X.strokeStyle='rgba(212,160,32,'+(0.12+0.08*hb)+')';X.lineWidth=1.5;X.stroke();
    }
  }

  // Label inside wedge
  var ma2=midAng(s);
  var lR2=isG?(ri+ro)/2+dm*0.015:(ri+ro)/2;
  var lx2=CX+Math.cos(ma2)*lR2,ly2=CY+Math.sin(ma2)*lR2;
  X.font=(a>0.1?'700 ':'500 ')+Math.round(dm*0.016)+'px "Share Tech Mono",monospace';
  X.textAlign='center';X.textBaseline='middle';
  X.fillStyle=isG?'rgba(212,160,32,'+(0.50+0.40*hb)+')':'rgba('+sc+','+(a>0.1?0.85:0.20)+')';
  if(!isG) X.fillText(s.label,lx2,ly2);

  // Status dot at outer edge
  var ep=edgePt(s,CX,CY,ro-8);
  X.fillStyle=isG?'rgba(212,160,32,'+(0.5+0.4*hb)+')':a>0.1?'rgba('+sc+','+(0.4+0.5*al)+')':'rgba('+sc+',0.08)';
  X.beginPath();X.arc(ep.x,ep.y,3,0,Math.PI*2);X.fill();
});

// ═══ CORE — layered engine ═══
// Dark foundation
X.fillStyle='rgba(3,6,16,0.98)';
X.beginPath();X.arc(CX,CY,ri,0,Math.PI*2);X.fill();

// Core containment ring
X.beginPath();X.arc(CX,CY,ri,0,Math.PI*2);
X.strokeStyle='rgba('+cc+','+(0.50+0.15*pulse)+')';X.lineWidth=3;X.stroke();

// Processing segments inside core
for(var si=0;si<4;si++){
  var ss=t*0.5+si*(Math.PI/2);
  var sl=0.6+0.3*Math.sin(t*1.5+si);
  X.beginPath();X.arc(CX,CY,ri*0.82,ss,ss+sl);
  X.strokeStyle='rgba('+cc+','+(0.15+0.12*Math.sin(t*2+si))+')';X.lineWidth=5;X.stroke();
}

// Nucleus fill
var ng=X.createRadialGradient(CX,CY,0,CX,CY,ri*0.75);
ng.addColorStop(0,'rgba('+cc+','+(0.28+0.14*pulse)+')');
ng.addColorStop(0.5,'rgba('+cc+','+(0.10+0.06*pulse)+')');
ng.addColorStop(1,'rgba('+cc+',0.02)');
X.fillStyle=ng;X.beginPath();X.arc(CX,CY,ri*0.75,0,Math.PI*2);X.fill();

// Inner ring
X.beginPath();X.arc(CX,CY,ri*0.7,0,Math.PI*2);
X.strokeStyle='rgba('+cc+','+(0.25+0.15*pulse)+')';X.lineWidth=1;X.stroke();

// Core center
X.fillStyle='rgba('+cc+','+(0.5+0.3*pulse)+')';
X.beginPath();X.arc(CX,CY,3,0,Math.PI*2);X.fill();

// Core text
X.textAlign='center';X.textBaseline='middle';
if(isP){
  var pp=PIPE[sP];
  X.font='900 '+Math.round(ri*0.42)+'px "Orbitron",sans-serif';
  X.fillStyle='rgba(212,180,80,0.95)';
  X.fillText(pp.opi,CX,CY-ri*0.10);
  X.font='600 '+Math.round(ri*0.12)+'px "Share Tech Mono",monospace';
  X.fillStyle='rgba(212,180,80,0.60)';
  X.fillText(pp.n.toUpperCase(),CX,CY+ri*0.18);
  X.font='500 '+Math.round(ri*0.09)+'px "Share Tech Mono",monospace';
  X.fillStyle='rgba(212,180,80,0.35)';
  X.fillText(pp.stage.toUpperCase()+' \u00B7 '+pp.due,CX,CY+ri*0.36);
}else{
  X.font='900 '+Math.round(ri*0.28)+'px "Orbitron",sans-serif';
  X.fillStyle='rgba(0,208,240,'+(0.50+0.25*pulse)+')';
  X.fillText('HGI',CX,CY-ri*0.06);
  X.font='500 '+Math.round(ri*0.10)+'px "Share Tech Mono",monospace';
  X.fillStyle='rgba(0,208,240,'+(0.25+0.12*pulse)+')';
  X.fillText('ORGANISM',CX,CY+ri*0.20);
}

// ═══ INBOUND CHANNELS — connect to wedge outer edge ═══
AG.forEach(function(a,i){
  if(i>=10||!sel||!pOn(i))return;
  var s=SEC.find(function(s){return s.id===a.sec;});if(!s)return;
  var ep=edgePt(s,CX,CY,ro);
  var ay=H*(0.04+i*0.092);
  var mx=W*0.12,my=ay*0.35+ep.y*0.65;

  if(!a.gated){
    X.beginPath();X.moveTo(0,ay);X.quadraticCurveTo(mx,my,ep.x,ep.y);
    X.strokeStyle=a.c;X.globalAlpha=0.07;X.lineWidth=18;X.stroke();X.globalAlpha=1;
  }
  X.beginPath();X.moveTo(0,ay);X.quadraticCurveTo(mx,my,ep.x,ep.y);
  X.strokeStyle=a.gated?'#d4a020':a.c;
  X.globalAlpha=a.gated?0.40:0.70;X.lineWidth=a.gated?2:3.5;
  if(a.gated)X.setLineDash([6,4]);
  X.stroke();X.setLineDash([]);X.globalAlpha=1;

  if(a.gated){
    var bp=bz(0,ay,mx,my,ep.x,ep.y,0.72);
    var perp=Math.atan2(ep.y-ay,ep.x)+Math.PI/2;
    var bpulse=0.5+0.5*Math.sin(t*5.5);
    X.fillStyle='rgba(212,160,32,'+(0.18*bpulse)+')';
    X.beginPath();X.arc(bp.x,bp.y,20,0,Math.PI*2);X.fill();
    X.beginPath();X.moveTo(bp.x+Math.cos(perp)*16,bp.y+Math.sin(perp)*16);X.lineTo(bp.x-Math.cos(perp)*16,bp.y-Math.sin(perp)*16);
    X.strokeStyle='rgba(212,160,32,'+(0.70+0.25*bpulse)+')';X.lineWidth=5;X.stroke();
  }

  X.font='700 9px "Share Tech Mono",monospace';
  X.fillStyle=a.gated?'rgba(212,160,32,0.80)':'rgba('+s.c+',0.70)';
  X.textAlign='left';X.textBaseline='middle';X.fillText(a.pl,5,ay);
});

// ═══ OUTBOUND CHANNELS ═══
OUTE.forEach(function(o){
  var s=SEC.find(function(s){return s.id===o.from;});if(!s)return;
  var ep=edgePt(s,CX,CY,ro);
  var on=sM==='synthesis'||(sA>=0&&AG[sA].sec===o.from);if(!on)return;
  var bx=W,by=H*o.fy;
  var mx=W*0.82,my=ep.y*0.35+by*0.65;
  X.beginPath();X.moveTo(ep.x,ep.y);X.quadraticCurveTo(mx,my,bx,by);
  X.strokeStyle='rgba('+o.c+',0.06)';X.lineWidth=14;X.stroke();
  X.beginPath();X.moveTo(ep.x,ep.y);X.quadraticCurveTo(mx,my,bx,by);
  X.strokeStyle='rgba('+o.c+',0.50)';X.lineWidth=2.5;X.stroke();
  X.font='700 9px "Share Tech Mono",monospace';X.fillStyle='rgba('+o.c+',0.70)';X.textAlign='right';X.textBaseline='middle';
  X.fillText('\u2192 '+o.label,W-5,by);
  var oprog=((t*0.25)%1);
  var op=bz(ep.x,ep.y,mx,my,bx,by,oprog);
  X.fillStyle='rgba('+o.c+',0.55)';X.beginPath();X.arc(op.x,op.y,7,0,Math.PI*2);X.fill();
});

// ═══ INBOUND PACKETS ═══
for(var pi=PK.length-1;pi>=0;pi--){
  var pk=PK[pi];pk.p+=pk.v;if(pk.p>=1){PK.splice(pi,1);continue;}
  var a=AG[pk.i];if(!a)continue;
  var s=SEC.find(function(s){return s.id===a.sec;});if(!s)continue;
  if(!pOn(pk.i)&&sel)continue;
  var ep=edgePt(s,CX,CY,ro);
  var ay=H*(0.04+pk.i*0.092);
  var mx=W*0.12,my=ay*0.35+ep.y*0.65;
  if(a.gated&&pk.p>0.70){PK.splice(pi,1);continue;}
  var pt=bz(0,ay,mx,my,ep.x,ep.y,pk.p);
  var sz=sel?10:4;
  var g=X.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sz);
  g.addColorStop(0,a.gated?'#d4a020':a.c);g.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=g;X.beginPath();X.arc(pt.x,pt.y,sz,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.globalAlpha=sel?0.9:0.35;
  X.beginPath();X.arc(pt.x,pt.y,sel?3:1,0,Math.PI*2);X.fill();X.globalAlpha=1;
}

// ═══ STATE LABEL ═══
if(sM){X.font='700 10px "Orbitron",sans-serif';X.textAlign='center';X.textBaseline='bottom';X.fillStyle='rgba(0,208,240,0.45)';X.fillText(sM.toUpperCase()+' MODE',CX,H-8);}
if(sA>=0){var sa=AG[sA];var sec=SEC.find(function(s){return s.id===sa.sec;});X.font='700 9px "Share Tech Mono",monospace';X.textAlign='center';X.textBaseline='bottom';X.fillStyle='rgba('+(sec?sec.c:'0,208,240')+',0.55)';X.fillText(sa.n.toUpperCase()+' \u2192 '+sa.sec.toUpperCase(),CX,H-8);}
}

// Tooltip
var tt=document.getElementById('tooltip');cv.style.pointerEvents='auto';
cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;var W=cv.width,H=cv.height,CX2=W*0.50,CY2=H*0.47,dm2=Math.min(W,H),ri2=dm2*0.15,ro2=dm2*0.40;
var dx=mx-CX2,dy=my-CY2,dist=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)/D;if(ang<-90)ang+=360;
var f=null;if(dist>ri2&&dist<ro2){SEC.forEach(function(s){var a0=s.a0,a1=s.a1;if(a0<-90)a0+=360;if(a1<-90)a1+=360;var testAng=ang;if(testAng<a0-10)testAng+=360;if(testAng>=a0&&testAng<=a1){var a=act(s.id);f={tip:s.label,detail:(a>0.5?'HIGH':a>0.04?'Ambient':'Dim')+' activity'};}});}
if(f){tt.innerHTML='<div class="tt-label">'+f.tip+'</div><div class="tt-detail">'+f.detail+'</div>';tt.style.left=(mx+14)+'px';tt.style.top=(my-30)+'px';tt.classList.add('vis');}else{tt.classList.remove('vis');}});
cv.addEventListener('mouseleave',function(){tt.classList.remove('vis');});
draw();
</script></body></html>
