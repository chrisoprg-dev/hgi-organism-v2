<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040a14;--panel:#0a1228;--border:rgba(0,160,220,0.06);--bb:rgba(0,180,240,0.12);--cy:#00d0f0;--gn:#3cd9a0;--am:#d4a020;--wh:#d0dce8;--tx:rgba(185,205,225,0.85);--dm:rgba(145,170,195,0.3);--mc:rgba(120,145,170,0.2);--mo:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;--br:'Orbitron',sans-serif}

.tb{font-family:var(--br);font-size:10px;font-weight:700;color:var(--cy);letter-spacing:3px}.ts{font-size:8px;font-family:var(--mo);color:var(--dm)}.ts b{color:var(--cy);font-family:var(--br);font-size:9px}.tsp{width:1px;height:12px;background:var(--bb);margin:0 6px}
#left{grid-area:left;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;z-index:5}
.lh{padding:6px 12px;font-family:var(--mo);font-size:7px;letter-spacing:2px;color:var(--dm);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2}
.ag{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.012);cursor:pointer;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;transition:all .15s}
.ag:hover{background:rgba(0,180,220,0.02)}.ag.sel{background:rgba(0,200,230,0.08);border-left-color:var(--cy)}.ag.sel .an{color:#fff}.ag.msel{background:rgba(0,180,220,0.04);border-left-color:rgba(0,200,230,0.3)}.ag.gated{border-left-color:var(--am)!important}
.an{font-size:10px;font-weight:600;color:var(--dm);transition:color .15s;flex:1}.as{font-size:7px;font-family:var(--mo);color:var(--dm)}.aw{font-size:8px;color:var(--am)}
#center{grid-area:center;position:relative;overflow:hidden;background:var(--bg)}#cv{position:absolute;inset:0;z-index:2}
#tiles{grid-area:tiles;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:2px 8px 5px;z-index:5}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:5px 7px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}.tile.sel{border-color:rgba(0,208,240,0.5);background:rgba(0,200,230,0.10)}
.tile .tl{font-family:var(--mo);font-size:7px;letter-spacing:1px;color:var(--dm)}.tile.sel .tl{color:var(--cy)}.tile .tv{font-size:8px;color:var(--tx);margin-top:1px}.tile .ti2{font-size:14px}
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;z-index:5}
.rb{padding:8px 12px;border-bottom:1px solid var(--border)}.rl{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px}.ro{font-family:var(--br);font-size:28px;font-weight:900;line-height:1}.rn{font-size:12px;font-weight:700;color:var(--wh);margin-top:3px}.ra{font-size:8px;color:var(--dm);margin-top:1px}
.rtag{font-size:7px;padding:1px 5px;border-radius:2px;font-family:var(--mo);border:1px solid var(--border);color:var(--dm);display:inline-block;margin:3px 3px 0 0}.rtag.hi{border-color:rgba(0,208,240,0.2);color:var(--cy)}
.rbar{height:2px;border-radius:1px;background:rgba(0,160,200,0.06);margin-top:2px;overflow:hidden}.rbar .f{height:100%;background:var(--cy);border-radius:1px}.rbl{font-size:6px;color:var(--mc);font-family:var(--mo);display:flex;justify-content:space-between;margin-top:2px}
.ralt{background:rgba(200,72,72,0.04);border:1px solid rgba(200,72,72,0.12);border-radius:3px;padding:5px 8px;margin-top:4px}
#bot{grid-area:bot;background:var(--panel);border-top:1px solid var(--bb);display:grid;grid-template-columns:1.3fr 0.7fr;z-index:5}
.bz{padding:6px 12px;overflow-y:auto}.bz:first-child{border-right:1px solid var(--border)}.bt{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
.pr{display:flex;align-items:center;gap:5px;padding:1px 0;font-size:8px;transition:opacity .3s;border-bottom:1px solid rgba(255,255,255,0.01)}.pr.faded{opacity:.12}
.pip{cursor:pointer;padding:2px 5px;display:flex;align-items:center;gap:5px;font-size:8px;border-left:3px solid transparent;transition:all .12s}.pip:hover{background:rgba(0,180,220,0.02)}.pip.sel{background:rgba(212,160,32,0.06);border-left-color:var(--am)}.pip.sel .pn{color:var(--am)}
.pw{font-size:7px;font-family:var(--mo);font-weight:600;padding:1px 3px;border-radius:2px}.pw.m{background:rgba(0,208,240,0.08);color:var(--cy)}.pw.w{background:rgba(212,160,32,0.08);color:var(--am)}
.ctx{padding:6px 12px;border-bottom:1px solid var(--border);font-family:var(--mo);font-size:6px;letter-spacing:1px}.ctx-row{margin-bottom:1px;display:flex;gap:4px;align-items:center}.ctx-dot{width:5px;height:5px;border-radius:50%}
#tooltip{position:absolute;z-index:20;pointer-events:none;font-family:var(--mo);font-size:10px;color:var(--cy);background:rgba(4,10,22,0.94);border:1px solid rgba(0,200,230,0.25);padding:6px 12px;border-radius:4px;opacity:0;transition:opacity .15s;box-shadow:0 2px 12px rgba(0,0,0,0.5)}#tooltip.vis{opacity:1}.tt-label{font-size:10px;font-weight:600;color:var(--wh);margin-bottom:2px}.tt-detail{font-size:8px;color:var(--tx)}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:36px 1fr auto 180px;grid-template-areas:"top" "center" "tiles" "bot"}#left,#right{display:none}#tiles{grid-template-columns:repeat(2,1fr)}#center{min-height:360px}}
</style></head><body>

<script>

{n:'Financial Agent',s:'Benchmarking',mode:'planning',gated:false,c:'#3cd9a0',sec:'planning',pl:'PRICE',task:'Wash Parish \u2014 $95-165/hr',finding:'Avg $127/hr'},
{n:'Winnability Agent',s:'Scoring',mode:'planning',gated:false,c:'#d4a020',sec:'winnability',pl:'PWIN',task:'OPSB \u2014 PWIN 62%',finding:'Location 10/10'},
{n:'CRM Agent',s:'Mapping',mode:'memory',gated:false,c:'#a78bfa',sec:'crm',pl:'CRM',task:'NOLA \u2014 2 contacts',finding:'Ops dir warm'},
{n:'Quality Gate',s:'Auditing',mode:'gate',gated:true,c:'#d4a020',sec:'gate',pl:'GATE',task:'St. George \u2014 Exhibit D',finding:'3 blocking'},

{n:'Dashboard Agent',s:'Compiling',mode:'memory',gated:false,c:'#818cf8',sec:'memory',pl:'BRIEF',task:'8 new memories',finding:'6 events'},

{n:'Staffing Agent',s:'Blocked',mode:'gate',gated:true,c:'#f59e0b',sec:'winnability',pl:'STAFF',task:'Position matching',finding:'Gated'}
];
var PIPE=[{n:'NOLA Water',opi:94,stage:'pursuing',due:'Unsolicited'},{n:'DR-4900 LA',opi:92,stage:'identified',due:'TBD'},{n:'Washington Parish',opi:88,stage:'pursuing',due:'May 8'},{n:'St. George',opi:85,stage:'watching',due:'Apr 24'},{n:'OPSB CM',opi:78,stage:'new',due:'Apr 30'}];

{id:'planning',label:'PLANNING',c:'0,208,240',a0:-90,a1:-90+SW,tp:0.7,stat:'3 ACTIVE'},
{id:'intelligence',label:'INTEL',c:'6,182,212',a0:-90+SW+G,a1:-90+2*SW+G,tp:0.5,stat:'SCANNING'},
{id:'winnability',label:'WINNABILITY',c:'212,180,60',a0:-90+2*(SW+G),a1:-90+3*SW+2*G,tp:0.4,stat:'SCORING'},
{id:'gate',label:'QTY GATE',c:'212,160,32',a0:-90+3*(SW+G),a1:-90+4*SW+3*G,tp:0.2,stat:'3 HOLDS'},
{id:'crm',label:'CRM',c:'167,139,250',a0:-90+4*(SW+G),a1:-90+5*SW+4*G,tp:0.3,stat:'MAPPING'},
{id:'memory',label:'MEMORY',c:'130,140,250',a0:-90+5*(SW+G),a1:-90+6*SW+5*G,tp:0.6,stat:'5.6K'},
{id:'synthesis',label:'SYNTHESIS',c:'96,165,250',a0:-90+6*(SW+G),a1:-90+7*SW+6*G,tp:0.8,stat:'DRAFTING'}
];
var OUTE=[{from:'synthesis',label:'PROPOSAL',c:'96,165,250',fy:0.22},{from:'gate',label:'VALIDATION',c:'212,160,32',fy:0.50},{from:'memory',label:'BRIEFING',c:'130,140,250',fy:0.78}];
var MSEC={planning:['planning','intelligence','winnability'],memory:['memory','crm'],synthesis:['synthesis','planning'],gate:['gate','winnability']};
var sA=-1,sM='',sP=-1;
function act(id){if(sA>=0)return AG[sA].sec===id?1:0;if(sM)return(MSEC[sM]||[]).indexOf(id)>=0?0.95:0;return 0.04;}
function isG(id){return id==='gate'&&(sM==='gate'||(sA>=0&&AG[sA].gated&&AG[sA].sec==='gate'));}
function isQ(id){return id==='synthesis'&&(sM==='gate'||(sA>=0&&AG[sA].gated));}
function pOn(i){if(sA>=0)return i===sA;if(sM)return AG[i]&&AG[i].mode===sM;return true;}

(function(){var el=document.getElementById('agl');AG.forEach(function(a,i){var r=document.createElement('div');r.className='ag'+(a.gated?' gated':'');r.innerHTML='<div style="width:3px;min-height:24px;border-radius:1px;background:'+a.c+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div class="an">'+a.n+'</div><div class="as"><b style="color:'+(a.gated?'var(--am)':a.c)+'">'+a.s+'</b> \u00B7 '+a.sec+'</div></div>'+(a.gated?'<span class="aw">\u26A0</span>':'');r.onclick=function(){sA=sA===i?-1:i;sM='';aS();uR();uT();};el.appendChild(r);});})();
function aS(){document.querySelectorAll('.ag').forEach(function(e,j){e.classList.remove('sel','msel');if(sA>=0&&j===sA)e.classList.add('sel');else if(sM&&AG[j].mode===sM)e.classList.add('msel');});document.querySelectorAll('.tile').forEach(function(e){e.classList.toggle('sel',e.dataset.mode===sM);});}
document.querySelectorAll('.tile').forEach(function(el){el.onclick=function(){var m=el.dataset.mode;sM=sM===m?'':m;sA=-1;aS();uR();uT();};});
function uT(){var el=document.getElementById('rtl');el.innerHTML='';EVT.forEach(function(e){var f=sM&&e.mode!==sM;var r=document.createElement('div');r.className='pr'+(f?' faded':'');r.innerHTML='<div style="width:6px;height:6px;border-radius:2px;background:'+(e.w==='Warning'?'var(--am)':'var(--cy)')+';flex-shrink:0"></div><span style="font-family:var(--mo);color:var(--dm);min-width:28px;font-size:7px">'+e.t+'</span><span style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+e.a+'</span><span class="pw '+(e.w==='Warning'?'w':'m')+'">'+e.w+'</span><span style="font-size:7px;color:var(--dm);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.d+'</span>';el.appendChild(r);});}uT();
(function(){var el=document.getElementById('pipl');PIPE.forEach(function(p,i){var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';var r=document.createElement('div');r.className='pip';r.innerHTML='<span style="font-family:var(--br);font-weight:700;color:'+oc+';min-width:22px;font-size:8px">'+p.opi+'</span><span class="pn" style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+p.n+'</span><span class="pw m">'+p.stage+'</span><span style="font-size:7px;color:var(--dm);flex:1">'+p.due+'</span>';r.onclick=function(){sP=sP===i?-1:i;document.querySelectorAll('.pip').forEach(function(e,j){e.classList.toggle('sel',j===sP);});uR();};el.appendChild(r);});})();
function uR(){var el=document.getElementById('rr'),h='';var p=sP>=0?PIPE[sP]:PIPE[0];var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';
h+='<div class="ctx"><div class="ctx-row"><div class="ctx-dot" style="background:'+(sP>=0?'var(--am)':'var(--mc)')+'"></div><span style="color:'+(sP>=0?'var(--am)':'var(--mc)')+'">PURSUIT: '+(sP>=0?p.n:'Default')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sM?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sM?'var(--cy)':'var(--mc)')+'">MODE: '+(sM?sM.toUpperCase():'None')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sA>=0?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sA>=0?'var(--cy)':'var(--mc)')+'">AGENT: '+(sA>=0?AG[sA].n:'None')+'</span></div></div>';
h+='<div class="rb"><div class="rl">'+(sP>=0?'SELECTED':'PRIORITY')+' PURSUIT</div><div class="ro" style="color:'+oc+'">'+p.opi+'</div><div class="rn">'+p.n+'</div><span class="rtag">'+p.due+'</span><span class="rtag hi">'+p.stage+'</span></div>';
if(sA>=0){var a=AG[sA];h+='<div class="rb"><div class="rl">AGENT</div><div style="font-size:11px;font-weight:700;color:'+a.c+'">'+a.n+'</div><div class="ra">'+(a.gated?'\u26A0 GATED':a.s)+' \u00B7 '+a.sec+'</div><div style="margin-top:5px"><div class="rl">TASK</div><div style="font-size:8px;color:var(--tx)">'+a.task+'</div></div><div style="margin-top:5px"><div class="rl">FINDING</div><div style="font-size:8px;color:var(--tx)">'+a.finding+'</div></div>';if(a.gated)h+='<div class="ralt"><div style="font-family:var(--mo);font-size:7px;color:var(--am);font-weight:600">\u26A0 BLOCKED</div><div style="font-size:8px;color:var(--dm);margin-top:2px">Pending prerequisite</div></div>';h+='</div>';}
else if(sM){h+='<div class="rb"><div class="rl">'+sM.toUpperCase()+' MODE</div>';AG.filter(function(a){return a.mode===sM;}).forEach(function(a){h+='<div style="margin-bottom:5px"><div style="font-size:9px;font-weight:600;color:'+(a.gated?'var(--am)':a.c)+'">'+a.n+(a.gated?' \u26A0':'')+'</div><div style="font-size:8px;color:var(--tx);margin-top:1px">'+a.task+'</div></div>';});h+='</div>';}
else{h+='<div class="rb"><div class="rl">OPI FACTORS</div>';[['KB Match',95],['Competitive',92],['Relationship',98],['Staff',85],['Strategic',90]].forEach(function(f){h+='<div class="rbl"><span>'+f[0]+'</span><span>'+f[1]+'%</span></div><div class="rbar"><div class="f" style="width:'+f[1]+'%"></div></div>';});h+='</div>';}el.innerHTML=h;}uR();

var cv=document.getElementById('cv'),X=cv.getContext('2d');
function rs(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;}
rs();window.addEventListener('resize',rs);
var PK=[];setInterval(function(){if(PK.length<4){var i=Math.floor(Math.random()*AG.length);if(!AG[i].gated)PK.push({i:i,p:0,v:0.005+Math.random()*0.004});}},1200);
var t=0,D=Math.PI/180;
function mA(s){return((s.a0+s.a1)/2)*D;}
function eP(s,cx,cy,r){var a=mA(s);return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};}
function bz(ax,ay,mx,my,bx,by,t){var u=1-t;return{x:u*u*ax+2*u*t*mx+t*t*bx,y:u*u*ay+2*u*t*my+t*t*by};}

function draw(){
requestAnimationFrame(draw);t+=0.016;
var W=cv.width,H=cv.height;X.clearRect(0,0,W,H);
var sel=sA>=0||sM!=='',CX=W*0.50,CY=H*0.47,dm=Math.min(W,H);
var ri=dm*0.15,ro=dm*0.44;
var pulse=0.5+0.5*Math.sin(t*1.2),isP=sP>=0;
var cc=isP?'212,180,80':'0,208,240';
var anyG=sM==='gate'||(sA>=0&&AG[sA].gated);

// ═══ WEDGES ═══
SEC.forEach(function(s){
  var a=act(s.id),gated=isG(s.id),queued=isQ(s.id);
  var sc=gated?'212,160,32':s.c;
  var hb=0.5+0.5*Math.sin(t*(gated?4.5:1.3)+s.a0*0.02);

  // Fill — 3 distinct states
  X.beginPath();X.arc(CX,CY,ro,s.a0*D,s.a1*D);X.arc(CX,CY,ri+2,s.a1*D,s.a0*D,true);X.closePath();
  if(gated) X.fillStyle='rgba(212,160,32,'+(0.12+0.16*hb)+')';
  else if(queued) X.fillStyle='rgba(212,160,32,0.04)';
  else if(a>0.5) X.fillStyle='rgba('+sc+','+(0.08+a*0.22)+')';
  else if(a>0.02) X.fillStyle='rgba('+sc+',0.02)';
  else X.fillStyle='rgba(4,8,18,0.4)';
  X.fill();

  // Outer arc
  X.beginPath();X.arc(CX,CY,ro,s.a0*D,s.a1*D);

SEC.forEach(function(s){var a=act(s.id);if(a<0.02)return;X.beginPath();X.arc(CX,CY,ri-3,s.a0*D,s.a1*D);X.strokeStyle='rgba('+(isG(s.id)?'212,160,32':s.c)+','+(a*0.40)+')';X.lineWidth=3;X.stroke();});

X.fillStyle='rgba(3,6,16,0.98)';X.beginPath();X.arc(CX,CY,ri,0,Math.PI*2);X.fill();

X.beginPath();X.arc(CX,CY,ri*0.65,0,Math.PI*2);X.strokeStyle='rgba('+cc+','+(0.18+0.12*pulse)+')';X.lineWidth=1;X.stroke();

else{X.font='900 '+Math.round(ri*0.28)+'px "Orbitron",sans-serif';X.fillStyle='rgba(0,208,240,'+(0.45+0.25*pulse)+')';X.fillText('HGI',CX,CY-ri*0.05);X.font='500 '+Math.round(ri*0.10)+'px "Share Tech Mono",monospace';X.fillStyle='rgba(0,208,240,'+(0.22+0.12*pulse)+')';X.fillText('ORGANISM',CX,CY+ri*0.20);}

// ═══ FLOW: Wedge-to-core ═══
SEC.forEach(function(s){var a=act(s.id);if(a<0.04||isG(s.id))return;var prog=((t*(a>0.5?0.5:0.2)+s.a0*0.01)%1);var ma=mA(s);var sR=ri+12+(ro-ri-12)*0.65;var eR=ri+5;var r=sR-(sR-eR)*prog;X.fillStyle='rgba('+s.c+','+(a>0.5?a*0.55:0.08)+')';X.beginPath();X.arc(CX+Math.cos(ma)*r,CY+Math.sin(ma)*r,a>0.5?6:2.5,0,Math.PI*2);X.fill();});

// ═══ INBOUND CHANNELS ═══
AG.forEach(function(a,i){if(i>=10||!sel||!pOn(i))return;var s=SEC.find(function(s){return s.id===a.sec;});if(!s)return;var ep=eP(s,CX,CY,ro+2);var ay=H*(0.04+i*0.092);var mx=W*0.12,my=ay*0.35+ep.y*0.65;
if(!a.gated){X.beginPath();X.moveTo(0,ay);X.quadraticCurveTo(mx,my,ep.x,ep.y);X.strokeStyle=a.c;X.globalAlpha=0.08;X.lineWidth=20;X.stroke();X.globalAlpha=1;}
X.beginPath();X.moveTo(0,ay);X.quadraticCurveTo(mx,my,ep.x,ep.y);X.strokeStyle=a.gated?'#d4a020':a.c;X.globalAlpha=a.gated?0.45:0.75;X.lineWidth=a.gated?2.5:4;if(a.gated)X.setLineDash([6,4]);X.stroke();X.setLineDash([]);X.globalAlpha=1;
if(a.gated){var bp=bz(0,ay,mx,my,ep.x,ep.y,0.70);var perp=Math.atan2(ep.y-ay,ep.x)+Math.PI/2;var bpulse=0.5+0.5*Math.sin(t*5.5);X.fillStyle='rgba(212,160,32,'+(0.20*bpulse)+')';X.beginPath();X.arc(bp.x,bp.y,22,0,Math.PI*2);X.fill();X.beginPath();X.moveTo(bp.x+Math.cos(perp)*18,bp.y+Math.sin(perp)*18);X.lineTo(bp.x-Math.cos(perp)*18,bp.y-Math.sin(perp)*18);X.strokeStyle='rgba(212,160,32,'+(0.75+0.20*bpulse)+')';X.lineWidth=5;X.stroke();}
X.font='700 10px "Share Tech Mono",monospace';X.fillStyle=a.gated?'rgba(212,160,32,0.85)':'rgba('+s.c+',0.75)';X.textAlign='left';X.textBaseline='middle';X.fillText(a.pl,5,ay);});

// ═══ OUTBOUND ═══
OUTE.forEach(function(o){var s=SEC.find(function(s){return s.id===o.from;});if(!s)return;var ep=eP(s,CX,CY,ro+2);var on=sM==='synthesis'||(sA>=0&&AG[sA].sec===o.from);if(!on)return;var bx=W,by=H*o.fy;var mx=W*0.82,my=ep.y*0.35+by*0.65;

var oprog=((t*0.25)%1);var op=bz(ep.x,ep.y,mx,my,bx,by,oprog);X.fillStyle='rgba('+o.c+',0.60)';X.beginPath();X.arc(op.x,op.y,8,0,Math.PI*2);X.fill();});

// ═══ INBOUND PACKETS ═══
for(var pi=PK.length-1;pi>=0;pi--){var pk=PK[pi];pk.p+=pk.v;if(pk.p>=1){PK.splice(pi,1);continue;}var a=AG[pk.i];if(!a)continue;var s=SEC.find(function(s){return s.id===a.sec;});if(!s)continue;if(!pOn(pk.i)&&sel)continue;var ep=eP(s,CX,CY,ro+2);var ay=H*(0.04+pk.i*0.092);var mx=W*0.12,my=ay*0.35+ep.y*0.65;if(a.gated&&pk.p>0.68){PK.splice(pi,1);continue;}var pt=bz(0,ay,mx,my,ep.x,ep.y,pk.p);var sz=sel?11:4;var g=X.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sz);g.addColorStop(0,a.gated?'#d4a020':a.c);g.addColorStop(1,'rgba(0,0,0,0)');X.fillStyle=g;X.beginPath();X.arc(pt.x,pt.y,sz,0,Math.PI*2);X.fill();X.fillStyle='#fff';X.globalAlpha=sel?0.92:0.35;X.beginPath();X.arc(pt.x,pt.y,sel?3:1,0,Math.PI*2);X.fill();X.globalAlpha=1;}

}
