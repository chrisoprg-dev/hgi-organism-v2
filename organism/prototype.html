<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HGI ORGANISM — Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#040a14;--panel:#0a1228;--border:rgba(0,160,220,0.06);--bb:rgba(0,180,240,0.12);--cy:#00d0f0;--gn:#3cd9a0;--am:#d4a020;--rd:#c84848;--wh:#d0dce8;--tx:rgba(185,205,225,0.85);--dm:rgba(145,170,195,0.3);--mc:rgba(120,145,170,0.2);--mo:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;--br:'Orbitron',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--ui);font-weight:500}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,160,200,0.1)}
#app{display:grid;width:100%;height:100%;grid-template-columns:220px 1fr 250px;grid-template-rows:36px 1fr auto 140px;grid-template-areas:"top top top" "left center right" "left tiles right" "bot bot bot"}
#top{grid-area:top;background:var(--panel);border-bottom:1px solid var(--bb);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10}
.tb{font-family:var(--br);font-size:10px;font-weight:700;color:var(--cy);letter-spacing:3px}
.ts{font-size:8px;font-family:var(--mo);color:var(--dm)}.ts b{color:var(--cy);font-family:var(--br);font-size:9px}
.tsp{width:1px;height:12px;background:var(--bb);margin:0 6px}
#left{grid-area:left;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;z-index:5}
.lh{padding:6px 12px;font-family:var(--mo);font-size:7px;letter-spacing:2px;color:var(--dm);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2}
.ag{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.012);cursor:pointer;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;transition:all .15s}
.ag:hover{background:rgba(0,180,220,0.02)}.ag.sel{background:rgba(0,200,230,0.08);border-left-color:var(--cy)}.ag.sel .an{color:#fff}
.ag.msel{background:rgba(0,180,220,0.04);border-left-color:rgba(0,200,230,0.3)}.ag.gated{border-left-color:var(--am)!important}
.an{font-size:10px;font-weight:600;color:var(--dm);transition:color .15s;flex:1}.as{font-size:7px;font-family:var(--mo);color:var(--dm)}.aw{font-size:8px;color:var(--am)}
#center{grid-area:center;position:relative;overflow:hidden;background:var(--bg)}
#cv{position:absolute;inset:0;z-index:2}
#tiles{grid-area:tiles;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:2px 8px 5px;z-index:5}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:5px 7px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
.tile.sel{border-color:rgba(0,208,240,0.5);background:rgba(0,200,230,0.10)}
.tile .tl{font-family:var(--mo);font-size:7px;letter-spacing:1px;color:var(--dm)}.tile.sel .tl{color:var(--cy)}
.tile .tv{font-size:8px;color:var(--tx);margin-top:1px}.tile .ti2{font-size:14px}
#right{grid-area:right;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;z-index:5}
.rb{padding:8px 12px;border-bottom:1px solid var(--border)}.rl{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px}
.ro{font-family:var(--br);font-size:28px;font-weight:900;line-height:1}.rn{font-size:12px;font-weight:700;color:var(--wh);margin-top:3px}
.ra{font-size:8px;color:var(--dm);margin-top:1px}
.rtag{font-size:7px;padding:1px 5px;border-radius:2px;font-family:var(--mo);border:1px solid var(--border);color:var(--dm);display:inline-block;margin:3px 3px 0 0}
.rtag.hi{border-color:rgba(0,208,240,0.2);color:var(--cy)}
.rbar{height:2px;border-radius:1px;background:rgba(0,160,200,0.06);margin-top:2px;overflow:hidden}.rbar .f{height:100%;background:var(--cy);border-radius:1px}
.rbl{font-size:6px;color:var(--mc);font-family:var(--mo);display:flex;justify-content:space-between;margin-top:2px}
.ralt{background:rgba(200,72,72,0.04);border:1px solid rgba(200,72,72,0.12);border-radius:3px;padding:5px 8px;margin-top:4px}
#bot{grid-area:bot;background:var(--panel);border-top:1px solid var(--bb);display:grid;grid-template-columns:1.3fr 0.7fr;z-index:5}
.bz{padding:6px 12px;overflow-y:auto}.bz:first-child{border-right:1px solid var(--border)}
.bt{font-family:var(--mo);font-size:6px;letter-spacing:2px;color:var(--mc);margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
.pr{display:flex;align-items:center;gap:5px;padding:1px 0;font-size:8px;transition:opacity .3s;border-bottom:1px solid rgba(255,255,255,0.01)}.pr.faded{opacity:.12}
.pip{cursor:pointer;padding:2px 5px;display:flex;align-items:center;gap:5px;font-size:8px;border-left:3px solid transparent;transition:all .12s}
.pip:hover{background:rgba(0,180,220,0.02)}.pip.sel{background:rgba(212,160,32,0.06);border-left-color:var(--am)}.pip.sel .pn{color:var(--am)}
.pw{font-size:7px;font-family:var(--mo);font-weight:600;padding:1px 3px;border-radius:2px}.pw.m{background:rgba(0,208,240,0.08);color:var(--cy)}.pw.w{background:rgba(212,160,32,0.08);color:var(--am)}
.ctx{padding:6px 12px;border-bottom:1px solid var(--border);font-family:var(--mo);font-size:6px;letter-spacing:1px}
.ctx-row{margin-bottom:1px;display:flex;gap:4px;align-items:center}.ctx-dot{width:5px;height:5px;border-radius:50%}
#tooltip{position:absolute;z-index:20;pointer-events:none;font-family:var(--mo);font-size:10px;color:var(--cy);background:rgba(4,10,22,0.94);border:1px solid rgba(0,200,230,0.25);padding:6px 12px;border-radius:4px;opacity:0;transition:opacity .15s;box-shadow:0 2px 12px rgba(0,0,0,0.5)}
#tooltip.vis{opacity:1}.tt-label{font-size:10px;font-weight:600;color:var(--wh);margin-bottom:2px}.tt-detail{font-size:8px;color:var(--tx)}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:36px 1fr auto 180px;grid-template-areas:"top" "center" "tiles" "bot"}#left,#right{display:none}#tiles{grid-template-columns:repeat(2,1fr);padding:5px 10px 8px}#center{min-height:340px}}
</style>
</head>
<body>
<div id="app">
<div id="top">
  <span class="tb">HGI ORGANISM</span><span class="tsp"></span>
  <span class="ts">Agents: <b>15</b></span><span class="tsp"></span>
  <span class="ts">Active: <b style="color:var(--gn)">10</b></span><span class="tsp"></span>
  <span class="ts">Gated: <b style="color:var(--am)">3</b></span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <span style="width:6px;height:6px;border-radius:50%;background:var(--gn);box-shadow:0 0 6px var(--gn)"></span>
    <span class="ts">LIVE</span>
  </span>
</div>
<div id="left"><div class="lh">AGENT ROSTER</div><div id="agl"></div></div>
<div id="center"><canvas id="cv"></canvas><div id="tooltip"></div></div>
<div id="tiles">
  <div class="tile" data-mode="planning"><span class="ti2">&#9670;</span><div><div class="tl">PLANNING</div><div class="tv">3 agents</div></div></div>
  <div class="tile" data-mode="memory"><span class="ti2">&#11041;</span><div><div class="tl">MEMORY</div><div class="tv">2 agents</div></div></div>
  <div class="tile" data-mode="synthesis"><span class="ti2">&#9671;</span><div><div class="tl">SYNTHESIS</div><div class="tv">2 agents</div></div></div>
  <div class="tile" data-mode="gate"><span class="ti2">&#11042;</span><div><div class="tl">QUALITY GATE</div><div class="tv">3 gated</div></div></div>
</div>
<div id="right"><div id="rr"></div></div>
<div id="bot">
  <div class="bz"><div class="bt">ROUTING TIMELINE</div><div id="rtl"></div><div class="bt" style="margin-top:5px">PIPELINE</div><div id="pipl"></div></div>
  <div class="bz"><div class="bt">SYSTEM STATUS</div>
    <div style="font-family:var(--br);font-size:18px;font-weight:900;color:var(--wh);margin:3px 0">15 agents deployed</div>
    <div style="display:flex;gap:14px;margin-top:4px">
      <div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--gn)">10</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Active</div></div>
      <div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--am)">3</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Gated</div></div>
      <div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--cy)">5</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Pursuits</div></div>
      <div><div style="font-family:var(--br);font-size:13px;font-weight:700;color:var(--wh)">5.6K</div><div style="font-size:7px;color:var(--dm);font-family:var(--mo)">Memories</div></div>
    </div>
  </div>
</div>
</div>
<script>
var AG=[
  {n:'Intelligence Engine',s:'Scanning',mode:'planning',gated:false,c:'#00d0f0',sector:'intelligence',plabel:'INTEL',task:'OPSB CM \u2014 3 competitors identified',finding:'CSRS confirmed bidding'},
  {n:'Financial Agent',s:'Benchmarking',mode:'planning',gated:false,c:'#3cd9a0',sector:'planning',plabel:'PRICE',task:'Washington Parish \u2014 $95-165/hr',finding:'Avg base rate $127/hr'},
  {n:'Winnability Agent',s:'Scoring',mode:'planning',gated:false,c:'#d4a020',sector:'winnability',plabel:'PWIN',task:'OPSB CM \u2014 PWIN 62%',finding:'Location 10/10'},
  {n:'CRM Agent',s:'Mapping',mode:'memory',gated:false,c:'#a78bfa',sector:'crm',plabel:'CRM',task:'NOLA \u2014 2 contacts confirmed',finding:'Ops director warm'},
  {n:'Quality Gate',s:'Auditing',mode:'gate',gated:true,c:'#d4a020',sector:'gate',plabel:'GATE',task:'St. George \u2014 Exhibit D missing',finding:'3 blocking items'},
  {n:'Proposal Writer',s:'Drafting',mode:'synthesis',gated:false,c:'#60a5fa',sector:'synthesis',plabel:'DRAFT',task:'NOLA exec summary \u2014 47K',finding:'Draft pending review'},
  {n:'Red Team',s:'Blocked',mode:'gate',gated:true,c:'#c84848',sector:'gate',plabel:'REVIEW',task:'Awaiting proposals',finding:'Blocked on completion'},
  {n:'Dashboard Agent',s:'Compiling',mode:'memory',gated:false,c:'#818cf8',sector:'memory',plabel:'BRIEF',task:'8 new memories overnight',finding:'6 events, 2 gates'},
  {n:'Pipeline Scanner',s:'Monitoring',mode:'planning',gated:false,c:'#06b6d4',sector:'planning',plabel:'SCAN',task:'5 deadlines tracked',finding:'OPSB Apr 30'},
  {n:'Staffing Agent',s:'Blocked',mode:'gate',gated:true,c:'#f59e0b',sector:'winnability',plabel:'STAFF',task:'Position matching',finding:'Gated \u2014 awaiting reqs'}
];
var PIPE=[
  {n:'NOLA Water',opi:94,stage:'pursuing',due:'Unsolicited',agency:'SWBNO'},
  {n:'DR-4900 LA',opi:92,stage:'identified',due:'TBD',agency:'FEMA'},
  {n:'Washington Parish',opi:88,stage:'pursuing',due:'May 8',agency:'WPSB'},
  {n:'St. George',opi:85,stage:'watching',due:'Apr 24',agency:'St. George'},
  {n:'OPSB CM',opi:78,stage:'new',due:'Apr 30',agency:'OPSB'}
];
var EVT=[
  {t:'14:52',a:'Scanner',w:'Match',d:'Addendum on JP SOQ',mode:'planning'},
  {t:'14:54',a:'Gate',w:'Warning',d:'Missing insurance \u2014 St. George',mode:'gate'},
  {t:'14:56',a:'Winnability',w:'Match',d:'OPSB winnability complete',mode:'planning'},
  {t:'14:55',a:'Writer',w:'Warning',d:'Exec summary over limit',mode:'synthesis'},
  {t:'14:53',a:'Intel',w:'Match',d:'CSRS confirmed on OPSB',mode:'planning'},
  {t:'14:50',a:'CRM',w:'Match',d:'SWBNO contact responded',mode:'memory'},
  {t:'14:48',a:'Financial',w:'Match',d:'Rate benchmark updated',mode:'planning'}
];

var SEC=[
  {id:'planning',   label:'PLANNING',     ang:-90, c:'0,208,240'},
  {id:'intelligence',label:'INTELLIGENCE',ang:-38, c:'6,182,212'},
  {id:'winnability', label:'WINNABILITY',  ang:14,  c:'212,180,60'},
  {id:'gate',        label:'QUALITY GATE', ang:62,  c:'212,160,32'},
  {id:'crm',         label:'CRM',          ang:114, c:'167,139,250'},
  {id:'memory',      label:'MEMORY',       ang:166, c:'130,140,250'},
  {id:'synthesis',   label:'SYNTHESIS',    ang:218, c:'96,165,250'}
];
var ARCS=[['planning','intelligence'],['intelligence','winnability'],['winnability','gate'],['planning','synthesis'],['synthesis','gate'],['memory','synthesis'],['crm','memory'],['intelligence','memory']];
var OUT=[
  {from:'synthesis',label:'PROPOSAL',  c:'96,165,250', fy:0.22},
  {from:'gate',     label:'VALIDATION',c:'212,160,32', fy:0.50},
  {from:'memory',   label:'BRIEFING',  c:'130,140,250',fy:0.78}
];
var MSEC={planning:['planning','intelligence','winnability'],memory:['memory','crm'],synthesis:['synthesis','planning'],gate:['gate','winnability']};

var sA=-1,sM='',sP=-1;
function act(id){if(sA>=0)return AG[sA].sector===id?1:0.02;if(sM)return(MSEC[sM]||[]).indexOf(id)>=0?0.9:0.03;return 0.10;}
function pAct(i){if(sA>=0)return i===sA;if(sM)return AG[i]&&AG[i].mode===sM;return true;}

// Left rail
(function(){var el=document.getElementById('agl');AG.forEach(function(a,i){var r=document.createElement('div');r.className='ag'+(a.gated?' gated':'');r.innerHTML='<div style="width:3px;min-height:24px;border-radius:1px;background:'+a.c+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div class="an">'+a.n+'</div><div class="as"><b style="color:'+(a.gated?'var(--am)':a.c)+'">'+a.s+'</b> \u00B7 '+a.sector+'</div></div>'+(a.gated?'<span class="aw">\u26A0</span>':'');r.onclick=function(){sA=sA===i?-1:i;sM='';aS();uR();uT();};el.appendChild(r);});})();
function aS(){document.querySelectorAll('.ag').forEach(function(e,j){e.classList.remove('sel','msel');if(sA>=0&&j===sA)e.classList.add('sel');else if(sM&&AG[j].mode===sM)e.classList.add('msel');});document.querySelectorAll('.tile').forEach(function(e){e.classList.toggle('sel',e.dataset.mode===sM);});}
document.querySelectorAll('.tile').forEach(function(el){el.onclick=function(){var m=el.dataset.mode;sM=sM===m?'':m;sA=-1;aS();uR();uT();};});
function uT(){var el=document.getElementById('rtl');el.innerHTML='';EVT.forEach(function(e){var f=sM&&e.mode!==sM;var r=document.createElement('div');r.className='pr'+(f?' faded':'');r.innerHTML='<div style="width:6px;height:6px;border-radius:2px;background:'+(e.w==='Warning'?'var(--am)':'var(--cy)')+';flex-shrink:0"></div><span style="font-family:var(--mo);color:var(--dm);min-width:28px;font-size:7px">'+e.t+'</span><span style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+e.a+'</span><span class="pw '+(e.w==='Warning'?'w':'m')+'">'+e.w+'</span><span style="font-size:7px;color:var(--dm);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.d+'</span>';el.appendChild(r);});}
uT();
(function(){var el=document.getElementById('pipl');PIPE.forEach(function(p,i){var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';var r=document.createElement('div');r.className='pip';r.innerHTML='<span style="font-family:var(--br);font-weight:700;color:'+oc+';min-width:22px;font-size:8px">'+p.opi+'</span><span class="pn" style="font-weight:600;color:var(--tx);font-size:8px;flex-shrink:0">'+p.n+'</span><span class="pw m">'+p.stage+'</span><span style="font-size:7px;color:var(--dm);flex:1">'+p.due+'</span>';r.onclick=function(){sP=sP===i?-1:i;document.querySelectorAll('.pip').forEach(function(e,j){e.classList.toggle('sel',j===sP);});uR();};el.appendChild(r);});})();
function uR(){var el=document.getElementById('rr'),h='';var p=sP>=0?PIPE[sP]:PIPE[0];var oc=p.opi>=90?'var(--gn)':p.opi>=80?'var(--cy)':'var(--am)';
h+='<div class="ctx"><div class="ctx-row"><div class="ctx-dot" style="background:'+(sP>=0?'var(--am)':'var(--mc)')+'"></div><span style="color:'+(sP>=0?'var(--am)':'var(--mc)')+'">PURSUIT: '+(sP>=0?p.n:'Default')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sM?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sM?'var(--cy)':'var(--mc)')+'">MODE: '+(sM?sM.toUpperCase():'None')+'</span></div><div class="ctx-row"><div class="ctx-dot" style="background:'+(sA>=0?'var(--cy)':'var(--mc)')+'"></div><span style="color:'+(sA>=0?'var(--cy)':'var(--mc)')+'">AGENT: '+(sA>=0?AG[sA].n:'None')+'</span></div></div>';
h+='<div class="rb"><div class="rl">'+(sP>=0?'SELECTED':'PRIORITY')+' PURSUIT</div><div class="ro" style="color:'+oc+'">'+p.opi+'</div><div class="rn">'+p.n+'</div><div class="ra">'+p.agency+'</div><span class="rtag">'+p.due+'</span><span class="rtag hi">'+p.stage+'</span></div>';
if(sA>=0){var a=AG[sA];h+='<div class="rb"><div class="rl">AGENT</div><div style="font-size:11px;font-weight:700;color:'+a.c+'">'+a.n+'</div><div class="ra">'+(a.gated?'\u26A0 GATED':a.s)+' \u00B7 '+a.sector+'</div><div style="margin-top:5px"><div class="rl">TASK</div><div style="font-size:8px;color:var(--tx)">'+a.task+'</div></div><div style="margin-top:5px"><div class="rl">FINDING</div><div style="font-size:8px;color:var(--tx)">'+a.finding+'</div></div>';if(a.gated)h+='<div class="ralt"><div style="font-family:var(--mo);font-size:7px;color:var(--am);font-weight:600">\u26A0 BLOCKED</div><div style="font-size:8px;color:var(--dm);margin-top:2px">Pending prerequisite</div></div>';h+='</div>';}
else if(sM){h+='<div class="rb"><div class="rl">'+sM.toUpperCase()+' MODE</div>';AG.filter(function(a){return a.mode===sM;}).forEach(function(a){h+='<div style="margin-bottom:5px"><div style="font-size:9px;font-weight:600;color:'+(a.gated?'var(--am)':a.c)+'">'+a.n+(a.gated?' \u26A0':'')+'</div><div style="font-size:8px;color:var(--tx);margin-top:1px">'+a.task+'</div></div>';});h+='</div>';}
else{h+='<div class="rb"><div class="rl">OPI FACTORS</div>';[['KB Match',95],['Competitive',92],['Relationship',98],['Staff',85],['Strategic',90]].forEach(function(f){h+='<div class="rbl"><span>'+f[0]+'</span><span>'+f[1]+'%</span></div><div class="rbar"><div class="f" style="width:'+f[1]+'%"></div></div>';});h+='</div>';}
el.innerHTML=h;}
uR();

// ═══ CANVAS ═══
var cv=document.getElementById('cv'),x=cv.getContext('2d');
function rs(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;}
rs();window.addEventListener('resize',rs);

var PK=[],IP=[],OP=[];
setInterval(function(){if(PK.length<5){var i=Math.floor(Math.random()*AG.length);if(!AG[i].gated)PK.push({i:i,p:0,s:0.006+Math.random()*0.005});}},1100);
setInterval(function(){if(IP.length<3){var i=Math.floor(Math.random()*ARCS.length);var a=ARCS[i];if(act(a[0])>0.06&&act(a[1])>0.06)IP.push({f:a[0],t:a[1],p:0,s:0.005+Math.random()*0.003});}},1600);
setInterval(function(){if(OP.length<2){var i=Math.floor(Math.random()*OUT.length);if(act(OUT[i].from)>0.06)OP.push({i:i,p:0,s:0.004+Math.random()*0.003});}},2000);

var t=0,D=Math.PI/180;
function sp(s,cx,cy,r){var a=s.ang*D;return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};}
function bz(ax,ay,mx,my,bx,by,t){var u=1-t;return{x:u*u*ax+2*u*t*mx+t*t*bx,y:u*u*ay+2*u*t*my+t*t*by};}

function draw(){
  requestAnimationFrame(draw);t+=0.016;
  var W=cv.width,H=cv.height;x.clearRect(0,0,W,H);
  var sel=sA>=0||sM!=='';
  var CX=W*0.50,CY=H*0.47;
  var dm=Math.min(W,H);
  var cR=dm*0.11;  // core radius — large
  var sR=dm*0.30;  // sector orbit radius
  var nR=dm*0.048; // sector node radius — large
  var pulse=0.5+0.5*Math.sin(t*1.3);
  var isP=sP>=0;
  var cc=isP?'212,180,80':'0,208,240';

  // ═══ CORE — dominant anchor ═══
  // Dark anchor disc
  x.fillStyle='rgba(4,8,20,0.95)';
  x.beginPath();x.arc(CX,CY,cR*1.8,0,Math.PI*2);x.fill();

  // Ambient halo
  var hg=x.createRadialGradient(CX,CY,cR*0.6,CX,CY,cR*2.5);
  hg.addColorStop(0,'rgba('+cc+','+(0.06+0.04*pulse)+')');
  hg.addColorStop(1,'rgba('+cc+',0)');
  x.fillStyle=hg;x.beginPath();x.arc(CX,CY,cR*2.5,0,Math.PI*2);x.fill();

  // Scanning sweep arc — ambient processing indicator
  var sweep=t*0.4;
  x.beginPath();x.arc(CX,CY,cR*1.35,sweep,sweep+0.8);
  x.strokeStyle='rgba('+cc+','+(0.15+0.08*pulse)+')';x.lineWidth=1.5;x.stroke();

  // Outer ring
  x.beginPath();x.arc(CX,CY,cR*1.2,0,Math.PI*2);
  x.strokeStyle='rgba('+cc+','+(0.12+0.06*pulse)+')';x.lineWidth=1;x.stroke();

  // Main ring — strong
  x.beginPath();x.arc(CX,CY,cR,0,Math.PI*2);
  x.strokeStyle='rgba('+cc+','+(0.6+0.25*pulse)+')';x.lineWidth=2.5;x.stroke();

  // Core fill — visible, not transparent
  var cg=x.createRadialGradient(CX,CY,0,CX,CY,cR*0.95);
  cg.addColorStop(0,'rgba('+cc+','+(0.14+0.08*pulse)+')');
  cg.addColorStop(0.7,'rgba('+cc+','+(0.05+0.03*pulse)+')');
  cg.addColorStop(1,'rgba('+cc+',0.02)');
  x.fillStyle=cg;x.beginPath();x.arc(CX,CY,cR*0.95,0,Math.PI*2);x.fill();

  // Core center point
  x.fillStyle='rgba('+cc+','+(0.4+0.25*pulse)+')';
  x.beginPath();x.arc(CX,CY,cR*0.06,0,Math.PI*2);x.fill();

  // Core text — large, confident
  x.textAlign='center';x.textBaseline='middle';
  if(isP){
    var pp=PIPE[sP];
    x.font='900 '+Math.round(cR*0.55)+'px "Orbitron",sans-serif';
    x.fillStyle='rgba(212,180,80,0.9)';
    x.fillText(pp.opi,CX,CY-cR*0.14);
    x.font='600 '+Math.round(cR*0.16)+'px "Share Tech Mono",monospace';
    x.fillStyle='rgba(212,180,80,0.6)';
    x.fillText(pp.n.toUpperCase(),CX,CY+cR*0.26);
    x.font='500 '+Math.round(cR*0.12)+'px "Share Tech Mono",monospace';
    x.fillStyle='rgba(212,180,80,0.35)';
    x.fillText(pp.stage.toUpperCase()+' \u00B7 '+pp.due,CX,CY+cR*0.48);
  }else{
    x.font='900 '+Math.round(cR*0.42)+'px "Orbitron",sans-serif';
    x.fillStyle='rgba(0,208,240,'+(0.6+0.25*pulse)+')';
    x.fillText('HGI',CX,CY-cR*0.10);
    x.font='600 '+Math.round(cR*0.15)+'px "Share Tech Mono",monospace';
    x.fillStyle='rgba(0,208,240,'+(0.30+0.10*pulse)+')';
    x.fillText('ORGANISM',CX,CY+cR*0.26);
  }

  // ═══ SECTORS — legible, meaningful ═══
  SEC.forEach(function(s){
    var p=sp(s,CX,CY,sR);
    var a=act(s.id);
    var isG=s.id==='gate'&&(sM==='gate'||(sA>=0&&AG[sA].gated&&AG[sA].sector==='gate'));
    var hb=0.55+0.45*Math.sin(t*(isG?4:1.5)+s.ang*0.04);
    var sc=isG?'212,160,32':s.c;
    var al=a*hb;

    // Sector glow — only when meaningfully active
    if(a>0.06){
      var sg=x.createRadialGradient(p.x,p.y,nR*0.3,p.x,p.y,nR*3.2);
      sg.addColorStop(0,'rgba('+sc+','+Math.min(al*0.20,0.20)+')');
      sg.addColorStop(1,'rgba('+sc+',0)');
      x.fillStyle=sg;x.beginPath();x.arc(p.x,p.y,nR*3.2,0,Math.PI*2);x.fill();
    }

    // Node disc
    x.beginPath();x.arc(p.x,p.y,nR,0,Math.PI*2);
    if(a>0.25){
      // Active: filled, strong border
      x.fillStyle='rgba('+sc+','+(al*0.25)+')';x.fill();
      x.strokeStyle='rgba('+sc+','+(0.6+0.25*hb)+')';x.lineWidth=2.5;
    }else{
      // Idle: unfilled, visible border
      x.fillStyle='rgba('+sc+',0.015)';x.fill();
      x.strokeStyle='rgba('+sc+',0.18)';x.lineWidth=1;
    }
    if(isG){x.setLineDash([4,3]);x.strokeStyle='rgba(212,160,32,'+(0.5+0.35*hb)+')';}
    x.stroke();x.setLineDash([]);

    // Active inner indicator
    if(a>0.25){
      x.fillStyle='rgba('+sc+','+(al*0.5)+')';
      x.beginPath();x.arc(p.x,p.y,nR*0.22,0,Math.PI*2);x.fill();
    }

    // Label — positioned outward, high contrast when active
    var la=s.ang*D;
    var ldist=nR+16;
    var lx=p.x+Math.cos(la)*ldist*0.4;
    var ly=p.y+Math.sin(la)*ldist;
    x.font=(a>0.25?'700 10':'500 8')+'px "Share Tech Mono",monospace';
    x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='rgba('+sc+','+(a>0.25?0.85:0.22)+')';
    x.fillText(s.label,lx,ly);
  });

  // ═══ INTER-SECTOR ARCS — only when both sectors active ═══
  ARCS.forEach(function(a){
    var s1=SEC.find(function(s){return s.id===a[0];}),s2=SEC.find(function(s){return s.id===a[1];});
    if(!s1||!s2)return;
    var both=Math.min(act(s1.id),act(s2.id));
    if(both<0.08)return;
    var p1=sp(s1,CX,CY,sR),p2=sp(s2,CX,CY,sR);
    var mx=(p1.x+p2.x)/2*0.5+CX*0.5,my=(p1.y+p2.y)/2*0.5+CY*0.5;
    x.beginPath();x.moveTo(p1.x,p1.y);x.quadraticCurveTo(mx,my,p2.x,p2.y);
    x.strokeStyle='rgba(180,200,230,'+(both>0.3?0.22:0.06)+')';
    x.lineWidth=both>0.3?1.8:0.8;x.stroke();
  });

  // ═══ INBOUND CHANNELS — none in idle, strong when active ═══
  AG.forEach(function(a,i){
    if(i>=10)return;
    var s=SEC.find(function(s){return s.id===a.sector;});if(!s)return;
    var sv=sp(s,CX,CY,sR);
    var on=pAct(i);
    var ay=H*(0.04+i*0.092);

    if(!sel){
      // Idle: no channel lines at all — clean topology
      return;
    }
    if(!on)return; // Inactive: invisible

    // Active channel
    var mx=W*0.14,my=ay*0.38+sv.y*0.62;

    // Channel glow
    if(!a.gated){
      x.beginPath();x.moveTo(0,ay);x.quadraticCurveTo(mx,my,sv.x,sv.y);
      x.strokeStyle=a.c;x.globalAlpha=0.08;x.lineWidth=14;x.stroke();x.globalAlpha=1;
    }

    // Main line
    x.beginPath();x.moveTo(0,ay);x.quadraticCurveTo(mx,my,sv.x,sv.y);
    x.strokeStyle=a.gated?'#d4a020':a.c;
    x.globalAlpha=a.gated?0.35:0.60;x.lineWidth=a.gated?2:3;
    if(a.gated)x.setLineDash([5,4]);
    x.stroke();x.setLineDash([]);x.globalAlpha=1;

    // GATED BARRIER — dramatic, unmistakable
    if(a.gated){
      var bp=bz(0,ay,mx,my,sv.x,sv.y,0.78);
      var perp=Math.atan2(sv.y-ay,sv.x-0)+Math.PI/2;
      var bpulse=0.5+0.5*Math.sin(t*5);
      // Barrier glow
      x.fillStyle='rgba(212,160,32,'+(0.20*bpulse)+')';
      x.beginPath();x.arc(bp.x,bp.y,14,0,Math.PI*2);x.fill();
      // Barrier line
      x.beginPath();
      x.moveTo(bp.x+Math.cos(perp)*14,bp.y+Math.sin(perp)*14);
      x.lineTo(bp.x-Math.cos(perp)*14,bp.y-Math.sin(perp)*14);
      x.strokeStyle='rgba(212,160,32,'+(0.7+0.25*bpulse)+')';x.lineWidth=4;x.stroke();
      // X mark at barrier
      x.font='900 12px "Orbitron",sans-serif';x.textAlign='center';x.textBaseline='middle';
      x.fillStyle='rgba(212,160,32,'+(0.6+0.3*bpulse)+')';
      x.fillText('\u2716',bp.x,bp.y);
    }

    // Label at left edge
    x.font='700 9px "Share Tech Mono",monospace';
    x.fillStyle=a.gated?'rgba(212,160,32,0.75)':'rgba('+s.c+',0.65)';
    x.textAlign='left';x.textBaseline='middle';
    x.fillText(a.plabel,5,ay);
  });

  // ═══ OUTBOUND CHANNELS ═══
  OUT.forEach(function(o){
    var s=SEC.find(function(s){return s.id===o.from;});if(!s)return;
    var sv=sp(s,CX,CY,sR);
    var on=sM==='synthesis'||(sA>=0&&AG[sA].sector===o.from);
    if(!sel&&!on)return;
    if(sel&&!on)return;
    var bx=W,by=H*o.fy;
    var mx=W*0.83,my=sv.y*0.38+by*0.62;

    // Glow
    x.beginPath();x.moveTo(sv.x,sv.y);x.quadraticCurveTo(mx,my,bx,by);
    x.strokeStyle='rgba('+o.c+',0.06)';x.lineWidth=12;x.stroke();
    // Line
    x.beginPath();x.moveTo(sv.x,sv.y);x.quadraticCurveTo(mx,my,bx,by);
    x.strokeStyle='rgba('+o.c+',0.45)';x.lineWidth=2.5;x.stroke();
    // Label
    x.font='700 9px "Share Tech Mono",monospace';
    x.fillStyle='rgba('+o.c+',0.65)';x.textAlign='right';x.textBaseline='middle';
    x.fillText('\u2192 '+o.label,W-5,by);
  });

  // ═══ DATA PACKETS: inbound ═══
  for(var pi=PK.length-1;pi>=0;pi--){
    var pk=PK[pi];pk.p+=pk.s;
    if(pk.p>=1){PK.splice(pi,1);continue;}
    var a=AG[pk.i];if(!a)continue;
    var s=SEC.find(function(s){return s.id===a.sector;});if(!s)continue;
    if(!pAct(pk.i)&&sel)continue;
    var sv=sp(s,CX,CY,sR);
    var ay=H*(0.04+pk.i*0.092);
    var mx=W*0.14,my=ay*0.38+sv.y*0.62;
    if(a.gated&&pk.p>0.75){PK.splice(pi,1);continue;}
    var pt=bz(0,ay,mx,my,sv.x,sv.y,pk.p);
    var sz=sel?8:3.5;
    var g=x.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sz);
    g.addColorStop(0,a.gated?'#d4a020':a.c);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(pt.x,pt.y,sz,0,Math.PI*2);x.fill();
    x.fillStyle='#fff';x.globalAlpha=sel?0.9:0.35;
    x.beginPath();x.arc(pt.x,pt.y,sel?2.5:1,0,Math.PI*2);x.fill();x.globalAlpha=1;
  }

  // ═══ DATA PACKETS: inter-sector ═══
  for(var ii=IP.length-1;ii>=0;ii--){
    var ip=IP[ii];ip.p+=ip.s;
    if(ip.p>=1){IP.splice(ii,1);continue;}
    var s1=SEC.find(function(s){return s.id===ip.f;}),s2=SEC.find(function(s){return s.id===ip.t;});
    if(!s1||!s2)continue;
    var both=Math.min(act(s1.id),act(s2.id));
    if(both<0.06)continue;
    var p1=sp(s1,CX,CY,sR),p2=sp(s2,CX,CY,sR);
    var mx=(p1.x+p2.x)/2*0.5+CX*0.5,my=(p1.y+p2.y)/2*0.5+CY*0.5;
    var pt=bz(p1.x,p1.y,mx,my,p2.x,p2.y,ip.p);
    var sz=both>0.3?6:3;
    x.fillStyle='rgba(180,210,240,'+(both*0.5)+')';
    x.beginPath();x.arc(pt.x,pt.y,sz,0,Math.PI*2);x.fill();
  }

  // ═══ DATA PACKETS: outbound ═══
  for(var oi=OP.length-1;oi>=0;oi--){
    var op=OP[oi];op.p+=op.s;
    if(op.p>=1){OP.splice(oi,1);continue;}
    var o=OUT[op.i];if(!o)continue;
    var s=SEC.find(function(s){return s.id===o.from;});if(!s)continue;
    var on=sM==='synthesis'||(sA>=0&&AG[sA].sector===o.from);
    if(!on&&sel)continue;
    var sv=sp(s,CX,CY,sR);
    var bx2=W,by2=H*o.fy;
    var mx=W*0.83,my=sv.y*0.38+by2*0.62;
    var pt=bz(sv.x,sv.y,mx,my,bx2,by2,op.p);
    x.fillStyle='rgba('+o.c+','+(on?0.6:0.25)+')';
    x.beginPath();x.arc(pt.x,pt.y,on?7:3,0,Math.PI*2);x.fill();
  }

  // ═══ STATE LABELS ═══
  if(sM){
    x.font='700 10px "Orbitron",sans-serif';x.textAlign='center';x.textBaseline='bottom';
    x.fillStyle='rgba(0,208,240,0.4)';x.fillText(sM.toUpperCase()+' MODE',CX,H-8);
  }
  if(sA>=0){
    var sa=AG[sA];var sec=SEC.find(function(s){return s.id===sa.sector;});
    x.font='700 9px "Share Tech Mono",monospace';x.textAlign='center';x.textBaseline='bottom';
    x.fillStyle='rgba('+(sec?sec.c:'0,208,240')+',0.5)';
    x.fillText(sa.n.toUpperCase()+' \u2192 '+sa.sector.toUpperCase(),CX,H-8);
  }
}

// Tooltip
var tt=document.getElementById('tooltip');
cv.style.pointerEvents='auto';
cv.addEventListener('mousemove',function(e){
  var r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  var W=cv.width,H=cv.height,CX=W*0.50,CY=H*0.47,sRR=Math.min(W,H)*0.30,nRR=Math.min(W,H)*0.06;
  var f=null;SEC.forEach(function(s){var p=sp(s,CX,CY,sRR);if(Math.sqrt((mx-p.x)*(mx-p.x)+(my-p.y)*(my-p.y))<nRR){var a=act(s.id);f={tip:s.label,detail:(a>0.5?'HIGH':a>0.08?'Ambient':'Dim')+' activity'};}});
  if(f){tt.innerHTML='<div class="tt-label">'+f.tip+'</div><div class="tt-detail">'+f.detail+'</div>';tt.style.left=(mx+14)+'px';tt.style.top=(my-30)+'px';tt.classList.add('vis');}else{tt.classList.remove('vis');}
});
cv.addEventListener('mouseleave',function(){tt.classList.remove('vis');});
cv.addEventListener('touchstart',function(e){
  var touch=e.touches[0],r=cv.getBoundingClientRect(),mx=touch.clientX-r.left,my=touch.clientY-r.top;
  var W=cv.width,H=cv.height,CX=W*0.50,CY=H*0.47,sRR=Math.min(W,H)*0.30,nRR=Math.min(W,H)*0.07;
  var f=null;SEC.forEach(function(s){var p=sp(s,CX,CY,sRR);if(Math.sqrt((mx-p.x)*(mx-p.x)+(my-p.y)*(my-p.y))<nRR){f={tip:s.label,detail:'Tap agent or mode'};}});
  if(f){e.preventDefault();tt.innerHTML='<div class="tt-label">'+f.tip+'</div><div class="tt-detail">'+f.detail+'</div>';tt.style.left=(mx+14)+'px';tt.style.top=(my-30)+'px';tt.classList.add('vis');}else{tt.classList.remove('vis');}
},{passive:false});

draw();
</script>
