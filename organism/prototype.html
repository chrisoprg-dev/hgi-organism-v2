// ── HELPERS ──
function regionActivity(rId, st) {
  if (st.selectedAgent !== null) {
    return AGENTS[st.selectedAgent]?.regionId === rId ? 1.0 : 0.04;
  }
  if (st.selectedMode) {
    const r = REGIONS.find(r => r.id === rId);
    return r?.modes.includes(st.selectedMode) ? 0.8 : 0.06;
  }
  return 0.18;
}
function pathActive(aIdx, st) {
  if (st.selectedAgent !== null) return aIdx === st.selectedAgent;
  if (st.selectedMode) return AGENTS[aIdx]?.mode === st.selectedMode;
  return true;
}

// ═══ BRAIN CANVAS ═══
function BrainCanvas({ state }) {
  const cvRef = useRef(null);
  const stRef = useRef(state);
  const tRef = useRef(0);
  const animRef = useRef(0);
  const partRef = useRef([]);
  const flashRef = useRef([]);
  useEffect(() => { stRef.current = state; }, [state]);

  useEffect(() => {
    const cv = cvRef.current; if (!cv) return;
    // Init particles
    const pts = [];
    for (let i = 0; i < 55; i++) {
      const r = REGIONS[Math.floor(Math.random()*REGIONS.length)];
      pts.push({x:r.x+(Math.random()-0.5)*r.rx*1.6, y:r.y+(Math.random()-0.5)*r.ry*1.6,
        vx:(Math.random()-0.5)*0.0003, vy:(Math.random()-0.5)*0.0003, life:Math.random(), sz:0.8+Math.random()*1.2});
    }
    partRef.current = pts;

    const resize = () => { cv.width=cv.parentElement.clientWidth; cv.height=cv.parentElement.clientHeight; };
    resize(); window.addEventListener('resize', resize);

    // Brain boundary check (rough ellipse)
    const inBrain = (px,py) => { const dx=(px-0.48)/0.42,dy=(py-0.42)/0.42; return dx*dx+dy*dy<1; };

    // Drawing helpers
    const bp = (cx,w,h,pts) => { // bezier path from segments
      cx.moveTo(pts.start[0]*w, pts.start[1]*h);
      pts.segs.forEach(s => cx.bezierCurveTo(s[0]*w,s[1]*h, s[2]*w,s[3]*h, s[4]*w,s[5]*h));
    };
    const qb = (cx,w,h,s) => { cx.moveTo(s[0]*w,s[1]*h); cx.quadraticCurveTo(s[2]*w,s[3]*h, s[4]*w,s[5]*h); };
    const bez2 = (ax,ay,mx,my,bx,by,t) => { const u=1-t; return {x:u*u*ax+2*u*t*mx+t*t*bx, y:u*u*ay+2*u*t*my+t*t*by}; };

    const animate = () => {
      animRef.current = requestAnimationFrame(animate);
      const t = tRef.current += 0.016;
      const s = stRef.current;
      const cx = cv.getContext('2d');
      const W = cv.width, H = cv.height;
      // Brain bounding box
      const bx=W*0.15, by=H*0.05, bw=W*0.70, bh=H*0.90;
      cx.clearRect(0,0,W,H);

      // Breathing scale
      const breath = 1 + 0.006*Math.sin(t*0.8);
      cx.save();
      cx.translate(bx+bw/2, by+bh/2);
      cx.scale(breath, breath);
      cx.translate(-(bx+bw/2), -(by+bh/2));

      // ── LAYER 0: Brain Form ──
      // Cerebrum fill
      const drawShape = (start, segs) => {
        cx.beginPath();
        cx.moveTo(bx+bw*start[0], by+bh*start[1]);
        segs.forEach(s => cx.bezierCurveTo(bx+bw*s[0],by+bh*s[1], bx+bw*s[2],by+bh*s[3], bx+bw*s[4],by+bh*s[5]));
        cx.closePath();
      };

      // Main brain gradient
      const grd = cx.createRadialGradient(bx+bw*0.42,by+bh*0.28, bw*0.05, bx+bw*0.42,by+bh*0.38, bw*0.50);
      grd.addColorStop(0, 'rgba(22,38,62,0.95)');
      grd.addColorStop(0.5, 'rgba(14,26,48,0.95)');
      grd.addColorStop(1, 'rgba(8,16,32,0.92)');

      // Cerebrum
      drawShape(BRAIN_START, BRAIN_SEGS);
      cx.fillStyle = grd; cx.fill();
      cx.strokeStyle = 'rgba(60,100,140,0.12)'; cx.lineWidth = 1; cx.stroke();

      // Cerebellum
      drawShape(CRB_START, CRB_SEGS);
      const cgrd = cx.createRadialGradient(bx+bw*0.75,by+bh*0.65,bw*0.02, bx+bw*0.75,by+bh*0.65,bw*0.12);
      cgrd.addColorStop(0,'rgba(18,32,52,0.92)'); cgrd.addColorStop(1,'rgba(10,20,38,0.90)');
      cx.fillStyle = cgrd; cx.fill();
      cx.strokeStyle = 'rgba(60,100,140,0.10)'; cx.lineWidth = 0.8; cx.stroke();

      // Brain stem
      drawShape(STEM_START, STEM_SEGS);
      cx.fillStyle = 'rgba(12,22,40,0.88)'; cx.fill();

      // Sulci (brain folds)
      cx.lineCap = 'round';
      SULCI.forEach((s,i) => {
        const alpha = 0.08 + 0.04*Math.sin(t*0.3+i);
        cx.beginPath();
        cx.moveTo(bx+bw*s[0], by+bh*s[1]);
        cx.quadraticCurveTo(bx+bw*s[2], by+bh*s[3], bx+bw*s[4], by+bh*s[5]);
        cx.strokeStyle = `rgba(30,55,85,${alpha})`; cx.lineWidth = 0.8; cx.stroke();
        // Subtle highlight on one side
        cx.beginPath();
        cx.moveTo(bx+bw*s[0], by+bh*s[1]-0.8);
        cx.quadraticCurveTo(bx+bw*s[2], by+bh*s[3]-0.8, bx+bw*s[4], by+bh*s[5]-0.8);
        cx.strokeStyle = `rgba(70,110,155,${alpha*0.5})`; cx.lineWidth = 0.5; cx.stroke();
      });

      // Cerebellum folia
      FOLIA.forEach((s,i) => {
        cx.beginPath();
        cx.moveTo(bx+bw*s[0], by+bh*s[1]);
        cx.quadraticCurveTo(bx+bw*s[2], by+bh*s[3], bx+bw*s[4], by+bh*s[5]);
        cx.strokeStyle = 'rgba(35,60,90,0.10)'; cx.lineWidth = 0.6; cx.stroke();
      });

      // ── LAYER 1: Regional Activity ──
      REGIONS.forEach(r => {
        const act = regionActivity(r.id, s);
        if (act < 0.02) return;
        const rx = bx+bw*r.x, ry2 = by+bh*r.y;
        const rrx = bw*r.rx, rry = bh*r.ry;
        const brth = 0.7+0.3*Math.sin(t*1.1+r.x*10);
        let al = act*0.30*brth;
        let col = r.c;
        // Gated region
        if (s.selectedAgent!==null && AGENTS[s.selectedAgent]?.gated && AGENTS[s.selectedAgent]?.regionId===r.id) col='212,160,32';
        // Pursuit gold wash
        if (s.selectedPursuit!==null && act>0.1) {
          const gg = cx.createRadialGradient(rx,ry2,0, rx,ry2,Math.max(rrx,rry)*1.3);
          gg.addColorStop(0,'rgba(212,180,80,0.02)'); gg.addColorStop(1,'rgba(212,180,80,0)');
          cx.fillStyle=gg; cx.beginPath(); cx.ellipse(rx,ry2,rrx*1.3,rry*1.3,0,0,Math.PI*2); cx.fill();
        }
        const g = cx.createRadialGradient(rx,ry2,0, rx,ry2,Math.max(rrx,rry)*1.6);
        g.addColorStop(0,`rgba(${col},${Math.min(al,0.30)})`);
        g.addColorStop(0.5,`rgba(${col},${al*0.35})`);
        g.addColorStop(1,`rgba(${col},0)`);
        cx.fillStyle=g; cx.beginPath(); cx.ellipse(rx,ry2,rrx*1.6,rry*1.6,0,0,Math.PI*2); cx.fill();
        // Active core shimmer
        if (act>0.5) {
          const sh = 0.5+0.5*Math.sin(t*3.5+r.y*20);
          cx.fillStyle=`rgba(${col},${0.06*sh})`; cx.beginPath(); cx.ellipse(rx,ry2,rrx*0.5,rry*0.5,0,0,Math.PI*2); cx.fill();
        }
        // Pulsing ring for active regions
        if (act>0.4) {
          const p = 0.5+0.5*Math.sin(t*2.5+r.x*8);
          const ringR = Math.max(rrx,rry)*0.7;
          cx.beginPath(); cx.arc(rx,ry2,ringR*(1+0.12*p),0,Math.PI*2);
          cx.strokeStyle=`rgba(${col},${0.10+0.08*p})`; cx.lineWidth=1; cx.stroke();
        }
      });

      // ── LAYER 2: Internal Particles + Neural Flashes ──
      cx.globalCompositeOperation = 'screen';
      const parts = partRef.current;
      parts.forEach(p => {
        // Drift toward active regions
        if (Math.random()<0.015) {
          let target = null;
          if (s.selectedAgent!==null) target = REGIONS.find(r=>r.id===AGENTS[s.selectedAgent]?.regionId);
          else if (s.selectedMode) {
            const active = REGIONS.filter(r=>r.modes.includes(s.selectedMode));
            if (active.length) target = active[Math.floor(Math.random()*active.length)];
          }
          if (target) { const dx=target.x-p.x,dy=target.y-p.y,d=Math.sqrt(dx*dx+dy*dy); if(d>0.01){p.vx+=dx/d*0.00015;p.vy+=dy/d*0.00015;} }
        }
        p.x+=p.vx*0.8; p.y+=p.vy*0.8; p.life-=0.0008;
        p.vx*=0.997; p.vy*=0.997;
        p.vx+=(Math.random()-0.5)*0.00006; p.vy+=(Math.random()-0.5)*0.00006;
        if (!inBrain(p.x,p.y)||p.life<=0) {
          const r=REGIONS[Math.floor(Math.random()*REGIONS.length)];
          p.x=r.x+(Math.random()-0.5)*r.rx*1.4; p.y=r.y+(Math.random()-0.5)*r.ry*1.4;
          p.vx=(Math.random()-0.5)*0.0003; p.vy=(Math.random()-0.5)*0.0003; p.life=1;
        }
        // Check if near active region
        let nearActive = false;
        REGIONS.forEach(r => { const dx=(p.x-r.x)/r.rx,dy=(p.y-r.y)/r.ry; if(dx*dx+dy*dy<2)if(regionActivity(r.id,s)>0.3)nearActive=true; });
        const al = nearActive ? 0.20+0.12*p.life : 0.05*p.life;
        const sz = p.sz*(nearActive?1.3:0.8);
        cx.fillStyle=`rgba(140,210,240,${al})`; cx.beginPath(); cx.arc(bx+bw*p.x,by+bh*p.y,sz,0,Math.PI*2); cx.fill();
      });

      // Fire neural flashes
      const flashes = flashRef.current;
      const flashRate = (s.selectedAgent!==null||s.selectedMode) ? 0.035 : 0.012;
      if (Math.random()<flashRate) {
        const conn = CONNECTIONS[Math.floor(Math.random()*CONNECTIONS.length)];
        const r1=REGIONS.find(r=>r.id===conn[0]), r2=REGIONS.find(r=>r.id===conn[1]);
        if (r1&&r2 && regionActivity(r1.id,s)>0.08 && regionActivity(r2.id,s)>0.08) {
          flashes.push({x1:r1.x,y1:r1.y,x2:r2.x,y2:r2.y,life:1,c:regionActivity(r1.id,s)>0.5?r1.c:r2.c});
        }
      }
      for (let i=flashes.length-1;i>=0;i--) { flashes[i].life-=0.035; if(flashes[i].life<=0)flashes.splice(i,1); }
      flashes.forEach(f => {
        const prog=1-f.life, head=prog, tail=Math.max(0,prog-0.25);
        const hx=bx+bw*(f.x1+(f.x2-f.x1)*head), hy=by+bh*(f.y1+(f.y2-f.y1)*head);
        const tx2=bx+bw*(f.x1+(f.x2-f.x1)*tail), ty2=by+bh*(f.y1+(f.y2-f.y1)*tail);
        cx.beginPath(); cx.moveTo(tx2,ty2); cx.lineTo(hx,hy);
        cx.strokeStyle=`rgba(${f.c},${f.life*0.30})`; cx.lineWidth=0.8; cx.stroke();
        cx.fillStyle=`rgba(${f.c},${f.life*0.45})`; cx.beginPath(); cx.arc(hx,hy,1.5,0,Math.PI*2); cx.fill();
      });
      cx.globalCompositeOperation = 'source-over';

      cx.restore(); // end breathing transform

      // ── LAYER 3: Pathways (outside breathing transform) ──
      const hasSel = s.selectedAgent!==null || !!s.selectedMode;
      INBOUND.forEach(p => {
        const r = REGIONS.find(rr=>rr.id===p.regionId); if(!r) return;
        const active = pathActive(p.agentIdx, s);
        const isGated = AGENTS[p.agentIdx]?.gated;
        const ax=0, ay=H*(0.08+AGENTS.findIndex(a=>a.id===p.agentIdx)*0.092);
        const bxx=bx+bw*r.x*breath, byy=by+bh*r.y*breath;
        const mx=W*0.10, my=ay*0.5+byy*0.5;
        // Line
        let la,lw;
        if(!hasSel){la=0.05;lw=0.8;}
        else if(active){la=isGated?0.22:0.32;lw=isGated?1.5:2.2;}
        else{la=0.012;lw=0.4;}
        cx.beginPath(); cx.moveTo(ax,ay); cx.quadraticCurveTo(mx,my,bxx,byy);
        cx.strokeStyle=isGated&&active?TH.am:AGENTS[p.agentIdx].color;
        cx.globalAlpha=la; cx.lineWidth=lw;
        if(isGated&&active){cx.setLineDash([5,3]);} cx.stroke(); cx.setLineDash([]); cx.globalAlpha=1;
        // Pulse
        if(active||!hasSel){
          const n=active&&hasSel?2:1;
          for(let k=0;k<n;k++){
            const prog=((t*0.3+p.agentIdx*0.4+k*0.8)%2)/2;
            if(prog<1){const pt=bez2(ax,ay,mx,my,bxx,byy,prog);const sz=hasSel&&active?7:3.5;
              const g=cx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,sz);
              const pc=isGated?TH.am:AGENTS[p.agentIdx].color;
              g.addColorStop(0,pc);g.addColorStop(1,'rgba(0,0,0,0)');
              cx.fillStyle=g;cx.beginPath();cx.arc(pt.x,pt.y,sz,0,Math.PI*2);cx.fill();
              cx.fillStyle='#fff';cx.globalAlpha=hasSel&&active?0.8:0.35;
              cx.beginPath();cx.arc(pt.x,pt.y,hasSel&&active?1.5:0.8,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
            }
          }
        }
      });
      // Outbound
      OUTBOUND.forEach(p => {
        const r=REGIONS.find(rr=>rr.id===p.regionId); if(!r) return;
        const show = s.selectedAgent===null;
        const ax2=bx+bw*r.x*breath, ay2=by+bh*r.y*breath;
        const bx3=W, by3=H*p.fy;
        const mx2=W*0.88, my2=ay2*0.4+by3*0.6;
        cx.beginPath(); cx.moveTo(ax2,ay2); cx.quadraticCurveTo(mx2,my2,bx3,by3);
        cx.strokeStyle=p.color; cx.globalAlpha=show?0.05:0.012; cx.lineWidth=0.8; cx.stroke(); cx.globalAlpha=1;
        if(show){
          const prog=((t*0.25+p.fy*3)%2)/2;
          if(prog<1){const pt=bez2(ax2,ay2,mx2,my2,bx3,by3,prog);
            const g=cx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,3.5);
            g.addColorStop(0,p.color);g.addColorStop(1,'rgba(0,0,0,0)');
            cx.fillStyle=g;cx.beginPath();cx.arc(pt.x,pt.y,3.5,0,Math.PI*2);cx.fill();}
        }
      });
    };
    animate();
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener('resize',resize); };
  }, []);

  return <canvas ref={cvRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}} />;
}

          <div><div style={{fontFamily:FONT.brand,fontSize:14,fontWeight:700,color:TH.wh}}>5.6K</div><div style={{fontSize:8,color:TH.dm,fontFamily:FONT.mono}}>Memories</div></div>
        </div>

// ═══ MAIN APP ═══
function App() {
  const [state, setState] = useState({ selectedPursuit:null, selectedMode:null, selectedAgent:null });
  const selectAgent = useCallback(id => setState(s => ({...s, selectedAgent:s.selectedAgent===id?null:id, selectedMode:null})), []);
  const selectMode = useCallback(mode => setState(s => ({...s, selectedMode:s.selectedMode===mode?null:mode, selectedAgent:null})), []);
  const selectPursuit = useCallback(id => setState(s => ({...s, selectedPursuit:s.selectedPursuit===id?null:id})), []);

  return (
    <>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,160,200,0.1)}
      `}</style>
      <div style={{
        width:'100vw',height:'100vh',overflow:'hidden',background:TH.bg,color:TH.tx,fontFamily:FONT.ui,fontWeight:500,
        display:'grid',
        gridTemplateColumns:'240px 1fr 270px',
        gridTemplateRows:'38px 1fr auto 148px',
        gridTemplateAreas:'"top top top" "left center right" "left tiles right" "bot bot bot"',
      }}>
        <TopBar />
        <LeftRail agents={AGENTS} state={state} onSelect={selectAgent} />
        <div style={{gridArea:'center',position:'relative',overflow:'hidden',background:'#040a14'}}>
          <BrainCanvas state={state} />
        </div>
        <ModeTiles state={state} onSelect={selectMode} />
        <RightRail state={state} agents={AGENTS} pursuits={PURSUITS} />
        <BottomZone events={EVENTS} pursuits={PURSUITS} state={state} onSelectPursuit={selectPursuit} />
      </div>

}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
