<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HGI ORGANISM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

body {
  background: #000;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* Top HUD bar */
#hud-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
}

#hud-top .title {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #00f0ff;
  text-shadow: 0 0 10px rgba(0,240,255,0.5);
}

#hud-top .status {
  font-size: 11px;
  color: #4ade80;
  letter-spacing: 1px;
}

#hud-top .status .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  margin-right: 4px;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Agent avatars (CSS2D rendered in 3D space) */
.agent-label {
  pointer-events: auto;
  cursor: pointer;
  text-align: center;
  width: 80px;
  -webkit-tap-highlight-color: transparent;
}

.agent-label:active .icon-ring {
  transform: scale(1.2);
  box-shadow: 0 0 20px var(--agent-color);
}

.agent-label .icon-ring {
  width: 36px; height: 36px;
  margin: 0 auto 2px;
  border-radius: 50%;
  border: 1.5px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 8px var(--agent-color);
  animation: agent-breathe 3s infinite ease-in-out;
}

@keyframes agent-breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 0 8px var(--agent-color); }
  50% { transform: scale(1.08); box-shadow: 0 0 14px var(--agent-color); }
}

.agent-label .name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--agent-color);
  text-shadow: 0 0 4px var(--agent-color);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Data panels */
.data-panel {
  position: fixed;
  z-index: 10;
  background: rgba(0, 10, 20, 0.85);
  border: 1px solid rgba(0, 240, 255, 0.15);
  border-radius: 6px;
  padding: 8px 10px;
  backdrop-filter: blur(8px);
  font-size: 11px;
  max-width: 180px;
}

.data-panel .panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  color: rgba(0, 240, 255, 0.6);
  margin-bottom: 6px;
  text-transform: uppercase;
}

#panel-pipeline {
  bottom: 80px;
  left: 8px;
  max-height: 220px;
  overflow-y: auto;
}

#panel-agents {
  bottom: 80px;
  right: 8px;
  max-height: 220px;
  overflow-y: auto;
}

.opp-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.opp-row:active {
  background: rgba(0,240,255,0.1);
}

.opp-opi {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  min-width: 24px;
  text-align: right;
}

.opp-name {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.opp-due {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
}

.agent-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 0;
}

.agent-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.agent-name-text {
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
}

.agent-status-text {
  font-size: 8px;
  margin-left: auto;
  white-space: nowrap;
}

/* Bottom stats bar */
#hud-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 10px 16px 14px;
  background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.stat-block {
  text-align: center;
}

.stat-block .value {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #00f0ff;
  text-shadow: 0 0 8px rgba(0,240,255,0.4);
}

.stat-block .label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

/* Scan line effect */
#scanline {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3), transparent);
  z-index: 20;
  animation: scan 4s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  0% { top: -2px; }
  100% { top: 100vh; }
}

/* Corner decorations */
.corner {
  position: fixed;
  width: 20px; height: 20px;
  z-index: 10;
  pointer-events: none;
}
.corner.tl { top: 4px; left: 4px; border-top: 1px solid rgba(0,240,255,0.3); border-left: 1px solid rgba(0,240,255,0.3); }
.corner.tr { top: 4px; right: 4px; border-top: 1px solid rgba(0,240,255,0.3); border-right: 1px solid rgba(0,240,255,0.3); }
.corner.bl { bottom: 4px; left: 4px; border-bottom: 1px solid rgba(0,240,255,0.3); border-left: 1px solid rgba(0,240,255,0.3); }
.corner.br { bottom: 4px; right: 4px; border-bottom: 1px solid rgba(0,240,255,0.3); border-right: 1px solid rgba(0,240,255,0.3); }

/* Loading */
#loading {

/* Detail overlay */
#detail-overlay {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  background: rgba(0, 8, 16, 0.95);
  border-top: 1px solid rgba(0,240,255,0.3);
  padding: 12px 16px 20px;
  max-height: 55vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  backdrop-filter: blur(12px);
}

#detail-overlay.open {
  transform: translateY(0);
}

#detail-overlay .detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#detail-overlay .detail-title {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  color: #00f0ff;
}

#detail-overlay .detail-close {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}

#detail-overlay .detail-body {
  font-size: 12px;
  line-height: 1.5;
  color: rgba(255,255,255,0.8);
}

#detail-overlay .detail-body .detail-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-right: 4px;
  margin-bottom: 4px;
}

#detail-overlay .detail-loading {
  text-align: center;
  padding: 20px;
  color: rgba(0,240,255,0.5);
  font-size: 11px;
  letter-spacing: 2px;
}

/* Loading */
#loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  transition: opacity 0.5s;
}

#loading .spinner {
  width: 40px; height: 40px;
  border: 2px solid rgba(0,240,255,0.2);
  border-top-color: #00f0ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading .text {
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(0,240,255,0.6);
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="text">INITIALIZING ORGANISM</div>
</div>

<div id="scanline"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="hud-top">
  <div class="title">HGI ORGANISM</div>
  <div class="status"><span class="dot"></span>V4.2 LIVE</div>
</div>

<div id="canvas-container"></div>

<div id="detail-overlay">
  <div class="detail-header">
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-close" id="detail-close">✕</div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div id="panel-pipeline" class="data-panel">
  <div class="panel-title">PIPELINE</div>
  <div id="pipeline-list"></div>
</div>

<div id="panel-agents" class="data-panel">
  <div class="panel-title">AGENT STATUS</div>
  <div id="agents-list"></div>
</div>

<div id="hud-bottom">
  <div class="stat-block">
    <div class="value">15</div>
    <div class="label">AGENTS</div>
  </div>
  <div class="stat-block">
    <div class="value">9</div>
    <div class="label">PIPELINE</div>
  </div>
  <div class="stat-block">
    <div class="value">5.6K</div>
    <div class="label">MEMORIES</div>
  </div>
  <div class="stat-block">
    <div class="value">47</div>
    <div class="label">INTEL</div>
  </div>
</div>

<!-- Three.js r128 (non-module) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

<script>
// ═══════════════════════════════════════════
// HGI ORGANISM — 3D BRAIN COMMAND CENTER
// ═══════════════════════════════════════════

// Pipeline data
const PIPELINE = [
  { name: 'NOLA Water', opi: 94, stage: 'pursuing', due: 'Unsolicited', color: '#4ade80' },
  { name: 'DR-4900 LA', opi: 92, stage: 'identified', due: 'TBD', color: '#facc15' },
  { name: 'Washington Parish', opi: 88, stage: 'pursuing', due: 'May 8', color: '#00f0ff' },
  { name: 'St. George', opi: 85, stage: 'watching', due: 'Apr 24', color: '#a78bfa' },
  { name: 'BRIC Resilient', opi: 82, stage: 'identified', due: 'Jul 23', color: '#facc15' },
  { name: 'DR-4899 MS', opi: 82, stage: 'identified', due: 'TBD', color: '#facc15' },
  { name: 'OPSB CM', opi: 78, stage: 'new', due: 'Apr 30', color: '#f97316' },
  { name: 'HTHA', opi: 78, stage: 'submitted', due: '—', color: '#4ade80' },
  { name: 'JP SOQ', opi: 72, stage: 'pursuing', due: 'Apr 9', color: '#ef4444' }
];

// Agent data
const AGENTS = [
  { name: 'Intel Engine', icon: '🔍', color: '#00f0ff', status: 'scanning', type: 'per-opp' },
  { name: 'Financial', icon: '💰', color: '#4ade80', status: 'analyzing', type: 'per-opp' },
  { name: 'Winnability', icon: '🎯', color: '#f97316', status: 'scoring', type: 'per-opp' },
  { name: 'CRM', icon: '🤝', color: '#a78bfa', status: 'tracking', type: 'per-opp' },
  { name: 'Quality Gate', icon: '✓', color: '#facc15', status: 'auditing', type: 'per-opp' },
  { name: 'Staffing', icon: '👥', color: '#34d399', status: 'gated', type: 'gated' },
  { name: 'Proposal', icon: '📝', color: '#60a5fa', status: 'gated', type: 'gated' },
  { name: 'Red Team', icon: '🛡️', color: '#ef4444', status: 'gated', type: 'gated' },
  { name: 'Price to Win', icon: '📊', color: '#c084fc', status: 'gated', type: 'gated' },
  { name: 'Assembly', icon: '📦', color: '#fb923c', status: 'gated', type: 'gated' },
  { name: 'Scanner', icon: '📡', color: '#22d3ee', status: 'monitoring', type: 'system' },
  { name: 'Disaster Mon', icon: '⚡', color: '#f43f5e', status: 'watching', type: 'system' },
  { name: 'Dashboard', icon: '📋', color: '#818cf8', status: 'compiling', type: 'system' },
  { name: 'Amendments', icon: '📌', color: '#fbbf24', status: 'tracking', type: 'system' },
  { name: 'Hunter', icon: '🎯', color: '#10b981', status: 'hunting', type: 'always' }
];

// Populate data panels
const pipelineHTML = PIPELINE.map(p => {
  const opiColor = p.opi >= 90 ? '#4ade80' : p.opi >= 80 ? '#00f0ff' : p.opi >= 70 ? '#facc15' : '#ef4444';
  const urgent = p.due === 'Apr 9' ? ' style="color:#ef4444;font-weight:700"' : '';
  return `<div class="opp-row">
    <span class="opp-opi" style="color:${opiColor}">${p.opi}</span>
    <span class="opp-name">${p.name}</span>
    <span class="opp-due"${urgent}>${p.due}</span>
  </div>`;
}).join('');
document.getElementById('pipeline-list').innerHTML = pipelineHTML;

const agentsHTML = AGENTS.map(a => {
  const statusColor = a.status === 'gated' ? 'rgba(255,255,255,0.25)' : a.color;
  return `<div class="agent-row">
    <span class="agent-dot" style="background:${a.color};box-shadow:0 0 4px ${a.color}"></span>
    <span class="agent-name-text">${a.icon} ${a.name}</span>
    <span class="agent-status-text" style="color:${statusColor}">${a.status}</span>
  </div>`;
}).join('');
document.getElementById('agents-list').innerHTML = agentsHTML;

// ═══════ THREE.JS SCENE ═══════
const container = document.getElementById('canvas-container');
const W = window.innerWidth;
const H = window.innerHeight;

// Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000510, 0.08);

// Camera
const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
camera.position.set(0, 0.5, 4.5);
camera.lookAt(0, 0.2, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// CSS2D Renderer for agent labels
const labelRenderer = new THREE.CSS2DRenderer();
labelRenderer.setSize(W, H);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// Bloom post-processing
const composer = new THREE.EffectComposer(renderer);
const renderPass = new THREE.RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(W, H), 1.2, 0.5, 0.2
);
composer.addPass(bloomPass);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.minDistance = 2;
controls.maxDistance = 6;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.maxPolarAngle = Math.PI * 0.7;
controls.minPolarAngle = Math.PI * 0.2;

// ═══════ PLATFORM (glowing pedestal) ═══════
function createPlatform() {
  const group = new THREE.Group();
  const platY = -0.8;

  // Main disc with glow
  const discGeo = new THREE.CylinderGeometry(2.0, 2.0, 0.03, 64);
  const discMat = new THREE.MeshBasicMaterial({
    color: 0x001a2a,
    transparent: true,
    opacity: 0.7
  });
  group.add(new THREE.Mesh(discGeo, discMat));
  group.children[0].position.y = platY;

  // Concentric glowing rings
  for (let i = 0; i < 5; i++) {
    const r = 0.4 + i * 0.38;
    const ringGeo = new THREE.TorusGeometry(r, 0.008, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x00f0ff,
      transparent: true,
      opacity: 0.15 + i * 0.05,
      blending: THREE.AdditiveBlending
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = platY + 0.02;
    group.add(ring);
  }

  // Outer bright edge ring
  const outerGeo = new THREE.TorusGeometry(2.0, 0.015, 8, 64);
  const outerMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.4
  });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  outer.rotation.x = Math.PI / 2;
  outer.position.y = platY + 0.02;
  group.add(outer);

  // Radial grid lines
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const points = [
      new THREE.Vector3(Math.cos(angle) * 0.2, platY + 0.02, Math.sin(angle) * 0.2),
      new THREE.Vector3(Math.cos(angle) * 1.95, platY + 0.02, Math.sin(angle) * 1.95)
    ];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.08 });
    group.add(new THREE.Line(lineGeo, lineMat));
  }

  return group;
}
scene.add(createPlatform());

// ═══════ GLASS DOME (visible containment field) ═══════
function createDome() {
  const group = new THREE.Group();

  // Dome shell — visible glass
  const domeGeo = new THREE.SphereGeometry(1.8, 64, 32, 0, Math.PI * 2, 0, Math.PI * 0.55);
  const domeMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.04,
    side: THREE.DoubleSide
  });
  const dome = new THREE.Mesh(domeGeo, domeMat);
  dome.position.y = -0.2;
  group.add(dome);

  // Dome wireframe for glass panel look
  const domeWireGeo = new THREE.SphereGeometry(1.81, 24, 16, 0, Math.PI * 2, 0, Math.PI * 0.55);
  const domeWireMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    wireframe: true,
    transparent: true,
    opacity: 0.06
  });
  const domeWire = new THREE.Mesh(domeWireGeo, domeWireMat);
  domeWire.position.y = -0.2;
  group.add(domeWire);

  // Bottom edge ring — bright
  const edgeGeo = new THREE.TorusGeometry(1.8, 0.02, 12, 64);
  const edgeMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.5
  });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.rotation.x = Math.PI / 2;
  edge.position.y = -0.2;
  group.add(edge);

  // Edge glow ring
  const edgeGlowGeo = new THREE.TorusGeometry(1.8, 0.08, 12, 64);
  const edgeGlowMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.08,
    blending: THREE.AdditiveBlending
  });
  const edgeGlow = new THREE.Mesh(edgeGlowGeo, edgeGlowMat);
  edgeGlow.rotation.x = Math.PI / 2;
  edgeGlow.position.y = -0.2;
  group.add(edgeGlow);

  return group;
}
scene.add(createDome());

// ═══════ AMBIENT PARTICLES ═══════
function createParticles() {
  const count = 600;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.5;
    const r = 0.5 + Math.random() * 1.5;
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = -0.5 + r * Math.cos(phi);
    positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

    const c = new THREE.Color().setHSL(0.52 + Math.random() * 0.08, 1, 0.5 + Math.random() * 0.3);
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.015,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  return new THREE.Points(geo, mat);
}
const particles = createParticles();
scene.add(particles);

// ═══════ BRAIN REGIONS — specific connection points ═══════
const BRAIN_REGIONS = {
  'Intel Engine':  { x: 0.0,  y: 0.7,  z: 0.35, region: 'Prefrontal' },
  'Financial':     { x:-0.3,  y: 0.5,  z: 0.2,  region: 'L-Temporal' },
  'Winnability':   { x: 0.0,  y: 0.75, z: 0.1,  region: 'Motor Cortex' },
  'CRM':           { x: 0.3,  y: 0.5,  z: 0.2,  region: 'R-Temporal' },
  'Quality Gate':  { x: 0.0,  y: 0.65, z:-0.25, region: 'Parietal' },
  'Staffing':      { x:-0.25, y: 0.6,  z: 0.15, region: 'L-Frontal' },
  'Proposal':      { x: 0.25, y: 0.6,  z: 0.15, region: 'R-Frontal' },
  'Red Team':      { x: 0.0,  y: 0.4,  z:-0.35, region: 'Occipital' },
  'Price to Win':  { x:-0.2,  y: 0.55, z:-0.15, region: 'L-Parietal' },
  'Assembly':      { x: 0.2,  y: 0.55, z:-0.15, region: 'R-Parietal' },
  'Scanner':       { x: 0.0,  y: 0.1,  z:-0.15, region: 'Cerebellum' },
  'Disaster Mon':  { x: 0.0,  y: 0.4,  z: 0.0,  region: 'Amygdala' },
  'Dashboard':     { x: 0.0,  y: 0.55, z: 0.0,  region: 'Corpus Callosum' },
  'Amendments':    { x: 0.0,  y: 0.05, z:-0.05, region: 'Brainstem' },
  'Hunter':        { x: 0.0,  y: 0.55, z: 0.4,  region: 'Frontal Pole' }
};

// Synapse nodes on the brain surface
function createSynapseNodes() {
  AGENTS.forEach(a => {
    const br = BRAIN_REGIONS[a.name];
    if (!br) return;
    // Outer glow sphere
    const glowGeo = new THREE.SphereGeometry(0.06, 12, 12);
    const glowMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(a.color),
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: false
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(br.x, br.y, br.z);
    scene.add(glow);
    // Inner bright core
    const coreGeo = new THREE.SphereGeometry(0.025, 8, 8);
    const coreMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 1.0,
      depthWrite: false,
      depthTest: false
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    core.position.set(br.x, br.y, br.z);
    scene.add(core);
  });
}
createSynapseNodes();

// ═══════ ENERGY TRACES (agent → specific brain region) ═══════
const traceLines = [];
function createEnergyTraces() {
  AGENTS.forEach((a, i) => {
    const angle = (i / AGENTS.length) * Math.PI * 2;
    const agentR = 1.4;
    // Spread vertically in 4 tiers instead of 3
    const tier = i % 4;
    const agentY = -0.1 + tier * 0.28;
    // Elliptical: compress X, keep Z for depth
    const ellipseX = 0.7; // horizontal squeeze factor
    const agentPos = new THREE.Vector3(
      agentR * ellipseX * Math.cos(angle), agentY, agentR * Math.sin(angle)
    );

    const br = BRAIN_REGIONS[a.name];
    if (!br) return;
    const brainPos = new THREE.Vector3(br.x, br.y, br.z);

    // Build curved path from agent → brain region
    const mid = new THREE.Vector3().lerpVectors(agentPos, brainPos, 0.5);
    mid.y += 0.15; // slight arc upward
    const curve = new THREE.CatmullRomCurve3([agentPos, mid, brainPos]);

    const color = new THREE.Color(a.color);

    // Main trace line (renders on top of brain)
    const geo = new THREE.TubeGeometry(curve, 24, 0.012, 6, false);
    const mat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
      depthTest: false
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    // Glow around trace
    const glowGeo = new THREE.TubeGeometry(curve, 24, 0.04, 6, false);
    const glowMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glowMesh);

    // Traveling pulse
    const pulseGeo = new THREE.SphereGeometry(0.025, 8, 8);
    const pulseMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending
    });
    const pulse = new THREE.Mesh(pulseGeo, pulseMat);
    scene.add(pulse);

    traceLines.push({ mesh, glowMesh, pulse, curve, agent: a, phase: i * 0.3, agentAngle: angle, agentR, agentY });
  });
}
createEnergyTraces();

// ═══════ AGENT CSS2D LABELS ═══════
const agentLabels = [];
function createAgentLabels() {
  AGENTS.forEach((a, i) => {
    const angle = (i / AGENTS.length) * Math.PI * 2;
    const r = 1.4;
    const tier = i % 4;
    const y = -0.1 + tier * 0.28;

    const div = document.createElement('div');
    div.className = 'agent-label';
    div.style.setProperty('--agent-color', a.color);
    div.innerHTML = `
      <div class="icon-ring" style="border-color:${a.color};color:${a.color}">${a.icon}</div>
      <div class="name">${a.name}</div>
    `;
    div.addEventListener('click', (e) => {
      e.stopPropagation();
      onAgentClick(a);
    });

    const label = new THREE.CSS2DObject(div);
    label.position.set(
      r * 0.7 * Math.cos(angle),
      y,
      r * Math.sin(angle)
    );
    scene.add(label);
    agentLabels.push({ label, baseAngle: angle, radius: r, baseY: y, idx: i });
  });
}
createAgentLabels();

// ═══════ PROCEDURAL BRAIN (renders everywhere) ═══════
let brainMesh = null;

function createBrain() {
  const group = new THREE.Group();

  // High-poly sphere with noise displacement for sulci/folds
  function makeHemisphere(isLeft) {
    const geo = new THREE.SphereGeometry(0.45, 48, 32, 
      isLeft ? 0 : Math.PI, Math.PI, 0, Math.PI);
    const pos = geo.attributes.position;
    
    // Multi-frequency noise for brain folds
    for (let i = 0; i < pos.count; i++) {
      let x = pos.getX(i);
      let y = pos.getY(i);
      let z = pos.getZ(i);
      
      // Primary sulci (deep folds)
      const n1 = Math.sin(x * 12 + y * 8) * Math.cos(z * 10) * 0.04;
      // Secondary gyri (ridges)  
      const n2 = Math.sin(x * 20 + z * 15) * Math.cos(y * 18) * 0.025;
      // Tertiary detail
      const n3 = Math.sin(x * 35 + y * 30 + z * 25) * 0.01;
      // Overall brain shape: wider at top, narrower at bottom
      const shapeY = 1 + y * 0.15;
      // Frontal lobe bulge
      const frontal = z > 0 ? 1.05 : 1.0;
      
      const displacement = n1 + n2 + n3;
      const r = Math.sqrt(x*x + y*y + z*z);
      const nx = x/r, ny = y/r, nz = z/r;
      
      pos.setXYZ(i, 
        (x + nx * displacement) * frontal,
        (y + ny * displacement) * shapeY,
        z + nz * displacement
      );
    }
    geo.computeVertexNormals();
    return geo;
  }
  
  // Left hemisphere
  const leftGeo = makeHemisphere(true);
  const brainMat = new THREE.MeshBasicMaterial({
    color: 0x00ccee,
    transparent: true,
    opacity: 0.12
  });
  const left = new THREE.Mesh(leftGeo, brainMat);
  left.position.x = -0.03;
  group.add(left);
  
  // Right hemisphere
  const rightGeo = makeHemisphere(false);
  const right = new THREE.Mesh(rightGeo, brainMat.clone());
  right.position.x = 0.03;
  group.add(right);
  
  // Wireframe overlay for holographic look
  [left, right].forEach(hemi => {
    const wire = new THREE.Mesh(hemi.geometry.clone(), new THREE.MeshBasicMaterial({
      color: 0x00f0ff,
      wireframe: true,
      transparent: true,
      opacity: 0.1
    }));
    wire.position.copy(hemi.position);
    group.add(wire);
  });
  
  // Inner glow core
  const coreGeo = new THREE.SphereGeometry(0.3, 16, 16);
  const coreMat = new THREE.MeshBasicMaterial({
    color: 0x00f0ff,
    transparent: true,
    opacity: 0.06,
    blending: THREE.AdditiveBlending
  });
  group.add(new THREE.Mesh(coreGeo, coreMat));
  
  // Brainstem
  const stemGeo = new THREE.CylinderGeometry(0.12, 0.08, 0.35, 12);
  const stemMat = new THREE.MeshBasicMaterial({
    color: 0x00aacc,
    transparent: true,
    opacity: 0.5
  });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = -0.55;
  stem.position.z = -0.1;
  group.add(stem);
  
  // Cerebellum (back bump)
  const cerebGeo = new THREE.SphereGeometry(0.28, 24, 16);
  const cerebPos = cerebGeo.attributes.position;
  for (let i = 0; i < cerebPos.count; i++) {
    const x = cerebPos.getX(i), y = cerebPos.getY(i), z = cerebPos.getZ(i);
    const ripple = Math.sin(x * 30) * Math.cos(y * 25) * 0.02;
    cerebPos.setXYZ(i, x + ripple, y * 0.7 + ripple, z + ripple);
  }
  cerebGeo.computeVertexNormals();
  const cerebellum = new THREE.Mesh(cerebGeo, brainMat.clone());
  cerebellum.position.set(0, -0.35, -0.25);
  group.add(cerebellum);
  
  group.position.y = 0.35;
  group.userData.baseScale = 1;
  scene.add(group);
  brainMesh = group;
  
  // Point light inside brain for glow
  const innerLight = new THREE.PointLight(0x00f0ff, 0.8, 3);
  innerLight.position.set(0, 0.35, 0);
  scene.add(innerLight);
  
  // Remove loading screen
  const loadEl = document.getElementById('loading');
  loadEl.style.opacity = '0';
  setTimeout(() => loadEl.style.display = 'none', 500);
}

createBrain();

// Ambient light
scene.add(new THREE.AmbientLight(0x112233, 0.5));

// ═══════ ANIMATION LOOP ═══════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Rotate brain slowly
  if (brainMesh) {
    brainMesh.rotation.y = t * 0.1;
    // Gentle breathing
    const breathe = 1 + Math.sin(t * 0.8) * 0.02;
    const bs = brainMesh.userData.baseScale || 1;
    brainMesh.scale.set(breathe * bs, breathe * bs, breathe * bs);
  }

  // Animate particles
  const pPos = particles.geometry.attributes.position;
  for (let i = 0; i < pPos.count; i++) {
    let y = pPos.getY(i);
    y += 0.001;
    if (y > 1.5) y = -0.5;
    pPos.setY(i, y);
  }
  pPos.needsUpdate = true;
  particles.rotation.y = t * 0.02;

  // Pulse energy traces + traveling particles
  traceLines.forEach((tl, i) => {
    const pulse = 0.3 + Math.sin(t * 2 + i * 0.5) * 0.15;
    tl.mesh.material.opacity = pulse;
    tl.glowMesh.material.opacity = pulse * 0.2;
    
    // Traveling pulse along curve (agent → brain region)
    const progress = ((t * 0.4 + tl.phase) % 1);
    const pt = tl.curve.getPoint(progress);
    tl.pulse.position.copy(pt);
    tl.pulse.material.opacity = 0.7 + Math.sin(t * 8) * 0.3;
    const pScale = 0.8 + Math.sin(t * 6 + i) * 0.4;
    tl.pulse.scale.setScalar(pScale);
  });

  // Gentle bob on agent labels (no orbit — keeps traces connected)
  agentLabels.forEach((al) => {
    al.label.position.y = al.baseY + Math.sin(t * 0.5 + al.idx) * 0.03;
  });

  controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
  composer.setSize(w, h);
});

// ═══════ INTERACTION — tap to see detail ═══════
const API_BASE = window.location.origin;
const overlay = document.getElementById('detail-overlay');
const detailTitle = document.getElementById('detail-title');
const detailBody = document.getElementById('detail-body');

document.getElementById('detail-close').addEventListener('click', () => {
  overlay.classList.remove('open');
});

// Close on tap outside
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('open');
});

function showDetail(title, html) {
  detailTitle.textContent = title;
  detailBody.innerHTML = html;
  overlay.classList.add('open');
}

function showLoading(title) {
  detailTitle.textContent = title;
  detailBody.innerHTML = '<div class="detail-loading">QUERYING ORGANISM...</div>';
  overlay.classList.add('open');
}

// Agent click handler
function onAgentClick(agent) {
  showLoading(agent.name.toUpperCase());
  
  fetch(API_BASE + '/api/memories?limit=50')
    .then(r => r.json())
    .then(memories => {
      // Filter to this agent type
      const agentKey = agent.name.toLowerCase().replace(/\s+/g, '_');
      const relevant = (memories || []).filter(m => {
        const a = (m.agent || '').toLowerCase();
        return a.includes(agentKey) || a.includes(agent.name.toLowerCase().split(' ')[0]);
      }).slice(0, 5);
      
      if (relevant.length === 0) {
        showDetail(agent.name.toUpperCase(), `
          <div style="color:${agent.color}">
            <span class="detail-tag" style="background:${agent.color}22;border:1px solid ${agent.color}">${agent.type}</span>
            <span class="detail-tag" style="background:${agent.status === 'gated' ? '#ffffff11' : agent.color + '22'};border:1px solid ${agent.status === 'gated' ? '#ffffff33' : agent.color}">${agent.status}</span>
          </div>
          <p style="margin-top:10px;color:rgba(255,255,255,0.5)">No recent memories from this agent. ${agent.status === 'gated' ? 'Agent is gated — requires RFP document to activate.' : 'Run /api/trigger to generate fresh analysis.'}</p>
        `);
      } else {
        const memHTML = relevant.map(m => `
          <div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div style="font-size:9px;color:rgba(255,255,255,0.35);margin-bottom:3px">${new Date(m.created_at).toLocaleDateString()} — ${m.opportunity_id ? m.opportunity_id.split('-').slice(0,3).join('-') : 'system'}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.75)">${(m.observation || '').substring(0, 300)}${(m.observation || '').length > 300 ? '...' : ''}</div>
          </div>
        `).join('');
        
        showDetail(agent.name.toUpperCase(), `
          <div style="margin-bottom:8px">
            <span class="detail-tag" style="background:${agent.color}22;border:1px solid ${agent.color}">${agent.type}</span>
            <span class="detail-tag" style="background:${agent.color}22;border:1px solid ${agent.color}">${agent.status}</span>
            <span class="detail-tag" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15)">${relevant.length} recent</span>
          </div>
          ${memHTML}
        `);
      }
    })
    .catch(() => {
      showDetail(agent.name.toUpperCase(), `
        <div style="color:${agent.color}">
          <span class="detail-tag" style="background:${agent.color}22;border:1px solid ${agent.color}">${agent.type}</span>
          <span class="detail-tag" style="background:${agent.color}22;border:1px solid ${agent.color}">${agent.status}</span>
        </div>
        <p style="margin-top:10px;color:rgba(255,255,255,0.4)">Brain region: ${BRAIN_REGIONS[agent.name]?.region || 'Unknown'}</p>
        <p style="color:rgba(255,255,255,0.3);font-size:10px">Could not reach organism API.</p>
      `);
    });
}

// Pipeline click handler
function onPipelineClick(opp) {
  showLoading(opp.name);
  
  fetch(API_BASE + '/api/pipeline')
    .then(r => r.json())
    .then(opps => {
      const match = (opps || []).find(o => 
        o.title && o.title.toLowerCase().includes(opp.name.toLowerCase().split(' ')[0])
      );
      
      if (match) {
        const hasRFP = match.rfp_document_retrieved ? '✓ RFP Retrieved' : '✗ No RFP';
        const hasProposal = match.proposal_content ? '✓ Proposal (' + Math.round((match.proposal_content||'').length/1000) + 'K)' : '✗ No Proposal';
        
        showDetail(opp.name.toUpperCase(), `
          <div style="margin-bottom:8px">
            <span class="detail-tag" style="background:${opp.color}22;border:1px solid ${opp.color}">OPI ${match.opi_score}</span>
            <span class="detail-tag" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15)">${match.stage}</span>
            ${match.due_date ? '<span class="detail-tag" style="background:#ef444422;border:1px solid #ef4444">Due ' + new Date(match.due_date).toLocaleDateString() + '</span>' : ''}
          </div>
          <p style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:6px">${match.agency || ''} — ${match.vertical || ''}</p>
          <p style="font-size:10px;margin-bottom:4px;color:${match.rfp_document_retrieved ? '#4ade80' : '#ef4444'}">${hasRFP}</p>
          <p style="font-size:10px;margin-bottom:8px;color:${match.proposal_content ? '#4ade80' : '#ef4444'}">${hasProposal}</p>
          ${match.scope_analysis ? '<div style="padding:8px 0;border-top:1px solid rgba(255,255,255,0.05)"><div style="font-size:9px;color:rgba(0,240,255,0.5);margin-bottom:3px">SCOPE</div><div style="font-size:11px;color:rgba(255,255,255,0.7)">' + (match.scope_analysis||'').substring(0,400) + '...</div></div>' : ''}
        `);
      } else {
        showDetail(opp.name.toUpperCase(), '<p style="color:rgba(255,255,255,0.4)">Opportunity not found in pipeline.</p>');
      }
    })
    .catch(() => {
      showDetail(opp.name.toUpperCase(), '<p style="color:rgba(255,255,255,0.4)">Could not reach organism API.</p>');
    });
}

// Wire up pipeline row clicks
document.querySelectorAll('.opp-row').forEach((row, i) => {
  row.addEventListener('click', () => onPipelineClick(PIPELINE[i]));
});
