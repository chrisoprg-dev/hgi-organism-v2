<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HGI ORGANISM</title>
<link rel="manifest" href="/manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06090f;--surface:#0c1220;--surface2:#111a2e;--border:rgba(0,180,220,0.08);
  --cyan:#00d4ff;--gold:#f0c040;--green:#2dd4a0;--red:#ff4060;--amber:#f0a030;
  --text:#c8d4e0;--dim:#5a6a80;--white:#eaf0f8;
  --font-display:Orbitron,monospace;--font-mono:'JetBrains Mono',monospace;--font-body:Inter,system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:10px}
.topbar .brand{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:3px}
.topbar .ver{font-family:var(--font-mono);font-size:9px;color:var(--dim)}
.topbar .spacer{flex:1}
.topbar .status{display:flex;align-items:center;gap:6px}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite}
.topbar .status-text{font-family:var(--font-mono);font-size:9px;color:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;user-select:none}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:active{background:rgba(0,212,255,0.05)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px;padding-bottom:80px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(0,180,220,0.15);border-radius:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-family:var(--font-display);font-size:10px;letter-spacing:2px;color:var(--dim);font-weight:600}
.card-badge{font-family:var(--font-mono);font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(0,212,255,0.08);color:var(--cyan);border:1px solid rgba(0,212,255,0.15)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.stat-value{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--white)}
.stat-value.cyan{color:var(--cyan)}.stat-value.gold{color:var(--gold)}.stat-value.green{color:var(--green)}
.stat-label{font-family:var(--font-mono);font-size:7px;letter-spacing:1px;color:var(--dim);margin-top:4px}
.pipe-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
.pipe-item:last-child{border-bottom:none}
.pipe-item:active{background:rgba(0,212,255,0.03);margin:0 -14px;padding:10px 14px}
.pipe-opi{font-family:var(--font-display);font-size:20px;font-weight:900;min-width:44px;text-align:center}
.pipe-opi.high{color:var(--green)}.pipe-opi.mid{color:var(--cyan)}.pipe-opi.low{color:var(--amber)}
.pipe-info{flex:1;min-width:0}
.pipe-title{font-size:13px;font-weight:600;color:var(--white)}
.pipe-meta{font-family:var(--font-mono);font-size:9px;color:var(--dim);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.pipe-stage{font-family:var(--font-mono);font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.stage-pursuing{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.2)}
.stage-identified{background:rgba(240,192,64,0.1);color:var(--gold);border:1px solid rgba(240,192,64,0.2)}
.stage-watching{background:rgba(90,106,128,0.2);color:var(--dim);border:1px solid rgba(90,106,128,0.3)}
.stage-submitted{background:rgba(45,212,160,0.1);color:var(--green);border:1px solid rgba(45,212,160,0.2)}
.stage-pending_rfp{background:rgba(240,192,64,0.06);color:var(--gold);border:1px solid rgba(240,192,64,0.12)}
.stage-proposal{background:rgba(0,180,255,0.1);color:#40b0ff;border:1px solid rgba(0,180,255,0.2)}
.feed-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.feed-item:last-child{border-bottom:none}
.feed-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.feed-agent{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--cyan)}
.feed-opp{font-family:var(--font-mono);font-size:8px;color:var(--gold)}
.feed-time{font-family:var(--font-mono);font-size:8px;color:var(--dim);margin-left:auto;flex-shrink:0}
.feed-text{font-size:12px;color:var(--text);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
.feed-text.expanded{display:block;-webkit-line-clamp:unset;overflow:visible;white-space:pre-wrap}
.expandable{cursor:pointer}
.expandable .expand-body{display:none;white-space:pre-wrap;font-size:12px;line-height:1.6;color:var(--text);padding-top:8px}
.expandable.open .expand-body{display:block}
.expandable .expand-arrow{font-size:10px;color:var(--cyan);transition:transform 0.2s}
.expandable.open .expand-arrow{transform:rotate(90deg)}
.intel-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.02);cursor:pointer}
.intel-row:active{background:rgba(0,212,255,0.03)}
.intel-label{font-size:12px;color:var(--dim)}
.intel-value{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--white)}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;position:relative;overflow:hidden;cursor:pointer}
.agent-card:active{border-color:rgba(0,212,255,0.3)}
.agent-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.agent-card.core::before{background:var(--cyan)}.agent-card.intel::before{background:var(--gold)}
.agent-card.gated::before{background:var(--amber)}.agent-card.per-opp::before{background:var(--green)}
.agent-name{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--white)}
.agent-type{font-family:var(--font-mono);font-size:7px;color:var(--dim);margin-top:2px;letter-spacing:1px}
.agent-last{font-size:8px;color:var(--dim);margin-top:4px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-family:var(--font-mono);font-size:10px;color:var(--cyan);text-align:center;cursor:pointer;letter-spacing:1px;transition:all 0.2s;user-select:none}
.btn:active{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);transform:scale(0.98)}
.btn.primary{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.2)}
.btn.btn-green{color:var(--green);border-color:rgba(45,212,160,0.3);background:rgba(45,212,160,0.06)}
.btn.btn-green:active{background:rgba(45,212,160,0.15)}
.btn.btn-red{color:var(--red);border-color:rgba(255,64,96,0.3);background:rgba(255,64,96,0.06)}
.btn.btn-red:active{background:rgba(255,64,96,0.15)}
.btn.btn-amber{color:var(--amber);border-color:rgba(240,160,48,0.3);background:rgba(240,160,48,0.06)}
.btn.btn-amber:active{background:rgba(240,160,48,0.15)}
.loading{text-align:center;padding:40px;color:var(--dim);font-family:var(--font-mono);font-size:11px}
.loading::after{content:'';display:block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:12px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.back{font-family:var(--font-mono);font-size:10px;color:var(--cyan);cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:4px}
.back:active{opacity:0.6}
.record{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.record-title{font-size:12px;font-weight:600;color:var(--white);margin-bottom:4px}
.record-meta{font-family:var(--font-mono);font-size:9px;color:var(--dim)}
.record-body{font-size:11px;color:var(--text);line-height:1.5;margin-top:4px}
.brain-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.35}
.brain-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 8s ease-in-out infinite alternate}
.brain-bg .orb1{width:200px;height:200px;background:rgba(0,180,255,0.06);top:20%;left:30%}
.brain-bg .orb2{width:150px;height:150px;background:rgba(0,212,255,0.04);top:60%;right:20%;animation-delay:2s}
.brain-bg .orb3{width:180px;height:180px;background:rgba(240,192,64,0.03);bottom:10%;left:10%;animation-delay:4s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,-15px) scale(1.1)}}
/* Stage buttons */
.stage-bar{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.stage-btn{padding:6px 10px;border-radius:6px;font-family:var(--font-mono);font-size:8px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--dim);transition:all 0.2s}
.stage-btn:active{transform:scale(0.95)}
.stage-btn.current{color:var(--cyan);border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.1);font-weight:600}
/* Outcome bar */
.outcome-bar{display:flex;gap:8px;margin:10px 0}
.outcome-bar .btn{flex:1;padding:14px 8px;font-size:11px;font-weight:600}
/* Sub-tabs inside detail view */
.detail-tabs{display:flex;gap:0;margin:12px 0 0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.detail-tabs::-webkit-scrollbar{display:none}
.detail-tab{padding:10px 14px;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s}
.detail-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.detail-tab:active{background:rgba(0,212,255,0.04)}
/* Proposal workspace */
.prop-toggle{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.prop-toggle-btn{flex:1;padding:10px;text-align:center;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--dim);cursor:pointer;background:var(--surface);transition:all 0.15s}
.prop-toggle-btn.active{color:var(--cyan);background:rgba(0,212,255,0.08)}
.prop-section{background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
.prop-section-header{display:flex;align-items:center;justify-content:space-between;padding:12px;cursor:pointer}
.prop-section-header:active{background:rgba(0,212,255,0.03)}
.prop-section-title{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--white);letter-spacing:0.5px}
.prop-section-body{display:none;padding:0 12px 12px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.prop-section.open .prop-section-body{display:block}
.prop-section .expand-arrow{font-size:10px;color:var(--cyan);transition:transform 0.2s}
.prop-section.open .expand-arrow{transform:rotate(90deg)}
.action-required{background:rgba(240,160,48,0.08);border-left:3px solid var(--amber);padding:8px 10px;margin:8px 0;border-radius:0 6px 6px 0;font-family:var(--font-mono);font-size:10px;color:var(--amber)}
.prop-full{font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.red-team-note{background:rgba(255,64,96,0.06);border-left:3px solid var(--red);padding:8px 10px;margin:8px 0;border-radius:0 6px 6px 0;font-size:11px;color:var(--text)}
.red-team-note .rt-label{font-family:var(--font-mono);font-size:8px;color:var(--red);letter-spacing:1px;margin-bottom:4px}
/* Confirm dialog */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:320px;width:100%}
.confirm-title{font-family:var(--font-display);font-size:12px;color:var(--white);letter-spacing:2px;margin-bottom:12px}
.confirm-text{font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-actions .btn{flex:1}
@media(min-width:768px){.stats{grid-template-columns:repeat(6,1fr)}.agent-grid{grid-template-columns:repeat(3,1fr)}.content{padding:16px 24px}}
</style>
</head>
<body>
<div class="brain-bg"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div id="app">
  <div class="topbar">
    <span class="brand">HGI ORGANISM</span>
    <span class="ver" id="ver"></span>
    <div class="spacer"></div>
    <div class="status">
      <div class="dot" id="health-dot"></div>
      <span class="status-text" id="health-text">connecting...</span>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="cop">COMMAND</div>
    <div class="tab" data-tab="pipeline">PIPELINE</div>
    <div class="tab" data-tab="feed">FEED</div>
    <div class="tab" data-tab="agents">AGENTS</div>
    <div class="tab" data-tab="intel">INTEL</div>
  </div>
  <div class="content" id="content"><div class="loading">INITIALIZING ORGANISM</div></div>
</div>
<div id="confirm-root"></div>
<script>
var BASE='';
var S={health:null,pipeline:[],memories:[],status:null,tab:'cop',outcomes:[],cycles:[],lossData:null,feedFilter:'',huntStats:null,
  sub:null,detailTab:'overview',propView:'sections',oppMems:null,oppMemsId:null};

var V1_SKIP=['v2_engine','v3_engine','v4_engine','oral_prep','brief_agent','opportunity_brief_agent',
  'post_award','mobile_notifications','exec_briefing_mode','unsolicited_agent',
  'financial_v2','content_engine_v2'];

async function api(path){try{var r=await fetch(BASE+path);if(!r.ok)return null;return await r.json();}catch(e){return null;}}
async function apiPost(path,body){try{var r=await fetch(BASE+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function timeAgo(ts){if(!ts)return '';var ms=Date.now()-new Date(ts).getTime();if(ms<60000)return 'now';if(ms<3600000)return Math.floor(ms/60000)+'m';if(ms<86400000)return Math.floor(ms/3600000)+'h';return Math.floor(ms/86400000)+'d';}
function safeDays(d){if(!d)return null;var x=new Date(d);if(isNaN(x.getTime()))return null;return Math.ceil((x-Date.now())/86400000);}
function stat(val,label,cc){return '<div class="stat"><div class="stat-value '+(cc||'')+'">'+(val!=null?val:'\u2014')+'</div><div class="stat-label">'+label+'</div></div>';}

function cleanObs(text){
  if(!text)return '';
  var lines=text.split('\n');var out=[];var past=false;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i].trim();
    if(!past&&!ln)continue;
    if(!past&&/^[A-Z0-9\s_\-]{3,40}(\s*-\s*[^:]+)?:\s*$/.test(ln))continue;
    if(ln.charAt(0)==='#')continue;
    if(/^(Agent \d|AGENT \d|Eyes Only|Classification|Principals? Only|For:|Prepared for|Principal Eyes|GOVERNING RULES|TRANSPARENCY NOTICE|CRITICAL SYSTEM)/i.test(ln))continue;
    if(/HGI GLOBAL/i.test(ln)&&ln.length<120)continue;
    if(/^[\-=\*]{3,}$/.test(ln))continue;
    if(/^>\s*(\*\*)?[A-Z]{2,}/.test(ln))continue;
    past=true;out.push(ln);
  }
  var r=out.join('\n').replace(/\*\*/g,'');
  r=r.replace(/Christopher\s+J?\.?\s*Oney/gi,'President').replace(/Larry Oney/gi,'Chairman')
    .replace(/Lou(?:is)?\s+Resweber/gi,'CEO').replace(/Candy Dottolo/gi,'CAO')
    .replace(/Dillon Truax/gi,'VP').replace(/Geoffrey Brien/gi,'[REMOVED]')
    .replace(/Vanessa James/gi,'SVP Claims').replace(/Chris Feduccia/gi,'SME');
  return r.trim();
}

// === DATA LOADING ===
async function loadAll(){
  var [h,p,m,s,la,ch,hs]=await Promise.all([api('/health'),api('/api/pipeline'),api('/api/memories'),api('/api/system-status'),api('/api/loss-analysis'),api('/api/cycle-history'),api('/api/hunt-stats')]);
  S.health=h;
  S.pipeline=(p||[]).filter(function(o){return o.status==='active'&&(o.opi_score||0)>=60;}).sort(function(a,b){return(b.opi_score||0)-(a.opi_score||0);});
  S.outcomes=(la&&la.recent_outcomes)?la.recent_outcomes:[];
  S.lossData=la||{};
  S.cycles=(ch&&ch.cycles)?ch.cycles:[];
  S.huntStats=hs||[];
  S.memories=(m||[]).filter(function(x){
    if(V1_SKIP.indexOf(x.agent)===-1){
      if(/Agent \d+ of (37|47)/.test(x.observation||''))return false;
      return true;
    }
    return false;
  });
  S.status=s;
  updateTopbar();render();
}

async function loadOppMems(id){
  if(S.oppMemsId===id&&S.oppMems)return S.oppMems;
  S.oppMems=await api('/api/opportunity-memories?id='+encodeURIComponent(id));
  S.oppMemsId=id;
  return S.oppMems||[];
}

function updateTopbar(){
  var h=S.health,dot=document.getElementById('health-dot'),txt=document.getElementById('health-text'),ver=document.getElementById('ver');
  if(h&&h.status==='alive'){
    dot.style.background='var(--green)';dot.style.boxShadow='0 0 8px var(--green)';
    var up=h.uptime_seconds;txt.textContent='ALIVE '+(up>3600?Math.floor(up/3600)+'h':Math.floor(up/60)+'m');
    ver.textContent=(h.version||'').replace('V','v');
  }else{dot.style.background='var(--red)';dot.style.boxShadow='0 0 8px var(--red)';txt.textContent='OFFLINE';}
}

// === NAVIGATION ===
document.getElementById('tabs').addEventListener('click',function(e){
  var tab=e.target.closest('.tab');if(!tab)return;
  S.tab=tab.dataset.tab;S.sub=null;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  tab.classList.add('active');render();
});

function render(){
  var c=document.getElementById('content');
  if(S.sub)return renderSub(c);
  switch(S.tab){
    case 'cop':c.innerHTML=renderCOP();break;
    case 'pipeline':c.innerHTML=renderPipeline();break;
    case 'feed':c.innerHTML=renderFeed();break;
    case 'agents':c.innerHTML=renderAgents();break;
    case 'intel':c.innerHTML=renderIntel();break;
  }
  bind();
}

function goSub(type,data){S.sub={type:type,data:data};render();}
function goBack(){S.sub=null;S.oppMems=null;S.oppMemsId=null;S.detailTab='overview';render();}

function renderSub(c){
  var s=S.sub;
  switch(s.type){
    case 'detail':renderDetailView(c,s.data);break;
    case 'agent-detail':renderAgentDetailView(c,s.data);break;
    case 'intel-drill':loadIntelDrill(c,s.data);break;
    case 'all-memories':loadAllMemories(c,s.data);break;
    case 'exec-brief':loadExecBrief(c);break;
    case 'cycle-history':loadCycleHistory(c);break;
    case 'compliance':loadCompliance(c,s.data);break;
    default:goBack();
  }
}

// === CONFIRM DIALOG ===
function showConfirm(title,text,confirmLabel,confirmClass,onConfirm){
  var root=document.getElementById('confirm-root');
  root.innerHTML='<div class="confirm-overlay" onclick="hideConfirm()">'+
    '<div class="confirm-box" onclick="event.stopPropagation()">'+
    '<div class="confirm-title">'+esc(title)+'</div>'+
    '<div class="confirm-text">'+esc(text)+'</div>'+
    '<div class="confirm-actions">'+
    '<div class="btn" onclick="hideConfirm()">CANCEL</div>'+
    '<div class="btn '+(confirmClass||'primary')+'" id="confirm-yes">'+esc(confirmLabel)+'</div>'+
    '</div></div></div>';

// === FEED ITEM (reusable) ===
function feedItem(m){
  var agent=(m.agent||'unknown').replace(/_/g,' ');
  var obs=cleanObs(m.observation||'');
  var opp=m.opportunity_id?getOppTitle(m.opportunity_id):'';
  var h='<div class="feed-item"><div class="feed-header"><span class="feed-agent">'+esc(agent)+'</span>';
  if(opp)h+='<span class="feed-opp">'+esc(opp)+'</span>';
  h+='<span class="feed-time">'+timeAgo(m.created_at)+'</span></div>';
  h+='<div class="feed-text" onclick="this.classList.toggle(\'expanded\')">'+esc(obs)+'</div></div>';
  return h;
}

function getOppTitle(id){
  var o=S.pipeline.find(function(x){return x.id===id;});
  return o?(o.title||'').slice(0,60):(id||'').slice(0,30);
}

function lastActivity(name){
  var f=S.memories.find(function(m){return m.agent===name||m.agent===name.replace(/_agent$/,'');});
  return f?timeAgo(f.created_at):'';
}

function expandSection(title,content,startOpen){
  var cl=startOpen?'expandable open':'expandable';

}

  }

  // === STAGE BUTTONS ===
  var stages=['identified','pursuing','proposal','submitted','watching'];
  html+='<div class="stage-bar">';
  stages.forEach(function(st){
    var cur=o.stage===st?'current':'';
    html+='<div class="stage-btn '+cur+'" onclick="event.stopPropagation();changeStage(\''+o.id+'\',\''+st+'\')">'+st.toUpperCase()+'</div>';
  });
  html+='</div>';
  html+='</div>';

  // === COMPLETENESS STATS ===

  html+=stat(hs?'\u2713':'\u2014','SCOPE',(hs?'green':''));
  html+=stat(hi?'\u2713':'\u2014','INTEL',(hi?'green':''));
  html+=stat(hf?'\u2713':'\u2014','FIN',(hf?'green':''));
  html+=stat(hst?'\u2713':'\u2014','STAFF',(hst?'green':''));
  html+=stat(hp?'\u2713':'\u2014','PROP',(hp?'green':''));
  html+='</div>';

  // === DETAIL SUB-TABS ===
  var dtab=S.detailTab||'overview';
  html+='<div class="detail-tabs">';
  ['overview','intel','proposal','activity'].forEach(function(t){
    html+='<div class="detail-tab'+(dtab===t?' active':'')+'" onclick="switchDetailTab(\''+t+'\',\''+o.id+'\')">'+t.toUpperCase()+'</div>';
  });
  html+='</div>';

  // === TAB CONTENT ===
  html+='<div style="margin-top:12px">';
  if(dtab==='overview') html+=renderDetailOverview(o);
  else if(dtab==='intel') html+=renderDetailIntel(o,mems);
  else if(dtab==='proposal') html+=renderDetailProposal(o,mems);
  else if(dtab==='activity') html+=renderDetailActivity(o,mems);
  html+='</div>';

  // === OUTCOME BAR ===
  if(o.stage!=='closed'&&o.stage!=='no_bid'&&!o.outcome){
    html+='<div class="outcome-bar">';
    html+='<div class="btn btn-green" onclick="recordOutcome(\''+o.id+'\',\'won\')">WON</div>';
    html+='<div class="btn btn-red" onclick="recordOutcome(\''+o.id+'\',\'lost\')">LOST</div>';
    html+='<div class="btn btn-amber" onclick="recordOutcome(\''+o.id+'\',\'no_bid\')">NO-BID</div>';
    html+='</div>';
  }
  if(o.outcome){
    var oColor=o.outcome==='won'?'var(--green)':o.outcome==='lost'?'var(--red)':'var(--amber)';
    html+='<div class="card" style="border-left:3px solid '+oColor+';text-align:center"><span style="font-family:var(--font-display);font-size:14px;color:'+oColor+';letter-spacing:3px">'+o.outcome.toUpperCase()+'</span></div>';
  }

  c.innerHTML=html;
  bind();
}

// === PROPOSAL TAB — full + section view, ACTION REQUIRED, red team ===
function renderDetailProposal(o,mems){
  var html='';
  var pc=o.proposal_content||'';
  if(pc.length<100){
    html+='<div class="card" style="text-align:center;padding:24px">';
    html+='<div style="color:var(--dim);margin-bottom:12px">No proposal generated yet</div>';
    html+='<div class="btn primary" style="display:inline-block" onclick="produceProposal(\''+o.id+'\')">PRODUCE PROPOSAL</div>';
    html+='</div>';
    return html;
  }

  // Toggle: FULL | SECTIONS
  html+='<div class="prop-toggle">';
  html+='<div class="prop-toggle-btn'+(S.propView==='full'?' active':'')+'" onclick="S.propView=\'full\';switchDetailTab(\'proposal\',\''+o.id+'\')">FULL VIEW</div>';
  html+='<div class="prop-toggle-btn'+(S.propView==='sections'?' active':'')+'" onclick="S.propView=\'sections\';switchDetailTab(\'proposal\',\''+o.id+'\')">SECTIONS</div>';
  html+='</div>';

  // Action bar
  html+='<div style="display:flex;gap:8px;margin-bottom:12px">';
  html+='<div class="btn primary" style="flex:1" onclick="window.open(BASE+\'/api/proposal-doc?id='+encodeURIComponent(o.id)+'\')">DOWNLOAD DOC</div>';
  html+='<div class="btn" style="flex:1" onclick="produceProposal(\''+o.id+'\')">REGENERATE</div>';
  html+='</div>';

  // Get red team analysis
  var rtMems=(mems||[]).filter(function(m){return m.agent==='red_team';});
  var rtText=rtMems.length>0?cleanObs(rtMems[0].observation||''):'';

  // Parse ACTION REQUIRED items
  var actionItems=[];
  var arRegex=/\[ACTION REQUIRED[^\]]*\][:\s]*(.*?)(?=\n\n|\n\[|$)/gis;
  var arMatch;
  while((arMatch=arRegex.exec(pc))!==null){
    actionItems.push(arMatch[0].trim());
  }

  // Show ACTION REQUIRED summary if any
  if(actionItems.length>0){
    html+='<div class="card" style="border-left:3px solid var(--amber)"><div class="card-header"><span class="card-title">ACTION REQUIRED</span><span class="card-badge" style="background:rgba(240,160,48,0.12);color:var(--amber);border-color:rgba(240,160,48,0.25)">'+actionItems.length+' items</span></div>';
    actionItems.forEach(function(item){
      html+='<div class="action-required">'+esc(item.slice(0,200))+'</div>';
    });
    html+='</div>';
  }

  if(S.propView==='full'){
    // Full view with ACTION REQUIRED highlighted inline
    var displayText=cleanObs(pc);
    // Highlight action required items
    var highlighted=esc(displayText).replace(/\[ACTION REQUIRED[^\]]*\][^\n]*/gi,function(match){
      return '<span style="background:rgba(240,160,48,0.12);color:var(--amber);padding:2px 4px;border-radius:3px">'+match+'</span>';
    });
    html+='<div class="card"><div class="card-header"><span class="card-title">FULL PROPOSAL</span><span style="font-family:var(--font-mono);font-size:9px;color:var(--dim)">'+(Math.round(pc.length/1000))+'K chars</span></div>';
    html+='<div class="prop-full">'+highlighted+'</div></div>';
  } else {
    // Section view — parse by ## headers
    var sections=parseProposalSections(pc);
    sections.forEach(function(sec,idx){
      html+='<div class="prop-section" id="prop-sec-'+idx+'" onclick="this.classList.toggle(\'open\')">';
      html+='<div class="prop-section-header"><span class="prop-section-title">'+esc(sec.title)+'</span>';
      var hasAR=sec.content.indexOf('ACTION REQUIRED')>=0;
      html+='<span style="display:flex;align-items:center;gap:6px">';
      if(hasAR)html+='<span style="font-family:var(--font-mono);font-size:7px;color:var(--amber);letter-spacing:1px">ACTION</span>';
      html+='<span class="expand-arrow">\u25B6</span></span>';
      html+='</div>';
      // Section body
      var secText=cleanObs(sec.content);
      var secHtml=esc(secText).replace(/\[ACTION REQUIRED[^\]]*\][^\n]*/gi,function(match){
        return '<span style="background:rgba(240,160,48,0.12);color:var(--amber);padding:2px 4px;border-radius:3px">'+match+'</span>';
      });
      html+='<div class="prop-section-body">'+secHtml+'</div>';
      html+='</div>';
    });
  }

  // Red Team Analysis
  if(rtText){
    html+='<div class="card"><div class="card-header"><span class="card-title">RED TEAM ANALYSIS</span><span class="card-badge" style="background:rgba(255,64,96,0.08);color:var(--red);border-color:rgba(255,64,96,0.2)">REVIEW</span></div>';
    html+='<div class="red-team-note"><div class="rt-label">RED TEAM</div>'+esc(rtText)+'</div></div>';
  }

  // Proposal metadata
  html+='<div style="font-family:var(--font-mono);font-size:9px;color:var(--dim);text-align:center;padding:8px">';
  html+=(Math.round(pc.length/1000))+'K chars \u2022 '+parseProposalSections(pc).length+' sections';
  if(actionItems.length>0) html+=' \u2022 '+actionItems.length+' action items';
  html+='</div>';

  return html;
}

function parseProposalSections(text){
  var lines=text.split('\n');
  var sections=[];
  var current={title:'Introduction',content:''};
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    // Match ## headers or all-caps section headers
    if(/^#{1,3}\s+(.+)/.test(ln)){
      if(current.content.trim())sections.push(current);
      current={title:ln.replace(/^#{1,3}\s+/,'').replace(/\*\*/g,''),content:''};
    } else if(/^[A-Z][A-Z\s\-:]{10,60}$/.test(ln.trim())&&ln.trim().length>12){
      if(current.content.trim())sections.push(current);
      current={title:ln.trim(),content:''};
    } else {
      current.content+=ln+'\n';
    }
  }
  if(current.content.trim())sections.push(current);
  // If only one section, try splitting by numbered sections (1., 2., etc)
  if(sections.length<=1&&text.length>2000){
    sections=[];current={title:'Cover',content:''};
    for(var j=0;j<lines.length;j++){
      if(/^\d+\.\s+[A-Z]/.test(lines[j].trim())){
        if(current.content.trim())sections.push(current);
        current={title:lines[j].trim(),content:''};
      } else {
        current.content+=lines[j]+'\n';
      }
    }
    if(current.content.trim())sections.push(current);
  }
  return sections.length>0?sections:[{title:'Full Proposal',content:text}];
}

    var content=data.compliance||data.result||data;
    if(typeof content==='string'){
      html+='<div style="font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap">'+esc(cleanObs(content))+'</div>';
    }else{
      Object.keys(content).forEach(function(k){
        var v=content[k];
        html+='<div class="record expandable" onclick="this.classList.toggle(\'open\')">';
        html+='<div class="record-title">'+esc(k.replace(/_/g,' ').toUpperCase())+' <span class="expand-arrow">\u25B6</span></div>';
        html+='<div class="expand-body">'+esc(typeof v==='string'?v:JSON.stringify(v,null,2))+'</div></div>';
      });
    }
    html+='</div>';
  }else{html+='<div class="card">Could not run compliance check</div>';}
  c.innerHTML=html;
}

// ============================================================
// ACTIONS
// ============================================================
function bind(){
  document.querySelectorAll('.pipe-item[data-id]').forEach(function(el){
    el.onclick=function(){
      if(S.tab!=='pipeline'){
        S.tab='pipeline';
        document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
        var pt=document.querySelector('[data-tab="pipeline"]');if(pt)pt.classList.add('active');
      }
      goSub('detail',el.dataset.id);
    };
  });
  var fs=document.getElementById('feed-search');
  if(fs){
    fs.addEventListener('input',function(){
      var v=this.value,p=this.selectionStart;
      S.feedFilter=v;
      document.getElementById('content').innerHTML=renderFeed();bind();
      var el2=document.getElementById('feed-search');
      if(el2){el2.focus();el2.setSelectionRange(p,p);}
    });
  }
}

async function triggerCycle(){
  var btn=event.target;btn.textContent='RUNNING...';btn.style.color='var(--amber)';
  await api('/api/trigger');btn.textContent='TRIGGERED';btn.style.color='var(--green)';
  setTimeout(loadAll,3000);
}

async function produceProposal(id){
  var btn=event.target;btn.textContent='STARTING...';btn.style.color='var(--amber)';
  await fetch(BASE+'/api/produce-proposal?id='+encodeURIComponent(id),{method:'POST'});
  btn.textContent='RUNNING (~5min)';btn.style.color='var(--green)';
}

async function changeStage(id,newStage){
  var o=S.pipeline.find(function(x){return x.id===id;});
  if(o&&o.stage===newStage)return;
  showConfirm('CHANGE STAGE','Move "'+((o&&o.title)||'').slice(0,40)+'" to '+newStage.toUpperCase()+'?',newStage.toUpperCase(),'primary',async function(){
    var result=await apiPost('/api/update-stage',{id:id,stage:newStage});
    if(result&&result.success){
      if(o)o.stage=newStage;
      goSub('detail',id);
    }
  });
}

async function recordOutcome(id,outcome){
  var o=S.pipeline.find(function(x){return x.id===id;});
  var labels={won:'Mark as WON',lost:'Mark as LOST',no_bid:'Mark as NO-BID'};
  var classes={won:'btn-green',lost:'btn-red',no_bid:'btn-amber'};
  showConfirm('RECORD OUTCOME',labels[outcome]+' for "'+((o&&o.title)||'').slice(0,40)+'"? This will trigger analysis agents.',outcome.toUpperCase(),classes[outcome],async function(){
    var result=await apiPost('/api/record-outcome',{id:id,outcome:outcome});
    if(result&&result.success){
      await loadAll();
      goSub('detail',id);
    }
  });
}

loadAll();
setInterval(loadAll,120000);
</script>
