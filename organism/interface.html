<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HGI ORGANISM</title>
<link rel="manifest" href="/manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06090f;--surface:#0c1220;--surface2:#111a2e;--border:rgba(0,180,220,0.08);
  --cyan:#00d4ff;--gold:#f0c040;--green:#2dd4a0;--red:#ff4060;--amber:#f0a030;
  --text:#c8d4e0;--dim:#5a6a80;--white:#eaf0f8;
  --font-display:Orbitron,monospace;--font-mono:'JetBrains Mono',monospace;--font-body:Inter,system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:10px}
.topbar .brand{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:3px}
.topbar .ver{font-family:var(--font-mono);font-size:9px;color:var(--dim)}
.topbar .spacer{flex:1}
.topbar .status{display:flex;align-items:center;gap:6px}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite}
.topbar .status-text{font-family:var(--font-mono);font-size:9px;color:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;user-select:none}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:active{background:rgba(0,212,255,0.05)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px;padding-bottom:80px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(0,180,220,0.15);border-radius:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-family:var(--font-display);font-size:10px;letter-spacing:2px;color:var(--dim);font-weight:600}
.card-badge{font-family:var(--font-mono);font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(0,212,255,0.08);color:var(--cyan);border:1px solid rgba(0,212,255,0.15)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.stat-value{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--white)}
.stat-value.cyan{color:var(--cyan)}.stat-value.gold{color:var(--gold)}.stat-value.green{color:var(--green)}
.stat-label{font-family:var(--font-mono);font-size:7px;letter-spacing:1px;color:var(--dim);margin-top:4px}
.pipe-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
.pipe-item:last-child{border-bottom:none}
.pipe-item:active{background:rgba(0,212,255,0.03);margin:0 -14px;padding:10px 14px}
.pipe-opi{font-family:var(--font-display);font-size:20px;font-weight:900;min-width:44px;text-align:center}
.pipe-opi.high{color:var(--green)}.pipe-opi.mid{color:var(--cyan)}.pipe-opi.low{color:var(--amber)}
.pipe-info{flex:1;min-width:0}
.pipe-title{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-meta{font-family:var(--font-mono);font-size:9px;color:var(--dim);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.pipe-stage{font-family:var(--font-mono);font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.stage-pursuing{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.2)}
.stage-identified{background:rgba(240,192,64,0.1);color:var(--gold);border:1px solid rgba(240,192,64,0.2)}
.stage-watching{background:rgba(90,106,128,0.2);color:var(--dim);border:1px solid rgba(90,106,128,0.3)}
.stage-submitted{background:rgba(45,212,160,0.1);color:var(--green);border:1px solid rgba(45,212,160,0.2)}
.stage-pending_rfp{background:rgba(240,192,64,0.06);color:var(--gold);border:1px solid rgba(240,192,64,0.12)}
.feed-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.feed-item:last-child{border-bottom:none}
.feed-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.feed-agent{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--cyan)}
.feed-opp-name{font-family:var(--font-mono);font-size:8px;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.feed-time{font-family:var(--font-mono);font-size:8px;color:var(--dim);margin-left:auto;flex-shrink:0}
.feed-text{font-size:12px;color:var(--text);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.intel-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.intel-label{font-size:12px;color:var(--dim)}
.intel-value{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--white)}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;position:relative;overflow:hidden}
.agent-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.agent-card.core::before{background:var(--cyan)}.agent-card.intel::before{background:var(--gold)}
.agent-card.gated::before{background:var(--amber)}.agent-card.per-opp::before{background:var(--green)}
.agent-name{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--white)}
.agent-type{font-family:var(--font-mono);font-size:7px;color:var(--dim);margin-top:2px;letter-spacing:1px}
.agent-last{font-size:8px;color:var(--dim);margin-top:4px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-family:var(--font-mono);font-size:10px;color:var(--cyan);text-align:center;cursor:pointer;letter-spacing:1px;transition:all 0.2s;user-select:none}
.btn:active{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);transform:scale(0.98)}
.btn.primary{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.2)}
.loading{text-align:center;padding:40px;color:var(--dim);font-family:var(--font-mono);font-size:11px}
.loading::after{content:'';display:block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:12px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.detail-back{font-family:var(--font-mono);font-size:10px;color:var(--cyan);cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:4px}
.detail-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px}
.detail-agency{font-family:var(--font-mono);font-size:11px;color:var(--dim);margin-bottom:12px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:8px}
.detail-content{font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap;max-height:300px;overflow-y:auto}
.brain-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.35}
.brain-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 8s ease-in-out infinite alternate}
.brain-bg .orb1{width:200px;height:200px;background:rgba(0,180,255,0.06);top:20%;left:30%}
.brain-bg .orb2{width:150px;height:150px;background:rgba(0,212,255,0.04);top:60%;right:20%;animation-delay:2s}
.brain-bg .orb3{width:180px;height:180px;background:rgba(240,192,64,0.03);bottom:10%;left:10%;animation-delay:4s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,-15px) scale(1.1)}}
@media(min-width:768px){.stats{grid-template-columns:repeat(6,1fr)}.agent-grid{grid-template-columns:repeat(3,1fr)}.content{padding:16px 24px}}
</style>
</head>
<body>
<div class="brain-bg"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div id="app">
  <div class="topbar">
    <span class="brand">HGI ORGANISM</span>
    <span class="ver" id="ver"></span>
    <div class="spacer"></div>
    <div class="status">
      <div class="dot" id="health-dot"></div>
      <span class="status-text" id="health-text">connecting...</span>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="cop">COMMAND</div>
    <div class="tab" data-tab="pipeline">PIPELINE</div>
    <div class="tab" data-tab="feed">FEED</div>
    <div class="tab" data-tab="agents">AGENTS</div>
    <div class="tab" data-tab="intel">INTEL</div>
  </div>
  <div class="content" id="content"><div class="loading">INITIALIZING ORGANISM</div></div>
</div>
<script>
var BASE='', S={health:null,pipeline:[],memories:[],status:null,detail:null,tab:'cop',oppTitles:{},outcomes:[],cycles:[],lossData:null};

// V1 agent names to filter out
var V1_SKIP=['v2_engine','v3_engine','v4_engine','oral_prep','brief_agent','opportunity_brief_agent',
  'post_award','mobile_notifications','exec_briefing_mode','unsolicited_agent',
  'financial_v2','content_engine_v2'];

async function api(path){try{var r=await fetch(BASE+path);if(!r.ok)return null;return await r.json();}catch(e){return null;}}

async function loadAll(){
  var [h,p,m,s,la,ch]=await Promise.all([api('/health'),api('/api/pipeline'),api('/api/memories'),api('/api/system-status'),api('/api/loss-analysis'),api('/api/cycle-history')]);
  S.health=h;
  S.pipeline=(p||[]).filter(function(o){return o.status==='active'&&(o.opi_score||0)>=60;}).sort(function(a,b){return(b.opi_score||0)-(a.opi_score||0);});
  S.outcomes=(la&&la.recent_outcomes)?la.recent_outcomes:[];
  S.lossData=la||{};
  S.cycles=(ch&&ch.cycles)?ch.cycles:[];
  // Build opp title lookup
  S.oppTitles={};
  S.pipeline.forEach(function(o){S.oppTitles[o.id]=((o.title||'').length>40?(o.title||'').slice(0,37)+'...':o.title)||'';});
  // Filter memories: skip V1 agents and V1-pattern outputs
  S.memories=(m||[]).filter(function(x){
    if(V1_SKIP.indexOf(x.agent)===-1){
      // Also filter V1 pattern: "Agent X of 37" or "Agent X of 47"
      var obs=x.observation||'';
      if(/Agent \d+ of (37|47)/.test(obs)) return false;
      return true;
    }
    return false;
  }).slice(0,50);
  S.status=s;
  updateTopbar();
  renderTab();
}

function updateTopbar(){
  var h=S.health,dot=document.getElementById('health-dot'),txt=document.getElementById('health-text'),ver=document.getElementById('ver');
  if(h&&h.status==='alive'){
    dot.style.background='var(--green)';dot.style.boxShadow='0 0 8px var(--green)';
    var up=h.uptime_seconds;txt.textContent='ALIVE '+(up>3600?Math.floor(up/3600)+'h':Math.floor(up/60)+'m');
    ver.textContent=(h.version||'').replace('V','v');
  }else{dot.style.background='var(--red)';dot.style.boxShadow='0 0 8px var(--red)';txt.textContent='OFFLINE';}
}

document.getElementById('tabs').addEventListener('click',function(e){
  var tab=e.target.closest('.tab');if(!tab)return;
  S.tab=tab.dataset.tab;S.detail=null;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  tab.classList.add('active');renderTab();
});

function renderTab(){
  var c=document.getElementById('content');
  switch(S.tab){
    case 'cop':c.innerHTML=renderCOP();break;
    case 'pipeline':c.innerHTML=S.detail?renderDetail():renderPipeline();break;
    case 'feed':c.innerHTML=renderFeed();break;
    case 'agents':c.innerHTML=renderAgents();break;
    case 'intel':c.innerHTML=renderIntel();break;
  }
  bindEvents();
}

// === CLEAN OBSERVATION TEXT ===
function cleanObs(text){
  if(!text)return '';
  // Split into lines and skip header block
  var lines=text.split('\n');
  var out=[];
  var pastHeaders=false;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i].trim();
    // Skip empty lines at start
    if(!pastHeaders&&!ln)continue;
    // Skip agent label line (AGENT_NAME - Opp Title: or AGENT_NAME:)
    if(!pastHeaders&&/^[A-Z0-9\s_\-]{3,40}(\s*-\s*[^:]+)?:\s*$/.test(ln))continue;
    // Skip markdown headers
    if(ln.charAt(0)==='#'){continue;}
    // Skip meta lines
    if(/^(Agent \d|AGENT \d|Eyes Only|Classification|Principals? Only|For:|Prepared for|Principal Eyes)/i.test(ln))continue;
    // Skip HGI GLOBAL lines
    if(/HGI GLOBAL/i.test(ln)&&ln.length<120)continue;
    // Skip separator lines
    if(/^[\-=\*]{3,}$/.test(ln))continue;
    // This line has real content
    pastHeaders=true;
    out.push(ln);
  }
  var result=out.join(' ').replace(/\s+/g,' ').trim();
  // Strip markdown bold
  result=result.replace(/\*\*/g,'');
  // Strip leading blockquote markers
  result=result.replace(/^>\s*/,'');
  // Strip markdown table separators
  result=result.replace(/\|[\s\-]+\|[\s\-|]+\|/g,'');
  // Strip AGENT numbering (uppercase variant)
  result=result.replace(/AGENT \d+\s*[>|]\s*/g,'');
  // Strip "Classification:" prefix that survived
  result=result.replace(/^Classification:\s*/i,'');
  // Strip names
  result=result.replace(/Christopher\s+J\.?\s*Oney/gi,'President').replace(/Christopher Oney/gi,'President').replace(/Larry Oney/gi,'Chairman')
    .replace(/Lou(?:is)?\s+Resweber/gi,'CEO').replace(/Candy Dottolo/gi,'CAO')
    .replace(/Dillon Truax/gi,'VP').replace(/Geoffrey Brien/gi,'[REMOVED]')
    .replace(/Vanessa James/gi,'SVP Claims').replace(/Chris Feduccia/gi,'SME');
  return result;
}

function safeDays(dueDate){
  if(!dueDate)return null;
  var d=new Date(dueDate);
  if(isNaN(d.getTime()))return null;
  return Math.ceil((d-Date.now())/86400000);
}

function oppTitle(id){
  return S.oppTitles[id]||((id||'').slice(0,30));
}

// === COP ===
function renderCOP(){
  var st=S.status||{},pipe=st.pipeline||{},intel=st.intelligence||{},h=S.health||{};
  var urgent=S.pipeline.filter(function(o){var d=safeDays(o.due_date);return d!==null&&d>0&&d<=14;}).sort(function(a,b){return new Date(a.due_date)-new Date(b.due_date);});
  var html='<div class="stats">';
  html+=stat(pipe.total_active||S.pipeline.length,'PIPELINE','cyan');
  html+=stat(h.agents_active||29,'AGENTS','gold');
  html+=stat(intel.organism_memories||'—','MEMORIES','cyan');
  html+=stat(pipe.avg_opi||'—','AVG OPI','green');
  html+='</div>';
  if(urgent.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">UPCOMING DEADLINES</span><span class="card-badge">'+urgent.length+' within 14d</span></div>';
    urgent.forEach(function(o){
      var days=safeDays(o.due_date);
      var color=days<=5?'var(--red)':days<=10?'var(--amber)':'var(--cyan)';
      html+='<div class="pipe-item" data-id="'+o.id+'"><div class="pipe-opi" style="color:'+color+';font-size:16px">'+days+'d</div>';
      html+='<div class="pipe-info"><div class="pipe-title">'+esc((o.title||'').slice(0,50))+'</div>';
      html+='<div class="pipe-meta"><span>'+esc(o.agency||'')+'</span><span>OPI '+o.opi_score+'</span></div></div></div>';
    });
    html+='</div>';
  }
  var recent=S.memories.slice(0,8);
  if(recent.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">LATEST INTEL</span><span class="card-badge">'+timeAgo(recent[0].created_at)+'</span></div>';
    recent.forEach(function(m){html+=feedItem(m);});
    html+='</div>';
  }
  html+='<div class="card"><div class="card-header"><span class="card-title">ACTIONS</span></div>';
  html+='<div class="actions">';
  html+='<div class="btn primary" onclick="triggerCycle()">TRIGGER CYCLE</div>';
  html+='<div class="btn" onclick="loadExecBrief()">EXEC BRIEF</div>';
  html+='<div class="btn" onclick="loadAll()">REFRESH</div>';
  html+='<div class="btn" onclick="showLogs()">CYCLE HISTORY</div>';
  html+='</div></div>';
  // System health card
  var intel=st.intelligence||{};
  html+='<div class="card"><div class="card-header"><span class="card-title">SYSTEM HEALTH</span><span class="card-badge">'+(h.version||'')+'</span></div>';
  var totalIntel=(intel.competitive_intelligence||0)+(intel.relationship_contacts||0)+(intel.disaster_alerts||0)+(intel.budget_cycles||0)+(intel.recompete_tracker||0)+(intel.regulatory_changes||0)+(intel.teaming_partners||0)+(intel.agency_profiles||0)+(intel.pipeline_analytics||0);
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">';
  html+='<div style="color:var(--dim)">Memories</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+(intel.organism_memories||'—')+'</div>';
  html+='<div style="color:var(--dim)">Structured Intel</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+totalIntel+'</div>';
  html+='<div style="color:var(--dim)">Uptime</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+(h.uptime_seconds>3600?Math.floor(h.uptime_seconds/3600)+'h '+Math.floor((h.uptime_seconds%3600)/60)+'m':Math.floor((h.uptime_seconds||0)/60)+'m')+'</div>';
  html+='<div style="color:var(--dim)">Agents</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+(h.agents_active||29)+'</div>';
  html+='<div style="color:var(--dim)">Win Rate</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+(S.lossData.win_rate_pct||0)+'%</div>';
  html+='<div style="color:var(--dim)">Outcomes</div><div style="color:var(--white);text-align:right;font-family:var(--font-mono)">'+(S.lossData.total_outcomes||0)+' (W:'+((S.lossData.wins||0))+' L:'+((S.lossData.losses||0))+' NB:'+((S.lossData.no_bids||0))+')</div>';
  html+='</div></div>';
  return html;
}

// === PIPELINE ===
function renderPipeline(){
  if(S.detail)return renderDetail();
  var html='<div class="card"><div class="card-header"><span class="card-title">ACTIVE PIPELINE</span><span class="card-badge">'+S.pipeline.length+' opps</span></div>';
  S.pipeline.forEach(function(o){
    var opiClass=(o.opi_score||0)>=90?'high':(o.opi_score||0)>=80?'mid':'low';
    var stageClass='stage-'+(o.stage||'identified');
    var days=safeDays(o.due_date);
    html+='<div class="pipe-item" data-id="'+o.id+'"><div class="pipe-opi '+opiClass+'">'+(o.opi_score||'?')+'</div>';
    html+='<div class="pipe-info"><div class="pipe-title">'+esc((o.title||'').slice(0,55))+'</div>';
    html+='<div class="pipe-meta"><span>'+esc(o.agency||'')+'</span>';
    if(days!==null&&days>0)html+='<span>'+days+'d</span>';
    html+='</div></div>';
    html+='<div class="pipe-stage '+stageClass+'">'+(o.stage||'identified').toUpperCase()+'</div></div>';
  });
  html+='</div>';
  // Outcomes
  if(S.outcomes&&S.outcomes.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">OUTCOMES</span><span class="card-badge">'+(S.lossData.wins||0)+'W / '+(S.lossData.losses||0)+'L / '+(S.lossData.no_bids||0)+'NB</span></div>';
    S.outcomes.forEach(function(o){
      var icon=o.outcome==='won'?'✓':o.outcome==='lost'?'✗':'—';
      var color=o.outcome==='won'?'var(--green)':o.outcome==='lost'?'var(--red)':'var(--dim)';
      var notes='';try{var n=JSON.parse(o.notes||'{}');notes=n.reason||'';}catch(e){notes=o.notes||'';}
      html+='<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.02)">';
      html+='<div style="font-family:var(--font-display);font-size:16px;color:'+color+';min-width:24px;text-align:center;padding-top:2px">'+icon+'</div>';
      html+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--white)">'+esc((o.title||'').slice(0,50))+'</div>';
      html+='<div style="font-family:var(--font-mono);font-size:9px;color:var(--dim)">'+esc(o.agency||'')+' • OPI '+(o.opi||o.opi_score||'?')+' • '+(o.outcome||'').toUpperCase()+'</div>';
      if(notes)html+='<div style="font-size:10px;color:var(--dim);margin-top:3px;font-style:italic">'+esc(notes)+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
  }
  return html;
}

// === FEED ===
function renderFeed(){
  var html='<div class="card"><div class="card-header"><span class="card-title">AGENT FEED</span><span class="card-badge">'+S.memories.length+' recent</span></div>';
  S.memories.slice(0,25).forEach(function(m){html+=feedItem(m);});
  html+='</div>';
  return html;
}

// === AGENTS ===
function renderAgents(){
  var st=S.status||{},agents=st.agents||{};
  var html='';
  html+=agentSection('PER-OPPORTUNITY',agents.per_opp||[],'per-opp');
  html+=agentSection('GATED',agents.gated||[],'gated');
  html+=agentSection('SYSTEM CORE',agents.system_core||[],'core');
  html+=agentSection('INTELLIGENCE',agents.system_intel||[],'intel');
  // Cycle history
  if(S.cycles.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">RECENT CYCLES</span><span class="card-badge">'+S.cycles.length+'</span></div>';
    S.cycles.slice(0,10).forEach(function(cy){
      var ts=cy.timestamp?new Date(cy.timestamp):null;
      var dateStr=ts?ts.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+ts.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'?';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)">';
      html+='<div style="min-width:56px;font-family:var(--font-mono);font-size:10px;color:var(--cyan)">'+dateStr+'</div>';
      html+='<div style="flex:1;font-size:11px;color:var(--white)">'+(cy.agents_fired||0)+' agents</div>';
      html+='<div style="font-family:var(--font-mono);font-size:10px;color:var(--dim)">'+(cy.opps_analyzed||0)+' opps • '+(cy.mode||'?')+(cy.zero_cost?' • $0':'')+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  return html;
}
function agentSection(title,list,type){
  var html='<div class="card"><div class="card-header"><span class="card-title">'+title+'</span><span class="card-badge">'+list.length+'</span></div><div class="agent-grid">';
  list.forEach(function(a){html+=agentCard(a,type);});
  html+='</div></div>';
  return html;
}

// === INTEL ===
function renderIntel(){
  var st=S.status||{},intel=st.intelligence||{},out=st.outcomes||{};
  var html='<div class="card"><div class="card-header"><span class="card-title">INTELLIGENCE DATABASE</span></div>';
  html+=intelRow('Organism Memories',intel.organism_memories);
  html+=intelRow('Competitive Intel',intel.competitive_intelligence);
  html+=intelRow('Contacts',intel.relationship_contacts);
  html+=intelRow('Disaster Alerts',intel.disaster_alerts);
  html+=intelRow('Budget Cycles',intel.budget_cycles);
  html+=intelRow('Recompete Tracker',intel.recompete_tracker);
  html+=intelRow('Regulatory Changes',intel.regulatory_changes);
  html+=intelRow('Teaming Partners',intel.teaming_partners);
  html+=intelRow('Agency Profiles',intel.agency_profiles);
  html+=intelRow('Analytics',intel.pipeline_analytics);
  html+='</div>';
  html+='<div class="card"><div class="card-header"><span class="card-title">OUTCOMES</span></div>';
  html+=intelRow('Total',out.total);html+=intelRow('Wins',out.wins);html+=intelRow('Losses',out.losses);html+=intelRow('No-Bids',out.no_bids);
  html+=intelRow('Win Rate',(S.lossData.win_rate_pct||0)+'%');
  html+=intelRow('Avg Loss OPI',S.lossData.avg_loss_opi||'—');
  html+=intelRow('OPI Threshold',((S.lossData.opi_calibration||{}).threshold_suggestion||60));
  html+='</div>';
  // Vertical breakdown
  var vb=S.lossData.vertical_breakdown||{};
  var vKeys=Object.keys(vb);
  if(vKeys.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">BY VERTICAL</span></div>';
    vKeys.forEach(function(v){
      var d=vb[v];
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px">';
      html+='<span style="color:var(--white);text-transform:capitalize">'+esc(v)+'</span>';
      html+='<span style="color:var(--dim);font-family:var(--font-mono)">'+(d.wins||0)+'W / '+(d.losses||0)+'L / '+(d.no_bids||0)+'NB</span></div>';
    });
    html+='</div>';
  }
  return html;
}

// === DETAIL ===
function renderDetail(){
  var o=S.detail;if(!o)return renderPipeline();
  var days=safeDays(o.due_date);
  var opiClass=(o.opi_score||0)>=90?'high':(o.opi_score||0)>=80?'mid':'low';
  
  var html='<div class="detail-back" onclick="S.detail=null;renderTab()">← PIPELINE</div>';
  
  // Hero card
  html+='<div class="card" style="border-left:3px solid var(--'+(opiClass==='high'?'green':opiClass==='mid'?'cyan':'amber')+')">';
  html+='<div style="display:flex;align-items:flex-start;gap:14px">';
  html+='<div class="pipe-opi '+opiClass+'" style="font-size:36px;line-height:1">'+( o.opi_score||'?')+'</div>';
  html+='<div style="flex:1"><div class="detail-title">'+esc(o.title||'')+'</div>';
  html+='<div class="detail-agency">'+esc(o.agency||'')+'</div>';
  html+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
  html+='<span class="pipe-stage stage-'+(o.stage||'identified')+'">'+(o.stage||'identified').toUpperCase()+'</span>';
  if(days!==null&&days>0){
    var urgColor=days<=5?'red':days<=10?'amber':'cyan';
    html+='<span class="pipe-stage" style="background:rgba(var(--'+urgColor+'-rgb,0),0.1);color:var(--'+urgColor+');border:1px solid rgba(var(--'+urgColor+'-rgb,0),0.2)">'+days+' DAYS</span>';
  }
  if(o.vertical)html+='<span class="pipe-stage" style="background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid rgba(255,255,255,0.08)">'+esc(o.vertical).toUpperCase()+'</span>';
  html+='</div>';
  if(o.estimated_value)html+='<div style="font-family:var(--font-mono);font-size:10px;color:var(--gold);margin-top:6px">'+esc(o.estimated_value)+'</div>';
  html+='</div></div></div>';
  
  // Quick stats
  html+='<div class="stats" style="grid-template-columns:repeat(3,1fr)">';
  html+=stat((o.scope_analysis||'').length>100?'✓':'—','SCOPE',((o.scope_analysis||'').length>100?'green':''));
  html+=stat((o.research_brief||'').length>100?'✓':'—','RESEARCH',((o.research_brief||'').length>100?'green':''));
  html+=stat((o.capture_action||'').length>100?'✓':'—','CAPTURE',((o.capture_action||'').length>100?'green':''));
  html+='</div>';
  
  // Sections with collapsible content
  var sections=[
    ['CAPTURE STRATEGY','capture_action','What the organism recommends'],
    ['SCOPE ANALYSIS','scope_analysis','What the RFP requires'],
    ['COMPETITIVE INTEL','research_brief','Who we compete against'],
    ['FINANCIAL ANALYSIS','financial_analysis','Pricing and contract value']
  ];
  sections.forEach(function(s){
    var val=o[s[1]];
    if(val&&val.length>50){
      var cleaned=cleanObs(val);
      // Extract first meaningful sentence for preview
      var preview=cleaned.slice(0,150).replace(/\n/g,' ');
      var dots=cleaned.length>150?'...':'';
      html+='<div class="card detail-card" data-field="'+s[1]+'">';
      html+='<div class="card-header" style="cursor:pointer" onclick="toggleSection(this)">';
      html+='<span class="card-title">'+s[0]+'</span>';
      html+='<span style="font-size:10px;color:var(--dim)">'+s[2]+'</span>';
      html+='</div>';
      html+='<div class="feed-text" style="-webkit-line-clamp:2;margin-bottom:8px;color:var(--text)">'+esc(preview+dots)+'</div>';
      html+='<div class="detail-expand" style="display:none"><div class="detail-content">'+esc(cleaned.slice(0,4000))+'</div></div>';
      html+='</div>';
    }
  });
  
  // Agent memories for this opp
  var oppMems=S.memories.filter(function(m){return m.opportunity_id===o.id;});
  if(oppMems.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">AGENT ACTIVITY</span><span class="card-badge">'+oppMems.length+'</span></div>';
    oppMems.slice(0,6).forEach(function(m){html+=feedItem(m);});
    html+='</div>';
  }
  
  // Actions
  html+='<div class="card"><div class="card-header"><span class="card-title">ACTIONS</span></div>';
  html+='<div class="actions">';
  html+='<div class="btn primary" onclick="produceProposal(\''+o.id+'\')">PRODUCE PROPOSAL</div>';
  html+='<div class="btn" onclick="complianceCheck(\''+o.id+'\')">COMPLIANCE CHECK</div>';
  if(o.source_url)html+='<div class="btn" onclick="window.open(\''+esc(o.source_url)+'\',\'_blank\')">SOURCE</div>';
  html+='<div class="btn" onclick="loadOppMemories(\''+o.id+'\')">ALL MEMORIES</div>';
  html+='</div></div>';
  
  return html;
}

function toggleSection(header){
  var card=header.parentElement;
  var expand=card.querySelector('.detail-expand');
  var preview=card.querySelector('.feed-text');
  if(expand.style.display==='none'){
    expand.style.display='block';
    if(preview)preview.style.display='none';
    header.querySelector('.card-title').style.color='var(--cyan)';
  }else{
    expand.style.display='none';
    if(preview)preview.style.display='';
    header.querySelector('.card-title').style.color='';
  }
}

async function loadOppMemories(id){
  var c=document.getElementById('content');
  c.innerHTML='<div class="loading">LOADING MEMORIES</div>';
  var data=await api('/api/opportunity-memories?id='+encodeURIComponent(id));
  if(data&&data.length>0){
    var html='<div class="detail-back" onclick="renderTab()">← BACK</div>';
    html+='<div class="card"><div class="card-header"><span class="card-title">ALL MEMORIES</span><span class="card-badge">'+data.length+'</span></div>';
    data.slice(0,30).forEach(function(m){
      html+='<div class="feed-item"><div class="feed-header"><span class="feed-agent">'+esc((m.agent||'').replace(/_/g,' '))+'</span>';
      html+='<span class="feed-time">'+timeAgo(m.created_at)+'</span></div>';
      html+='<div class="feed-text" style="-webkit-line-clamp:4">'+esc(cleanObs((m.observation||'').slice(0,500)))+'</div></div>';
    });
    html+='</div>';
    c.innerHTML=html;
  }else{c.innerHTML='<div class="detail-back" onclick="renderTab()">← BACK</div><div class="card">No memories found</div>';}
}

// === HELPERS ===
function stat(val,label,cc){return '<div class="stat"><div class="stat-value '+(cc||'')+'">'+(val!=null?val:'—')+'</div><div class="stat-label">'+label+'</div></div>';}

function feedItem(m){
  var agentName=(m.agent||'unknown').replace(/_/g,' ');
  var obs=cleanObs((m.observation||'')).slice(0,140);
  var oppName=m.opportunity_id?oppTitle(m.opportunity_id):'';
  var html='<div class="feed-item"><div class="feed-header"><span class="feed-agent">'+esc(agentName)+'</span>';
  if(oppName)html+='<span class="feed-opp-name">'+esc(oppName)+'</span>';
  html+='<span class="feed-time">'+timeAgo(m.created_at)+'</span></div>';
  html+='<div class="feed-text">'+esc(obs)+'</div></div>';
  return html;
}

function agentCard(name,type){
  var display=name.replace(/_/g,' ').replace(/agent$/,'').replace(/_agent$/,'').trim();
  var typeLabel=type==='per-opp'?'PER-OPP':type==='gated'?'GATED':type==='core'?'CORE':'INTEL';
  var lastTime=lastActivity(name);
  return '<div class="agent-card '+type+'"><div class="agent-name">'+esc(display)+'</div><div class="agent-type">'+typeLabel+'</div>'+(lastTime?'<div class="agent-last">'+lastTime+'</div>':'')+'</div>';
}

function lastActivity(agentName){
  // Try exact match first, then common variations
  var found=S.memories.find(function(m){
    return m.agent===agentName||m.agent===agentName.replace(/_agent$/,'');
  });
  return found?timeAgo(found.created_at):'';
}

function intelRow(label,value){return '<div class="intel-row"><span class="intel-label">'+label+'</span><span class="intel-value">'+(value!=null?value:'—')+'</span></div>';}
function timeAgo(ts){if(!ts)return '';var ms=Date.now()-new Date(ts).getTime();if(ms<60000)return 'now';if(ms<3600000)return Math.floor(ms/60000)+'m';if(ms<86400000)return Math.floor(ms/3600000)+'h';return Math.floor(ms/86400000)+'d';}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// === ACTIONS ===
function bindEvents(){
  document.querySelectorAll('.pipe-item[data-id]').forEach(function(el){
    el.addEventListener('click',function(){loadDetail(el.dataset.id);});
  });
}

async function loadDetail(id){
  // First show what we have from pipeline
  var fromPipeline=S.pipeline.find(function(o){return o.id===id;});
  if(fromPipeline){S.detail=fromPipeline;renderTab();}
  // Then try to get enriched data
  var data=await api('/api/opportunity-detail?id='+encodeURIComponent(id));
  if(data){S.detail=data;renderTab();}
  else if(!fromPipeline){
    document.getElementById('content').innerHTML='<div class="detail-back" onclick="S.detail=null;renderTab()">← PIPELINE</div><div class="card"><div class="card-title">Could not load details</div></div>';
  }
}

async function triggerCycle(){
  var btn=event.target;btn.textContent='RUNNING...';btn.style.color='var(--amber)';
  await api('/api/trigger');btn.textContent='TRIGGERED';btn.style.color='var(--green)';
  setTimeout(function(){loadAll();},3000);
}

async function loadExecBrief(){
  var c=document.getElementById('content');c.innerHTML='<div class="loading">GENERATING BRIEF</div>';
  var data=await api('/api/exec-brief');
  if(!data){c.innerHTML='<div class="card">Could not generate brief</div>';return;}
  
  var html='<div class="detail-back" onclick="S.tab=\'cop\';renderTab()">← COMMAND</div>';
  var ps=data.pipeline_summary||{};
  var ah=data.agent_health||{};
  
  // Pipeline summary stats
  html+='<div class="card"><div class="card-header"><span class="card-title">EXECUTIVE BRIEF</span><span class="card-badge">'+new Date().toLocaleDateString()+'</span></div>';
  html+='<div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:0">';
  html+=stat(ps.total_active||0,'ACTIVE','cyan');
  html+=stat(ps.pursuing||0,'PURSUING','green');
  html+=stat(ps.identified||0,'IDENTIFIED','gold');
  html+='</div></div>';
  
  // Alerts
  var alerts=data.alerts||[];
  if(alerts.length>0){
    html+='<div class="card" style="border-left:3px solid var(--amber)"><div class="card-header"><span class="card-title">ALERTS</span><span class="card-badge" style="background:rgba(240,160,48,0.1);color:var(--amber);border-color:rgba(240,160,48,0.2)">'+alerts.length+'</span></div>';
    alerts.forEach(function(a){
      var icon=a.type==='deadline'?'⏰':a.type==='disaster'?'🌊':'⚠️';
      var color=a.days_remaining&&a.days_remaining<=5?'var(--red)':a.days_remaining&&a.days_remaining<=14?'var(--amber)':'var(--cyan)';
      html+='<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;align-items:center;gap:8px">';
      html+='<span style="font-size:14px">'+icon+'</span>';
      html+='<div style="flex:1"><div style="font-size:12px;color:var(--white)">'+esc((a.title||'').slice(0,60))+'</div>';
      if(a.days_remaining)html+='<div style="font-family:var(--font-mono);font-size:10px;color:'+color+'">'+a.days_remaining+' days remaining • OPI '+(a.opi||'?')+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
  }
  
  // Upcoming deadlines
  var deadlines=data.upcoming_deadlines||[];
  if(deadlines.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">UPCOMING DEADLINES</span></div>';
    deadlines.forEach(function(d){
      var color=(d.days_remaining||99)<=7?'var(--red)':(d.days_remaining||99)<=14?'var(--amber)':'var(--cyan)';
      html+='<div class="pipe-item"><div class="pipe-opi" style="color:'+color+';font-size:16px">'+(d.days_remaining||'?')+'d</div>';
      html+='<div class="pipe-info"><div class="pipe-title">'+esc((d.title||'').slice(0,50))+'</div>';
      html+='<div class="pipe-meta"><span>OPI '+(d.opi||'?')+'</span><span>'+(d.stage||'').toUpperCase()+'</span></div></div></div>';
    });
    html+='</div>';
  }
  
  // Awaiting award
  var awaiting=data.awaiting_award||[];
  if(awaiting.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">AWAITING AWARD</span></div>';
    awaiting.forEach(function(a){
      html+='<div style="padding:6px 0;font-size:12px;color:var(--text)">'+esc(a.title||'')+' <span style="color:var(--cyan);font-family:var(--font-mono);font-size:10px">OPI '+(a.opi||'?')+'</span></div>';
    });
    html+='</div>';
  }
  
  // Recent intel (cleaned)
  var intel=data.recent_intel||[];
  if(intel.length>0){
    html+='<div class="card"><div class="card-header"><span class="card-title">RECENT INTEL</span></div>';
    intel.slice(0,6).forEach(function(i){
      var cleaned=cleanObs((i.summary||'').slice(0,300));
      if(cleaned.length<20)return;
      html+='<div class="feed-item"><div class="feed-header"><span class="feed-agent">'+esc((i.agent||'').replace(/_/g,' '))+'</span>';
      html+='<span class="feed-time">'+timeAgo(i.when)+'</span></div>';
      html+='<div class="feed-text">'+esc(cleaned.slice(0,140))+'</div></div>';
    });
    html+='</div>';
  }
  
  // System health
  html+='<div class="card"><div class="card-header"><span class="card-title">SYSTEM</span></div>';
  html+=intelRow('Version',ah.version||'?');
  html+=intelRow('Active Agents',ah.active_agents||'?');
  html+=intelRow('Last Cycle',ah.last_cycle?timeAgo(ah.last_cycle)+' ago':'—');
  html+='</div>';
  
  c.innerHTML=html;
}

async function showLogs(){
  var c=document.getElementById('content');c.innerHTML='<div class="loading">LOADING</div>';
  var data=await api('/api/cycle-history');
  if(data&&data.cycles){
    var html='<div class="detail-back" onclick="S.tab=\'cop\';renderTab()">← COMMAND</div>';
    html+='<div class="card"><div class="card-header"><span class="card-title">CYCLE HISTORY</span><span class="card-badge">'+data.total_cycles+' runs</span></div>';
    data.cycles.forEach(function(cy){
      html+='<div class="feed-item"><div class="feed-header"><span class="feed-agent">'+esc(cy.trigger||'?')+'</span><span class="feed-time">'+timeAgo(cy.timestamp)+'</span></div>';
      html+='<div class="feed-text">'+(cy.agents_fired||0)+' agents • '+(cy.opps_analyzed||0)+' opps • '+cy.mode+(cy.zero_cost?' • $0':'')+'</div></div>';
    });
    html+='</div>';c.innerHTML=html;
  }
}

async function produceProposal(id){event.target.textContent='STARTING...';event.target.style.color='var(--amber)';await fetch(BASE+'/api/produce-proposal?id='+encodeURIComponent(id),{method:'POST'});event.target.textContent='RUNNING (~5min)';event.target.style.color='var(--green)';}
async function complianceCheck(id){var c=document.getElementById('content');c.innerHTML='<div class="loading">CHECKING COMPLIANCE</div>';var data=await api('/api/compliance-check?id='+encodeURIComponent(id));if(data){var html='<div class="detail-back" onclick="S.detail=null;renderTab()">← BACK</div><div class="card"><div class="card-header"><span class="card-title">COMPLIANCE CHECK</span></div><div class="detail-content">'+esc(JSON.stringify(data,null,2))+'</div></div>';c.innerHTML=html;}}

loadAll();
setInterval(loadAll,120000);
