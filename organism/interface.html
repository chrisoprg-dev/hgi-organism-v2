<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HGI">
<meta name="theme-color" content="#060810">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='28' fill='%231B2A4A'/%3E%3Ctext x='90' y='115' text-anchor='middle' font-family='Arial Black' font-size='75' font-weight='900' fill='%23eab308'%3EH%3C/text%3E%3C/svg%3E">
<title>HGI Organism</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--s1:rgba(255,255,255,0.018);--s2:rgba(255,255,255,0.035);--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);--gold:#d4a843;--navy:#1B2A4A;--t1:#666;--t2:#aaa;--t3:#ddd}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden;min-height:100dvh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(212,168,67,0.2)}
.m{font-family:'JetBrains Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(212,168,67,0.15)}50%{box-shadow:0 0 22px rgba(212,168,67,0.35)}}

.hdr{padding:16px 18px 12px;background:linear-gradient(180deg,rgba(27,42,74,0.12) 0%,transparent 100%);border-bottom:1px solid rgba(212,168,67,0.06);position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.2),transparent)}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#8b6914);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#000;box-shadow:0 2px 16px rgba(212,168,67,0.3);animation:glow 4s ease-in-out infinite}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,0.5);animation:pulse 2.5s ease-in-out infinite}
.metrics{padding:10px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.mc-v{font-size:22px;font-weight:800;color:#fff;line-height:1;margin-top:4px;letter-spacing:-1px}
.alert{margin:4px 16px 8px;background:rgba(239,68,68,0.025);border:1px solid rgba(239,68,68,0.07);border-radius:10px;padding:12px 14px;border-left:3px solid #ef4444}
.tabs{padding:0 12px;display:flex;gap:0;border-bottom:1px solid var(--b1);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 16px;cursor:pointer;color:#555;font-size:10px;font-weight:700;letter-spacing:0.12em;white-space:nowrap;transition:all 0.15s;touch-action:manipulation}
.tab.a{color:var(--gold);border-bottom-color:var(--gold)}
.cnt{padding:12px 16px;min-height:320px;animation:fadeIn 0.2s ease}
.opp{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:8px;transition:all 0.15s;position:relative;touch-action:manipulation}
.opp:active{transform:scale(0.98);background:var(--s2)}
.badge{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;display:inline-block}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp 0.2s ease}
.ov-h{position:sticky;top:0;background:linear-gradient(180deg,#060810 85%,transparent);padding:14px 16px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;z-index:10}
.ov-b{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:18px;cursor:pointer;touch-action:manipulation}
.ov-b:active{background:rgba(255,255,255,0.1)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ds{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px}
.sh{font-size:10px;font-weight:700;letter-spacing:0.12em;color:#555;text-transform:uppercase;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.mem{padding:10px 14px;background:rgba(255,255,255,0.01);border-radius:0 8px 8px 0;margin-bottom:5px}
.thr{padding:14px 16px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:7px;cursor:pointer;touch-action:manipulation}
.thr:active{background:var(--s2)}
.ct{padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:6px;cursor:pointer;touch-action:manipulation}
.st{display:flex;gap:0;border-bottom:1px solid var(--b1);overflow-x:auto;margin-bottom:10px;padding:0 4px;-webkit-overflow-scrolling:touch}
.stb{background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 11px;cursor:pointer;color:#444;font-size:9px;font-weight:700;letter-spacing:0.08em;white-space:nowrap;transition:all 0.15s;touch-action:manipulation}
.stb.a{color:var(--gold);border-bottom-color:var(--gold)}
.pill{padding:5px 11px;border-radius:14px;font-size:9px;font-weight:700;border:1px solid var(--b1);color:#555;cursor:pointer;transition:all 0.15s;touch-action:manipulation}
.pill.a{background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.25);color:var(--gold)}
.ex{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.ex.o{max-height:600px}
.btn{background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.12);border-radius:8px;padding:7px 14px;color:var(--gold);font-size:11px;cursor:pointer;font-weight:700;touch-action:manipulation}
.btn:active{transform:scale(0.95);background:rgba(212,168,67,0.12)}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var SB='https://mfvfbeyjpwllndeuhldi.supabase.co/rest/v1';
var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mdmZiZXlqcHdsbG5kZXVobGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDM0NjQsImV4cCI6MjA4Nzk3OTQ2NH0.V-p5WqM8uwJWRcndiQZJcXw7mz9vBcCVsCrfI6Jz0qs';
var HD={apikey:AK,Authorization:'Bearer '+AK};
async function sb(p){try{var r=await fetch(SB+p,{headers:HD});return r.ok?await r.json():[];}catch(e){return[];}}

function oc(s){return s>=90?'#22c55e':s>=80?'#38bdf8':s>=70?'#eab308':s>=60?'#f97316':'#ef4444'}
var SC={pursuing:'#38bdf8',submitted:'#22c55e',identified:'#eab308',watching:'#f97316',no_bid:'#555'};
var TC={primary:'#ef4444',secondary:'#f97316',emerging:'#eab308',watch:'#64748b'};
function ac(a){var m={'intelligence':'#3b82f6','competitor':'#f97316','financial':'#22c55e','crm':'#a855f7','research':'#0891b2','winnability':'#eab308','staffing':'#ec4899','proposal':'#6366f1','brief':'#14b8a6','quality':'#ef4444','dashboard':'#d4a843','disaster':'#dc2626','amendment':'#0284c7','red_team':'#ef4444','price':'#22c55e'};for(var k in m){if((a||'').indexOf(k)>=0)return m[k];}return '#64748b';}
function mc(a){var m={'intelligence':'competitive','competitor':'competitive','financial':'financial','price':'financial','crm':'crm','research':'research','winnability':'research','staffing':'staffing','recruiting':'staffing','proposal':'proposal','red_team':'proposal','content':'proposal','brief':'research','quality':'proposal','assembly':'proposal'};for(var k in m){if((a||'').indexOf(k)>=0)return m[k];}return 'other';}
function tr(s,n){if(!s)return '';s=String(s);return s.length>n?s.slice(0,n)+'\u2026':s}
function fd(d){if(!d)return '\u2014';try{var dt=new Date(d);if(isNaN(dt))return String(d).slice(0,20);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return String(d).slice(0,20)}}
function dtl(d){if(!d)return null;try{var dt=new Date(d);if(isNaN(dt))return null;return Math.ceil((dt-new Date())/(864e5));}catch(e){return null}}
function ago(d){if(!d)return '';try{var dt=new Date(d);var mins=Math.floor((Date.now()-dt)/6e4);if(mins<60)return mins+'m';if(mins<1440)return Math.floor(mins/60)+'h';return Math.floor(mins/1440)+'d';}catch(e){return ''}}

var S={pipe:[],mems:[],comps:[],cts:[],loading:true,tab:'cop',sel:null,selMems:[],selPc:0,selReview:null,subTab:'overview',feedFilter:'all',expanded:{}};

async function loadData(){
  S.loading=true;render();
  try{
    var [pRaw,mems,comps,cts]=await Promise.all([
      sb('/opportunities?status=neq.filtered&opi_score=gte.40&order=opi_score.desc&select=id,title,agency,opi_score,stage,due_date,status,rfp_document_retrieved,source_url'),
      sb('/organism_memory?memory_type=neq.decision_point&memory_type=neq.compliance_matrix_data&memory_type=neq.rate_table_data&memory_type=neq.org_chart_data&order=created_at.desc&limit=50&select=agent,observation,created_at,memory_type,opportunity_id'),
      sb('/competitive_intelligence?order=created_at.desc&limit=60&select=competitor_name,threat_level,strengths,weaknesses,opportunity_id,strategic_notes'),
      sb('/relationship_graph?order=created_at.desc&limit=80&select=contact_name,title,organization,priority,contact_type,opportunity_id,email,phone,hgi_relationship,notes')
    ]);
    var pLens=await sb('/opportunities?status=neq.filtered&opi_score=gte.40&select=id,proposal_content,proposal_review');
    var lenMap={};(pLens||[]).forEach(function(p){lenMap[p.id]={pLen:(p.proposal_content||'').length,rLen:(p.proposal_review||'').length}});
    S.pipe=(pRaw||[]).map(function(o){var l=lenMap[o.id]||{};o.pLen=l.pLen||0;o.rLen=l.rLen||0;return o}).filter(function(o){return o.status!=='no_bid'&&o.status!=='filtered'});
    S.mems=mems||[];S.comps=comps||[];S.cts=cts||[];S.loading=false;
  }catch(e){S.loading=false;}
  render();
}

async function loadOppDetail(idx){
  var opp=S.pipe[idx];S.sel=opp;S.selMems=[];S.selPc=opp.pLen||0;S.selReview=null;S.subTab='overview';render();
  var [mems,det]=await Promise.all([
    sb('/organism_memory?opportunity_id=eq.'+opp.id+'&memory_type=neq.decision_point&memory_type=neq.compliance_matrix_data&memory_type=neq.rate_table_data&memory_type=neq.org_chart_data&select=agent,observation,created_at,memory_type&order=created_at.desc&limit=60'),
    sb('/opportunities?id=eq.'+opp.id+'&select=proposal_review&limit=1')
  ]);
  S.selMems=mems||[];
  S.selReview=det&&det[0]&&det[0].proposal_review?det[0].proposal_review:null;
  render();
}
function closeSel(){S.sel=null;render()}
function setTab(t){S.tab=t;S.sel=null;render();window.scrollTo(0,0)}
function setSubTab(t){S.subTab=t;render()}
function setFeedFilter(f){S.feedFilter=f;render()}
function toggleExpand(id){S.expanded[id]=!S.expanded[id];render()}

function bdg(text,color,mono){return '<span class="badge'+(mono?' m':'')+'" style="background:'+color+'15;color:'+color+'">'+text+'</span>'}

function render(){
  var a=document.getElementById('app');
  var p=S.pipe;
  var urgs=p.filter(function(o){var d=dtl(o.due_date);return d!==null&&d>=0&&d<=14&&o.stage!=='submitted'});
  var propCount=p.filter(function(o){return o.pLen>100}).length;
  // Consolidated competitors
  var compMap={};S.comps.forEach(function(c){var n=c.competitor_name;if(!compMap[n]){compMap[n]={competitor_name:n,threat_level:c.threat_level,strengths:c.strengths||'',weaknesses:c.weaknesses||'',strategic_notes:c.strategic_notes||'',opps:1};}else{compMap[n].opps++;if((c.strengths||'').length>(compMap[n].strengths||'').length)compMap[n].strengths=c.strengths;if((c.weaknesses||'').length>(compMap[n].weaknesses||'').length)compMap[n].weaknesses=c.weaknesses;if((c.strategic_notes||'').length>(compMap[n].strategic_notes||'').length)compMap[n].strategic_notes=c.strategic_notes;}});
  var tOrd={primary:0,secondary:1,emerging:2,watch:3};
  var merged=Object.values(compMap).sort(function(a,b){return(tOrd[a.threat_level]||4)-(tOrd[b.threat_level]||4)});
  var h='';

  // HEADER
  h+='<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:14px"><div class="logo">H</div><div><div style="font-size:15px;font-weight:700;color:var(--t3);letter-spacing:0.12em">HGI ORGANISM</div><div class="m" style="font-size:9px;color:rgba(212,168,67,0.4);letter-spacing:0.15em;font-weight:600;margin-top:2px">'+(S.loading?'SYNCING\u2026':'V4.2 \u00B7 '+p.length+' OPS \u00B7 15 AGENTS')+'</div></div></div><div style="display:flex;align-items:center;gap:10px">'+(S.loading?'':'<div class="dot"></div><span class="m" style="font-size:9px;color:#22c55e;font-weight:600">LIVE</span>')+'<button class="btn m" onclick="loadData()">\u21BB</button></div></div></div>';

  // METRICS
  var mcs=[{l:'PIPELINE',v:p.length,s:propCount+' proposals',c:'#38bdf8'},{l:'INTEL',v:S.mems.length,s:'findings',c:'#d4a843'},{l:'THREATS',v:merged.length,s:'tracked',c:'#f97316'},{l:'CONTACTS',v:S.cts.length,s:'mapped',c:'#22c55e'}];
  h+='<div class="metrics">';
  mcs.forEach(function(m){h+='<div class="mc"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,'+m.c+',transparent);border-radius:12px 12px 0 0"></div><div class="m" style="font-size:9px;color:#555;letter-spacing:0.1em;font-weight:600">'+m.l+'</div><div class="m mc-v">'+m.v+'</div><div class="m" style="font-size:9px;color:#444;margin-top:3px">'+m.s+'</div></div>'});
  h+='</div>';

  // ALERTS
  if(urgs.length>0){
    h+='<div class="alert"><div class="m" style="color:#ef4444;margin-bottom:6px;font-size:9px;font-weight:700;letter-spacing:0.1em">\u26A0 UPCOMING DEADLINES</div>';
    urgs.forEach(function(o){var dl=dtl(o.due_date);
      h+='<div style="font-size:12px;color:var(--t2);padding:4px 0;display:flex;gap:8px;align-items:baseline"><span class="m" style="color:#ef4444;font-weight:800;font-size:14px;min-width:28px">'+dl+'d</span><span>'+tr(o.title,38)+'</span></div>';
    });
    h+='</div>';
  }

  // TABS
  var tabs=[{id:'cop',l:'PIPELINE'},{id:'feed',l:'FEED'},{id:'rivals',l:'RIVALS'},{id:'crm',l:'CRM'}];
  h+='<div class="tabs">';tabs.forEach(function(t){h+='<button class="tab m'+(S.tab===t.id?' a':'')+'" onclick="setTab(\''+t.id+'\')">'+t.l+'</button>'});h+='</div>';
  h+='<div class="cnt">';

  if(S.loading){h+='<div style="text-align:center;padding:60px;color:#333"><div class="m" style="font-size:12px;letter-spacing:0.15em">SYNCHRONIZING</div><div style="margin-top:12px;width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto;animation:shimmer 1.5s ease infinite;background-size:200% auto"></div></div>';}

  // ═══ PIPELINE ═══
  else if(S.tab==='cop'){
    h+='<div class="m sh"><span>ACTIVE ('+p.length+')</span><span style="color:#333">BY OPI \u2193</span></div>';
    p.forEach(function(o,i){
      var sc=SC[o.stage]||'#555';var dl=dtl(o.due_date);var urg=dl!==null&&dl>=0&&dl<=10&&o.stage!=='submitted';
      h+='<div class="opp" style="border-left:3px solid '+oc(o.opi_score)+'" onclick="loadOppDetail('+i+')">';
      h+='<div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:8px"><div style="font-size:13px;font-weight:600;color:var(--t3);line-height:1.35;flex:1">'+tr(o.title,52)+'</div><div class="m" style="font-size:28px;font-weight:800;color:'+oc(o.opi_score)+';line-height:1;letter-spacing:-1.5px;flex-shrink:0">'+o.opi_score+'</div></div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:4px">'+bdg(o.stage||'new',sc);
      if(!o.rfp_document_retrieved)h+=bdg('NO RFP','#f87171');
      if(o.pLen>100)h+=bdg('\u2713 '+Math.round(o.pLen/1000)+'K','#22c55e',1);
      if(o.rLen>100)h+=bdg('REVIEWED','#a855f7');
      if(urg)h+=bdg('\u26A0 '+dl+'d','#ef4444',1);
      else if(dl!==null&&dl>10)h+=bdg(dl+'d','#555',1);
      h+='</div>';
      if(o.agency)h+='<div class="m" style="font-size:10px;color:#444;margin-top:6px">'+tr(o.agency,48)+'</div>';
      h+='</div>';
    });
  }

  // ═══ FEED ═══
  else if(S.tab==='feed'){
    var cats=['all','competitive','financial','research','proposal','staffing','crm'];
    h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">';
    cats.forEach(function(c){h+='<div class="pill m'+(S.feedFilter===c?' a':'')+'" onclick="setFeedFilter(\''+c+'\')">'+c.toUpperCase()+'</div>'});
    h+='</div>';
    var filtered=S.mems.filter(function(m){return S.feedFilter==='all'||mc(m.agent)===S.feedFilter});
    h+='<div class="m" style="font-size:9px;color:#444;margin-bottom:8px">'+filtered.length+' of '+S.mems.length+' findings</div>';
    filtered.forEach(function(m){var c=ac(m.agent);
      h+='<div class="mem" style="border-left:2px solid '+c+'"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="m" style="font-size:9px;font-weight:700;color:'+c+';text-transform:uppercase;letter-spacing:0.1em">'+(m.agent||'?').replace(/_/g,' ')+'</span><span class="m" style="font-size:9px;color:#333">'+ago(m.created_at)+'</span></div><div style="font-size:12px;color:#777;line-height:1.45">'+tr(m.observation,200)+'</div></div>';
    });
    if(filtered.length===0)h+='<div style="text-align:center;padding:30px;color:#444;font-size:11px">No findings in this category</div>';
  }

  // ═══ RIVALS ═══
  else if(S.tab==='rivals'){
    h+='<div class="m sh">COMPETITIVE LANDSCAPE ('+merged.length+')</div>';
    merged.forEach(function(c,ci){
      var tc=TC[c.threat_level]||'#64748b';var eid='c-'+ci;var isO=S.expanded[eid];
      h+='<div class="thr" style="border-left:3px solid '+tc+'" onclick="toggleExpand(\''+eid+'\')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600;color:var(--t3)">'+c.competitor_name+'</span><div style="display:flex;gap:5px;align-items:center">';
      if(c.opps>1)h+=bdg(c.opps+' OPPS','#666',1);
      if(c.threat_level)h+=bdg(c.threat_level,tc);
      h+='<span style="font-size:14px;color:#444;transform:rotate('+(isO?'90':'0')+'deg);display:inline-block;transition:transform 0.2s">\u25B8</span></div></div>';
      if(!isO&&c.strengths)h+='<div style="font-size:11px;color:#555;margin-top:5px;line-height:1.35">'+tr(c.strengths,85)+'</div>';
      h+='<div class="ex'+(isO?' o':'')+'" style="margin-top:'+(isO?'10':'0')+'px">';
      if(c.strengths)h+='<div style="margin-bottom:8px"><div class="m" style="font-size:8px;color:#22c55e;font-weight:700;margin-bottom:3px">STRENGTHS</div><div style="font-size:11px;color:#777;line-height:1.45">'+c.strengths+'</div></div>';
      if(c.weaknesses)h+='<div style="margin-bottom:8px"><div class="m" style="font-size:8px;color:#ef4444;font-weight:700;margin-bottom:3px">WEAKNESSES</div><div style="font-size:11px;color:#777;line-height:1.45">'+c.weaknesses+'</div></div>';
      if(c.strategic_notes)h+='<div><div class="m" style="font-size:8px;color:var(--gold);font-weight:700;margin-bottom:3px">STRATEGY</div><div style="font-size:11px;color:#777;line-height:1.45">'+tr(c.strategic_notes,350)+'</div></div>';
      h+='</div></div>';
    });
    if(merged.length===0)h+='<div style="text-align:center;padding:30px;color:#444;font-size:11px">No competitor data</div>';
  }

  // ═══ CRM ═══
  else if(S.tab==='crm'){
    var ctT={};S.cts.forEach(function(c){var t=c.contact_type||'other';ctT[t]=(ctT[t]||0)+1});
    var tClr={decision_maker:'#ef4444',evaluator:'#f97316',procurement:'#eab308',technical:'#38bdf8',political:'#a855f7',influencer:'#ec4899',other:'#64748b'};
    h+='<div class="m sh">RELATIONSHIP MAP ('+S.cts.length+')</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">';
    Object.keys(ctT).forEach(function(t){var c=tClr[t]||'#64748b';h+=bdg(t.replace(/_/g,' ')+' ('+ctT[t]+')',c)});
    h+='</div>';
    S.cts.forEach(function(c,ci){
      var pc={critical:'#ef4444',high:'#f97316',medium:'#eab308',low:'#64748b'}[c.priority]||'#64748b';
      var tc2=tClr[c.contact_type]||'#64748b';var eid='ct-'+ci;var isO=S.expanded[eid];
      h+='<div class="ct" style="border-top:2px solid '+pc+'" onclick="toggleExpand(\''+eid+'\')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:600;color:var(--t3)">'+tr(c.contact_name,28)+'</div>';
      if(c.title)h+='<div style="font-size:10px;color:#666;margin-top:2px">'+tr(c.title,38)+'</div>';
      h+='</div><div style="display:flex;gap:5px;align-items:center">';
      if(c.contact_type)h+=bdg(c.contact_type.replace(/_/g,' '),tc2);
      h+='<span style="font-size:14px;color:#444;transform:rotate('+(isO?'90':'0')+'deg);display:inline-block;transition:transform 0.2s">\u25B8</span></div></div>';
      h+='<div class="ex'+(isO?' o':'')+'" style="margin-top:'+(isO?'8':'0')+'px">';
      if(c.organization)h+='<div style="font-size:10px;color:#666;margin-top:2px">\u{1F3E2} '+c.organization+'</div>';
      if(c.email)h+='<div style="font-size:10px;color:#4a9eff;margin-top:3px">\u2709 '+c.email+'</div>';
      if(c.phone)h+='<div style="font-size:10px;color:#888;margin-top:3px">\u260E '+c.phone+'</div>';
      if(c.hgi_relationship)h+='<div style="font-size:10px;margin-top:5px"><span class="m" style="font-size:8px;color:#555">RELATIONSHIP:</span> <span style="color:'+(c.hgi_relationship==='warm'?'#22c55e':c.hgi_relationship==='cold'?'#ef4444':'#eab308')+'">'+c.hgi_relationship+'</span></div>';
      if(c.notes)h+='<div style="font-size:10px;color:#666;margin-top:5px;line-height:1.35">'+tr(c.notes,200)+'</div>';
      h+='</div></div>';
    });
    if(S.cts.length===0)h+='<div style="text-align:center;padding:30px;color:#444;font-size:11px">No contacts mapped</div>';
  }

  h+='</div>'; // end content

  // ═══ DETAIL OVERLAY ═══
  if(S.sel){
    var s=S.sel;var dl=dtl(s.due_date);
    h+='<div class="ov">';
    h+='<div class="ov-h"><div class="ov-b" onclick="closeSel()">\u2190</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+tr(s.title,38)+'</div><div class="m" style="font-size:9px;color:#555;margin-top:2px">OPI '+s.opi_score+' \u00B7 '+(s.stage||'new')+' \u00B7 '+fd(s.due_date)+(dl!==null&&dl>=0?' \u00B7 '+dl+'d':'')+'</div></div></div>';
    var stabs=[{id:'overview',l:'OVERVIEW'},{id:'competitive',l:'INTEL'},{id:'financial',l:'FINANCIAL'},{id:'research',l:'RESEARCH'},{id:'proposal',l:'PROPOSAL'},{id:'staffing',l:'STAFFING'},{id:'crm',l:'CRM'}];
    h+='<div class="st">';stabs.forEach(function(st){var cnt=st.id==='overview'?'':S.selMems.filter(function(m){return mc(m.agent)===st.id}).length;h+='<button class="stb m'+(S.subTab===st.id?' a':'')+'" onclick="setSubTab(\''+st.id+'\')">'+st.l+(cnt?' ('+cnt+')':'')+'</button>'});h+='</div>';
    h+='<div style="padding:16px">';

    if(S.subTab==='overview'){
      h+='<div class="dg">';
      h+='<div class="ds"><div class="m" style="font-size:9px;color:#555;letter-spacing:0.1em;font-weight:600">OPI SCORE</div><div class="m" style="font-size:24px;font-weight:800;color:'+oc(s.opi_score)+';margin-top:4px">'+s.opi_score+'</div></div>';
      h+='<div class="ds"><div class="m" style="font-size:9px;color:#555;letter-spacing:0.1em;font-weight:600">DEADLINE</div><div class="m" style="font-size:16px;color:'+(dl!==null&&dl<=14?'#ef4444':'#999')+';margin-top:6px;font-weight:700">'+(dl!==null?dl+' days':'TBD')+'</div></div>';
      h+='<div class="ds"><div class="m" style="font-size:9px;color:#555;letter-spacing:0.1em;font-weight:600">PROPOSAL</div><div class="m" style="font-size:16px;color:'+(S.selPc>100?'#22c55e':'#ef4444')+';margin-top:6px;font-weight:700">'+(S.selPc>100?Math.round(S.selPc/1000)+'K chars':'NONE')+'</div></div>';
      h+='<div class="ds"><div class="m" style="font-size:9px;color:#555;letter-spacing:0.1em;font-weight:600">INTEL</div><div class="m" style="font-size:16px;color:var(--gold);margin-top:6px;font-weight:700">'+S.selMems.length+' findings</div></div>';
      h+='</div>';
      if(s.agency)h+='<div style="font-size:11px;color:#666;margin-bottom:14px"><span style="font-weight:600;color:#555">Agency:</span> '+s.agency+'</div>';

      // Red team
      if(S.selReview){var rv=S.selReview;var fl=rv.split('\n')[0]||'';var cm=fl.match(/(\d+)\s*critical/i);var mm=fl.match(/(\d+)\s*major/i);var rc=cm?parseInt(cm[1]):0;var rm=mm?parseInt(mm[1]):0;var rvC=rc>0?'#ef4444':rm>3?'#f97316':'#22c55e';
        h+='<div style="background:var(--s1);border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid var(--b1);border-left:3px solid '+rvC+'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="m" style="font-size:10px;color:'+rvC+';font-weight:700">\u26A0 RED TEAM</span><div style="display:flex;gap:4px">';
        if(rc>0)h+=bdg(rc+' CRIT','#ef4444',1);if(rm>0)h+=bdg(rm+' MAJOR','#f97316',1);
        h+='</div></div><div style="font-size:11px;color:#777;max-height:180px;overflow-y:auto;line-height:1.45;white-space:pre-wrap">'+tr(rv,1500)+'</div></div>';
      }

      // Agent coverage
      var cats2={};S.selMems.forEach(function(m){var c=mc(m.agent);cats2[c]=(cats2[c]||0)+1});
      h+='<div class="m sh">AGENT COVERAGE</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">';
      Object.keys(cats2).forEach(function(k){h+='<div class="pill a m" onclick="setSubTab(\''+k+'\')">'+k.toUpperCase()+' ('+cats2[k]+')</div>'});
      h+='</div>';
      h+='<div class="m sh">LATEST INTEL</div>';
      S.selMems.slice(0,6).forEach(function(m){var c=ac(m.agent);h+='<div class="mem" style="border-left:2px solid '+c+'"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="m" style="font-size:9px;font-weight:700;color:'+c+';text-transform:uppercase;letter-spacing:0.1em">'+(m.agent||'?').replace(/_/g,' ')+'</span><span class="m" style="font-size:9px;color:#333">'+ago(m.created_at)+'</span></div><div style="font-size:12px;color:#777;line-height:1.45">'+tr(m.observation,160)+'</div></div>'});

    } else {
      var catMems=S.selMems.filter(function(m){return mc(m.agent)===S.subTab});
      h+='<div class="m" style="font-size:9px;color:#555;margin-bottom:10px">'+catMems.length+' findings in '+S.subTab.toUpperCase()+'</div>';
      if(catMems.length===0)h+='<div style="text-align:center;padding:30px;color:#444;font-size:11px">No '+S.subTab+' intel for this opportunity</div>';
      catMems.forEach(function(m){var c=ac(m.agent);h+='<div class="mem" style="border-left:2px solid '+c+'"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="m" style="font-size:9px;font-weight:700;color:'+c+';text-transform:uppercase;letter-spacing:0.1em">'+(m.agent||'?').replace(/_/g,' ')+'</span><span class="m" style="font-size:9px;color:#333">'+ago(m.created_at)+'</span></div><div style="font-size:12px;color:#777;line-height:1.45">'+tr(m.observation,350)+'</div></div>'});
    }
    h+='</div></div>'; // close overlay
  }

  // FOOTER
  h+='<div style="padding:12px 18px;border-top:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center"><span class="m" style="font-size:9px;color:#333">HGI GLOBAL \u00B7 EST 1931</span><span class="m" style="font-size:9px;color:#222">'+new Date().toLocaleTimeString()+'</span></div>';

  a.innerHTML=h;
  if(!S.sel)window.scrollTo(0,0);
}

loadData();
setInterval(loadData,300000);
</script>
</body>
</html>
