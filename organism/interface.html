<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HGI AI Capture System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0A;color:#E8E0D0;font-family:Georgia,serif;margin:0;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#8B6E2E}
textarea::placeholder,input::placeholder{color:#555048}
select option{background:#191919}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:768px){body{font-size:14px} #mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useCallback=React.useCallback,useMemo=React.useMemo;

// ============================================================
// SHARED.JS — Constants, Components, Utilities
// ============================================================
var GOLD='#C9A84C',GOLD_D='#8B6E2E',BG='#0A0A0A',BG2='#111111',BG3='#191919',BG4='#222222',
TEXT='#E8E0D0',TEXT_D='#888070',BORDER='#2A2520',RED='#C0392B',GREEN='#27AE60',BLUE='#2980B9',ORANGE='#E67E22',CYAN='#00D4FF';

var HGI_CONTEXT='HGI Global (Hammerman & Gainer LLC) — 97-year-old, 100% minority-owned program management firm in Kenner, LA. 8 verticals: Disaster Recovery, TPA/Claims, Property Tax Appeals, Workforce/WIOA, Construction Management, Program Administration, Housing/HUD, Grant Management. SAM UEI: DL4SJEVKZ6H4.';

function Badge(p){
  var c=p.color||GOLD;
  return e('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',background:c+'22',color:c,border:'1px solid '+c+'44'}},p.children);
}

function Card(p){
  return e('div',{style:Object.assign({background:BG2,border:'1px solid '+BORDER,borderRadius:6,padding:16,marginBottom:12},p.style||{}),onClick:p.onClick},p.children);
}

function Btn(p){
  var v=p.variant||'primary',bg=v==='primary'?GOLD:v==='danger'?RED:v==='ghost'?'transparent':BG3,
  clr=v==='primary'?'#000':v==='ghost'?GOLD:TEXT,bdr=v==='ghost'?'1px solid '+GOLD:'none';
  return e('button',{onClick:p.onClick,disabled:p.disabled,style:Object.assign({background:bg,color:clr,border:bdr,borderRadius:4,padding:p.small?'4px 10px':'8px 16px',cursor:p.disabled?'not-allowed':'pointer',fontSize:p.small?11:13,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',opacity:p.disabled?0.5:1,fontFamily:'Georgia,serif'},p.style||{})},p.children);
}

function Input(p){
  return e('input',{value:p.value,onChange:p.onChange,placeholder:p.placeholder,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',width:'100%',fontSize:13,fontFamily:'Georgia,serif',outline:'none'},p.style||{})});
}

function Textarea(p){
  return e('textarea',{value:p.value,onChange:p.onChange,placeholder:p.placeholder,rows:p.rows||4,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',width:'100%',fontSize:13,fontFamily:'Georgia,serif',outline:'none',resize:'vertical'},p.style||{})});
}

function Sel(p){
  return e('select',{value:p.value,onChange:p.onChange,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',fontSize:13,fontFamily:'Georgia,serif',outline:'none'},p.style||{})},
  (p.options||[]).map(function(o){return e('option',{key:o.value,value:o.value},o.label)}));
}

function Label(p){
  return e('div',{style:{fontSize:10,fontWeight:'bold',letterSpacing:2,textTransform:'uppercase',color:TEXT_D,marginBottom:6}},p.text);
}

function AIOut(p){
  return e('div',{style:{background:BG3,border:'1px solid '+BORDER,borderRadius:4,overflow:'hidden'}},
    e('div',{style:{background:GOLD+'22',padding:'6px 12px',fontSize:10,fontWeight:'bold',letterSpacing:2,color:GOLD,textTransform:'uppercase'}},p.label||'AI ANALYSIS'),
    e('div',{style:{padding:12,fontSize:13,whiteSpace:'pre-wrap',color:TEXT,lineHeight:1.6}},
      p.loading?e('span',{style:{animation:'pulse 1.5s infinite',color:GOLD}},'Analyzing...'):p.content||'No analysis yet.')
  );
}

function OPIBadge(p){
  var s=p.score||0,c=s>=90?GREEN:s>=75?CYAN:s>=60?GOLD:RED,
  lbl=s>=90?'Tier 1':s>=75?'Pursue':s>=60?'Monitor':'Low';
  return e('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:'bold',background:c+'22',color:c,border:'1px solid '+c+'44'}},s+' '+lbl);
}

// Store
var store={
  get:function(k){try{return JSON.parse(localStorage.getItem('hgi_'+k))}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem('hgi_'+k,JSON.stringify(v))}catch(e){}}
};

// callClaude
function callClaude(prompt,system,maxTokens){
  return fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:prompt,system:system||HGI_CONTEXT,max_tokens:maxTokens||3000})
  }).then(function(r){return r.json()}).then(function(d){return d.response||d.content||''}).catch(function(){return 'Error calling AI'});
}

// ============================================================
// PIPELINE.JS — usePipeline hook + OpportunitySelector
// ============================================================
var _plCache={data:null,ts:0};

function fetchPipelineData(){
  var now=Date.now();
  if(_plCache.data&&now-_plCache.ts<60000)return Promise.resolve(_plCache.data);
  return fetch('/api/pipeline').then(function(r){return r.json()}).then(function(d){
    var opps=(d.opportunities||d||[]).filter(function(o){return o.status==='active'||!o.status});
    _plCache={data:opps,ts:Date.now()};
    return opps;
  }).catch(function(){return _plCache.data||[]});
}

function usePipeline(){
  var st=useState([]),pipeline=st[0],setPipeline=st[1];
  var st2=useState(null),selected=st2[0],setSelected=st2[1];
  var st3=useState(true),loading=st3[0],setLoading=st3[1];

  useEffect(function(){
    fetchPipelineData().then(function(d){setPipeline(d);setLoading(false)});
  },[]);

  function select(o){
    setSelected(o);
    store.set('sharedCtx',{rfpText:o.rfp_text||'',decomposition:o.scope_analysis||'',execBrief:o.description||'',title:o.title,agency:o.agency,vertical:o.vertical,research:o.research_brief||'',value:o.estimated_value||''});
  }

  function writeBack(id,updates){
    return fetch('/api/opportunities',{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:id,updates:updates})
    }).then(function(){_plCache.data=null;return fetchPipelineData().then(function(d){setPipeline(d)})}).catch(function(){});
  }

  function refresh(){
    setLoading(true);_plCache.data=null;
    fetchPipelineData().then(function(d){setPipeline(d);setLoading(false)});
  }

  return{pipeline:pipeline,selected:selected,select:select,writeBack:writeBack,loading:loading,refresh:refresh};
}

function OpportunitySelector(p){
  var opps=(p.pipeline||[]).filter(function(o){return(o.opi_score||0)>=(p.minOpi||0)});
  if(p.loading)return e('div',{style:{color:GOLD,padding:8}},'Loading pipeline...');
  if(!opps.length)return e('div',{style:{color:ORANGE,padding:8}},'No active opportunities.');
  return e('div',null,
    e(Label,{text:p.label||'SELECT OPPORTUNITY'}),
    e('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}},
      opps.map(function(o){
        var isActive=p.selected&&p.selected.id===o.id;
        var sc=o.opi_score||0,bc=sc>=75?GREEN:sc>=60?GOLD:RED;
        return e('div',{key:o.id,onClick:function(){p.onSelect(o)},style:{
          background:isActive?bc+'22':BG3,border:'1px solid '+(isActive?bc:BORDER),borderLeft:'3px solid '+bc,
          borderRadius:4,padding:'6px 10px',cursor:'pointer',maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12
        }},
          e('span',{style:{fontWeight:'bold',color:isActive?'#fff':TEXT}},o.title&&o.title.substring(0,30)),
          e('span',{style:{marginLeft:6,color:bc,fontWeight:'bold',fontSize:11}},sc),
          o.agency?e('span',{style:{marginLeft:6,color:TEXT_D,fontSize:10}},o.agency.substring(0,20)):null
        );
      })
    ),
    p.selected?e('div',{style:{background:GREEN+'22',border:'1px solid '+GREEN+'44',borderRadius:4,padding:'6px 12px',fontSize:12,color:GREEN}},
      '✓ LOADED: ',p.selected.title,' ',e(OPIBadge,{score:p.selected.opi_score})
    ):null
  );
}

// ============================================================
// DASHBOARD.JS
// ============================================================
function Dashboard(p){
  var pl=p.pl;
  var st1=useState(null),health=st1[0],setHealth=st1[1];
  var st2=useState(null),sysStatus=st2[0],setSysStatus=st2[1];
  var st3=useState(null),execBrief=st3[0],setExecBrief=st3[1];
  var st4=useState(null),huntStats=st4[0],setHuntStats=st4[1];
  var st5=useState(false),thinking=st5[0],setThinking=st5[1];
  var st6=useState({}),expanded=st6[0],setExpanded=st6[1];
  var st7=useState(null),cycleHist=st7[0],setCycleHist=st7[1];
  var st8=useState(''),timeStr=st8[0],setTimeStr=st8[1];

  useEffect(function(){
    function loadAll(){
      fetch('/health').then(function(r){return r.json()}).then(setHealth).catch(function(){});
      fetch('/api/system-status').then(function(r){return r.json()}).then(setSysStatus).catch(function(){});
      fetch('/api/exec-brief').then(function(r){return r.json()}).then(setExecBrief).catch(function(){});
      fetch('/api/hunt-stats').then(function(r){return r.json()}).then(setHuntStats).catch(function(){});
      fetch('/api/cycle-history').then(function(r){return r.json()}).then(setCycleHist).catch(function(){});
    }
    loadAll();
    var iv=setInterval(loadAll,300000);
    // Live clock
    function tick(){setTimeStr(new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'}))}
    tick();var t2=setInterval(tick,30000);
    return function(){clearInterval(iv);clearInterval(t2)};
  },[]);

  var now=new Date();
  var greeting=now.getHours()<12?'Good morning':now.getHours()<17?'Good afternoon':'Good evening';
  var dateStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  var pipeline=pl.pipeline||[];
  var tier1=pipeline.filter(function(o){return(o.opi_score||0)>=75}).length;
  var pursuing=pipeline.filter(function(o){return o.stage==='pursuing'}).length;
  var inProposal=pipeline.filter(function(o){return o.stage==='proposal'}).length;
  var submitted=pipeline.filter(function(o){return o.stage==='submitted'}).length;
  var stale=pipeline.filter(function(o){var d=o.due_date?new Date(o.due_date):null;return d&&d<now&&o.stage!=='won'&&o.stage!=='lost'}).length;
  var newToday=pipeline.filter(function(o){var d=o.discovered_at?new Date(o.discovered_at):null;return d&&(now-d)<86400000}).length;
  var avgOpi=sysStatus&&sysStatus.pipeline?sysStatus.pipeline.avg_opi:0;
  var memCount=sysStatus&&sysStatus.intelligence?sysStatus.intelligence.organism_memories:0;

  function triggerThink(){
    setThinking(true);
    fetch('/api/trigger',{method:'POST'}).then(function(){setTimeout(function(){setThinking(false)},3000)}).catch(function(){setThinking(false)});
  }

  function toggleExp(k){var n={};for(var x in expanded)n[x]=expanded[x];n[k]=!n[k];setExpanded(n)}

  function relTime(ts){
    if(!ts)return'—';
    var d=new Date(ts),diff=now-d,m=Math.floor(diff/60000),h=Math.floor(diff/3600000);
    if(m<1)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';
  }

  // Navigation targets per stat
  var statNavMap={ACTIVE:'discovery','TIER 1':'tracker',PURSUING:'tracker','IN PROPOSAL':'proposal',SUBMITTED:'tracker',STALE:'tracker','NEW TODAY':'discovery','AVG OPI':'tracker',MEMORIES:'chat'};
  var stats=[
    {label:'ACTIVE',value:pipeline.length,color:CYAN},
    {label:'TIER 1',value:tier1,color:GREEN},
    {label:'PURSUING',value:pursuing,color:GOLD},
    {label:'IN PROPOSAL',value:inProposal,color:ORANGE},
    {label:'SUBMITTED',value:submitted,color:GREEN},
    {label:'STALE',value:stale,color:stale>0?RED:TEXT_D},
    {label:'NEW TODAY',value:newToday,color:newToday>0?GREEN:TEXT_D}
  ];

  // Extract dashboard briefing from exec-brief
  var dashBrief=null;
  if(execBrief&&execBrief.recent_intel){
    for(var i=0;i<execBrief.recent_intel.length;i++){
      if(execBrief.recent_intel[i].agent==='dashboard_agent'){dashBrief=execBrief.recent_intel[i];break}
    }
  }

  // Extract disaster alerts
  var disasters=(execBrief&&execBrief.alerts)?execBrief.alerts.filter(function(a){return a.type==='disaster'}):[];

  // Extract upcoming deadlines
  var deadlines=(execBrief&&execBrief.upcoming_deadlines)?execBrief.upcoming_deadlines:[];

  // Recent intel feed (last 5 non-dashboard-agent)
  var intelFeed=(execBrief&&execBrief.recent_intel)?execBrief.recent_intel.slice(0,8):[];

  // Agent lists for organism status
  var agentLists=sysStatus&&sysStatus.agents?sysStatus.agents:null;
  var lastCycle=execBrief&&execBrief.agent_health?execBrief.agent_health.last_cycle:null;

  // Hunt stats for scraper status
  var recentHunts=Array.isArray(huntStats)?huntStats.slice(0,20):[];
  var sourceMap={};
  recentHunts.forEach(function(h){
    var src=h.source||'cron';
    if(!sourceMap[src])sourceMap[src]={runs:0,found:0,newOpps:0,lastRun:null};
    sourceMap[src].runs++;
    sourceMap[src].found+=(h.opportunities_found||0);
    sourceMap[src].newOpps+=(h.opportunities_new||0);
    if(!sourceMap[src].lastRun||h.run_at>sourceMap[src].lastRun)sourceMap[src].lastRun=h.run_at;
  });

  // Scraper sources from system-status
  var scSources=sysStatus&&sysStatus.sources?sysStatus.sources:{active:[],disabled:[]};

  return e('div',{style:{padding:'20px 28px',maxWidth:1100}},

    // === GREETING + CLOCK ===
    e('h1',{style:{fontSize:26,fontWeight:400,color:GOLD,marginBottom:2}},greeting+', Christopher.'),
    e('div',{style:{fontSize:13,color:TEXT_D,marginBottom:16}},dateStr+' · '+timeStr),

    // === TODAY'S PRIORITY (spec item 1) ===
    dashBrief?e('div',{style:{border:'2px solid '+GOLD,borderRadius:8,padding:'14px 18px',marginBottom:16,background:'rgba(201,168,76,0.06)'}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'🎯 TODAY\'S PRIORITY'),
      e('div',{style:{fontSize:13,lineHeight:1.7,color:TEXT,whiteSpace:'pre-wrap'}},
        (dashBrief.summary||'').substring(0,800)+(dashBrief.summary&&dashBrief.summary.length>800?'...':'')
      ),
      e('div',{style:{fontSize:11,color:TEXT_D,marginTop:8}},relTime(dashBrief.when)+' via '+dashBrief.agent)
    ):
    e(Card,{style:{border:'2px solid '+GOLD}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:6}},'🎯 TODAY\'S PRIORITY'),
      e('span',{style:{color:GOLD,animation:'pulse 1.5s infinite'}},'⊙ Loading intelligence briefing...')
    ),

    // === STATS GRID (spec item 2 — all clickable) ===
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,margin:'12px 0'}},
      stats.map(function(s){
        return e('div',{key:s.label,onClick:function(){p.nav(statNavMap[s.label]||'tracker')},style:{
          background:BG2,border:'1px solid '+BORDER,borderRadius:4,padding:'10px 6px',textAlign:'center',cursor:'pointer',borderBottom:'3px solid '+s.color
        }},
          e('div',{style:{fontSize:22,fontWeight:'bold',color:s.color}},s.value),
          e('div',{style:{fontSize:9,letterSpacing:1.5,color:TEXT_D,marginTop:2}},s.label)
        );
      })
    ),

    // === V2 ADDITIONS: Avg OPI + Memories + Agent Count row ===
    e('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
      [{l:'AVG OPI',v:avgOpi,c:avgOpi>=80?GREEN:avgOpi>=60?GOLD:RED},
       {l:'MEMORIES',v:memCount.toLocaleString(),c:CYAN},
       {l:'AGENTS',v:health?health.agents_active:'—',c:GREEN},
       {l:'OUTCOMES',v:sysStatus&&sysStatus.outcomes?sysStatus.outcomes.total:'—',c:GOLD}
      ].map(function(s){
        return e('div',{key:s.l,style:{flex:1,minWidth:80,background:BG2,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 6px',textAlign:'center'}},
          e('div',{style:{fontSize:18,fontWeight:'bold',color:s.c}},s.v),
          e('div',{style:{fontSize:9,letterSpacing:1.5,color:TEXT_D,marginTop:2}},s.l)
        );
      })
    ),

    // === UPCOMING DEADLINES (spec V2 addition) ===
    deadlines.length>0?e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'⏰ UPCOMING DEADLINES'),
      deadlines.map(function(dl){
        var daysLeft=dl.days_remaining;
        var urgColor=daysLeft<=0?RED:daysLeft<=5?RED:daysLeft<=10?ORANGE:CYAN;
        return e('div',{key:dl.title,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
          e('div',{style:{flex:1}},
            e('span',{style:{fontWeight:'bold',color:TEXT}},dl.title.substring(0,50)),
            e(OPIBadge,{score:dl.opi}),
            e(Badge,{color:stageColor(dl.stage)||GOLD},' ',dl.stage)
          ),
          e('div',{style:{color:urgColor,fontWeight:'bold',fontSize:13,minWidth:80,textAlign:'right'}},
            daysLeft<=0?(Math.abs(daysLeft)+'d OVERDUE'):(daysLeft+'d left')
          )
        );
      })
    ):null,

    // === ORGANISM STATUS (spec item 3 — agent dot grid) ===
    e(Card,{style:{marginBottom:12}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD}},'ORGANISM STATUS'),
        e('div',{style:{display:'flex',gap:12,fontSize:11}},
          agentLists?[
            e('span',{key:'live',style:{color:GREEN}},'● LIVE '+(agentLists.per_opp||[]).length),
            e('span',{key:'gated',style:{color:ORANGE}},'● GATED '+(agentLists.gated||[]).length),
            e('span',{key:'core',style:{color:CYAN}},'● CORE '+((agentLists.system_core||[]).length+(agentLists.system_intel||[]).length))
          ]:null
        )
      ),
      // Agent dot grid
      agentLists?e('div',{style:{display:'flex',flexWrap:'wrap',gap:3,marginBottom:8}},
        (agentLists.per_opp||[]).map(function(a){return e('div',{key:a,title:a+' (per-opp)',style:{width:12,height:12,borderRadius:2,background:GREEN,cursor:'help'}})}),
        (agentLists.gated||[]).map(function(a){return e('div',{key:a,title:a+' (gated)',style:{width:12,height:12,borderRadius:2,background:ORANGE,cursor:'help'}})}),
        (agentLists.system_core||[]).map(function(a){return e('div',{key:a,title:a+' (system)',style:{width:12,height:12,borderRadius:2,background:CYAN,cursor:'help'}})}),
        (agentLists.system_intel||[]).map(function(a){return e('div',{key:a,title:a+' (intel)',style:{width:12,height:12,borderRadius:2,background:'#5B9BD5',cursor:'help'}})})
      ):null,
      // Think Now + Last Think
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('div',{style:{fontSize:11,color:TEXT_D}},
          lastCycle?'Last think: '+relTime(lastCycle):'No cycles recorded',
          health?' · V'+(health.version||'').replace('V',''):''
        ),
        e(Btn,{onClick:triggerThink,disabled:thinking,small:true},thinking?'Running...':'Think Now')
      )
    ),

    // === DISASTER DECLARATIONS (spec item 6) ===
    disasters.length>0?e(Card,{style:{border:'1px solid '+RED,marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:RED,marginBottom:8}},'🚨 DISASTER DECLARATIONS'),
      disasters.map(function(d,i){
        return e('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<disasters.length-1?'1px solid '+BORDER:'none'}},
          e('div',null,
            e('div',{style:{fontWeight:'bold',color:TEXT,fontSize:13}},d.title),
            d.threat_level?e(Badge,{color:RED},d.threat_level):null
          ),
          e(Btn,{onClick:function(){p.nav('content')},small:true,variant:'danger'},'48-hr Response →')
        );
      })
    ):null,

    // === MARKET PULSE (spec item 7) ===
    sysStatus&&sysStatus.intelligence?e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'📡 MARKET PULSE'),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:8}},
        [{l:'Competitors',v:sysStatus.intelligence.competitive_intelligence,c:ORANGE},
         {l:'Contacts',v:sysStatus.intelligence.relationship_contacts,c:GREEN},
         {l:'Disasters',v:sysStatus.intelligence.disaster_alerts,c:RED},
         {l:'Budget Signals',v:sysStatus.intelligence.budget_cycles,c:CYAN},
         {l:'Recompetes',v:sysStatus.intelligence.recompete_tracker,c:GOLD},
         {l:'Regulations',v:sysStatus.intelligence.regulatory_changes,c:'#5B9BD5'},
         {l:'Teaming',v:sysStatus.intelligence.teaming_partners,c:GREEN},
         {l:'Agencies',v:sysStatus.intelligence.agency_profiles,c:GOLD}
        ].map(function(s){
          return e('div',{key:s.l,style:{background:BG3,padding:'8px',borderRadius:4,textAlign:'center'}},
            e('div',{style:{fontSize:16,fontWeight:'bold',color:s.c}},s.v),
            e('div',{style:{fontSize:9,color:TEXT_D,letterSpacing:1}},s.l)
          );
        })
      )
    ):null,

// ============================================================
// PIPELINE TRACKER
// ============================================================
function PipelineTracker(p){
  var pl=p.pl;
  var st1=useState('all'),stageFilter=st1[0],setStageFilter=st1[1];
  var st2=useState(null),expanded=st2[0],setExpanded=st2[1];
  var st3=useState(false),showAdd=st3[0],setShowAdd=st3[1];
  var st4=useState(null),editing=st4[0],setEditing=st4[1];
  var st5=useState(null),intelTab=st5[0],setIntelTab=st5[1];
  var st6=useState(null),detailOpp=st6[0],setDetailOpp=st6[1];
  var st7=useState(null),captureStrategy=st7[0],setCaptureStrategy=st7[1];
  var st8=useState(false),csLoading=st8[0],setCsLoading=st8[1];

  // Add form state
  var st9=useState({title:'',agency:'',type:'',value:'',deadline:'',notes:'',stage:'identified',opi:50}),addForm=st9[0],setAddForm=st9[1];

  var pipeline=pl.pipeline||[];
  var stages=['all','identified','qualifying','pursuing','proposal','submitted','won','lost'];

  var filtered=stageFilter==='all'?pipeline:pipeline.filter(function(o){return o.stage===stageFilter});

  function stageCounts(){
    var c={all:pipeline.length};
    stages.forEach(function(s){if(s!=='all')c[s]=pipeline.filter(function(o){return o.stage===s}).length});
    return c;
  }
  var counts=stageCounts();


  function winPathStep(o){
    if(o.stage==='won')return 8;
    if(o.stage==='submitted')return 7;
    if(o.has_proposal||o.proposal_content)return 5;
    if(o.has_financial||o.financial_analysis)return 4;
    if(o.has_intel||o.research_brief)return 3;
    if(o.has_scope||o.scope_analysis)return 2;
    return 1;
  }

  function WinPathBar(pp){
    var o=pp.opp,step=winPathStep(o);
    var steps=['Discovered','Scored','Researched','Financial','Proposal','Red Team','Export','Submitted','WON'];
    return e('div',{style:{display:'flex',gap:2,margin:'4px 0'}},
      steps.map(function(s,i){
        var active=i<step;
        return e('div',{key:s,style:{flex:1,height:4,borderRadius:2,background:active?GREEN:BORDER}});
      })
    );
  }

  function handleStageChange(opp,newStage){
    if(!confirm('Change '+opp.title+' to '+newStage+'?'))return;
    fetch('/api/update-stage',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:opp.id,stage:newStage})
    }).then(function(){pl.refresh()});
  }

  function handleOutcome(opp,outcome){
    var notes='';
    if(outcome==='lost'){
      var winner=prompt('Who won?');
      var theirPrice=prompt('Their price?');
      var ourPrice=prompt('Our bid amount?');
      notes='Winner: '+(winner||'Unknown')+', Their price: '+(theirPrice||'N/A')+', Our price: '+(ourPrice||'N/A');
    }
    if(!confirm('Record '+opp.title+' as '+outcome.toUpperCase()+'?'))return;
    fetch('/api/record-outcome',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:opp.id,outcome:outcome,notes:notes})
    }).then(function(){pl.refresh()});
  }

  function getCapture(opp){
    setCsLoading(true);setCaptureStrategy(null);
    callClaude('Generate a capture strategy for this opportunity: '+opp.title+' ('+opp.agency+', '+(opp.vertical||'')+').'
    ).then(function(r){setCaptureStrategy(r);setCsLoading(false)});
  }

  function exportBrief(opp){
    window.open('/api/export-opportunity?id='+encodeURIComponent(opp.id));
  }

  function handleAdd(){
    fetch('/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(addForm)
    }).then(function(){setShowAdd(false);setAddForm({title:'',agency:'',type:'',value:'',deadline:'',notes:'',stage:'identified',opi:50});pl.refresh()});
  }

  // If viewing detail
  if(detailOpp){
    return e(OpportunityDetail,{opp:detailOpp,onBack:function(){setDetailOpp(null)},pl:pl,nav:p.nav});
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    // Header
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      e('div',null,
        e('h2',{style:{color:GOLD,margin:0}},'Pipeline Tracker'),
        e('div',{style:{fontSize:12,color:TEXT_D}},pipeline.length+' opportunities tracked')
      ),
      e('div',{style:{display:'flex',gap:8}},
        e(Btn,{onClick:function(){setShowAdd(!showAdd)},variant:'primary'},showAdd?'Cancel':'+ Add Opportunity')
      )
    ),

    // Add form
    showAdd?e(Card,null,
      e('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=768?'1fr':'1fr 1fr',gap:12}},
        e('div',null,e(Label,{text:'TITLE'}),e(Input,{value:addForm.title,onChange:function(ev){setAddForm(Object.assign({},addForm,{title:ev.target.value}))},placeholder:'Opportunity title'})),
        e('div',null,e(Label,{text:'AGENCY'}),e(Input,{value:addForm.agency,onChange:function(ev){setAddForm(Object.assign({},addForm,{agency:ev.target.value}))},placeholder:'Agency name'})),
        e('div',null,e(Label,{text:'TYPE'}),e(Input,{value:addForm.type,onChange:function(ev){setAddForm(Object.assign({},addForm,{type:ev.target.value}))},placeholder:'FEMA PA, TPA, CDBG-DR...'})),
        e('div',null,e(Label,{text:'EST. VALUE'}),e(Input,{value:addForm.value,onChange:function(ev){setAddForm(Object.assign({},addForm,{value:ev.target.value}))},placeholder:'$50M'})),
        e('div',null,e(Label,{text:'DEADLINE'}),e(Input,{value:addForm.deadline,onChange:function(ev){setAddForm(Object.assign({},addForm,{deadline:ev.target.value}))},placeholder:'YYYY-MM-DD'})),
        e('div',null,e(Label,{text:'STAGE'}),e(Sel,{value:addForm.stage,onChange:function(ev){setAddForm(Object.assign({},addForm,{stage:ev.target.value}))},options:stages.filter(function(s){return s!=='all'}).map(function(s){return{value:s,label:s.charAt(0).toUpperCase()+s.slice(1)}})}))
      ),
      e('div',{style:{marginTop:12}},e(Label,{text:'NOTES'}),e(Textarea,{value:addForm.notes,onChange:function(ev){setAddForm(Object.assign({},addForm,{notes:ev.target.value}))},placeholder:'Additional context...',rows:2})),
      e('div',{style:{marginTop:12}},e(Btn,{onClick:handleAdd},'Submit'))
    ):null,

    // Stage filter pills
    e('div',{style:{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}},
      stages.map(function(s){
        var isActive=stageFilter===s;
        var c=counts[s]||0;
        return e('div',{key:s,onClick:function(){setStageFilter(s)},style:{
          padding:'4px 12px',borderRadius:20,fontSize:11,cursor:'pointer',fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',
          background:isActive?stageColor(s)+'22':BG3,color:isActive?stageColor(s):TEXT_D,border:'1px solid '+(isActive?stageColor(s)+'44':BORDER)
        }},s.charAt(0).toUpperCase()+s.slice(1)+' ('+c+')');
      })
    ),

    // Opportunity list
    filtered.length===0?e(Card,{style:{textAlign:'center',padding:40}},
      e('div',{style:{fontSize:24,marginBottom:8}},'◈'),
      e('div',{style:{color:TEXT_D}},'No opportunities tracked yet'),
      e(Btn,{onClick:function(){setShowAdd(true)},style:{marginTop:12}},'+ Add First Opportunity')
    ):
    filtered.map(function(o){
      var isExpanded=expanded===o.id;
      var sc=o.opi_score||0;
      var daysLeft=o.deadline?Math.ceil((new Date(o.deadline)-new Date())/(1000*60*60*24)):null;
      var sc_color=stageColor(o.stage);

      return e(Card,{key:o.id,style:{borderLeft:'3px solid '+sc_color}},
        // Header row
        e('div',{onClick:function(){setExpanded(isExpanded?null:o.id)},style:{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          e('div',{style:{flex:1}},
            e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
              e('span',{style:{width:8,height:8,borderRadius:4,background:sc_color,display:'inline-block'}}),
              e('span',{style:{fontWeight:'bold',fontSize:14}},o.title),
              e(OPIBadge,{score:sc}),
              o.stage?e(Badge,{color:sc_color},o.stage):null
            ),
            e('div',{style:{fontSize:11,color:TEXT_D}},
              o.agency||'',o.type?' · '+o.type:'',o.estimated_value?' · '+o.estimated_value:'',
              daysLeft!==null?' · ':null,
              daysLeft!==null?e('span',{style:{color:daysLeft<=5?RED:daysLeft<=10?ORANGE:TEXT_D}},daysLeft+' days left'):null
            ),
            e(WinPathBar,{opp:o})
          ),
          e('span',{style:{fontSize:16,color:TEXT_D}},isExpanded?'▼':'▶')
        ),

        // Expanded content
        isExpanded?e('div',{style:{marginTop:12,borderTop:'1px solid '+BORDER,paddingTop:12}},
          // Completeness indicators
          e('div',{style:{display:'flex',gap:12,marginBottom:12}},
            [{k:'has_scope',l:'SCOPE'},{k:'has_intel',l:'INTEL'},{k:'has_financial',l:'FIN'},{k:'has_staffing',l:'STAFF'},{k:'has_proposal',l:'PROP'}].map(function(f){
              var has=o[f.k]||(f.k==='has_scope'&&o.scope_analysis)||(f.k==='has_proposal'&&o.proposal_content)||(f.k==='has_intel'&&o.research_brief)||(f.k==='has_financial'&&o.financial_analysis);
              return e('span',{key:f.k,style:{fontSize:10,color:has?GREEN:TEXT_D,fontWeight:'bold',letterSpacing:1}},
                (has?'✓':'—')+' '+f.l
              );
            })
          ),

          // Two-column detail
          e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
            // LEFT: Details
            e('div',null,
              e(Label,{text:'DETAILS'}),
              [{l:'Agency',v:o.agency},{l:'Type',v:o.type||o.vertical},{l:'Value',v:o.estimated_value},{l:'Deadline',v:o.deadline},{l:'Added',v:o.created_at?new Date(o.created_at).toLocaleDateString():''},{l:'Source',v:o.source_url?e('a',{href:o.source_url,target:'_blank',style:{color:CYAN,textDecoration:'none'}},'View →'):''}].map(function(d){
                return d.v?e('div',{key:d.l,style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:12,borderBottom:'1px solid '+BORDER}},
                  e('span',{style:{color:TEXT_D}},d.l),e('span',null,d.v)
                ):null;
              })
            ),
            // RIGHT: Stage + Actions
            e('div',null,
              e(Label,{text:'CHANGE STAGE'}),
              e('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:12}},
                ['identified','pursuing','proposal','submitted','watching'].map(function(s){
                  return e(Btn,{key:s,onClick:function(){handleStageChange(o,s)},small:true,variant:o.stage===s?'primary':'ghost'},s);
                })
              ),
              e(Label,{text:'ACTIONS'}),
              e('div',{style:{display:'flex',flexDirection:'column',gap:6}},
                e(Btn,{onClick:function(){setDetailOpp(o)},variant:'ghost',small:true},'◑ View Full Detail'),
                e(Btn,{onClick:function(){getCapture(o)},variant:'ghost',small:true},'⚡ Get Capture Strategy'),
                e(Btn,{onClick:function(){exportBrief(o)},variant:'ghost',small:true},'📄 Export Decision Brief'),
                e(Btn,{onClick:function(){p.nav('proposal');pl.select(o)},variant:'ghost',small:true},'✦ Start Proposal')
              )
            )
          ),

          // Capture strategy
          captureStrategy&&expanded===o.id?e('div',{style:{marginTop:12}},e(AIOut,{content:captureStrategy,loading:csLoading,label:'CAPTURE STRATEGY'})):null,

          // Outcome recording
          e('div',{style:{display:'flex',gap:8,marginTop:12,paddingTop:12,borderTop:'1px solid '+BORDER}},
            e(Btn,{onClick:function(){handleOutcome(o,'won')},variant:'primary',small:true},'🏆 WON'),
            e(Btn,{onClick:function(){handleOutcome(o,'lost')},variant:'danger',small:true},'LOST'),
            e(Btn,{onClick:function(){handleOutcome(o,'no-bid')},variant:'ghost',small:true},'NO-BID')
          )
        ):null
      );
    })
  );
}

// ============================================================
// OPPORTUNITY DETAIL — Step-by-step status board
// ============================================================
function OpportunityDetail(p){
  var opp=p.opp;
  var st1=useState('overview'),subTab=st1[0],setSubTab=st1[1];
  var st2=useState(null),memories=st2[0],setMemories=st2[1];
  var st3=useState(null),fullOpp=st3[0],setFullOpp=st3[1];
  var st4b=useState(-1),expandedStep=st4b[0],setExpandedStep=st4b[1];

  useEffect(function(){
    fetch('/api/opportunity-detail?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(setFullOpp).catch(function(){});
    fetch('/api/opportunity-memories?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(function(d){setMemories(Array.isArray(d)?d:d.memories||[])}).catch(function(){});
  },[opp.id]);

  var o=fullOpp||opp;
  var sc=o.opi_score||0;

  var steps=[
    {name:'INTAKE',done:true,data:o.source_url||o.created_at||'Discovered'},
    {name:'SCOPE ANALYSIS',done:!!(o.scope_analysis||o.has_scope),data:o.scope_analysis},
    {name:'FINANCIAL ANALYSIS',done:!!(o.financial_analysis||o.has_financial),data:o.financial_analysis},
    {name:'COMPETITIVE RESEARCH',done:!!(o.research_brief||o.has_intel),data:o.research_brief},
    {name:'WINNABILITY',done:!!(o.capture_action||o.winnability_score),data:o.capture_action},
    {name:'PROPOSAL',done:!!(o.proposal_content||o.has_proposal),data:o.proposal_content},
    {name:'RED TEAM',done:false,data:null}
  ];

  // Check red team from memories
  if(memories){
    var rtMems=memories.filter(function(m){return m.agent_name==='red_team_agent'||m.agent_name==='agentRedTeam'});
    if(rtMems.length>0){steps[6].done=true;steps[6].data=rtMems.map(function(m){return m.observation}).join('\n\n');}
  }

  var subTabs=['overview','intel','proposal','activity'];

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    // Back button
    e('div',{onClick:p.onBack,style:{cursor:'pointer',color:CYAN,fontSize:12,marginBottom:16}},'← Back to Pipeline'),

    // Hero
    e(Card,{style:{borderLeft:'4px solid '+(sc>=90?GREEN:sc>=75?CYAN:sc>=60?GOLD:RED)}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        e('div',null,
          e('div',{style:{fontSize:36,fontWeight:'bold',color:sc>=90?GREEN:sc>=75?CYAN:GOLD}},sc),
          e('h2',{style:{margin:'4px 0',fontSize:18}},o.title),
          e('div',{style:{fontSize:12,color:TEXT_D}},o.agency,' · ',o.vertical||'',o.deadline?' · Due '+o.deadline:'')
        ),
        e('div',{style:{textAlign:'right'}},
          o.stage?e(Badge,{color:stageColor(o.stage)},o.stage):null,
          o.estimated_value?e('div',{style:{fontSize:14,color:GOLD,marginTop:4}},o.estimated_value):null
        )
      )
    ),

    // Step-by-step pipeline
    e(Card,null,
      e(Label,{text:'PURSUIT PIPELINE'}),
      steps.map(function(step,i){
        
        var icon=step.done?'✓':'—';
        var clr=step.done?GREEN:TEXT_D;
        var charCount=step.data?step.data.length:0;

        return e('div',{key:step.name},
          e('div',{onClick:function(){if(step.data)setExpandedStep(expandedStep===i?-1:i)},style:{
            display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid '+BORDER,cursor:step.data?'pointer':'default'
          }},
            e('span',{style:{color:clr,fontWeight:'bold',width:20,textAlign:'center'}},icon),
            e('span',{style:{flex:1,fontSize:13,color:step.done?TEXT:TEXT_D}},step.name),
            charCount>0?e('span',{style:{fontSize:10,color:TEXT_D}},Math.round(charCount/1000)+'K chars'):null,
            step.data?e('span',{style:{color:CYAN,fontSize:10}},expandedStep===i?'▼':'▶'):null
          ),
          expandedStep===i&&step.data?e('div',{style:{padding:'8px 32px',fontSize:12,whiteSpace:'pre-wrap',color:TEXT_D,maxHeight:300,overflowY:'auto',background:BG3,borderRadius:4,margin:'4px 0'}},
            typeof step.data==='string'?step.data.substring(0,3000):JSON.stringify(step.data,null,2).substring(0,3000)
          ):null
        );
      })
    ),

    // Completeness indicators
    e('div',{style:{display:'flex',gap:16,margin:'12px 0'}},
      [{k:'has_scope',l:'SCOPE'},{k:'has_intel',l:'INTEL'},{k:'has_financial',l:'FIN'},{k:'has_staffing',l:'STAFF'},{k:'has_proposal',l:'PROP'}].map(function(f){
        var has=o[f.k];
        return e('span',{key:f.k,style:{fontSize:11,color:has?GREEN:TEXT_D,fontWeight:'bold'}},
          (has?'✓':'—')+' '+f.l
        );
      })
    ),

    // Sub-tabs
    e('div',{style:{display:'flex',gap:0,borderBottom:'1px solid '+BORDER,marginBottom:12}},
      subTabs.map(function(t){
        return e('div',{key:t,onClick:function(){setSubTab(t)},style:{
          padding:'8px 16px',cursor:'pointer',fontSize:12,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',
          color:subTab===t?CYAN:TEXT_D,borderBottom:subTab===t?'2px solid '+CYAN:'2px solid transparent'
        }},t);
      })
    ),

    // Sub-tab content

function ManualIntake(p){
  var pl=p.pl;
  var st1=useState(''),title=st1[0],setTitle=st1[1];
  var st2=useState(''),agency=st2[0],setAgency=st2[1];
  var st3=useState(''),incumbent=st3[0],setIncumbent=st3[1];
  var st4=useState(''),rfpUrl=st4[0],setRfpUrl=st4[1];
  var st5=useState(''),context=st5[0],setContext=st5[1];
  var st6=useState(''),rfpText=st6[0],setRfpText=st6[1];
  var st7=useState(null),file=st7[0],setFile=st7[1];
  var st8=useState(false),submitting=st8[0],setSubmitting=st8[1];
  var st9=useState(null),result=st9[0],setResult=st9[1];
  var st10=useState(false),extracting=st10[0],setExtracting=st10[1];
  var st11=useState(null),extractResult=st11[0],setExtractResult=st11[1];
  var fileRef=useRef(null);

  function handleFile(ev){
    var f=ev.target.files[0];
    if(!f)return;
    setFile(f);
    setExtracting(true);setExtractResult(null);
    var reader=new FileReader();
    reader.onload=function(){
      var base64=reader.result.split(',')[1];
      callClaude('Extract the full text from this uploaded document. Return ONLY the extracted text, no commentary.','You are a document extraction assistant. Extract all text faithfully.',8000
      ).then(function(r){
        setRfpText(r);setExtractResult('Extracted '+r.length+' characters from '+f.name);setExtracting(false);
      }).catch(function(){setExtracting(false);setExtractResult('Extraction failed — paste text manually.')});
    };
    reader.readAsDataURL(f);
  }

  function handleSubmit(){
    if(!title.trim()){alert('Title is required');return}
    setSubmitting(true);setResult(null);
    fetch('/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        title:title,agency:agency,incumbent:incumbent,source_url:rfpUrl,
        context:context,rfp_text:rfpText,manual:true
      })
    }).then(function(r){return r.json()}).then(function(d){
      setResult(d);setSubmitting(false);
      setTitle('');setAgency('');setIncumbent('');setRfpUrl('');setContext('');setRfpText('');setFile(null);
      pl.refresh();
    }).catch(function(err){setResult({error:'Submission failed: '+err.message});setSubmitting(false)});
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:900}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Manual Intake'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:16}},'Submit a new opportunity. Paste RFP text or upload a document.'),

    // Pipeline selector
    pl.pipeline.length>0?e('div',{style:{marginBottom:16}},
      e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading,label:'EXISTING PIPELINE'})
    ):e(Card,{style:{background:ORANGE+'15',borderColor:ORANGE+'44'}},
      e('div',{style:{color:ORANGE,fontSize:12}},'No active opportunities. Submit your first RFP below.')
    ),

    // Form
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
      e('div',null,e(Label,{text:'OPPORTUNITY TITLE'}),e(Input,{value:title,onChange:function(ev){setTitle(ev.target.value)},placeholder:'e.g. FEMA PA TPA — Jefferson Parish'})),
      e('div',null,e(Label,{text:'AGENCY'}),e(Input,{value:agency,onChange:function(ev){setAgency(ev.target.value)},placeholder:'e.g. Jefferson Parish OEM'}))
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
      e('div',null,e(Label,{text:'KNOWN INCUMBENT'}),e(Input,{value:incumbent,onChange:function(ev){setIncumbent(ev.target.value)},placeholder:'e.g. ICF / None / Unknown'})),
      e('div',null,e(Label,{text:'RFP URL (optional)'}),e(Input,{value:rfpUrl,onChange:function(ev){setRfpUrl(ev.target.value)},placeholder:'https://...'}))
    ),
    e('div',{style:{marginBottom:12}},
      e(Label,{text:'RELATIONSHIP INTEL / CONTEXT'}),
      e(Textarea,{value:context,onChange:function(ev){setContext(ev.target.value)},placeholder:'Known relationships, budget intel, political context...',rows:3})
    ),
    e('div',{style:{marginBottom:12}},
      e(Label,{text:'RFP / SOLICITATION TEXT'}),
      e('div',{style:{marginBottom:8}},
        e(Btn,{onClick:function(){fileRef.current&&fileRef.current.click()},variant:'ghost',small:true},'📎 Upload PDF / Word / TXT'),
        e('input',{ref:fileRef,type:'file',accept:'.pdf,.docx,.doc,.txt',onChange:handleFile,style:{display:'none'}}),
        file?e('span',{style:{marginLeft:8,fontSize:11,color:CYAN}},file.name):null,
        extracting?e('span',{style:{marginLeft:8,fontSize:11,color:GOLD,animation:'pulse 1.5s infinite'}},' Extracting...'):null,
        extractResult?e('span',{style:{marginLeft:8,fontSize:11,color:GREEN}},extractResult):null
      ),
      e(Textarea,{value:rfpText,onChange:function(ev){setRfpText(ev.target.value)},placeholder:'Paste RFP text here, or upload a file above...',rows:10})
    ),

    e(Btn,{onClick:handleSubmit,disabled:submitting||!title.trim(),style:{width:'100%',padding:'12px 0',fontSize:14}},
      submitting?'Submitting...':'Submit to Pipeline'
    ),

    result?e(Card,{style:{marginTop:16,background:result.error?RED+'15':GREEN+'15',borderColor:result.error?RED+'44':GREEN+'44'}},
      e('div',{style:{color:result.error?RED:GREEN,fontSize:13,fontWeight:'bold'}},
        result.error||'✓ Opportunity submitted successfully. OPI: '+(result.opi_score||result.opi||'scoring...')
      ),
      !result.error?e(Btn,{onClick:function(){p.nav('tracker')},variant:'ghost',small:true,style:{marginTop:8}},'View in Pipeline →'):null
    ):null
  );
}

// ============================================================
// SYSTEM CHAT
// ============================================================
function SystemChat(p){
  var pl=p.pl;
  var st1=useState([]),messages=st1[0],setMessages=st1[1];
  var st2=useState(''),input=st2[0],setInput=st2[1];
  var st3=useState(false),sending=st3[0],setSending=st3[1];
  var st4=useState(null),memoryToast=st4[0],setMemoryToast=st4[1];
  var chatEndRef=useRef(null);

  useEffect(function(){
    if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  var quickActions=[
    {label:'Pipeline summary',prompt:'Give me a summary of the current pipeline — how many opportunities, which are highest priority, any upcoming deadlines.'},
    {label:'What should I focus on today?',prompt:'Based on the current pipeline and deadlines, what should I focus on today? Give me 3 specific actions.'},
    {label:'Competitive landscape',prompt:'Summarize the competitive landscape across our active opportunities. Who are the main competitors and what are our advantages?'},
    {label:'System status',prompt:'What is the current status of the organism? How many agents, recent activity, any issues?'}
  ];

  function sendMessage(text){
    if(!text.trim())return;
    var newMsg={role:'user',content:text,timestamp:new Date().toISOString()};
    var updated=messages.concat([newMsg]);
    setMessages(updated);
    setInput('');
    setSending(true);

    var oppCtx='';
    if(pl.selected){
      oppCtx='\n\nCurrently focused opportunity: '+pl.selected.title+' (OPI: '+(pl.selected.opi_score||'?')+', Agency: '+(pl.selected.agency||'?')+')';
    }

    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message:text+oppCtx,
        history:messages.slice(-6).map(function(m){return{role:m.role,content:m.content}})
      })
    }).then(function(r){return r.json()}).then(function(d){
      var response=d.response||d.content||'No response received.';
      var assistantMsg={role:'assistant',content:response,timestamp:new Date().toISOString()};
      setMessages(function(prev){return prev.concat([assistantMsg])});
      setSending(false);

      // Memory toast
      if(d.memory_stored||d.stored){
        setMemoryToast('Memory stored: organism is learning from this conversation');
        setTimeout(function(){setMemoryToast(null)},4000);
      }
    }).catch(function(){
      setMessages(function(prev){return prev.concat([{role:'assistant',content:'Connection error. Try again.',timestamp:new Date().toISOString()}])});
      setSending(false);
    });
  }

  function handleKeyDown(ev){
    if(ev.key==='Enter'&&!ev.shiftKey){
      ev.preventDefault();
      sendMessage(input);
    }
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:900,display:'flex',flexDirection:'column',height:'calc(100vh - 60px)'}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'System Chat'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:12}},'Talk to the organism. It has full context on your pipeline, intelligence, and history.'),

    // Quick actions
    e('div',{style:{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}},
      quickActions.map(function(qa){
        return e(Btn,{key:qa.label,onClick:function(){sendMessage(qa.prompt)},variant:'ghost',small:true},qa.label);
      })
    ),

    // Opportunity context
    pl.selected?e('div',{style:{fontSize:11,color:CYAN,marginBottom:8,padding:'4px 8px',background:CYAN+'11',borderRadius:4}},
      '◎ Context: '+pl.selected.title+' (OPI '+pl.selected.opi_score+')'
    ):null,

    // Messages
    e('div',{style:{flex:1,overflowY:'auto',marginBottom:12,padding:8}},
      messages.length===0?e('div',{style:{color:TEXT_D,textAlign:'center',padding:40}},'Ask the organism anything about your pipeline, opportunities, or strategy.'):
      messages.map(function(m,i){
        var isUser=m.role==='user';
        return e('div',{key:i,style:{marginBottom:12,display:'flex',justifyContent:isUser?'flex-end':'flex-start'}},
          e('div',{style:{
            maxWidth:'75%',padding:'10px 14px',borderRadius:isUser?'12px 12px 2px 12px':'12px 12px 12px 2px',
            background:isUser?GOLD+'22':BG3,border:'1px solid '+(isUser?GOLD+'33':BORDER),fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'
          }},
            m.content,
            m.timestamp?e('div',{style:{fontSize:9,color:TEXT_D,marginTop:4,textAlign:'right'}},new Date(m.timestamp).toLocaleTimeString()):null
          )
        );
      }),
      sending?e('div',{style:{display:'flex',justifyContent:'flex-start',marginBottom:12}},
        e('div',{style:{padding:'10px 14px',borderRadius:12,background:BG3,border:'1px solid '+BORDER,color:GOLD,animation:'pulse 1.5s infinite',fontSize:13}},'Thinking...')
      ):null,
      e('div',{ref:chatEndRef})
    ),

    // Memory toast
    memoryToast?e('div',{style:{position:'fixed',bottom:80,right:32,background:GREEN+'22',border:'1px solid '+GREEN+'44',borderRadius:8,padding:'8px 16px',fontSize:12,color:GREEN,zIndex:300}},
      '🧠 '+memoryToast
    ):null,

    // Input
    e('div',{style:{display:'flex',gap:8}},
      e('textarea',{value:input,onChange:function(ev){setInput(ev.target.value)},onKeyDown:handleKeyDown,
        placeholder:'Ask the organism...',rows:2,
        style:{flex:1,background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:8,padding:'10px 14px',fontSize:13,fontFamily:'Georgia,serif',outline:'none',resize:'none'}
      }),
      e(Btn,{onClick:function(){sendMessage(input)},disabled:sending||!input.trim(),style:{alignSelf:'flex-end'}},'Send')
    ),
    e('div',{style:{fontSize:10,color:TEXT_D,marginTop:4}},'Enter to send · Shift+Enter for newline')
  );
}

// ============================================================
// PROPOSAL ENGINE — Section-by-section proposal workspace
// ============================================================
function ProposalEngineModule(p){
  var pl=p.pl;
  var st1=useState('single'),mode=st1[0],setMode=st1[1];
  var st2=useState('Executive Summary'),section=st2[0],setSection=st2[1];
  var st3=useState(''),rfpContext=st3[0],setRfpContext=st3[1];
  var st4=useState(''),addContext=st4[0],setAddContext=st4[1];
  var st5=useState({}),sections=st5[0],setSections=st5[1];
  var st6=useState(null),generating=st6[0],setGenerating=st6[1];
  var st7=useState(null),autoProgress=st7[0],setAutoProgress=st7[1];
  var st8=useState(null),improveResult=st8[0],setImproveResult=st8[1];

  var sectionList=['Executive Summary','Technical Approach','Management Approach','Staffing Plan','Past Performance Matrix','Transition / Mobilization Plan','Pricing Narrative','Compliance Matrix','Clarifying Questions','Red Team Critique'];

  useEffect(function(){
    if(pl.selected){
      if(pl.selected.rfp_text)setRfpContext(pl.selected.rfp_text.substring(0,5000));
      else if(pl.selected.scope_analysis)setRfpContext(pl.selected.scope_analysis.substring(0,3000));
      // Load existing proposal content into sections
      if(pl.selected.proposal_content){
        var parsed={};
        var parts=pl.selected.proposal_content.split(/(?=^#{1,3}\s)/m);
        parts.forEach(function(part){
          sectionList.forEach(function(s){
            if(part.toLowerCase().includes(s.toLowerCase()))parsed[s]=part.trim();
          });
        });
        if(Object.keys(parsed).length>0)setSections(parsed);
      }
    }
  },[pl.selected?pl.selected.id:null]);

  function generateSection(sec){
    setGenerating(sec);
    var prompt='Generate the "'+sec+'" section for a government proposal.\n'+
      'RFP Context:\n'+rfpContext.substring(0,3000)+
      (addContext?'\nAdditional Context: '+addContext:'')+
      (pl.selected?'\nOpportunity: '+pl.selected.title+' ('+pl.selected.agency+')':'');

    callClaude(prompt,'You are HGI\'s proposal writer. Write a submission-ready proposal section. Be specific, cite HGI capabilities and past performance. No placeholders.',6000
    ).then(function(r){
      setSections(function(prev){var n=Object.assign({},prev);n[sec]=r;return n});
      setGenerating(null);
    });
  }

  function autoGenerateAll(){
    setAutoProgress({current:0,total:sectionList.length});
    var i=0;
    function next(){
      if(i>=sectionList.length){setAutoProgress(null);return}
      var sec=sectionList[i];
      setAutoProgress({current:i+1,total:sectionList.length,section:sec});
      setGenerating(sec);
      var prompt='Generate the "'+sec+'" section for a government proposal.\nRFP: '+rfpContext.substring(0,2000)+
        (pl.selected?'\nOpp: '+pl.selected.title+' ('+pl.selected.agency+')':'');
      callClaude(prompt,'You are HGI\'s proposal writer. Write submission-ready content.',4000
      ).then(function(r){
        setSections(function(prev){var n=Object.assign({},prev);n[sec]=r;return n});
        setGenerating(null);i++;next();
      });
    }
    next();
  }

  function improveSection(sec,action){
    setImproveResult(null);setGenerating(sec);
    var content=sections[sec]||'';
    fetch('/api/proposal-improve',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({section:sec,content:content,action:action,rfp_context:rfpContext.substring(0,2000)})
    }).then(function(r){return r.json()}).then(function(d){
      if(action==='improve'){setSections(function(prev){var n=Object.assign({},prev);n[sec]=d.improved||d.content||content;return n})}
      else{setImproveResult(d.critique||d.red_team||JSON.stringify(d))}
      setGenerating(null);
    }).catch(function(){setGenerating(null)});
  }

  function produceProposal(){
    if(!pl.selected)return;
    fetch('/api/produce-proposal?id='+encodeURIComponent(pl.selected.id),{method:'POST'});
  }

  function exportDocx(){
    if(!pl.selected)return;
    window.open('/api/proposal-doc?id='+encodeURIComponent(pl.selected.id));
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Proposal Engine'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:12}},'Select a pipeline opportunity or paste RFP text manually'),

    pl.pipeline.length>0?e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading}):
    e(Card,{style:{background:ORANGE+'15'}},e('div',{style:{color:ORANGE,fontSize:12}},'No active opportunities.')),

    !pl.selected&&!rfpContext?e(Card,{style:{background:GOLD+'11',borderColor:GOLD+'33'}},
      e('div',{style:{color:GOLD,fontWeight:'bold',fontSize:12}},'Recommended: Complete Full Workflow First'),
      e('div',{style:{color:TEXT_D,fontSize:12}},'For best results run Full Workflow first. Or paste RFP text below.')
    ):null,

    // Mode tabs
    e('div',{style:{display:'flex',gap:0,marginBottom:12,marginTop:12}},
      [{k:'single',l:'Single Section'},{k:'auto',l:'Auto Generate All'},{k:'workspace',l:'Draft Workspace'}].map(function(m){
        return e('div',{key:m.k,onClick:function(){setMode(m.k)},style:{
          padding:'8px 16px',cursor:'pointer',fontSize:12,fontWeight:'bold',
          background:mode===m.k?GOLD+'22':BG3,color:mode===m.k?GOLD:TEXT_D,
          border:'1px solid '+(mode===m.k?GOLD+'44':BORDER),borderRadius:m.k==='single'?'4px 0 0 4px':m.k==='workspace'?'0 4px 4px 0':0
        }},m.l);
      })
    ),

    // RFP Context
    e(Card,null,
      e(Label,{text:'RFP CONTEXT (paste if not loaded from workflow)'}),
      e(Textarea,{value:rfpContext,onChange:function(ev){setRfpContext(ev.target.value)},placeholder:'Paste RFP text...',rows:4})
    ),

    // Single Section mode
    mode==='single'?e('div',null,
      e('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=768?'1fr':'1fr 1fr',gap:12}},
        e('div',null,e(Label,{text:'SECTION'}),e(Sel,{value:section,onChange:function(ev){setSection(ev.target.value)},options:sectionList.map(function(s){return{value:s,label:s}})})),
        e('div',null,e(Label,{text:'ADDITIONAL CONTEXT'}),e(Input,{value:addContext,onChange:function(ev){setAddContext(ev.target.value)},placeholder:'Agency, key win themes, incumbent...'}))
      ),
      e(Btn,{onClick:function(){generateSection(section)},disabled:generating===section,style:{marginTop:12}},
        generating===section?'Generating...':'Generate: '+section
      ),
      sections[section]?e('div',{style:{marginTop:12}},
        e(AIOut,{content:sections[section],label:section.toUpperCase()}),
        e('div',{style:{display:'flex',gap:8,marginTop:8}},
          e(Btn,{onClick:function(){improveSection(section,'improve')},variant:'ghost',small:true},'✨ Improve'),
          e(Btn,{onClick:function(){improveSection(section,'redteam')},variant:'ghost',small:true},'🔴 Red Team')
        ),
        improveResult?e(AIOut,{content:improveResult,label:'RED TEAM CRITIQUE'}):null
      ):null
    ):null,

    // Auto Generate mode
    mode==='auto'?e('div',null,
      e(Btn,{onClick:autoGenerateAll,disabled:autoProgress!==null,style:{marginBottom:12}},
        autoProgress?'Generating '+autoProgress.current+'/'+autoProgress.total+': '+(autoProgress.section||'...'):'Auto Generate All Sections'
      ),
      autoProgress?e('div',{style:{background:BG3,borderRadius:4,height:8,marginBottom:12}},
        e('div',{style:{background:GOLD,height:8,borderRadius:4,width:(autoProgress.current/autoProgress.total*100)+'%',transition:'width 0.3s'}})
      ):null
    ):null,

    // Workspace mode
    mode==='workspace'?e('div',null,
      e('div',{style:{display:'flex',gap:8,marginBottom:12}},
        e(Btn,{onClick:produceProposal},'🚀 Produce Full Proposal (Opus)'),
        e(Btn,{onClick:exportDocx,variant:'ghost'},'📄 Export .docx')
      ),
      pl.selected&&pl.selected.proposal_content?e(Card,null,
        e(Label,{text:'CURRENT PROPOSAL DRAFT'}),
        e('div',{style:{fontSize:12,whiteSpace:'pre-wrap',maxHeight:600,overflowY:'auto',lineHeight:1.6}},pl.selected.proposal_content.substring(0,15000))
      ):null
    ):null,

    // Section pills
    e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginTop:16}},
      sectionList.map(function(s){
        var has=!!sections[s];
        return e('div',{key:s,onClick:function(){setSection(s);setMode('single')},style:{
          padding:'4px 10px',borderRadius:4,fontSize:11,cursor:'pointer',
          background:has?GREEN+'22':BG3,color:has?GREEN:TEXT_D,border:'1px solid '+(has?GREEN+'44':BORDER)
        }},s);
      })
    )
  );
}

// ============================================================
// FINANCIAL & PRICING — 6-tab pricing command center
// ============================================================
function FinancialPricingModule(p){
  var pl=p.pl;
  var st1=useState('intelligence'),tab=st1[0],setTab=st1[1];

  // Price Intelligence state
  var st2=useState({contractType:'Best Value — Tradeoff',setAside:'Full & Open Competition',priceWeight:30,value:'',years:3,geography:'Louisiana',incumbent:'',incumbentAdv:'Unknown',hgiIncumbent:'No',competitors:'ICF, Hagerty, Witt O\'Brien\'s, Dewberry',marginTarget:12,protestRisk:'Low'}),intel=st2[0],setIntel=st2[1];

  // Cost Buildup state
  var st3=useState([
    {cat:'Program Manager',hours:2080,rate:155,fringe:0.32,oh:0.15,ga:0.08,fee:0.07},
    {cat:'Senior Analyst',hours:2080,rate:125,fringe:0.32,oh:0.15,ga:0.08,fee:0.07}
  ]),labor=st3[0],setLabor=st3[1];
  var st4=useState([{desc:'Travel',amount:25000},{desc:'Other Direct Costs',amount:10000}]),odcs=st4[0],setOdcs=st4[1];

  // Results
  var st5=useState(null),marketRates=st5[0],setMarketRates=st5[1];
  var st6=useState(null),ptw=st6[0],setPtw=st6[1];
  var st7=useState(null),narrative=st7[0],setNarrative=st7[1];
  var st8=useState(false),loading=st8[0],setLoading=st8[1];

  // Period pricing
  var st9=useState({baseMonths:12,optionYears:2,escalation:3}),periods=st9[0],setPeriods=st9[1];

  // Eval model
  var st10=useState({price:30,technical:40,pastPerf:20,management:10}),evalWeights=st10[0],setEvalWeights=st10[1];

  // Scenario
  var st11=useState({feeAdj:0,rateAdj:0,hoursAdj:0}),scenario=st11[0],setScenario=st11[1];

  useEffect(function(){
    if(pl.selected){
      setIntel(function(prev){return Object.assign({},prev,{value:pl.selected.estimated_value||'',geography:pl.selected.vertical==='disaster'?'Louisiana':prev.geography})});
    }
  },[pl.selected?pl.selected.id:null]);

  function calcLoaded(row){
    var loaded=row.rate*(1+row.fringe)*(1+row.oh)*(1+row.ga)*(1+row.fee);
    return Math.round(loaded*100)/100;
  }
  function calcRowTotal(row){return Math.round(calcLoaded(row)*row.hours)}

  var laborTotal=labor.reduce(function(s,r){return s+calcRowTotal(r)},0);
  var odcTotal=odcs.reduce(function(s,r){return s+(parseFloat(r.amount)||0)},0);
  var feeEarned=Math.round(laborTotal*0.07);
  var baseYear=laborTotal+odcTotal;
  var contractTotal=Math.round(baseYear*(1+periods.optionYears*(1+periods.escalation/100)));
  var profitMargin=baseYear>0?Math.round(feeEarned/baseYear*1000)/10:0;

  function analyzeMarket(){
    setLoading(true);
    callClaude('Analyze market rates for this opportunity: '+JSON.stringify(intel)+
      (pl.selected?'\nOpp: '+pl.selected.title:''),
      'You are a pricing analyst. Provide GSA ranges per role, competitor indirect rates, locality factors, red flags, and HGI positioning.',5000
    ).then(function(r){setMarketRates(r);setLoading(false)});
  }

  function runPTW(){
    setLoading(true);
    callClaude('Run full Price-to-Win analysis: '+JSON.stringify(intel)+'\nLabor total: $'+laborTotal+', ODCs: $'+odcTotal,
      'You are a PTW analyst. Provide: bidder pool, competitor pricing models, incumbent analysis, eval score modeling, price sensitivity, 3 win price scenarios, pricing strategy, risks.',6000
    ).then(function(r){setPtw(r);setLoading(false)});
  }

  function generateNarrative(){
    setLoading(true);
    callClaude('Generate an 800+ word cost narrative for submission. Labor total: $'+laborTotal+', ODCs: $'+odcTotal+', Contract total: $'+contractTotal+'. '+JSON.stringify(intel),
      'Write a submission-ready cost narrative covering methodology, rate justification, indirect rates, ODC justification, cost realism, value proposition, fee reasonableness.',6000
    ).then(function(r){setNarrative(r);setLoading(false)});
  }

  function updateLabor(i,field,val){
    setLabor(function(prev){var n=prev.slice();n[i]=Object.assign({},n[i],{[field]:field==='cat'?val:parseFloat(val)||0});return n});
  }
  function addLabor(){setLabor(function(prev){return prev.concat([{cat:'',hours:2080,rate:100,fringe:0.32,oh:0.15,ga:0.08,fee:0.07}])})}
  function removeLabor(i){setLabor(function(prev){return prev.filter(function(_,j){return j!==i})})}

  var tabs=[{k:'intelligence',l:'⚡ Price Intelligence'},{k:'buildup',l:'Cost Buildup'},{k:'periods',l:'Period Pricing'},{k:'eval',l:'Eval Score Model'},{k:'scenario',l:'Scenario Modeling'},{k:'narrative',l:'Cost Narrative'}];

  return e('div',{style:{padding:'24px 32px',maxWidth:1200}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Financial Analysis & Pricing'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:12}},'Price Intelligence · Cost Buildup · PTW · Evaluation Modeling · Cost Narrative'),

    pl.pipeline.length>0?e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading}):null,

    // Live summary bar
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,margin:'12px 0'}},
      [{l:'BASE YEAR',v:'$'+baseYear.toLocaleString()},{l:'CONTRACT TOTAL',v:'$'+contractTotal.toLocaleString()},{l:'PROFIT MARGIN',v:profitMargin+'%',c:profitMargin>=intel.marginTarget?GREEN:RED},
       {l:'LABOR TOTAL',v:'$'+laborTotal.toLocaleString()},{l:'ODCs',v:'$'+odcTotal.toLocaleString()},{l:'WIN PRICE',v:ptw?'See PTW →':'Click PTW'}].map(function(s){
        return e('div',{key:s.l,style:{background:BG2,border:'1px solid '+BORDER,borderRadius:4,padding:12,textAlign:'center'}},
          e('div',{style:{fontSize:16,fontWeight:'bold',color:s.c||GOLD}},s.v),
          e('div',{style:{fontSize:9,letterSpacing:2,color:TEXT_D,marginTop:4}},s.l)
        );
      })
    ),

    // Cost composition bar
    e('div',{style:{marginBottom:12}},
      e('div',{style:{fontSize:10,color:TEXT_D,marginBottom:4}},'COST COMPOSITION — $'+(baseYear+feeEarned).toLocaleString()+' total'),
      e('div',{style:{display:'flex',height:8,borderRadius:4,overflow:'hidden'}},
        laborTotal>0?e('div',{style:{flex:laborTotal,background:GREEN}}):null,
        odcTotal>0?e('div',{style:{flex:odcTotal,background:BLUE}}):null,
        feeEarned>0?e('div',{style:{flex:feeEarned,background:CYAN}}):null
      ),
      e('div',{style:{display:'flex',gap:16,fontSize:10,color:TEXT_D,marginTop:4}},
        e('span',null,'■ Labor '+(baseYear>0?Math.round(laborTotal/baseYear*100):0)+'%'),
        e('span',null,'■ ODCs '+(baseYear>0?Math.round(odcTotal/baseYear*100):0)+'%'),
        e('span',null,'■ Fee '+(baseYear>0?Math.round(feeEarned/baseYear*100):0)+'%')
      )
    ),

    // Tab navigation
    e('div',{style:{display:'flex',gap:0,marginBottom:12,flexWrap:'wrap'}},
      tabs.map(function(t,i){
        return e('div',{key:t.k,onClick:function(){setTab(t.k)},style:{
          padding:'8px 14px',cursor:'pointer',fontSize:11,fontWeight:'bold',

    if(active==='digest')return e(WeeklyDigestModule,{pl:pl,nav:nav});
    if(active==='knowledge')return e(KnowledgeBaseModule,{pl:pl,nav:nav});
    if(active==='scraperinsights')return e(ScraperInsightsModule,{pl:pl,nav:nav});
    if(active==='discovery')return e(DiscoveryModule,{pl:pl,nav:nav});
    if(active==='execbrief')return e(ExecBriefModule,{pl:pl,nav:nav});
    if(active==='scanner')return e(PipelineScannerModule,{pl:pl,nav:nav});
    var mod=modules.find(function(m){return m.key===active});
    return e(PlaceholderModule,{title:mod?mod.label:active,pl:pl});
  }

  var unread=notifs.filter(function(n){return!n.read}).length;

  return e('div',{style:{display:'flex',minHeight:'100vh'}},
    // Sidebar
    sidebarOpen?e('div',{style:{width:sidebarW,background:BG2,borderRight:'1px solid '+BORDER,position:'fixed',top:0,left:0,bottom:0,overflowY:'auto',zIndex:100,display:'flex',flexDirection:'column'}},
      // Header
      e('div',{style:{padding:'16px 16px 12px'}},
        e('div',{style:{fontSize:18,fontWeight:'bold',color:GOLD,letterSpacing:2}},'HGI'),
        e('div',{style:{fontSize:9,letterSpacing:2,color:TEXT_D}},'AI CAPTURE SYSTEM '+(health&&health.version?health.version:'')),
        e('div',{style:{fontSize:10,color:TEXT_D}},'Hammerman & Gainer LLC · 97 Years')
      ),
      // Module list
      e('div',{style:{flex:1}},
        modules.map(function(m){
          var isActive=active===m.key;
          return e('div',{key:m.key,onClick:function(){setActive(m.key);if(window.innerWidth<=768)setSidebarOpen(false)},style:{
            display:'flex',alignItems:'center',padding:'10px 16px',cursor:'pointer',
            background:isActive?GOLD+'15':'transparent',borderLeft:isActive?'3px solid '+GOLD:'3px solid transparent',
            color:isActive?GOLD:TEXT_D,fontSize:13,gap:8
          }},
            e('span',{style:{fontSize:14,width:20,textAlign:'center'}},m.icon),
            e('span',null,m.label),
            m.badge?e('span',{style:{marginLeft:'auto',background:GOLD,color:'#000',fontSize:9,padding:'1px 6px',borderRadius:4,fontWeight:'bold'}},m.badge):null
          );
        })
      ),
      // Footer
      e('div',{style:{padding:12,borderTop:'1px solid '+BORDER,fontSize:10,color:GOLD}},
        e('div',{style:{fontWeight:'bold',letterSpacing:2,marginBottom:4}},'KEY PAST PERFORMANCE'),
        ['Road Home $12B CDBG-DR','BP GCCF 1M+ claims','PBGC 34M beneficiaries','TPCIGA 20yrs Texas','Restore Louisiana','Terrebonne Parish / Ida'].map(function(pp){
          return e('div',{key:pp,style:{color:TEXT_D,marginBottom:2}},'· '+pp);
        })
      )
    ):null,

    // Main content
    e('div',{style:{marginLeft:sidebarW,flex:1,minHeight:'100vh'}},
      // Top bar
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 16px',borderBottom:'1px solid '+BORDER,background:BG2,position:'sticky',top:0,zIndex:50}},
        e('div',{style:{display:'flex',alignItems:'center',gap:12}},
          e('span',{onClick:function(){setSidebarOpen(!sidebarOpen)},style:{cursor:'pointer',fontSize:18,color:TEXT_D}},'☰'),
          e('span',{style:{fontWeight:'bold',color:TEXT,fontSize:14}},moduleLabel),
          health?e('span',{style:{fontSize:10,color:health.status==='alive'?GREEN:RED}},'● '+(health.status==='alive'?'ALIVE':'OFFLINE')):null
        ),
        // Notification bell
        e('div',{style:{position:'relative'}},
          e('span',{onClick:function(){setBellOpen(!bellOpen)},style:{cursor:'pointer',fontSize:20,color:GOLD}},'🔔'),
          unread>0?e('span',{style:{position:'absolute',top:-4,right:-4,background:RED,color:'#fff',fontSize:9,borderRadius:10,padding:'1px 5px',fontWeight:'bold'}},unread):null,
          bellOpen?e('div',{style:{position:'absolute',right:0,top:32,width:320,maxHeight:400,overflowY:'auto',background:BG2,border:'1px solid '+BORDER,borderRadius:4,boxShadow:'0 4px 12px rgba(0,0,0,0.5)',zIndex:200}},
            e('div',{style:{padding:'8px 12px',borderBottom:'1px solid '+BORDER,fontWeight:'bold',fontSize:12,color:GOLD}},'NOTIFICATIONS'),
            notifs.length===0?e('div',{style:{padding:12,color:TEXT_D,fontSize:12}},'No notifications'):
            notifs.slice(0,10).map(function(n,i){
              return e('div',{key:i,style:{padding:'8px 12px',borderBottom:'1px solid '+BORDER,fontSize:11,color:n.read?TEXT_D:TEXT}},
                e('div',{style:{fontWeight:n.read?'normal':'bold'}},n.message||n.title||'Notification'),
                n.timestamp?e('div',{style:{fontSize:10,color:TEXT_D,marginTop:2}},new Date(n.timestamp).toLocaleString()):null
              );
            })
          ):null
        )
      ),
      // Module content
      renderModule()
    )
  );
}

ReactDOM.render(e(App),document.getElementById('root'));
</script>
</body>
</html>
