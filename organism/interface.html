<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HGI AI Capture System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0A;color:#E8E0D0;font-family:Georgia,serif;margin:0;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#8B6E2E}
textarea::placeholder,input::placeholder{color:#555048}
select option{background:#191919}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:768px){body{font-size:14px} #mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useCallback=React.useCallback,useMemo=React.useMemo,Fragment=React.Fragment;

// ============================================================
// SHARED.JS — Constants, Components, Utilities
// ============================================================
var GOLD='#C9A84C',GOLD_D='#8B6E2E',BG='#0A0A0A',BG2='#111111',BG3='#191919',BG4='#222222',
TEXT='#E8E0D0',TEXT_D='#888070',BORDER='#2A2520',RED='#C0392B',GREEN='#27AE60',BLUE='#2980B9',ORANGE='#E67E22',CYAN='#00D4FF';

var HGI_CONTEXT='HGI Global (Hammerman & Gainer LLC) — 97-year-old, 100% minority-owned program management firm in Kenner, LA. 8 verticals: Disaster Recovery, TPA/Claims, Property Tax Appeals, Workforce/WIOA, Construction Management, Program Administration, Housing/HUD, Grant Management. SAM UEI: DL4SJEVKZ6H4.';

function Badge(p){
  var c=p.color||GOLD;
  return e('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',background:c+'22',color:c,border:'1px solid '+c+'44'}},p.children);
}

function Card(p){
  return e('div',{style:Object.assign({background:BG2,border:'1px solid '+BORDER,borderRadius:6,padding:16,marginBottom:12},p.style||{}),onClick:p.onClick},p.children);
}

function Btn(p){
  var v=p.variant||'primary',bg=v==='primary'?GOLD:v==='danger'?RED:v==='ghost'?'transparent':BG3,
  clr=v==='primary'?'#000':v==='ghost'?GOLD:TEXT,bdr=v==='ghost'?'1px solid '+GOLD:'none';
  return e('button',{onClick:p.onClick,disabled:p.disabled,style:Object.assign({background:bg,color:clr,border:bdr,borderRadius:4,padding:p.small?'4px 10px':'8px 16px',cursor:p.disabled?'not-allowed':'pointer',fontSize:p.small?11:13,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',opacity:p.disabled?0.5:1,fontFamily:'Georgia,serif'},p.style||{})},p.children);
}

function Input(p){
  var props={onChange:p.onChange,placeholder:p.placeholder,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',width:'100%',fontSize:13,fontFamily:'Georgia,serif',outline:'none'},p.style||{})};
  if(p.onBlur)props.onBlur=p.onBlur;
  if(p.defaultValue!==undefined){props.defaultValue=p.defaultValue}else{props.value=p.value}
  return e('input',props);
}

function Textarea(p){
  var props={onChange:p.onChange,placeholder:p.placeholder,rows:p.rows||4,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',width:'100%',fontSize:13,fontFamily:'Georgia,serif',outline:'none',resize:'vertical'},p.style||{})};
  if(p.onBlur)props.onBlur=p.onBlur;
  if(p.defaultValue!==undefined){props.defaultValue=p.defaultValue}else{props.value=p.value}
  return e('textarea',props);
}

function Sel(p){
  return e('select',{value:p.value,onChange:p.onChange,style:Object.assign({background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 12px',fontSize:13,fontFamily:'Georgia,serif',outline:'none'},p.style||{})},
  (p.options||[]).map(function(o){return e('option',{key:o.value,value:o.value},o.label)}));
}

function Label(p){
  return e('div',{style:{fontSize:10,fontWeight:'bold',letterSpacing:2,textTransform:'uppercase',color:TEXT_D,marginBottom:6}},p.text);
}

function AIOut(p){
  return e('div',{style:{background:BG3,border:'1px solid '+BORDER,borderRadius:4,overflow:'hidden'}},
    e('div',{style:{background:GOLD+'22',padding:'6px 12px',fontSize:10,fontWeight:'bold',letterSpacing:2,color:GOLD,textTransform:'uppercase'}},p.label||'AI ANALYSIS'),
    e('div',{style:{padding:12,fontSize:13,whiteSpace:'pre-wrap',color:TEXT,lineHeight:1.6}},
      p.loading?e('span',{style:{animation:'pulse 1.5s infinite',color:GOLD}},'Analyzing...'):p.content||'No analysis yet.')
  );
}

function OPIBadge(p){
  var s=p.score||0,c=s>=90?GREEN:s>=75?CYAN:s>=60?GOLD:RED,
  lbl=s>=90?'Tier 1':s>=75?'Pursue':s>=60?'Monitor':'Low';
  return e('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:'bold',background:c+'22',color:c,border:'1px solid '+c+'44'}},s+' '+lbl);
}

// Store
var store={
  get:function(k){try{return JSON.parse(localStorage.getItem('hgi_'+k))}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem('hgi_'+k,JSON.stringify(v))}catch(e){}}
};

// callClaude
function callClaude(prompt,system,maxTokens){
  return fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:prompt,system:system||HGI_CONTEXT,max_tokens:maxTokens||3000})
  }).then(function(r){return r.json()}).then(function(d){return d.response||d.content||''}).catch(function(){return 'Error calling AI'});
}

// ============================================================
// PIPELINE.JS — usePipeline hook + OpportunitySelector
// ============================================================
var _plCache={data:null,ts:0};

function fetchPipelineData(){
  var now=Date.now();
  if(_plCache.data&&now-_plCache.ts<60000)return Promise.resolve(_plCache.data);
  return fetch('/api/pipeline').then(function(r){return r.json()}).then(function(d){
    var opps=(d.opportunities||d||[]).filter(function(o){return o.status==='active'||!o.status});
    _plCache={data:opps,ts:Date.now()};
    return opps;
  }).catch(function(){return _plCache.data||[]});
}

function usePipeline(){
  var st=useState([]),pipeline=st[0],setPipeline=st[1];
  var st2=useState(null),selected=st2[0],setSelected=st2[1];
  var st3=useState(true),loading=st3[0],setLoading=st3[1];

  useEffect(function(){
    fetchPipelineData().then(function(d){setPipeline(d);setLoading(false)});
  },[]);

  function select(o){
    setSelected(o);
    store.set('sharedCtx',{rfpText:o.rfp_text||'',decomposition:o.scope_analysis||'',execBrief:o.description||'',title:o.title,agency:o.agency,vertical:o.vertical,research:o.research_brief||'',value:o.estimated_value||''});
  }

  function writeBack(id,updates){
    return fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({id:id},updates))
    }).then(function(){_plCache.data=null;return fetchPipelineData().then(function(d){setPipeline(d)})}).catch(function(){});
  }

  function refresh(){
    setLoading(true);_plCache.data=null;
    fetchPipelineData().then(function(d){setPipeline(d);setLoading(false)});
  }

  return{pipeline:pipeline,selected:selected,select:select,writeBack:writeBack,loading:loading,refresh:refresh};
}

function OpportunitySelector(p){
  var opps=(p.pipeline||[]).filter(function(o){return(o.opi_score||0)>=(p.minOpi||0)});
  if(p.loading)return e('div',{style:{color:GOLD,padding:8}},'Loading pipeline...');
  if(!opps.length)return e('div',{style:{color:ORANGE,padding:8}},'No active opportunities.');
  return e('div',null,
    e(Label,{text:p.label||'SELECT OPPORTUNITY'}),
    e('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}},
      opps.map(function(o){
        var isActive=p.selected&&p.selected.id===o.id;
        var sc=o.opi_score||0,bc=sc>=75?GREEN:sc>=60?GOLD:RED;
        return e('div',{key:o.id,onClick:function(){p.onSelect(o)},style:{
          background:isActive?bc+'22':BG3,border:'1px solid '+(isActive?bc:BORDER),borderLeft:'3px solid '+bc,
          borderRadius:4,padding:'6px 10px',cursor:'pointer',maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12
        }},
          e('span',{style:{fontWeight:'bold',color:isActive?'#fff':TEXT},title:o.title},o.title),
          e('span',{style:{marginLeft:6,color:bc,fontWeight:'bold',fontSize:11}},sc),
          o.agency?e('span',{style:{marginLeft:6,color:TEXT_D,fontSize:10},title:o.agency},o.agency):null
        );
      })
    ),
    p.selected?e('div',{style:{background:GREEN+'22',border:'1px solid '+GREEN+'44',borderRadius:4,padding:'6px 12px',fontSize:12,color:GREEN}},
      '✓ LOADED: ',p.selected.title,' ',e(OPIBadge,{score:p.selected.opi_score})
    ):null
  );
}

// ============================================================
// DASHBOARD.JS
// ============================================================
function Dashboard(p){
  var pl=p.pl;
  var st1=useState(null),health=st1[0],setHealth=st1[1];
  var st2=useState(null),sysStatus=st2[0],setSysStatus=st2[1];
  var st3=useState(null),execBrief=st3[0],setExecBrief=st3[1];
  var st4=useState(null),huntStats=st4[0],setHuntStats=st4[1];
  var st5=useState(false),thinking=st5[0],setThinking=st5[1];
  var st6=useState({}),expanded=st6[0],setExpanded=st6[1];
  var st7=useState(null),cycleHist=st7[0],setCycleHist=st7[1];
  var st8=useState(''),timeStr=st8[0],setTimeStr=st8[1];
  var st9=useState(null),decisions=st9[0],setDecisions=st9[1];
  var st10=useState(null),executing=st10[0],setExecuting=st10[1];

  useEffect(function(){
    function loadAll(){
      fetch('/health').then(function(r){return r.json()}).then(setHealth).catch(function(){});
      fetch('/api/system-status').then(function(r){return r.json()}).then(setSysStatus).catch(function(){});
      fetch('/api/exec-brief').then(function(r){return r.json()}).then(setExecBrief).catch(function(){});
      fetch('/api/hunt-stats').then(function(r){return r.json()}).then(setHuntStats).catch(function(){});
      fetch('/api/cycle-history').then(function(r){return r.json()}).then(setCycleHist).catch(function(){});
      fetch('/api/organism-decisions').then(function(r){return r.json()}).then(setDecisions).catch(function(){});
    }
    loadAll();
    var iv=setInterval(loadAll,300000);
    // Live clock
    function tick(){setTimeStr(new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'}))}
    tick();var t2=setInterval(tick,30000);
    return function(){clearInterval(iv);clearInterval(t2)};
  },[]);

  var now=new Date();
  var greeting=now.getHours()<12?'Good morning':now.getHours()<17?'Good afternoon':'Good evening';
  var dateStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  var pipeline=pl.pipeline||[];
  var tier1=pipeline.filter(function(o){return(o.opi_score||0)>=75}).length;
  var pursuing=pipeline.filter(function(o){return o.stage==='pursuing'}).length;
  var inProposal=pipeline.filter(function(o){return o.stage==='proposal'}).length;
  var submitted=pipeline.filter(function(o){return o.stage==='submitted'}).length;
  var stale=pipeline.filter(function(o){var d=o.due_date?new Date(o.due_date):null;return d&&d<now&&o.stage!=='won'&&o.stage!=='lost'}).length;
  var newToday=pipeline.filter(function(o){var d=o.discovered_at?new Date(o.discovered_at):null;return d&&(now-d)<86400000}).length;
  var avgOpi=sysStatus&&sysStatus.pipeline?sysStatus.pipeline.avg_opi:0;
  var memCount=sysStatus&&sysStatus.intelligence?sysStatus.intelligence.organism_memories:0;

  function triggerThink(){
    setThinking(true);
    fetch('/api/trigger',{method:'POST'}).then(function(){setTimeout(function(){setThinking(false);fetch('/api/organism-decisions').then(function(r){return r.json()}).then(setDecisions).catch(function(){})},3000)}).catch(function(){setThinking(false)});
  }

  function dismissDecision(id){
    fetch('/api/organism-decisions',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})}).then(function(){
      if(decisions&&decisions.decisions){setDecisions({decisions:decisions.decisions.filter(function(d){return d.id!==id}),count:decisions.count-1,last_think_run:decisions.last_think_run})}
    }).catch(function(){});
  }

  function executeDecision(dp){
    if(!dp.action_endpoint)return;
    setExecuting(dp.id);
    var ctrl=new AbortController();
    setTimeout(function(){ctrl.abort()},8000);
    fetch(dp.action_endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(dp.action_payload||{}),signal:ctrl.signal}).then(function(r){return r.json()}).then(function(){
      setExecuting(null);dismissDecision(dp.id);
    }).catch(function(err){
      setExecuting(null);
      if(err.name==='AbortError'){dismissDecision(dp.id)}
    });
  }

  function toggleExp(k){var n={};for(var x in expanded)n[x]=expanded[x];n[k]=!n[k];setExpanded(n)}

  function relTime(ts){
    if(!ts)return'—';
    var d=new Date(ts),diff=now-d,m=Math.floor(diff/60000),h=Math.floor(diff/3600000);
    if(m<1)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';
  }

  // Navigation targets per stat
  var statNavMap={ACTIVE:'discovery','TIER 1':'tracker',PURSUING:'tracker','IN PROPOSAL':'proposal',SUBMITTED:'tracker',STALE:'tracker','NEW TODAY':'discovery','AVG OPI':'tracker',MEMORIES:'chat'};
  var stats=[
    {label:'ACTIVE',value:pipeline.length,color:CYAN},
    {label:'TIER 1',value:tier1,color:GREEN},
    {label:'PURSUING',value:pursuing,color:GOLD},
    {label:'IN PROPOSAL',value:inProposal,color:ORANGE},
    {label:'SUBMITTED',value:submitted,color:GREEN},
    {label:'STALE',value:stale,color:stale>0?RED:TEXT_D},
    {label:'NEW TODAY',value:newToday,color:newToday>0?GREEN:TEXT_D}
  ];

  // Extract dashboard briefing from exec-brief
  var dashBrief=null;
  if(execBrief&&execBrief.recent_intel){
    for(var i=0;i<execBrief.recent_intel.length;i++){
      if(execBrief.recent_intel[i].agent==='dashboard_agent'){dashBrief=execBrief.recent_intel[i];break}
    }
  }

  // Extract disaster alerts
  var disasters=(execBrief&&execBrief.alerts)?execBrief.alerts.filter(function(a){return a.type==='disaster'}):[];

  // Extract upcoming deadlines
  var deadlines=(execBrief&&execBrief.upcoming_deadlines)?execBrief.upcoming_deadlines:[];

  // Recent intel feed (last 5 non-dashboard-agent)
  var intelFeed=(execBrief&&execBrief.recent_intel)?execBrief.recent_intel.slice(0,8):[];

  // Agent lists for organism status
  var agentLists=sysStatus&&sysStatus.agents?sysStatus.agents:null;
  var lastCycle=execBrief&&execBrief.agent_health?execBrief.agent_health.last_cycle:null;

  // Hunt stats for scraper status
  var recentHunts=Array.isArray(huntStats)?huntStats.slice(0,20):[];
  var sourceMap={};
  recentHunts.forEach(function(h){
    var src=h.source||'cron';
    if(!sourceMap[src])sourceMap[src]={runs:0,found:0,newOpps:0,lastRun:null};
    sourceMap[src].runs++;
    sourceMap[src].found+=(h.opportunities_found||0);
    sourceMap[src].newOpps+=(h.opportunities_new||0);
    if(!sourceMap[src].lastRun||h.run_at>sourceMap[src].lastRun)sourceMap[src].lastRun=h.run_at;
  });

  // Scraper sources from system-status
  var scSources=sysStatus&&sysStatus.sources?sysStatus.sources:{active:[],disabled:[]};

  return e('div',{style:{padding:'20px 28px',maxWidth:1100}},

    // === GREETING + CLOCK ===
    e('h1',{style:{fontSize:26,fontWeight:400,color:GOLD,marginBottom:2}},greeting+', Christopher.'),
    e('div',{style:{fontSize:13,color:TEXT_D,marginBottom:16}},dateStr+' · '+timeStr),

    // === TODAY'S PRIORITY (spec item 1) ===
    dashBrief?e('div',{style:{border:'2px solid '+GOLD,borderRadius:8,padding:'14px 18px',marginBottom:16,background:'rgba(201,168,76,0.06)'}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'🎯 TODAY\'S PRIORITY'),
      e('div',{style:{fontSize:13,lineHeight:1.7,color:TEXT,whiteSpace:'pre-wrap'}},
        (dashBrief.summary||'')
      ),
      e('div',{style:{fontSize:11,color:TEXT_D,marginTop:8}},relTime(dashBrief.when)+' via '+dashBrief.agent)
    ):
    e(Card,{style:{border:'2px solid '+GOLD}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:6}},'🎯 TODAY\'S PRIORITY'),
      e('span',{style:{color:GOLD,animation:'pulse 1.5s infinite'}},'⊙ Loading intelligence briefing...')
    ),

    // === STATS GRID (spec item 2 — all clickable) ===
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,margin:'12px 0'}},
      stats.map(function(s){
        return e('div',{key:s.label,onClick:function(){p.nav(statNavMap[s.label]||'tracker')},style:{
          background:BG2,border:'1px solid '+BORDER,borderRadius:4,padding:'10px 6px',textAlign:'center',cursor:'pointer',borderBottom:'3px solid '+s.color
        }},
          e('div',{style:{fontSize:22,fontWeight:'bold',color:s.color}},s.value),
          e('div',{style:{fontSize:9,letterSpacing:1.5,color:TEXT_D,marginTop:2}},s.label)
        );
      })
    ),

    // === V2 ADDITIONS: Avg OPI + Memories + Agent Count row ===
    e('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
      [{l:'AVG OPI',v:avgOpi,c:avgOpi>=80?GREEN:avgOpi>=60?GOLD:RED},
       {l:'MEMORIES',v:memCount.toLocaleString(),c:CYAN},
       {l:'AGENTS',v:health?health.agents_active:'—',c:GREEN},
       {l:'OUTCOMES',v:sysStatus&&sysStatus.outcomes?sysStatus.outcomes.total:'—',c:GOLD}
      ].map(function(s){
        return e('div',{key:s.l,style:{flex:1,minWidth:80,background:BG2,border:'1px solid '+BORDER,borderRadius:4,padding:'8px 6px',textAlign:'center'}},
          e('div',{style:{fontSize:18,fontWeight:'bold',color:s.c}},s.v),
          e('div',{style:{fontSize:9,letterSpacing:1.5,color:TEXT_D,marginTop:2}},s.l)
        );
      })
    ),

    // === UPCOMING DEADLINES (spec V2 addition) ===
    deadlines.length>0?e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'⏰ UPCOMING DEADLINES'),
      deadlines.map(function(dl){
        var daysLeft=dl.days_remaining;
        var urgColor=daysLeft<=0?RED:daysLeft<=5?RED:daysLeft<=10?ORANGE:CYAN;
        return e('div',{key:dl.title,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
          e('div',{style:{flex:1}},
            e('span',{style:{fontWeight:'bold',color:TEXT}},dl.title),
            e(OPIBadge,{score:dl.opi}),
            e(Badge,{color:stageColor(dl.stage)||GOLD},' ',dl.stage)
          ),
          e('div',{style:{color:urgColor,fontWeight:'bold',fontSize:13,minWidth:80,textAlign:'right'}},
            daysLeft<=0?(Math.abs(daysLeft)+'d OVERDUE'):(daysLeft+'d left')
          )
        );
      })
    ):null,

    // === ORGANISM STATUS (spec item 3 — agent dot grid) ===
    e(Card,{style:{marginBottom:12}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD}},'ORGANISM STATUS'),
        e('div',{style:{display:'flex',gap:12,fontSize:11}},
          agentLists?[
            e('span',{key:'live',style:{color:GREEN}},'● LIVE '+(agentLists.per_opp||[]).length),
            e('span',{key:'gated',style:{color:ORANGE}},'● GATED '+(agentLists.gated||[]).length),
            e('span',{key:'core',style:{color:CYAN}},'● CORE '+((agentLists.system_core||[]).length+(agentLists.system_intel||[]).length))
          ]:null
        )
      ),
      // Agent dot grid
      agentLists?e('div',{style:{display:'flex',flexWrap:'wrap',gap:3,marginBottom:8}},
        (agentLists.per_opp||[]).map(function(a){return e('div',{key:a,title:a+' (per-opp)',style:{width:12,height:12,borderRadius:2,background:GREEN,cursor:'help'}})}),
        (agentLists.gated||[]).map(function(a){return e('div',{key:a,title:a+' (gated)',style:{width:12,height:12,borderRadius:2,background:ORANGE,cursor:'help'}})}),
        (agentLists.system_core||[]).map(function(a){return e('div',{key:a,title:a+' (system)',style:{width:12,height:12,borderRadius:2,background:CYAN,cursor:'help'}})}),
        (agentLists.system_intel||[]).map(function(a){return e('div',{key:a,title:a+' (intel)',style:{width:12,height:12,borderRadius:2,background:'#5B9BD5',cursor:'help'}})})
      ):null,
      // Think Now + Last Think
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        e('div',{style:{fontSize:11,color:TEXT_D}},
          lastCycle?'Last think: '+relTime(lastCycle):'No cycles recorded',
          health?' · V'+(health.version||'').replace('V',''):''
        ),
        e(Btn,{onClick:triggerThink,disabled:thinking,small:true},thinking?'Running...':'Think Now')
      )
    ),

    // === PENDING DECISIONS (spec item 4 — priority cards with Execute/Dismiss) ===
    decisions&&decisions.decisions&&decisions.decisions.length>0?e(Card,{style:{marginBottom:12}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD}},'PENDING DECISIONS'),
        e(Badge,{color:GOLD},decisions.count+' pending')
      ),
      decisions.decisions.slice(0,8).map(function(dp,i){
        var isExp=expanded['dec_'+dp.id];

            )

    // === DISASTER DECLARATIONS (spec item 6) ===
    disasters.length>0?e(Card,{style:{border:'1px solid '+RED,marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:RED,marginBottom:8}},'🚨 DISASTER DECLARATIONS'),
      disasters.map(function(d,i){
        return e('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<disasters.length-1?'1px solid '+BORDER:'none'}},
          e('div',null,
            e('div',{style:{fontWeight:'bold',color:TEXT,fontSize:13}},d.title),
            d.threat_level?e(Badge,{color:RED},d.threat_level):null
          ),
          e(Btn,{onClick:function(){p.nav('content')},small:true,variant:'danger'},'48-hr Response →')
        );
      })
    ):null,

    // === MARKET PULSE (spec item 7) ===
    sysStatus&&sysStatus.intelligence?e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'📡 MARKET PULSE'),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:8}},
        [{l:'Competitors',v:sysStatus.intelligence.competitive_intelligence,c:ORANGE},
         {l:'Contacts',v:sysStatus.intelligence.relationship_contacts,c:GREEN},
         {l:'Disasters',v:sysStatus.intelligence.disaster_alerts,c:RED},
         {l:'Budget Signals',v:sysStatus.intelligence.budget_cycles,c:CYAN},
         {l:'Recompetes',v:sysStatus.intelligence.recompete_tracker,c:GOLD},
         {l:'Regulations',v:sysStatus.intelligence.regulatory_changes,c:'#5B9BD5'},
         {l:'Teaming',v:sysStatus.intelligence.teaming_partners,c:GREEN},
         {l:'Agencies',v:sysStatus.intelligence.agency_profiles,c:GOLD}
        ].map(function(s){
          return e('div',{key:s.l,style:{background:BG3,padding:'8px',borderRadius:4,textAlign:'center'}},
            e('div',{style:{fontSize:16,fontWeight:'bold',color:s.c}},s.v),
            e('div',{style:{fontSize:9,color:TEXT_D,letterSpacing:1}},s.l)
          );
        })
      )
    ):null,

    // === LATEST INTEL FEED (spec V2 addition — last 5 agent observations) ===
    intelFeed.length>0?e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'LATEST INTELLIGENCE'),
      intelFeed.slice(0,5).map(function(m,i){
        var isExp=expanded['intel_'+i];
        return e('div',{key:i,style:{padding:'6px 0',borderBottom:i<4?'1px solid '+BORDER:'none',cursor:'pointer'},onClick:function(){toggleExp('intel_'+i)}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('div',{style:{display:'flex',gap:6,alignItems:'center'}},
              e(Badge,{color:m.agent==='self_awareness'?GREEN:m.agent==='dashboard_agent'?GOLD:m.agent==='disaster_monitor'?RED:CYAN},m.agent.replace(/_/g,' ')),
              m.opportunity_title?e('span',{style:{fontSize:11,color:TEXT_D}},m.opportunity_title):null
            ),
            e('span',{style:{fontSize:10,color:TEXT_D}},relTime(m.when||m.created_at))
          ),
          e('div',{style:{fontSize:12,color:TEXT_D,marginTop:4,whiteSpace:'pre-wrap',maxHeight:isExp?'none':'40px',overflow:'hidden'}},
            isExp?(m.summary||m.observation||''):(m.summary||m.observation||'').substring(0,200)+'...'
          )
        );
      })
    ):null,

    // === TWO COLUMN: SCRAPER STATUS + QUICK START ===
    e('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=768?'1fr':'1fr 1fr',gap:12,marginBottom:12}},

      // Scraper Status (spec item 8 — enhanced with per-source cards)
      e(Card,null,
        e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'SCRAPER STATUS'),
        scSources.active?scSources.active.map(function(src){
          var key=src.replace(/[^a-z]/gi,'').toLowerCase();
          var runs=0;
          Object.keys(sourceMap).forEach(function(k){runs+=sourceMap[k].runs});
          return e('div',{key:src,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
            e('div',{style:{display:'flex',alignItems:'center',gap:6}},
              e('span',{style:{width:8,height:8,borderRadius:'50%',background:GREEN,display:'inline-block'}}),
              e('span',null,src.replace(/\(.*\)/,'').trim())
            ),
            e(Badge,{color:GREEN},'ACTIVE')
          );
        }):null,
        scSources.disabled?scSources.disabled.map(function(src){
          return e('div',{key:src,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',fontSize:12}},
            e('div',{style:{display:'flex',alignItems:'center',gap:6}},
              e('span',{style:{width:8,height:8,borderRadius:'50%',background:RED,display:'inline-block'}}),
              e('span',{style:{color:TEXT_D}},src.replace(/\(.*\)/,'').trim())
            ),
            e(Badge,{color:RED},'DISABLED')
          );
        }):null,
        // Hunt run summary
        e('div',{style:{marginTop:8,fontSize:11,color:TEXT_D,borderTop:'1px solid '+BORDER,paddingTop:6}},
          recentHunts.length>0?('Last hunt: '+relTime(recentHunts[0].run_at)+' · '+recentHunts.length+' runs in buffer'):
          'No recent hunt data'
        )
      ),

      // Quick Start (spec: 4 shortcuts)
      e(Card,null,
        e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'QUICK START'),
        [{icon:'⚡',label:'New RFP landed',mod:'intake'},{icon:'◎',label:'Check pipeline',mod:'tracker'},
         {icon:'✦',label:'Draft proposal',mod:'proposal'},{icon:'◇',label:'Weekly digest',mod:'digest'}].map(function(q){
          return e('div',{key:q.label,onClick:function(){p.nav(q.mod)},style:{
            display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderRadius:4,border:'1px solid '+BORDER,marginBottom:6,cursor:'pointer',background:BG3
          }},
            e('span',null,e('span',{style:{marginRight:8}},q.icon),q.label),
            e('span',{style:{color:GOLD,fontSize:12}},'→')
          );
        })
      )
    ),

    // === WIN PATH (spec: 9 steps) ===
    e(Card,{style:{marginBottom:12}},
      e('div',{style:{fontSize:11,fontWeight:'bold',letterSpacing:2,color:GOLD,marginBottom:8}},'WIN PATH'),
      e('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
        ['Discover','Score','Research','Workflow','Proposal','Red Team','Export','Submit','WIN'].map(function(step,i){
          return e('span',{key:step,style:{padding:'4px 10px',borderRadius:4,border:'1px solid '+(i===8?GREEN:BORDER),fontSize:11,color:i===8?GREEN:TEXT_D,background:i===8?'rgba(39,174,96,0.1)':BG3}},
            (i<8?(i+1)+'. ':'')+step
          );
        })
      ),
      e('div',{style:{fontSize:11,color:TEXT_D,marginTop:6}},'Each opportunity moves through this path. The organism tracks progress and tells you what\'s next.')
    ),

    // === COST STATUS (spec V2 addition) ===
    cycleHist&&cycleHist.cycles&&cycleHist.cycles.length>0?e('div',{style:{fontSize:11,color:TEXT_D,textAlign:'right',marginTop:4}},
      'Last full cycle: '+relTime(cycleHist.cycles[0].timestamp)+
      (cycleHist.cycles[0].agents_fired?' · '+cycleHist.cycles[0].agents_fired+' agents fired':'')
    ):null
  );
}

// PIPELINE TRACKER
// ============================================================
// Styled Modal overlay (reusable, not browser confirm/prompt)
function PTModal(pp){
  if(!pp.show)return null;
  return e('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16},onClick:function(ev){if(ev.target===ev.currentTarget&&pp.onClose)pp.onClose()}},
    e('div',{style:{background:BG2,border:'1px solid '+BORDER,borderRadius:8,padding:24,maxWidth:pp.wide?700:480,width:'100%',maxHeight:'85vh',overflowY:'auto'}},pp.children)
  );
}

function PipelineTracker(p){
  var pl=p.pl;
  var st1=useState('all'),stageFilter=st1[0],setStageFilter=st1[1];
  var stF1=useState(''),searchText=stF1[0],setSearchText=stF1[1];
  var stF2=useState('all'),vertFilter=stF2[0],setVertFilter=stF2[1];
  var stF3=useState('all'),opiFilter=stF3[0],setOpiFilter=stF3[1];
  var st2=useState(null),expanded=st2[0],setExpanded=st2[1];
  var st3=useState(false),showAdd=st3[0],setShowAdd=st3[1];
  var st6=useState(null),detailOpp=st6[0],setDetailOpp=st6[1];
  var st7=useState(null),captureStrategy=st7[0],setCaptureStrategy=st7[1];
  var st8=useState(false),csLoading=st8[0],setCsLoading=st8[1];
  var st9=useState({title:'',agency:'',type:'',value:'',deadline:'',notes:'',stage:'identified',opi:50}),addForm=st9[0],setAddForm=st9[1];

  // Modal states
  var stM1=useState(null),stageModal=stM1[0],setStageModal=stM1[1]; // {opp,stage}
  var stM2=useState(null),outcomeModal=stM2[0],setOutcomeModal=stM2[1]; // {opp,outcome}
  var stM3=useState({winner:'',theirPrice:'',ourPrice:'',notes:''}),lossFields=stM3[0],setLossFields=stM3[1];
  var stM4=useState(null),editModal=stM4[0],setEditModal=stM4[1]; // opp being edited
  var stM5=useState({title:'',agency:'',type:'',value:'',deadline:'',notes:'',stage:'',opi:''}),editForm=stM5[0],setEditForm=stM5[1];
  var stM6=useState(null),deleteModal=stM6[0],setDeleteModal=stM6[1]; // opp to delete
  var stM7=useState(null),lossAnalysisOpp=stM7[0],setLossAnalysisOpp=stM7[1]; // standalone loss analysis
  var stM8=useState({winner_name:'',winner_amount:'',our_bid_amount:'',notes:''}),laForm=stM8[0],setLaForm=stM8[1];
  var stM9=useState(false),laSubmitted=stM9[0],setLaSubmitted=stM9[1];
  var stM10=useState(null),toastMsg=stM10[0],setToastMsg=stM10[1];

  // Per-opp expand sub-tab + intel tab + memories
  var stE1=useState('overview'),expSubTab=stE1[0],setExpSubTab=stE1[1];
  var stE2=useState('winnability'),expIntelTab=stE2[0],setExpIntelTab=stE2[1];
  var stE3=useState({}),oppMemories=stE3[0],setOppMemories=stE3[1]; // keyed by opp id
  var stE4=useState({}),oppDetails=stE4[0],setOppDetails=stE4[1]; // keyed by opp id

  var pipeline=pl.pipeline||[];
  var stages=['all','identified','pursuing','proposal','submitted','won','lost'];
  var allVerticals=pipeline.reduce(function(a,o){var v=o.vertical||'Unknown';if(a.indexOf(v)===-1)a.push(v);return a},[]).sort();
  var filtered=pipeline.filter(function(o){
    if(stageFilter!=='all'&&o.stage!==stageFilter)return false;
    if(vertFilter!=='all'&&(o.vertical||'Unknown')!==vertFilter)return false;
    if(opiFilter==='high'&&(o.opi_score||0)<75)return false;
    if(opiFilter==='mid'&&((o.opi_score||0)<60||(o.opi_score||0)>=75))return false;
    if(opiFilter==='low'&&(o.opi_score||0)>=60)return false;
    if(searchText){var q=searchText.toLowerCase();if((o.title||'').toLowerCase().indexOf(q)===-1&&(o.agency||'').toLowerCase().indexOf(q)===-1)return false}
    return true;
  });

  function stageCounts(){
    var c={all:pipeline.length};
    stages.forEach(function(s){if(s!=='all')c[s]=pipeline.filter(function(o){return o.stage===s}).length});
    return c;
  }
  var counts=stageCounts();

  // Toast helper
  function showToast(msg){setToastMsg(msg);setTimeout(function(){setToastMsg(null)},5000)}

  // Load memories + detail when expanding
  function loadOppData(oppId){
    if(!oppMemories[oppId]){
      fetch('/api/opportunity-memories?id='+encodeURIComponent(oppId)).then(function(r){return r.json()}).then(function(d){
        var copy=Object.assign({},oppMemories);copy[oppId]=Array.isArray(d)?d:d.memories||[];setOppMemories(copy);
      }).catch(function(){});
    }
    if(!oppDetails[oppId]){
      fetch('/api/opportunity-detail?id='+encodeURIComponent(oppId)).then(function(r){return r.json()}).then(function(d){
        var copy=Object.assign({},oppDetails);copy[oppId]=d;setOppDetails(copy);
      }).catch(function(){});
    }
  }

  function winPathStep(o){
    if(o.stage==='won')return 8;if(o.stage==='submitted')return 7;
    if(o.proposal_complete===true)return 5;if(o.has_financial||o.financial_analysis)return 4;
    if(o.has_intel||o.research_brief)return 3;if(o.has_scope||o.scope_analysis)return 2;return 1;
  }

  function WinPathBar(pp){
    var o=pp.opp,step=winPathStep(o);
    var steps=['Discovered','Scored','Researched','Financial','Proposal','Red Team','Export','Submitted','WON'];
    return e('div',{style:{display:'flex',gap:2,margin:'4px 0'}},
      steps.map(function(s,i){var active=i<step;return e('div',{key:s,title:s,style:{flex:1,height:4,borderRadius:2,background:active?GREEN:BORDER}})})
    );
  }

  // IntelPanel: 5 tabbed views
  function IntelPanel(pp){
    var o=pp.opp,det=oppDetails[o.id]||o;
    var tabs=[
      {id:'winnability',label:'Winnability',field:'capture_action'},
      {id:'competitive',label:'Competitive Intel',field:'research_brief'},
      {id:'financial',label:'Financial',field:'financial_analysis'},
      {id:'proposal',label:'Proposal Draft',field:'staffing_plan'},
      {id:'scope',label:'Scope Analysis',field:'scope_analysis'}
    ];
    var availTabs=tabs.filter(function(t){var v=det[t.field];return v&&v.length>50});
    if(availTabs.length===0)return e('div',{style:{fontSize:11,color:TEXT_D,padding:8}},'No intel data available yet. Run analysis to populate.');
    var activeTab=availTabs.find(function(t){return t.id===expIntelTab})||availTabs[0];
    return e('div',null,
      e('div',{style:{display:'flex',gap:0,borderBottom:'1px solid '+BORDER,marginBottom:8}},
        availTabs.map(function(t){return e('div',{key:t.id,onClick:function(){setExpIntelTab(t.id)},style:{
          padding:'6px 12px',cursor:'pointer',fontSize:10,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',
          color:activeTab.id===t.id?GOLD:TEXT_D,borderBottom:activeTab.id===t.id?'2px solid '+GOLD:'2px solid transparent'
        }},t.label)})
      ),
      e('div',{style:{fontSize:12,whiteSpace:'pre-wrap',maxHeight:500,overflowY:'auto',background:BG3,borderRadius:4,padding:12,fontFamily:'monospace',lineHeight:1.5}},
        (det[activeTab.field]||'')
      )
    );
  }

  // Stage change via styled modal
  function confirmStageChange(){
    if(!stageModal)return;
    fetch('/api/update-stage',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:stageModal.opp.id,stage:stageModal.stage})
    }).then(function(){pl.refresh();setStageModal(null);showToast('Stage updated to '+stageModal.stage.toUpperCase())});
  }

  // Outcome via styled modal
  function confirmOutcome(){
    if(!outcomeModal)return;
    var notes='';
    if(outcomeModal.outcome==='lost'){
      notes='Winner: '+(lossFields.winner||'Unknown')+', Their price: '+(lossFields.theirPrice||'N/A')+', Our price: '+(lossFields.ourPrice||'N/A')+', Notes: '+(lossFields.notes||'');
    }
    fetch('/api/record-outcome',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:outcomeModal.opp.id,outcome:outcomeModal.outcome,notes:notes})
    }).then(function(){
      pl.refresh();setOutcomeModal(null);setLossFields({winner:'',theirPrice:'',ourPrice:'',notes:''});
      showToast('🧠 All 10 learning agents are recalibrating now. Outcome recorded as '+outcomeModal.outcome.toUpperCase()+'.');
    });
  }

  // Get capture strategy + writeback
  function getCapture(opp){
    setCsLoading(true);setCaptureStrategy(null);
    callClaude('Generate a capture strategy for: '+opp.title+' ('+opp.agency+', '+(opp.vertical||'')+', value: '+(opp.estimated_value||'Unknown')+', deadline: '+(opp.deadline||'Unknown')+'). Include: 3 immediate capture actions, intel gaps to fill, teaming partners, Pwin estimate, and recommended next steps.'
    ).then(function(r){
      setCaptureStrategy(r);setCsLoading(false);
      // Write back to opportunity
      fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:opp.id,capture_strategy:r})
      }).catch(function(){});
    });
  }

  function exportBrief(opp){window.open('/api/export-opportunity?id='+encodeURIComponent(opp.id))}

  function handleAdd(){
    fetch('/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(addForm)
    }).then(function(){setShowAdd(false);setAddForm({title:'',agency:'',type:'',value:'',deadline:'',notes:'',stage:'identified',opi:50});pl.refresh()});
  }

  // Edit opportunity
  function openEdit(opp){
    setEditForm({title:opp.title||'',agency:opp.agency||'',type:opp.type||opp.vertical||'',value:opp.estimated_value||'',deadline:opp.deadline||'',notes:opp.description||'',stage:opp.stage||'identified',opi:opp.opi_score||50});
    setEditModal(opp);
  }
  function saveEdit(){
    if(!editModal)return;
    fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:editModal.id,title:editForm.title,agency:editForm.agency,vertical:editForm.type,estimated_value:editForm.value,due_date:editForm.deadline,description:editForm.notes,stage:editForm.stage,opi_score:parseInt(editForm.opi)||50})
    }).then(function(){pl.refresh();setEditModal(null);showToast('Opportunity updated.')}).catch(function(){showToast('Update failed — check API.')});
  }

  // Delete opportunity (archive)
  function confirmDelete(){
    if(!deleteModal)return;
    fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:deleteModal.id,status:'archived'})
    }).then(function(){pl.refresh();setDeleteModal(null);setExpanded(null);showToast('Opportunity archived.')});
  }

  // Clean test data
  function cleanTestData(){
    var testItems=pipeline.filter(function(o){return !o.title||o.title.toLowerCase().indexOf('test')>=0||o.title.toLowerCase().indexOf('untitled')>=0||o.title.trim()===''});
    if(testItems.length===0){showToast('No test data found.');return}
    Promise.all(testItems.map(function(o){
      return fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:o.id,status:'archived'})});
    })).then(function(){pl.refresh();showToast(testItems.length+' test items archived.')});
  }

  // Submit standalone loss analysis
  function submitLossAnalysis(){
    if(!lossAnalysisOpp)return;
    fetch('/api/loss-analysis',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({opportunity_id:lossAnalysisOpp.id,winner_name:laForm.winner_name,winner_amount:laForm.winner_amount,our_bid_amount:laForm.our_bid_amount,notes:laForm.notes,date:new Date().toISOString()})
    }).then(function(){setLaSubmitted(true);showToast('Loss analysis submitted. Learning agents processing.')});
  }

  // Save field on blur (post-submission tracking)
  function saveFieldOnBlur(opp,field,value){
    var body={id:opp.id};body[field]=value;
    fetch('/api/update-opportunity',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    }).catch(function(){});
  }

  // If viewing detail
  if(detailOpp){return e(OpportunityDetail,{opp:detailOpp,onBack:function(){setDetailOpp(null)},pl:pl,nav:p.nav})}

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},

    // Toast notification
    toastMsg?e('div',{style:{position:'fixed',bottom:24,right:24,background:GREEN+'22',border:'1px solid '+GREEN,color:GREEN,padding:'12px 20px',borderRadius:8,fontSize:13,fontWeight:'bold',zIndex:10000,maxWidth:400}},toastMsg):null,

    // ===== MODALS =====
    // Stage change confirmation modal
    e(PTModal,{show:!!stageModal,onClose:function(){setStageModal(null)}},
      stageModal?[
        e('h3',{key:'h',style:{color:GOLD,margin:'0 0 12px 0'}},'Confirm Stage Change'),
        e('div',{key:'b',style:{fontSize:13,marginBottom:16}},'Change ',e('strong',null,stageModal.opp.title),' to ',e(Badge,{color:stageColor(stageModal.stage)},stageModal.stage),'?'),
        e('div',{key:'a',style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          e(Btn,{onClick:function(){setStageModal(null)},variant:'ghost'},'Cancel'),
          e(Btn,{onClick:confirmStageChange},'Confirm')
        )
      ]:null

              e('div',{style:{marginTop:12}},e(Btn,{onClick:function(){if(!confirm('Run full proposal pipeline?\n\n~$5-10 cost, ~10 min runtime.\nRe-runs all 19 stages including Opus calls.\n\nProceed?'))return;fetch('/api/produce-proposal?id='+encodeURIComponent(o.id),{method:'POST'}).then(function(){showToast('Proposal pipeline started — ~10 min.')})}},'RUN PROPOSAL'))
            )
          ):null,

          // ---- ACTIVITY sub-tab (per-opp agent memories) ----
          expSubTab==='activity'?e('div',null,
            mems.length>0?e('div',null,
              e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:8}},mems.length+' memories from '+(new Set(mems.map(function(m){return (m.agent_name||m.agent)}))).size+' agents'),
              (function(){
                var grouped={};
                mems.forEach(function(m){var n=(m.agent_name||m.agent)||'unknown';if(!grouped[n])grouped[n]=[];grouped[n].push(m)});
                return Object.keys(grouped).map(function(agent){
                  return e(Card,{key:agent,style:{marginBottom:8}},
                    e('div',{style:{fontSize:11,color:CYAN,fontWeight:'bold',marginBottom:6}},agent.replace(/_/g,' ').toUpperCase()+' ('+grouped[agent].length+')'),
                    grouped[agent].map(function(m,i){
                      return e('div',{key:i,style:{fontSize:12,padding:'4px 0',borderBottom:'1px solid '+BORDER,whiteSpace:'pre-wrap'}},
                        e('div',{style:{fontSize:10,color:TEXT_D,marginBottom:2}},m.created_at?new Date(m.created_at).toLocaleString():''),
                        m.observation||''
                      );
                    })
                  );
                });
              })()
            ):e('div',{style:{color:TEXT_D,textAlign:'center',padding:20}},'No activity recorded for this opportunity yet.')
          ):null,

          // Outcome recording bar (always visible at bottom of expanded)
          e('div',{style:{display:'flex',gap:8,marginTop:16,paddingTop:12,borderTop:'1px solid '+BORDER,alignItems:'center'}},
            e('span',{style:{fontSize:10,color:TEXT_D,fontWeight:'bold',letterSpacing:1,marginRight:8}},'RECORD OUTCOME:'),
            e(Btn,{onClick:function(){setOutcomeModal({opp:o,outcome:'won'})},variant:'primary',small:true},'🏆 WON'),
            e(Btn,{onClick:function(){setOutcomeModal({opp:o,outcome:'lost'})},variant:'danger',small:true},'LOST'),
            e(Btn,{onClick:function(){setOutcomeModal({opp:o,outcome:'no_bid'})},variant:'ghost',small:true},'NO-BID'),
            e(Btn,{onClick:function(){setOutcomeModal({opp:o,outcome:'cancelled'})},variant:'ghost',small:true},'CANCELLED'),
            o.outcome?e('span',{style:{fontSize:11,color:o.outcome==='won'?GREEN:o.outcome==='lost'?RED:GOLD,marginLeft:8,fontWeight:'bold'}},'Recorded: '+o.outcome.toUpperCase()+(o.outcome_notes?' — '+o.outcome_notes:'')):null
          )
        ):null
      );
    })
  );
}

// ============================================================
// OPPORTUNITY DETAIL — Step-by-step status board
// ============================================================
function OpportunityDetail(p){
  var opp=p.opp;
  var st1=useState('overview'),subTab=st1[0],setSubTab=st1[1];
  var st2=useState(null),memories=st2[0],setMemories=st2[1];
  var st3=useState(null),fullOpp=st3[0],setFullOpp=st3[1];
  var st4b=useState(-1),expandedStep=st4b[0],setExpandedStep=st4b[1];
  var stDM1=useState(null),detOutcomeModal=stDM1[0],setDetOutcomeModal=stDM1[1];
  var stDM2=useState({winner:'',theirPrice:'',ourPrice:'',notes:''}),detLossFields=stDM2[0],setDetLossFields=stDM2[1];
  var stDM3=useState(null),detStageModal=stDM3[0],setDetStageModal=stDM3[1];
  var stDM4=useState(null),detToast=stDM4[0],setDetToast=stDM4[1];
  var stD1=useState([]),discriminators=stD1[0],setDiscriminators=stD1[1];
  var stD2=useState(false),discGenerating=stD2[0],setDiscGenerating=stD2[1];
  var stR1=useState(null),refinementHistory=stR1[0],setRefinementHistory=stR1[1];
  var stPR1=useState(null),pursuitResearch=stPR1[0],setPursuitResearch=stPR1[1];
  var stPR2=useState(false),prGenerating=stPR2[0],setPrGenerating=stPR2[1];
  var stPR3=useState(null),prPollTimer=stPR3[0],setPrPollTimer=stPR3[1];
  function detShowToast(m){setDetToast(m);setTimeout(function(){setDetToast(null)},5000)}

  useEffect(function(){
    fetch('/api/opportunity-detail?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(setFullOpp).catch(function(){});
    fetch('/api/opportunity-memories?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(function(d){setMemories(Array.isArray(d)?d:d.memories||[])}).catch(function(){});
    fetch('/api/discriminators?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(function(d){setDiscriminators((d&&d.discriminators)||[])}).catch(function(){});
    fetch('/api/refinement-history?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(setRefinementHistory).catch(function(){});
    fetch('/api/pursuit-research?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(setPursuitResearch).catch(function(){});
  },[opp.id]);

  function generateDiscriminators(){
    setDiscGenerating(true);
    fetch('/api/discriminators-generate?id='+encodeURIComponent(opp.id),{method:'POST'}).then(function(r){return r.json()}).then(function(d){
      setDiscGenerating(false);
      fetch('/api/discriminators?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(function(dd){setDiscriminators((dd&&dd.discriminators)||[])});
      detShowToast('Generated '+((d&&d.result&&d.result.written)||0)+' discriminators');
    }).catch(function(){setDiscGenerating(false);detShowToast('Discriminator generation failed')});
  }

  function refreshPursuitResearch(){
    return fetch('/api/pursuit-research?id='+encodeURIComponent(opp.id)).then(function(r){return r.json()}).then(function(d){setPursuitResearch(d);return d;});
  }

  function generatePursuitResearch(){
    if(prGenerating) return;
    setPrGenerating(true);
    detShowToast('Pursuit research started (~8-12 min). Polling for results...');
    fetch('/api/pursuit-research?id='+encodeURIComponent(opp.id),{method:'POST'}).then(function(r){return r.json()}).then(function(d){
      if(d && d.started){
        // Poll every 20s for up to 15 min
        var polls=0;
        var timer=setInterval(function(){
          polls++;
          refreshPursuitResearch().then(function(dd){
            var status = dd && dd.latest_run && dd.latest_run.status;
            if(status && status !== 'running'){
              clearInterval(timer);
              setPrGenerating(false);
              var fc = (dd.latest_run && dd.latest_run.findings_count) || 0;
              var cost = (dd.latest_run && dd.latest_run.cost_usd) || 0;
              detShowToast('Pursuit research '+status+': '+fc+' findings, $'+cost);
            } else if(polls >= 45){
              clearInterval(timer);
              setPrGenerating(false);
              detShowToast('Pursuit research still running after 15 min — check back later');
            }
          });
        }, 20000);
        setPrPollTimer(timer);
      } else {
        setPrGenerating(false);
        detShowToast('Failed to start pursuit research: '+((d&&d.error)||'unknown'));
      }
    }).catch(function(){setPrGenerating(false);detShowToast('Pursuit research start failed')});
  }

  var o=fullOpp||opp;
  var sc=o.opi_score||0;

  var discStepData = null;
  if (discriminators && discriminators.length > 0) {
    discStepData = discriminators.map(function(d){
      return d.discriminator_num+'. '+d.title+'\n'+
        '   Claim: '+d.claim+'\n'+
        '   Evidence: '+d.evidence_anchor_type+(d.evidence_anchor_id?' ('+d.evidence_anchor_id+')':'')+
        (d.evidence_quote?'\n   Quote: "'+d.evidence_quote+'"':'')+
        (d.competitor_gap?'\n   Gap: '+d.competitor_gap:'');
    }).join('\n\n');
  }

  var refStepData = null;
  var refStepDone = false;
  if (refinementHistory) {
    var iters = refinementHistory.iterations || [];
    if (iters.length > 0) {
      refStepDone = true;
      refStepData = 'Refinement trajectory ('+iters.length+' iteration'+(iters.length>1?'s':'')+'):\n\n'+
        iters.map(function(it){
          return 'Iteration '+it.iteration+': PWIN '+it.pwin_before+'% → '+it.pwin_after+'% ('+
            (it.delta>=0?'+':'')+it.delta+')';
        }).join('\n')+
        (refinementHistory.summary?'\n\n'+refinementHistory.summary.text:'');
    } else if (refinementHistory.summary && refinementHistory.summary.skipped) {
      refStepDone = true;
      refStepData = refinementHistory.summary.text;
    }
  }

  var prStepData = null;
  var prStepDone = false;
  var prLatestRun = pursuitResearch && pursuitResearch.latest_run;
  var prFindings = (pursuitResearch && pursuitResearch.findings) || [];
  if(prLatestRun && prLatestRun.status && prLatestRun.status !== 'running' && prFindings.length > 0){
    prStepDone = true;
    var cd = prLatestRun.confidence_distribution || {};
    var header = 'Layer B pursuit research — '+prLatestRun.status+'\n'+
      'Plan items: '+(prLatestRun.plan_item_count||'?')+' | Findings: '+prFindings.length+
      ' (H:'+(cd.high||0)+' M:'+(cd.medium||0)+' L:'+(cd.low||0)+')\n'+
      'Cost: $'+(prLatestRun.cost_usd||0)+' | Wall time: '+(prLatestRun.wall_time_seconds||'?')+'s\n\n';
    var findingsText = prFindings.slice(0,25).map(function(f){
      return '['+String(f.category||'other').toUpperCase()+' | '+(f.confidence||'medium')+'] '+
        String(f.finding||'').slice(0,500)+
        (f.source_url?'\n   Source: '+(f.source_title?f.source_title+' — ':'')+f.source_url:'');
    }).join('\n\n');
    prStepData = header + findingsText;
    var gaps = (prLatestRun.gaps && prLatestRun.gaps.clarifying_questions) || [];
    if(gaps.length > 0){
      prStepData += '\n\n=== CLARIFYING QUESTIONS ('+gaps.length+') ===\n' + gaps.map(function(g){
        return (g.item_num?'Q'+g.item_num+': ':'')+g.clarifying_question;
      }).join('\n\n');
    }
  } else if(prLatestRun && prLatestRun.status === 'running'){
    prStepData = 'Pursuit research in progress (started '+(prLatestRun.created_at||'?')+')...';
  }

  var steps=[
    {name:'INTAKE',done:true,data:o.source_url||o.created_at||'Discovered'},
    {name:'SCOPE ANALYSIS',done:!!(o.scope_analysis||o.has_scope),data:o.scope_analysis},
    {name:'FINANCIAL ANALYSIS',done:!!(o.financial_analysis||o.has_financial),data:o.financial_analysis},
    {name:'COMPETITIVE RESEARCH',done:!!(o.research_brief||o.has_intel),data:o.research_brief},
    {name:'PURSUIT RESEARCH',done:prStepDone,data:prStepData,action:{label:prGenerating?'Running...':(prStepDone?'Refresh':'Generate'),fn:generatePursuitResearch,disabled:prGenerating}},
    {name:'DISCRIMINATORS',done:discriminators&&discriminators.length>0,data:discStepData,action:{label:discGenerating?'Generating...':'Generate',fn:generateDiscriminators,disabled:discGenerating}},
    {name:'WINNABILITY',done:!!(o.capture_action||o.winnability_score),data:o.capture_action},
    {name:'PROPOSAL',done:o.proposal_complete===true,data:o.proposal_content},
    {name:'REFINEMENT',done:refStepDone,data:refStepData},
    {name:'RED TEAM',done:false,data:null}
  ];

  // Check red team from memories
  if(memories){
    var rtMems=memories.filter(function(m){return (m.agent_name||m.agent)==='red_team_agent'||(m.agent_name||m.agent)==='agentRedTeam'});
    if(rtMems.length>0){steps[9].done=true;steps[9].data=rtMems.map(function(m){return m.observation}).join('\n\n');}
  }

  var subTabs=['overview','intel','proposal','activity'];

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    // Back button
    e('div',{onClick:p.onBack,style:{cursor:'pointer',color:CYAN,fontSize:12,marginBottom:16}},'← Back to Pipeline'),

    // Hero
    e(Card,{style:{borderLeft:'4px solid '+(sc>=90?GREEN:sc>=75?CYAN:sc>=60?GOLD:RED)}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        e('div',null,
          e('div',{style:{fontSize:36,fontWeight:'bold',color:sc>=90?GREEN:sc>=75?CYAN:GOLD}},sc),
          e('h2',{style:{margin:'4px 0',fontSize:18}},o.title),
          e('div',{style:{fontSize:12,color:TEXT_D}},o.agency,' · ',o.vertical||'',o.due_date?' · Due '+o.due_date:'')
        ),
        e('div',{style:{textAlign:'right'}},
          o.stage?e(Badge,{color:stageColor(o.stage)},o.stage):null,
          o.estimated_value?e('div',{style:{fontSize:14,color:GOLD,marginTop:4}},o.estimated_value):null
        )
      )
    ),

    // Step-by-step pipeline
    e(Card,null,
      e(Label,{text:'PURSUIT PIPELINE'}),
      steps.map(function(step,i){
        
        var icon=step.done?'✓':'—';
        var clr=step.done?GREEN:TEXT_D;
        var charCount=step.data?step.data.length:0;

        return e('div',{key:step.name},
          e('div',{onClick:function(){if(step.data)setExpandedStep(expandedStep===i?-1:i)},style:{
            display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid '+BORDER,cursor:step.data?'pointer':'default'
          }},
            e('span',{style:{color:clr,fontWeight:'bold',width:20,textAlign:'center'}},icon),
            e('span',{style:{flex:1,fontSize:13,color:step.done?TEXT:TEXT_D}},step.name),
            charCount>0?e('span',{style:{fontSize:10,color:TEXT_D}},Math.round(charCount/1000)+'K chars'):null,
            step.action?e('span',{onClick:function(ev){ev.stopPropagation();if(!step.action.disabled)step.action.fn()},style:{fontSize:10,color:step.action.disabled?TEXT_D:GOLD,cursor:step.action.disabled?'default':'pointer',border:'1px solid '+(step.action.disabled?BORDER:GOLD),padding:'2px 8px',borderRadius:3,marginRight:4}},step.action.label):null,
            step.data?e('span',{style:{color:CYAN,fontSize:10}},expandedStep===i?'▼':'▶'):null
          ),
          expandedStep===i&&step.data?e('div',{style:{padding:'8px 32px',fontSize:12,whiteSpace:'pre-wrap',color:TEXT_D,maxHeight:300,overflowY:'auto',background:BG3,borderRadius:4,margin:'4px 0'}},
            typeof step.data==='string'?step.data:JSON.stringify(step.data,null,2)
          ):null
        );
      })
    ),

    // Completeness indicators
    e('div',{style:{display:'flex',gap:16,margin:'12px 0'}},
      [{k:'has_scope',l:'SCOPE'},{k:'has_intel',l:'INTEL'},{k:'has_financial',l:'FIN'},{k:'has_staffing',l:'STAFF'},{k:'has_proposal',l:'PROP'}].map(function(f){
        var has=o[f.k];
        return e('span',{key:f.k,style:{fontSize:11,color:has?GREEN:TEXT_D,fontWeight:'bold'}},
          (has?'✓':'—')+' '+f.l
        );
      })
    ),

    // Sub-tabs
    e('div',{style:{display:'flex',gap:0,borderBottom:'1px solid '+BORDER,marginBottom:12}},
      subTabs.map(function(t){
        return e('div',{key:t,onClick:function(){setSubTab(t)},style:{
          padding:'8px 16px',cursor:'pointer',fontSize:12,fontWeight:'bold',letterSpacing:1,textTransform:'uppercase',
          color:subTab===t?CYAN:TEXT_D,borderBottom:subTab===t?'2px solid '+CYAN:'2px solid transparent'
        }},t);
      })
    ),

    // Sub-tab content
    subTab==='overview'?e('div',null,
      o.scope_analysis?e(Card,null,e(Label,{text:'SCOPE ANALYSIS'}),e('div',{style:{fontSize:12,whiteSpace:'pre-wrap',maxHeight:400,overflowY:'auto'}},o.scope_analysis)):null,
      o.description?e(Card,null,e(Label,{text:'EXECUTIVE SUMMARY'}),e('div',{style:{fontSize:12,whiteSpace:'pre-wrap',maxHeight:400,overflowY:'auto'}},o.description)):null,
      e(Card,null,
        e(Label,{text:'ACTIONS'}),
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          e(Btn,{onClick:function(){if(!confirm('Run full proposal pipeline?\n\n~$5-10 cost, ~10 min runtime.\nRe-runs all 19 stages including Opus calls.\n\nProceed?'))return;fetch('/api/produce-proposal?id='+encodeURIComponent(o.id),{method:'POST'}).then(function(){detShowToast('Proposal pipeline started — ~10 min.')})},variant:'primary'},'RUN PROPOSAL'),
          e(Btn,{onClick:function(){fetch('/api/compliance-check?id='+encodeURIComponent(o.id),{method:'POST'}).then(function(r){return r.json()}).then(function(d){detShowToast(d.compliance_summary||d.result||'Compliance check complete')}).catch(function(){detShowToast('Compliance check failed')})},variant:'ghost'},'COMPLIANCE CHECK'),
          o.source_url?e(Btn,{onClick:function(){window.open(o.source_url)},variant:'ghost'},'SOURCE'):null,
          e(Btn,{onClick:function(){if(o.proposal_doc_url){window.open(o.proposal_doc_url)}else{fetch('/api/regenerate-doc?id='+encodeURIComponent(o.id),{method:'POST'});detShowToast('No doc yet — generating (~35s). Click again shortly.')}},variant:'ghost'},o.proposal_doc_url?'DOWNLOAD DOC':'GENERATE DOC')
        )
      )
    ):

    subTab==='intel'?e('div',null,
      memories?['intelligence_engine','crm_agent','winnability_agent','financial_agent','price_to_win'].map(function(agent){
        var agentMems=memories.filter(function(m){return (m.agent_name||m.agent)===agent});
        if(!agentMems.length)return null;
        return e(Card,{key:agent},
          e(Label,{text:agent.replace(/_/g,' ').toUpperCase()}),
          agentMems.map(function(m,i){
            return e('div',{key:i,style:{fontSize:12,padding:'6px 0',borderBottom:'1px solid '+BORDER,whiteSpace:'pre-wrap'}},m.observation||'');
          })
        );
      }):e('div',{style:{color:TEXT_D}},'Loading intel...')
    ):

    subTab==='proposal'?e('div',null,
      o.proposal_content?e(Card,null,
        e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          e(Label,{text:'PROPOSAL'}),
          e('div',{style:{display:'flex',gap:8}},
            e(Btn,{onClick:function(){if(o.proposal_doc_url){window.open(o.proposal_doc_url)}else{fetch('/api/regenerate-doc?id='+encodeURIComponent(o.id),{method:'POST'});detShowToast('No doc yet — generating (~35s). Click DOWNLOAD again shortly.')}},small:true,variant:'primary'},o.proposal_doc_url?'DOWNLOAD DOC':'GENERATE DOC'),
            e(Btn,{onClick:function(){fetch('/api/regenerate-doc?id='+encodeURIComponent(o.id),{method:'POST'});detShowToast('Doc regen started (~35s, ~$0).')},small:true,variant:'ghost'},'REGEN DOC'),
            e(Btn,{onClick:function(){if(!confirm('Run full proposal pipeline?\n\n~$5-10 cost, ~10 min runtime.\nRe-runs all 19 stages including Opus calls.\n\nProceed?'))return;fetch('/api/produce-proposal?id='+encodeURIComponent(o.id),{method:'POST'}).then(function(){detShowToast('Proposal pipeline started — ~10 min.')})},small:true,variant:'ghost'},'RUN PROPOSAL')
          )
        ),
        // S150: doc metadata caption
        (function(){
          if(!o.proposal_doc_url&&!o.proposal_doc_generated_at)return null;
          var parts=[];
          if(o.proposal_doc_generated_at){
            var ts=new Date(o.proposal_doc_generated_at);
            var ago=Math.round((Date.now()-ts.getTime())/60000);
            var agoStr=ago<60?(ago+'m ago'):(ago<1440?(Math.round(ago/60)+'h ago'):(Math.round(ago/1440)+'d ago'));
            parts.push('Doc updated '+agoStr);
          }
          if(o.proposal_doc_size_bytes)parts.push(Math.round(o.proposal_doc_size_bytes/1024)+'KB');
          if(o.proposal_content)parts.push(Math.round(o.proposal_content.length/1000)+'K chars');
          return e('div',{style:{fontSize:10,color:TEXT_D,marginBottom:8,fontFamily:'monospace'}},parts.join(' • '));
        })(),
        e('div',{style:{fontSize:12,whiteSpace:'pre-wrap',maxHeight:800,overflowY:'auto',lineHeight:1.6}},o.proposal_content)
      ):e(Card,null,e('div',{style:{color:TEXT_D,textAlign:'center',padding:20}},'No proposal generated yet.'),
        e('div',{style:{textAlign:'center'}},e(Btn,{onClick:function(){if(!confirm('Run full proposal pipeline?\n\n~$5-10 cost, ~10 min runtime.\nRe-runs all 19 stages including Opus calls.\n\nProceed?'))return;fetch('/api/produce-proposal?id='+encodeURIComponent(o.id),{method:'POST'}).then(function(){detShowToast('Proposal pipeline started — ~10 min.')})}},'RUN PROPOSAL'))
      )
    ):

    subTab==='activity'?e('div',null,
      memories&&memories.length>0?e('div',null,
        e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:8}},memories.length+' memories from '+(new Set(memories.map(function(m){return (m.agent_name||m.agent)}))).size+' agents'),
        memories.map(function(m,i){
          return e(Card,{key:i},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
              e('span',{style:{fontSize:11,color:CYAN,fontWeight:'bold'}},(m.agent_name||m.agent)||'unknown'),
              m.created_at?e('span',{style:{fontSize:10,color:TEXT_D}},new Date(m.created_at).toLocaleString()):null
            ),
            e('div',{style:{fontSize:12,whiteSpace:'pre-wrap'}},m.observation||'')
          );
        })
      ):e('div',{style:{color:TEXT_D}},'No activity recorded yet.')
    ):null,

    // Outcome bar
    detToast?e('div',{style:{position:'fixed',bottom:24,right:24,background:GREEN+'22',border:'1px solid '+GREEN,color:GREEN,padding:'12px 20px',borderRadius:8,fontSize:13,fontWeight:'bold',zIndex:10000,maxWidth:400}},detToast):null,

    // Stage change modal
    e(PTModal,{show:!!detStageModal,onClose:function(){setDetStageModal(null)}},
      detStageModal?[
        e('h3',{key:'h',style:{color:GOLD,margin:'0 0 12px 0'}},'Confirm Stage Change'),
        e('div',{key:'b',style:{fontSize:13,marginBottom:16}},'Change ',e('strong',null,o.title),' to ',e(Badge,{color:stageColor(detStageModal)},detStageModal),'?'),
        e('div',{key:'a',style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          e(Btn,{onClick:function(){setDetStageModal(null)},variant:'ghost'},'Cancel'),
          e(Btn,{onClick:function(){fetch('/api/update-stage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:o.id,stage:detStageModal})}).then(function(){p.pl.refresh();setDetStageModal(null);detShowToast('Stage updated to '+detStageModal.toUpperCase())})}},'Confirm')
        )
      ]:null
    ),

    // Outcome modal
    e(PTModal,{show:!!detOutcomeModal,onClose:function(){setDetOutcomeModal(null)}},
      detOutcomeModal?[
        e('h3',{key:'h',style:{color:detOutcomeModal==='won'?GREEN:detOutcomeModal==='lost'?RED:GOLD,margin:'0 0 12px 0'}},'Record Outcome: '+detOutcomeModal.toUpperCase()),

// MANUAL INTAKE (replaces Full Workflow — simpler intake form)
// ============================================================
function ManualIntake(p){
  var pl=p.pl;
  var st1=useState(''),title=st1[0],setTitle=st1[1];
  var st2=useState(''),agency=st2[0],setAgency=st2[1];
  var st3=useState(''),incumbent=st3[0],setIncumbent=st3[1];
  var st4=useState(''),rfpUrl=st4[0],setRfpUrl=st4[1];
  var st5=useState(''),context=st5[0],setContext=st5[1];
  var st6=useState(''),rfpText=st6[0],setRfpText=st6[1];
  var st7=useState(null),file=st7[0],setFile=st7[1];
  var st8=useState(false),submitting=st8[0],setSubmitting=st8[1];
  var st9=useState(null),result=st9[0],setResult=st9[1];
  var st10=useState(false),extracting=st10[0],setExtracting=st10[1];
  var st11=useState(null),extractResult=st11[0],setExtractResult=st11[1];
  var fileRef=useRef(null);

  function handleFile(ev){
    var f=ev.target.files[0];
    if(!f)return;
    setFile(f);
    setExtracting(true);setExtractResult(null);
    // For text files, read as text directly
    if(f.name.match(/\.(txt|csv|md)$/i)){
      var reader=new FileReader();
      reader.onload=function(){
        var text=reader.result;
        setRfpText(text);setExtractResult('Loaded '+text.length+' characters from '+f.name);setExtracting(false);
        // Auto-extract title/agency from text
        callClaude('From this RFP text, extract: 1) The opportunity title 2) The issuing agency. Return as JSON: {"title":"...","agency":"..."}. If not found, return empty strings.\n\nRFP TEXT:\n'+text,
          'You are an RFP extraction assistant. Return ONLY valid JSON.',500
        ).then(function(r){
          try{var parsed=JSON.parse(r.replace(/```json?|```/g,'').trim());if(parsed.title&&!title)setTitle(parsed.title);if(parsed.agency&&!agency)setAgency(parsed.agency)}catch(e){}
        }).catch(function(){});
      };
      reader.readAsText(f);
    } else {
      // For PDF/DOCX, read as text (best effort) then prompt user to paste if unreadable
      var reader=new FileReader();
      reader.onload=function(){
        var text=reader.result;
        if(text&&text.length>100&&!/[\x00-\x08]/.test(text.substring(0,100))){
          setRfpText(text);setExtractResult('Loaded '+text.length+' characters from '+f.name);setExtracting(false);
        } else {
          setExtracting(false);setExtractResult('⚠ Binary file detected — please paste the RFP text manually below.');
        }
      };
      reader.onerror=function(){setExtracting(false);setExtractResult('⚠ Could not read file — paste text manually.')};
      reader.readAsText(f);
    }
  }

  function handleSubmit(){
    if(!title.trim()){setResult({error:'Title is required'});return}
    setSubmitting(true);setResult(null);
    fetch('/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        title:title,agency:agency,incumbent:incumbent,source_url:rfpUrl,
        context:context,rfp_text:rfpText,manual:true
      })
    }).then(function(r){return r.json()}).then(function(d){
      setResult(d);setSubmitting(false);
      setTitle('');setAgency('');setIncumbent('');setRfpUrl('');setContext('');setRfpText('');setFile(null);
      pl.refresh();
    }).catch(function(err){setResult({error:'Submission failed: '+err.message});setSubmitting(false)});
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:900}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Manual Intake'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:16}},'Submit a new opportunity. Paste RFP text or upload a document.'),

    // Pipeline selector
    pl.pipeline.length>0?e('div',{style:{marginBottom:16}},
      e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading,label:'EXISTING PIPELINE'})
    ):e(Card,{style:{background:ORANGE+'15',borderColor:ORANGE+'44'}},
      e('div',{style:{color:ORANGE,fontSize:12}},'No active opportunities. Submit your first RFP below.')
    ),

    // Form
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
      e('div',null,e(Label,{text:'OPPORTUNITY TITLE'}),e(Input,{value:title,onChange:function(ev){setTitle(ev.target.value)},placeholder:'e.g. FEMA PA TPA — Jefferson Parish'})),
      e('div',null,e(Label,{text:'AGENCY'}),e(Input,{value:agency,onChange:function(ev){setAgency(ev.target.value)},placeholder:'e.g. Jefferson Parish OEM'}))
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
      e('div',null,e(Label,{text:'KNOWN INCUMBENT'}),e(Input,{value:incumbent,onChange:function(ev){setIncumbent(ev.target.value)},placeholder:'e.g. ICF / None / Unknown'})),
      e('div',null,e(Label,{text:'RFP URL (optional)'}),e(Input,{value:rfpUrl,onChange:function(ev){setRfpUrl(ev.target.value)},placeholder:'https://...'}))
    ),
    e('div',{style:{marginBottom:12}},
      e(Label,{text:'RELATIONSHIP INTEL / CONTEXT'}),
      e(Textarea,{value:context,onChange:function(ev){setContext(ev.target.value)},placeholder:'Known relationships, budget intel, political context...',rows:3})
    ),
    e('div',{style:{marginBottom:12}},
      e(Label,{text:'RFP / SOLICITATION TEXT'}),
      e('div',{style:{marginBottom:8}},
        e(Btn,{onClick:function(){fileRef.current&&fileRef.current.click()},variant:'ghost',small:true},'📎 Upload PDF / Word / TXT'),
        e('input',{ref:fileRef,type:'file',accept:'.pdf,.docx,.doc,.txt',onChange:handleFile,style:{display:'none'}}),
        file?e('span',{style:{marginLeft:8,fontSize:11,color:CYAN}},file.name):null,
        extracting?e('span',{style:{marginLeft:8,fontSize:11,color:GOLD,animation:'pulse 1.5s infinite'}},' Extracting...'):null,
        extractResult?e('span',{style:{marginLeft:8,fontSize:11,color:GREEN}},extractResult):null
      ),
      e(Textarea,{value:rfpText,onChange:function(ev){setRfpText(ev.target.value)},placeholder:'Paste RFP text here, or upload a file above...',rows:10})
    ),

    e(Btn,{onClick:handleSubmit,disabled:submitting||!title.trim(),style:{width:'100%',padding:'12px 0',fontSize:14}},
      submitting?'Submitting...':'Submit to Pipeline'
    ),

    result?e(Card,{style:{marginTop:16,background:result.error?RED+'15':GREEN+'15',borderColor:result.error?RED+'44':GREEN+'44'}},
      e('div',{style:{color:result.error?RED:GREEN,fontSize:13,fontWeight:'bold'}},
        result.error||'✓ Opportunity submitted successfully. ID: '+(result.id||'created')+'. OPI scoring runs automatically.'
      ),
      !result.error?e(Btn,{onClick:function(){p.nav('tracker')},variant:'ghost',small:true,style:{marginTop:8}},'View in Pipeline →'):null
    ):null
  );
}

// SYSTEM CHAT
// ============================================================
function SystemChat(p){
  var pl=p.pl;
  var st1=useState([]),messages=st1[0],setMessages=st1[1];
  var st2=useState(''),input=st2[0],setInput=st2[1];
  var st3=useState(false),sending=st3[0],setSending=st3[1];
  var st4=useState(null),memoryToast=st4[0],setMemoryToast=st4[1];
  var chatEndRef=useRef(null);

  useEffect(function(){
    if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  var quickActions=[
    {label:'Pipeline summary',prompt:'Give me a summary of the current pipeline — how many opportunities, which are highest priority, any upcoming deadlines.'},
    {label:'What should I focus on today?',prompt:'Based on the current pipeline and deadlines, what should I focus on today? Give me 3 specific actions.'},
    {label:'Competitive landscape',prompt:'Summarize the competitive landscape across our active opportunities. Who are the main competitors and what are our advantages?'},
    {label:'System status',prompt:'What is the current status of the organism? How many agents, recent activity, any issues?'}
  ];

  function sendMessage(text){
    if(!text.trim())return;
    var newMsg={role:'user',content:text,timestamp:new Date().toISOString()};
    var updated=messages.concat([newMsg]);
    setMessages(updated);
    setInput('');
    setSending(true);

    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message:text,
        history:messages.slice(-6).map(function(m){return{role:m.role,content:m.content}}),
        opportunityId:pl.selected?pl.selected.id:null
      })
    }).then(function(r){return r.json()}).then(function(d){
      var response=d.response||d.content||'No response received.';
      var assistantMsg={role:'assistant',content:response,timestamp:new Date().toISOString()};
      setMessages(function(prev){return prev.concat([assistantMsg])});
      setSending(false);

      // Memory toast — backend stores when msg>30 and reply>100
      if(text.length>30&&response.length>100){
        setMemoryToast('ORGANISM MEMORY UPDATED: Learning from this interaction');
        setTimeout(function(){setMemoryToast(null)},4000);
      }
    }).catch(function(){
      setMessages(function(prev){return prev.concat([{role:'assistant',content:'Connection error. Try again.',timestamp:new Date().toISOString()}])});
      setSending(false);
    });
  }

  function chatMarkdown(text){
    if(!text)return text;
    // Split into lines, process each
    return text.split('\n').map(function(line,i){
      // Bullets
      if(/^\s*[-*•]\s/.test(line)){
        var content=line.replace(/^\s*[-*•]\s+/,'');
        return e('div',{key:i,style:{paddingLeft:16,marginBottom:2}},
          e('span',{style:{color:GOLD,marginRight:6}},'•'),
          processBold(content)
        );
      }
      // Numbered lists
      if(/^\s*\d+[\.\)]\s/.test(line)){
        var num=line.match(/^\s*(\d+[\.\)])\s/)[1];
        var content=line.replace(/^\s*\d+[\.\)]\s+/,'');
        return e('div',{key:i,style:{paddingLeft:16,marginBottom:2}},
          e('span',{style:{color:GOLD,marginRight:6}},num),
          processBold(content)
        );
      }
      // Headers
      if(/^#{1,3}\s/.test(line)){
        return e('div',{key:i,style:{color:GOLD,fontWeight:'bold',marginTop:8,marginBottom:4}},line.replace(/^#{1,3}\s+/,''));
      }
      // Empty lines
      if(!line.trim())return e('div',{key:i,style:{height:8}});
      // Regular lines
      return e('div',{key:i,style:{marginBottom:2}},processBold(line));
    });
  }
  function processBold(text){
    if(!text||typeof text!=='string')return text;
    var parts=text.split(/(\*\*[^*]+\*\*)/g);
    if(parts.length===1)return text;
    return parts.map(function(p,i){
      if(/^\*\*/.test(p))return e('span',{key:i,style:{color:GOLD,fontWeight:'bold'}},p.replace(/\*\*/g,''));
      return p;
    });
  }

  function handleKeyDown(ev){
    if(ev.key==='Enter'&&!ev.shiftKey){
      ev.preventDefault();
      sendMessage(input);
    }
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:900,display:'flex',flexDirection:'column',height:'calc(100vh - 60px)'}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'System Chat'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:12}},'Talk to the organism. It has full context on your pipeline, intelligence, and history.'),

    // Quick actions (only when no messages)
    messages.length===0?e('div',{style:{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}},
      quickActions.map(function(qa){
        return e(Btn,{key:qa.label,onClick:function(){sendMessage(qa.prompt)},variant:'ghost',small:true},qa.label);
      })
    ):null,

    // Opportunity context
    pl.selected?e('div',{style:{fontSize:11,color:CYAN,marginBottom:8,padding:'4px 8px',background:CYAN+'11',borderRadius:4}},
      '◎ Context: '+pl.selected.title+' (OPI '+pl.selected.opi_score+')'
    ):null,

    // Messages
    e('div',{style:{flex:1,overflowY:'auto',marginBottom:12,padding:8}},
      messages.length===0?e('div',{style:{color:TEXT_D,textAlign:'center',padding:40}},'Ask the organism anything about your pipeline, opportunities, or strategy.'):
      messages.map(function(m,i){
        var isUser=m.role==='user';
        return e('div',{key:i,style:{marginBottom:12,display:'flex',justifyContent:isUser?'flex-end':'flex-start'}},
          e('div',{style:{
            maxWidth:'75%',padding:'10px 14px',borderRadius:isUser?'12px 12px 2px 12px':'12px 12px 12px 2px',
            background:isUser?GOLD+'22':BG3,border:'1px solid '+(isUser?GOLD+'33':BORDER),fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'
          }},
            isUser?m.content:chatMarkdown(m.content),
            m.timestamp?e('div',{style:{fontSize:9,color:TEXT_D,marginTop:4,textAlign:'right'}},new Date(m.timestamp).toLocaleTimeString()):null
          )
        );
      }),
      sending?e('div',{style:{display:'flex',justifyContent:'flex-start',marginBottom:12}},
        e('div',{style:{padding:'10px 14px',borderRadius:12,background:BG3,border:'1px solid '+BORDER,color:GOLD,animation:'pulse 1.5s infinite',fontSize:13}},'Thinking...')
      ):null,
      e('div',{ref:chatEndRef})
    ),

    // Memory toast
    memoryToast?e('div',{style:{position:'fixed',bottom:80,right:32,background:GREEN+'22',border:'1px solid '+GREEN+'44',borderRadius:8,padding:'8px 16px',fontSize:12,color:GREEN,zIndex:300}},
      '🧠 '+memoryToast
    ):null,

    // Input
    e('div',{style:{display:'flex',gap:8}},
      e('textarea',{value:input,onChange:function(ev){setInput(ev.target.value)},onKeyDown:handleKeyDown,
        placeholder:'Ask the organism...',rows:2,
        style:{flex:1,background:BG3,color:TEXT,border:'1px solid '+BORDER,borderRadius:8,padding:'10px 14px',fontSize:13,fontFamily:'Georgia,serif',outline:'none',resize:'none'}
      }),
      e(Btn,{onClick:function(){sendMessage(input)},disabled:sending||!input.trim(),style:{alignSelf:'flex-end'}},'Send')
    ),
    e('div',{style:{fontSize:10,color:TEXT_D,marginTop:4}},'Enter to send · Shift+Enter for newline')
  );
}

// OPPORTUNITY BRIEF — Single-opp deep view

function OpportunityBriefModule(p){
  var pl=p.pl;
  var st1=useState(null),analysis=st1[0],setAnalysis=st1[1];
  var st2=useState(false),loading=st2[0],setLoading=st2[1];
  var st3=useState(false),orchLoading=st3[0],setOrchLoading=st3[1];
  var st4=useState(null),orchResult=st4[0],setOrchResult=st4[1];
  var st5=useState(null),detail=st5[0],setDetail=st5[1];
  var st6=useState(null),fitAnalysis=st6[0],setFitAnalysis=st6[1];
  var st7=useState(false),fitLoading=st7[0],setFitLoading=st7[1];
  var st8=useState({}),expanded=st8[0],setExpanded=st8[1];

  // Fetch detail when opp selected
  useEffect(function(){
    if(pl.selected){
      fetch('/api/opportunity-detail?id='+encodeURIComponent(pl.selected.id)).then(function(r){return r.json()}).then(function(d){setDetail(d)}).catch(function(){});
    }
  },[pl.selected?pl.selected.id:null]);

    e('h2',{style:{color:GOLD}},'Opportunity Brief'),
