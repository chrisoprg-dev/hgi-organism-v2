  );

  var o=pl.selected;
  var det=detail||o;
  var sc=o.opi_score||0;
  var daysLeft=o.due_date?Math.ceil((new Date(o.due_date)-new Date())/(1000*60*60*24)):null;

  function toggleSection(key){var c=Object.assign({},expanded);c[key]=!c[key];setExpanded(c)}

  function runOrchestration(){
    setOrchLoading(true);
    fetch('/api/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:o.id})})
      .then(function(r){return r.json()}).then(function(d){
        setOrchResult(d);setOrchLoading(false);
        // Refresh detail after orchestration triggers
        setTimeout(function(){
          fetch('/api/opportunity-detail?id='+encodeURIComponent(o.id)).then(function(r){return r.json()}).then(function(d2){setDetail(d2)});
          pl.refresh();
        },15000);
      }).catch(function(){setOrchLoading(false)});
  }

  function runResearch(){

      'Title: '+o.title+'\nAgency: '+(o.agency||'')+'\nVertical: '+(o.vertical||'')+'\nValue: '+(o.estimated_value||'Unknown')+
      (det.scope_analysis?'\nScope: '+det.scope_analysis:'')+
      (det.research_brief?'\nResearch: '+det.research_brief:''),
      null,6000
    ).then(function(r){setFitAnalysis(r);setFitLoading(false)});
  }

  // Expandable section helper
  function Section(sp){

    var isOpen=expanded[key];
    return e(Card,{style:{cursor:'pointer'}},

          e('span',{style:{fontSize:10,color:TEXT_D,marginLeft:8}},content.length.toLocaleString()+' chars')
        ),
        e('span',{style:{color:TEXT_D}},isOpen?'▼':'▶')

    e('h2',{style:{color:GOLD,marginBottom:12}},'Opportunity Brief'),

    // Hero card

      e('div',{style:{display:'flex',justifyContent:'space-between'}},

          ),
          o.source_url?e('a',{href:o.source_url,target:'_blank',style:{color:CYAN,fontSize:11,textDecoration:'none',marginTop:4,display:'inline-block'}},'View Source →'):null
        ),
        e('div',{style:{textAlign:'right'}},
          o.stage?e(Badge,{color:stageColor(o.stage)},o.stage):null,
          o.estimated_value?e('div',{style:{fontSize:16,color:GOLD,marginTop:8}},o.estimated_value):null,

        )
      ),
      // Completeness indicators

// WINNABILITY SCORING — Interactive sliders
// ============================================================
function WinnabilityScoringModule(p){
  var pl=p.pl;
  var st1=useState({title:'',agency:'',value:'$50M',type:'',incumbent:'',competitors:'',teaming:'',timeline:'near'}),form=st1[0],setForm=st1[1];
  var st2=useState({pastPerf:5,relationship:5,technical:5}),factors=st2[0],setFactors=st2[1];
  var st3=useState(''),addContext=st3[0],setAddContext=st3[1];
  var st4=useState(null),result=st4[0],setResult=st4[1];
  var st5=useState(false),loading=st5[0],setLoading=st5[1];
  var st6=useState(null),simulation=st6[0],setSimulation=st6[1];
  var st7=useState(false),simLoading=st7[0],setSimLoading=st7[1];

  useEffect(function(){
    if(pl.selected){
      setForm({
        title:pl.selected.title||'',agency:pl.selected.agency||'',
        value:pl.selected.estimated_value||'$50M',type:pl.selected.vertical||pl.selected.type||'',
        incumbent:'',competitors:'',teaming:'',timeline:'near'
      });
      // Fetch full detail to get scope_analysis for winnability prompt
      fetch('/api/opportunity-detail?id='+encodeURIComponent(pl.selected.id)).then(function(r){return r.json()}).then(function(det){
        if(det.scope_analysis)pl.selected.scope_analysis=det.scope_analysis;
        if(det.capture_action)pl.selected.capture_action=det.capture_action;
        if(det.research_brief)pl.selected.research_brief=det.research_brief;
      }).catch(function(){});
    }
  },[pl.selected?pl.selected.id:null]);

  function calculate(){
    setLoading(true);
    var prompt='Calculate Probability of Win (Pwin) and OPI score for this opportunity:\n'+
      'Title: '+form.title+'\nAgency: '+form.agency+'\nValue: '+form.value+'\nType: '+form.type+
      '\nIncumbent: '+form.incumbent+'\nCompetitors: '+form.competitors+'\nTeaming: '+form.teaming+
      '\nTimeline: '+form.timeline+
      '\nScoring Factors: Past Performance Relevance '+factors.pastPerf+'/10, Relationship Strength '+factors.relationship+'/10, Technical Capability '+factors.technical+'/10'+
      '\nAdditional Context: '+addContext+
      (pl.selected&&pl.selected.scope_analysis?'\n\nScope: '+pl.selected.scope_analysis:'')+
      '\n\nProvide: 1) Pwin percentage (0-100%), 2) Recommended OPI score (0-100), 3) GO/NO-GO recommendation, 4) Key win themes, 5) Risk factors, 6) Recommended next 3 actions. Be direct and specific to HGI.';

    callClaude(prompt,'You are HGI\'s winnability analyst. Calculate Pwin and OPI based on the 6-factor model: KB match depth, competitive position, relationship strength, staff availability, strategic fit, eval criteria alignment. Be direct and specific.',4000
    ).then(function(r){
      setResult(r);setLoading(false);
      // Extract OPI from response and write back
      if(pl.selected){
        var opiMatch=r.match(/OPI[:\s]*(\d{2,3})/i);
        if(opiMatch){
          var newOpi=parseInt(opiMatch[1]);
          if(newOpi>=0&&newOpi<=100){
            pl.writeBack(pl.selected.id,{opi_score:newOpi,capture_action:r});
          }
        }
      }
    });
  }

  function runSimulation(){
    setSimLoading(true);
    callClaude('Run a competitive win simulation for: '+form.title+' ('+form.agency+').\n'+
      'Competitors: '+form.competitors+'\nIncumbent: '+form.incumbent+'\nHGI factors: Past Performance '+factors.pastPerf+'/10, Relationship '+factors.relationship+'/10, Technical '+factors.technical+'/10'+
      '\n\nSimulate 3 scenarios: 1) Best case (HGI strengths play out), 2) Base case (realistic), 3) Worst case (HGI weaknesses exploited). For each: Pwin %, key driver, what HGI must do differently. Then recommend the single most impactful action to move from base to best case.',
      null,3000
    ).then(function(r){setSimulation(r);setSimLoading(false)});
  }

  function exportDocx(){
    if(!pl.selected)return;
    window.open('/api/export-module?type=winnability&id='+encodeURIComponent(pl.selected.id));
  }

  function updateForm(k,v){setForm(Object.assign({},form,{[k]:v}))}
  function updateFactor(k,v){setFactors(Object.assign({},factors,{[k]:parseInt(v)}))}

  var timelineOpts=[{value:'immediate',label:'Immediate (0-90 days)'},{value:'near',label:'Near-term (90-180 days)'},{value:'medium',label:'Medium (6-12 months)'},{value:'long',label:'Long-term (12+ months)'}];

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Winnability Scoring'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:16}},'Select an opportunity — auto-loads scope, financial, and research intelligence for informed scoring.'),

    pl.pipeline.length>0?e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading}):
    e(Card,{style:{background:ORANGE+'15'}},e('div',{style:{color:ORANGE,fontSize:12}},'No active opportunities.')),

    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:12}},
      // LEFT: Opportunity Details
      e(Card,null,
        e(Label,{text:'OPPORTUNITY DETAILS'}),
        [{k:'title',l:'TITLE',ph:'Opportunity name'},{k:'agency',l:'AGENCY',ph:'Agency/client'},{k:'value',l:'EST. VALUE',ph:'$50M'},{k:'type',l:'TYPE',ph:'FEMA PA, TPA, CDBG-DR...'},{k:'incumbent',l:'KNOWN INCUMBENT',ph:'ICF / None / Unknown'},{k:'competitors',l:'COMPETITORS',ph:'Witt, Hagerty, Dewberry...'},{k:'teaming',l:'TEAMING NEEDED',ph:'Yes — need construction sub / No'}].map(function(f){
          return e('div',{key:f.k,style:{marginBottom:10}},
            e(Label,{text:f.l}),
            e(Input,{value:form[f.k],onChange:function(ev){updateForm(f.k,ev.target.value)},placeholder:f.ph})
          );
        }),
        e('div',null,e(Label,{text:'REVENUE TIMELINE'}),e(Sel,{value:form.timeline,onChange:function(ev){updateForm('timeline',ev.target.value)},options:timelineOpts}))
      ),

      // RIGHT: Scoring Factors
      e(Card,null,
        e(Label,{text:'SCORING FACTORS (HGI 6-FACTOR MODEL)'}),
        [{k:'pastPerf',l:'PAST PERFORMANCE RELEVANCE'},{k:'relationship',l:'RELATIONSHIP STRENGTH'},{k:'technical',l:'TECHNICAL CAPABILITY'}].map(function(f){
          return e('div',{key:f.k,style:{marginBottom:16}},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
              e(Label,{text:f.l}),
              e('span',{style:{color:factors[f.k]>=7?GREEN:factors[f.k]>=4?GOLD:RED,fontWeight:'bold',fontSize:13}},factors[f.k]+'/10')
            ),
            e('input',{type:'range',min:0,max:10,value:factors[f.k],onChange:function(ev){updateFactor(f.k,ev.target.value)},
              style:{width:'100%',accentColor:GOLD}})
          );
        }),
        e('div',{style:{marginTop:8}},
          e(Label,{text:'ADDITIONAL CONTEXT'}),
          e(Textarea,{value:addContext,onChange:function(ev){setAddContext(ev.target.value)},placeholder:'Agency relationships, political context, HGI advantages...',rows:4})
        ),
        e(Btn,{onClick:calculate,disabled:loading,style:{width:'100%',marginTop:12,padding:'12px 0'}},loading?'Calculating...':'Calculate Pwin + OPI'),
        e('div',{style:{display:'flex',gap:8,marginTop:8}},
          result?e(Btn,{onClick:runSimulation,disabled:simLoading,variant:'ghost',style:{flex:1}},simLoading?'Simulating...':'🎲 Win Simulation'):null,
          result?e(Btn,{onClick:exportDocx,variant:'ghost',style:{flex:1}},'📄 Export .docx'):null
        )
      )
    ),

    result?e(AIOut,{content:result,loading:loading,label:'WINNABILITY ASSESSMENT'}):null,
    simulation?e(AIOut,{content:simulation,loading:simLoading,label:'WIN SIMULATION — 3 SCENARIOS'}):null
  );
}

// PROPOSAL ENGINE — Section-by-section proposal workspace
// ============================================================
function ProposalEngineModule(p){
  var pl=p.pl;
  var st1=useState('single'),mode=st1[0],setMode=st1[1];
  var st2=useState('Executive Summary'),section=st2[0],setSection=st2[1];
  var st3=useState(''),rfpContext=st3[0],setRfpContext=st3[1];
  var st4=useState(''),addContext=st4[0],setAddContext=st4[1];
  var st5=useState({}),sections=st5[0],setSections=st5[1];
  var st6=useState(null),generating=st6[0],setGenerating=st6[1];
  var st7=useState(null),autoProgress=st7[0],setAutoProgress=st7[1];
  var st8=useState(null),improveResult=st8[0],setImproveResult=st8[1];
  var st9w=useState('sections'),wsView=st9w[0],setWsView=st9w[1];
  var st10w=useState({}),wsExpanded=st10w[0],setWsExpanded=st10w[1];
  var st11w=useState(null),wsEditing=st11w[0],setWsEditing=st11w[1];

  var sectionList=['Executive Summary','Technical Approach','Management Approach','Staffing Plan','Past Performance Matrix','Transition / Mobilization Plan','Pricing Narrative','Compliance Matrix','Clarifying Questions','Red Team Critique'];

  // Fetch full opportunity detail (pipeline data is lightweight — no text fields)
  useEffect(function(){
    if(pl.selected&&pl.selected.id){
      fetch('/api/opportunity-detail?id='+encodeURIComponent(pl.selected.id)).then(function(r){return r.json()}).then(function(det){
        if(det.rfp_text)setRfpContext(det.rfp_text);
        else if(det.scope_analysis)setRfpContext(det.scope_analysis);
        // Load existing proposal content into sections
        if(det.proposal_content){
          pl.selected.proposal_content=det.proposal_content;
          pl.selected.rfp_text=det.rfp_text;
          pl.selected.scope_analysis=det.scope_analysis;
          var parsed={};
          var parts=det.proposal_content.split(/(?=^#{1,3}\s)/m);
          parts.forEach(function(part){
            sectionList.forEach(function(s){
              if(part.toLowerCase().includes(s.toLowerCase()))parsed[s]=part.trim();
            });
          });
          if(Object.keys(parsed).length>0)setSections(parsed);
        }
      }).catch(function(){});
    }
  },[pl.selected?pl.selected.id:null]);

  function generateSection(sec){
    setGenerating(sec);
    var prompt='Generate the "'+sec+'" section for a government proposal.\n'+
      'RFP Context:\n'+rfpContext+
      (addContext?'\nAdditional Context: '+addContext:'')+
      (pl.selected?'\nOpportunity: '+pl.selected.title+' ('+pl.selected.agency+')':'');

    callClaude(prompt,'You are HGI\'s proposal writer. Write a submission-ready proposal section. Be specific, cite HGI capabilities and past performance. No placeholders.',8000
    ).then(function(r){
      setSections(function(prev){var n=Object.assign({},prev);n[sec]=r;return n});
      setGenerating(null);
    });
  }

  function autoGenerateAll(){
    setAutoProgress({current:0,total:sectionList.length});
    var i=0;
    function next(){
      if(i>=sectionList.length){setAutoProgress(null);return}
      var sec=sectionList[i];
      setAutoProgress({current:i+1,total:sectionList.length,section:sec});
      setGenerating(sec);
      var prompt='Generate the "'+sec+'" section for a government proposal.\nRFP: '+rfpContext+
        (pl.selected?'\nOpp: '+pl.selected.title+' ('+pl.selected.agency+')':'');
      callClaude(prompt,'You are HGI\'s proposal writer. Write submission-ready content.',6000
      ).then(function(r){
        setSections(function(prev){var n=Object.assign({},prev);n[sec]=r;return n});
        setGenerating(null);i++;next();
      });
    }
    next();
  }

  function improveSection(sec,action){
    setImproveResult(null);setGenerating(sec);
    var content=sections[sec]||'';
    fetch('/api/proposal-improve',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({section_content:content,section_name:sec,action:action,rfp_context:rfpContext,agency:pl.selected?pl.selected.agency:'',vertical:pl.selected?pl.selected.vertical:''})
    }).then(function(r){return r.json()}).then(function(d){
      if(action==='improve'){setSections(function(prev){var n=Object.assign({},prev);n[sec]=(d.result&&d.result.improved)||d.improved||d.content||content;return n})}
      else{setImproveResult((d.result&&d.result.redteam_findings)||d.critique||d.red_team||JSON.stringify(d))}
      setGenerating(null);
    }).catch(function(){setGenerating(null)});
  }

  function produceProposal(){
    if(!pl.selected)return;
    if(!confirm('Run full proposal pipeline?\n\n~$5-10 cost, ~10 min runtime.\nRe-runs all 19 stages including Opus calls.\n\nProceed?'))return;
    fetch('/api/produce-proposal?id='+encodeURIComponent(pl.selected.id),{method:'POST'});
  }

  function exportDocx(){
    if(!pl.selected)return;
    window.open('/api/proposal-doc?id='+encodeURIComponent(pl.selected.id));
  }

  return e('div',{style:{padding:'24px 32px',maxWidth:1100}},
    e('h2',{style:{color:GOLD,marginBottom:4}},'Proposal Engine'),
    e('div',{style:{fontSize:12,color:TEXT_D,marginBottom:12}},'Select a pipeline opportunity or paste RFP text manually'),

    pl.pipeline.length>0?e(OpportunitySelector,{pipeline:pl.pipeline,selected:pl.selected,onSelect:pl.select,loading:pl.loading}):
    e(Card,{style:{background:ORANGE+'15'}},e('div',{style:{color:ORANGE,fontSize:12}},'No active opportunities.')),

    !pl.selected&&!rfpContext?e(Card,{style:{background:GOLD+'11',borderColor:GOLD+'33'}},
      e('div',{style:{color:GOLD,fontWeight:'bold',fontSize:12}},'Recommended: Complete Full Workflow First'),
      e('div',{style:{color:TEXT_D,fontSize:12}},'For best results run Full Workflow first. Or paste RFP text below.')
    ):null,

    // Mode tabs
    e('div',{style:{display:'flex',gap:0,marginBottom:12,marginTop:12}},
      [{k:'single',l:'Single Section'},{k:'auto',l:'Auto Generate All'},{k:'workspace',l:'Draft Workspace'}].map(function(m){
        return e('div',{key:m.k,onClick:function(){setMode(m.k)},style:{
          padding:'8px 16px',cursor:'pointer',fontSize:12,fontWeight:'bold',
          background:mode===m.k?GOLD+'22':BG3,color:mode===m.k?GOLD:TEXT_D,
          border:'1px solid '+(mode===m.k?GOLD+'44':BORDER),borderRadius:m.k==='single'?'4px 0 0 4px':m.k==='workspace'?'0 4px 4px 0':0
        }},m.l);
      })
    ),

    // RFP Context
    e(Card,null,
      e(Label,{text:'RFP CONTEXT (paste if not loaded from workflow)'}),
      e(Textarea,{value:rfpContext,onChange:function(ev){setRfpContext(ev.target.value)},placeholder:'Paste RFP text...',rows:4})
    ),

    // Single Section mode
    mode==='single'?e('div',null,
      e('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=768?'1fr':'1fr 1fr',gap:12}},
        e('div',null,e(Label,{text:'SECTION'}),e(Sel,{value:section,onChange:function(ev){setSection(ev.target.value)},options:sectionList.map(function(s){return{value:s,label:s}})})),
        e('div',null,e(Label,{text:'ADDITIONAL CONTEXT'}),e(Input,{value:addContext,onChange:function(ev){setAddContext(ev.target.value)},placeholder:'Agency, key win themes, incumbent...'}))
      ),
      e(Btn,{onClick:function(){generateSection(section)},disabled:generating===section,style:{marginTop:12}},
        generating===section?'Generating...':'Generate: '+section
      ),
      sections[section]?e('div',{style:{marginTop:12}},
        e(AIOut,{content:sections[section],label:section.toUpperCase()}),
        e('div',{style:{display:'flex',gap:8,marginTop:8}},
          e(Btn,{onClick:function(){improveSection(section,'improve')},variant:'ghost',small:true},'✨ Improve'),
          e(Btn,{onClick:function(){improveSection(section,'redteam')},variant:'ghost',small:true},'🔴 Red Team')
        ),

function FinancialPricingModule(p){
  var pl=p.pl;
  var st1=useState('intelligence'),tab=st1[0],setTab=st1[1];

  // Price Intelligence state
  var st2=useState({contractType:'Best Value — Tradeoff',setAside:'Full & Open Competition',priceWeight:30,value:'',years:3,geography:'Louisiana',incumbent:'',incumbentAdv:'Unknown',hgiIncumbent:'No',competitors:'ICF, Hagerty, Witt O\'Brien\'s, Dewberry',marginTarget:12,protestRisk:'Low'}),intel=st2[0],setIntel=st2[1];

  // Cost Buildup state
  var st3=useState([
    {cat:'Program Manager',hours:2080,rate:155,fringe:0.32,oh:0.15,ga:0.08,fee:0.07},
    {cat:'Senior Analyst',hours:2080,rate:125,fringe:0.32,oh:0.15,ga:0.08,fee:0.07}
  ]),labor=st3[0],setLabor=st3[1];
  var st4=useState([{desc:'Travel',amount:25000},{desc:'Other Direct Costs',amount:10000}]),odcs=st4[0],setOdcs=st4[1];

  // Results
  var st5=useState(null),marketRates=st5[0],setMarketRates=st5[1];
  var st6=useState(null),ptw=st6[0],setPtw=st6[1];
  var st7=useState(null),narrative=st7[0],setNarrative=st7[1];
  var st8=useState(false),loading=st8[0],setLoading=st8[1];

  // Period pricing
  var st9=useState({baseMonths:12,optionYears:2,escalation:3}),periods=st9[0],setPeriods=st9[1];

  // Eval model
  var st10=useState({price:30,technical:40,pastPerf:20,management:10}),evalWeights=st10[0],setEvalWeights=st10[1];

  // Scenario
  var st11=useState({feeAdj:0,rateAdj:0,hoursAdj:0}),scenario=st11[0],setScenario=st11[1];

  useEffect(function(){
    if(pl.selected){
      setIntel(function(prev){return Object.assign({},prev,{value:pl.selected.estimated_value||'',geography:pl.selected.vertical==='disaster'?'Louisiana':prev.geography})});
      // Fetch full detail to get financial_analysis and scope
      fetch('/api/opportunity-detail?id='+encodeURIComponent(pl.selected.id)).then(function(r){return r.json()}).then(function(det){
        if(det.scope_analysis)pl.selected.scope_analysis=det.scope_analysis;
        if(det.financial_analysis)pl.selected.financial_analysis=det.financial_analysis;
        if(det.rfp_text)pl.selected.rfp_text=det.rfp_text;

    }
  },[pl.selected?pl.selected.id:null]);

  function calcLoaded(row){
    var loaded=row.rate*(1+row.fringe)*(1+row.oh)*(1+row.ga)*(1+row.fee);
    return Math.round(loaded*100)/100;
  }
  function calcRowTotal(row){return Math.round(calcLoaded(row)*row.hours)}

  var laborTotal=labor.reduce(function(s,r){return s+calcRowTotal(r)},0);
  var odcTotal=odcs.reduce(function(s,r){return s+(parseFloat(r.amount)||0)},0);
  var feeEarned=Math.round(laborTotal*0.07);
  var baseYear=laborTotal+odcTotal;
  var contractTotal=Math.round(baseYear*(1+periods.optionYears*(1+periods.escalation/100)));
  var profitMargin=baseYear>0?Math.round(feeEarned/baseYear*1000)/10:0;

  function analyzeMarket(){
    setLoading(true);
    callClaude('Analyze market rates for this opportunity: '+JSON.stringify(intel)+
      (pl.selected?'\nOpp: '+pl.selected.title:''),
      'You are a pricing analyst. Provide GSA ranges per role, competitor indirect rates, locality factors, red flags, and HGI positioning.',5000
    ).then(function(r){setMarketRates(r);setLoading(false)});
  }

  function runPTW(){
    setLoading(true);
    callClaude('Run full Price-to-Win analysis: '+JSON.stringify(intel)+'\nLabor total: $'+laborTotal+', ODCs: $'+odcTotal,
      'You are a PTW analyst. Provide: bidder pool, competitor pricing models, incumbent analysis, eval score modeling, price sensitivity, 3 win price scenarios, pricing strategy, risks.',6000
    ).then(function(r){setPtw(r);setLoading(false)});
  }

  function generateNarrative(){
    setLoading(true);
    callClaude('Generate an 800+ word cost narrative for submission. Labor total: $'+laborTotal+', ODCs: $'+odcTotal+', Contract total: $'+contractTotal+'. '+JSON.stringify(intel),
      'Write a submission-ready cost narrative covering methodology, rate justification, indirect rates, ODC justification, cost realism, value proposition, fee reasonableness.',6000
    ).then(function(r){setNarrative(r);setLoading(false)});

  }

      urgent.length>0?e(Card,{style:{borderLeft:'3px solid '+ORANGE}},e(Label,{text:'DUE WITHIN 14 DAYS'}),urgent.map(function(o){
        return e('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
          e('div',null,e('strong',{style:{color:'#fff'}},o.title?o.title.substring(0,50):''),e('div',{style:{fontSize:10,color:TEXT_D}},o.agency||'')),
          e('div',{style:{textAlign:'right'}},e('div',{style:{color:o.days_left<=7?RED:ORANGE,fontWeight:'bold'}},o.days_left+' days left'),e(OPIBadge,{score:o.opi_score||0}))
        );
      })):null,
      urgent.length===0&&overdue.length===0?e(Card,null,e('div',{style:{color:GREEN,textAlign:'center',padding:20}},'No urgent deadlines. Pipeline is clear.')):null
    ):
    tab==='missing'?e(Card,null,e(Label,{text:'OPPORTUNITIES MISSING RFP DOCUMENT ('+noRfp.length+')'}),
      noRfp.length===0?e('div',{style:{color:GREEN,textAlign:'center',padding:20}},'All active opportunities have RFP documents.'):
      noRfp.map(function(o){
        return e('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
          e('div',null,e('strong',{style:{color:'#fff'}},o.title?o.title.substring(0,50):''),e('div',{style:{fontSize:10,color:TEXT_D}},o.agency||'',' · ',o.stage||'')),
          e('div',null,e(OPIBadge,{score:o.opi_score||0}),o.source_url?e(Btn,{onClick:function(){window.open(o.source_url)},variant:'ghost',small:true},'View Source'):null)
        );
      })
    ):
    tab==='recompetes'?e(Card,null,e(Label,{text:'RECOMPETE SIGNALS ('+recompetes.length+')'}),
      recompetes.length===0?e('div',{style:{color:TEXT_D,textAlign:'center',padding:20}},'No recompete signals detected.'):
      recompetes.map(function(o){
        return e('div',{key:o.id,style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid '+BORDER,fontSize:12}},
          e('div',null,e('strong',{style:{color:'#fff'}},o.title?o.title.substring(0,50):''),e('div',{style:{fontSize:10,color:TEXT_D}},o.agency||'')),
          e(OPIBadge,{score:o.opi_score||0})
        );
      })
    ):
    tab==='history'?e(Card,null,e(Label,{text:'RECENT SCAN REPORTS'}),
      scannerMems.length===0?e('div',{style:{color:TEXT_D,textAlign:'center',padding:20}},'No scan history yet. Run a scan to populate.'):
      scannerMems.map(function(m,i){
        return e(Card,{key:i,style:{background:BG3}},
          e('div',{style:{fontSize:10,color:TEXT_D,marginBottom:4}},new Date(m.created_at).toLocaleString()),
          e('div',{style:{fontSize:12,whiteSpace:'pre-wrap'}},(m.observation||'').substring(0,500))
        );
      })
    ):null,
    e(Card,null,
      e(Label,{text:'MANUAL PORTALS'}),
      e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
        [{l:'SAM.gov',u:'https://sam.gov'},{l:'LaPAC',u:'https://lapac.doa.louisiana.gov'},{l:'Texas SmartBuy',u:'https://comptroller.texas.gov/purchasing/vendors/'},{l:'FEMA',u:'https://www.fema.gov/grants'},{l:'HUD CDBG-DR',u:'https://www.hud.gov/program_offices/comm_planning/cdbg-dr'}].map(function(p){
          return e(Btn,{key:p.l,onClick:function(){window.open(p.u)},variant:'ghost',small:true},p.l);
        })
      )
    )
  );
}

function PlaceholderModule(p){
  return e('div',{style:{padding:'40px 32px'}},
    e('h2',{style:{color:GOLD,marginBottom:8}},p.title),
    e('div',{style:{color:TEXT_D}},'This module is being rebuilt. Full functionality coming in the next deployment.'),
    p.pl&&p.pl.pipeline.length>0?e('div',{style:{marginTop:16}},e(OpportunitySelector,{pipeline:p.pl.pipeline,selected:p.pl.selected,onSelect:p.pl.select,loading:p.pl.loading})):null
  );
}

// ============================================================
// APP.JS — Sidebar + Routing + Notification Bell
// ============================================================
function App(){
  var pl=usePipeline();
  var st1=useState('dashboard'),active=st1[0],setActive=st1[1];
  var st2=useState(window.innerWidth>768),sidebarOpen=st2[0],setSidebarOpen=st2[1];
  var st3=useState([]),notifs=st3[0],setNotifs=st3[1];
  var st4=useState(false),bellOpen=st4[0],setBellOpen=st4[1];
  var st5=useState(null),health=st5[0],setHealth=st5[1];

  useEffect(function(){
    fetch('/health').then(function(r){return r.json()}).then(setHealth).catch(function(){});
    fetch('/api/notify').then(function(r){return r.json()}).then(function(d){setNotifs(Array.isArray(d.notifications)?d.notifications:Array.isArray(d)?d:[])}).catch(function(){});
    var iv=setInterval(function(){
      fetch('/api/notify').then(function(r){return r.json()}).then(function(d){setNotifs(Array.isArray(d.notifications)?d.notifications:Array.isArray(d)?d:[])}).catch(function(){});
    },60000);
    return function(){clearInterval(iv)};
  },[]);

  function nav(mod){setActive(mod)}

  var modules=[
    {key:'dashboard',label:'Dashboard',icon:'⌂'},
    {key:'intake',label:'Manual Intake',icon:'⊕',badge:'NEW'},
    {key:'discovery',label:'Opportunity Discovery',icon:'◎'},
    {key:'scanner',label:'Pipeline Scanner',icon:'⊕'},
    {key:'tracker',label:'Pipeline Tracker',icon:'◈'},
    {key:'brief',label:'Opportunity Brief',icon:'◑'},
    {key:'research',label:'Research & Analysis',icon:'◉'},
    {key:'scoring',label:'Winnability Scoring',icon:'◆'},
    {key:'proposal',label:'Proposal Engine',icon:'✦'},
    {key:'financial',label:'Financial & Pricing',icon:'$'},
    {key:'recruiting',label:'Recruiting & Bench',icon:'◧'},
    {key:'crm',label:'Relationship Intelligence',icon:'◫'},
    {key:'content',label:'Content Engine',icon:'◭'},
    {key:'digest',label:'Weekly Digest',icon:'◇'},
    {key:'execbrief',label:'Executive Brief',icon:'◈'},
    {key:'scraperinsights',label:'Scraper Insights',icon:'⊗'},
    {key:'knowledge',label:'Knowledge Base',icon:'⬡'},
    {key:'chat',label:'System Chat',icon:'💬'}
  ];

  var moduleLabel=(modules.find(function(m){return m.key===active})||{}).label||'Dashboard';

  var sidebarW=sidebarOpen?240:0;

  function renderModule(){
    if(active==='dashboard')return e(Dashboard,{pl:pl,nav:nav});
    if(active==='tracker')return e(PipelineTracker,{pl:pl,nav:nav});
    if(active==='intake')return e(ManualIntake,{pl:pl,nav:nav});
    if(active==='chat')return e(SystemChat,{pl:pl,nav:nav});
    if(active==='brief')return e(OpportunityBriefModule,{pl:pl,nav:nav});
    if(active==='research')return e(ResearchAnalysisModule,{pl:pl,nav:nav});
    if(active==='scoring')return e(WinnabilityScoringModule,{pl:pl,nav:nav});
    if(active==='proposal')return e(ProposalEngineModule,{pl:pl,nav:nav});
    if(active==='financial')return e(FinancialPricingModule,{pl:pl,nav:nav});
    if(active==='crm')return e(CRMModule,{pl:pl,nav:nav});
    if(active==='recruiting')return e(RecruitingModule,{pl:pl,nav:nav});
    if(active==='content')return e(ContentEngineModule,{pl:pl,nav:nav});
    if(active==='digest')return e(WeeklyDigestModule,{pl:pl,nav:nav});
    if(active==='knowledge')return e(KnowledgeBaseModule,{pl:pl,nav:nav});
    if(active==='scraperinsights')return e(ScraperInsightsModule,{pl:pl,nav:nav});
    if(active==='discovery')return e(DiscoveryModule,{pl:pl,nav:nav});
    if(active==='execbrief')return e(ExecBriefModule,{pl:pl,nav:nav});
    if(active==='scanner')return e(PipelineScannerModule,{pl:pl,nav:nav});
    var mod=modules.find(function(m){return m.key===active});
    return e(PlaceholderModule,{title:mod?mod.label:active,pl:pl});
  }

  var unread=notifs.filter(function(n){return!n.read}).length;

  return e('div',{style:{display:'flex',minHeight:'100vh'}},
    // Sidebar
    sidebarOpen?e('div',{style:{width:sidebarW,background:BG2,borderRight:'1px solid '+BORDER,position:'fixed',top:0,left:0,bottom:0,overflowY:'auto',zIndex:100,display:'flex',flexDirection:'column'}},
      // Header
      e('div',{style:{padding:'16px 16px 12px'}},
        e('div',{style:{fontSize:18,fontWeight:'bold',color:GOLD,letterSpacing:2}},'HGI'),
        e('div',{style:{fontSize:9,letterSpacing:2,color:TEXT_D}},'AI CAPTURE SYSTEM '+(health&&health.version?health.version:'')),
        e('div',{style:{fontSize:10,color:TEXT_D}},'Hammerman & Gainer LLC · 97 Years')
      ),
      // Module list
      e('div',{style:{flex:1}},
        modules.map(function(m){
          var isActive=active===m.key;
          return e('div',{key:m.key,onClick:function(){setActive(m.key);if(window.innerWidth<=768)setSidebarOpen(false)},style:{
            display:'flex',alignItems:'center',padding:'10px 16px',cursor:'pointer',
            background:isActive?GOLD+'15':'transparent',borderLeft:isActive?'3px solid '+GOLD:'3px solid transparent',
            color:isActive?GOLD:TEXT_D,fontSize:13,gap:8
          }},
            e('span',{style:{fontSize:14,width:20,textAlign:'center'}},m.icon),
            e('span',null,m.label),
            m.badge?e('span',{style:{marginLeft:'auto',background:GOLD,color:'#000',fontSize:9,padding:'1px 6px',borderRadius:4,fontWeight:'bold'}},m.badge):null
          );
        })
      ),
      // Footer
      e('div',{style:{padding:12,borderTop:'1px solid '+BORDER,fontSize:10,color:GOLD}},
        e('div',{style:{fontWeight:'bold',letterSpacing:2,marginBottom:4}},'KEY PAST PERFORMANCE'),
        ['Road Home $12B CDBG-DR','BP GCCF 1M+ claims','PBGC 34M beneficiaries','TPCIGA 20yrs Texas','Restore Louisiana','Terrebonne Parish / Ida'].map(function(pp){
          return e('div',{key:pp,style:{color:TEXT_D,marginBottom:2}},'· '+pp);
        })
      )
    ):null,

    // Main content
    e('div',{style:{marginLeft:sidebarW,flex:1,minHeight:'100vh'}},
      // Top bar
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 16px',borderBottom:'1px solid '+BORDER,background:BG2,position:'sticky',top:0,zIndex:50}},
        e('div',{style:{display:'flex',alignItems:'center',gap:12}},
          e('span',{onClick:function(){setSidebarOpen(!sidebarOpen)},style:{cursor:'pointer',fontSize:18,color:TEXT_D}},'☰'),
          e('span',{style:{fontWeight:'bold',color:TEXT,fontSize:14}},moduleLabel),
          health?e('span',{style:{fontSize:10,color:health.status==='alive'?GREEN:RED}},'● '+(health.status==='alive'?'ALIVE':'OFFLINE')):null
        ),
        // Notification bell
        e('div',{style:{position:'relative'}},
          e('span',{onClick:function(){setBellOpen(!bellOpen)},style:{cursor:'pointer',fontSize:20,color:GOLD}},'🔔'),
          unread>0?e('span',{style:{position:'absolute',top:-4,right:-4,background:RED,color:'#fff',fontSize:9,borderRadius:10,padding:'1px 5px',fontWeight:'bold'}},unread):null,
          bellOpen?e('div',{style:{position:'absolute',right:0,top:32,width:320,maxHeight:400,overflowY:'auto',background:BG2,border:'1px solid '+BORDER,borderRadius:4,boxShadow:'0 4px 12px rgba(0,0,0,0.5)',zIndex:200}},
            e('div',{style:{padding:'8px 12px',borderBottom:'1px solid '+BORDER,fontWeight:'bold',fontSize:12,color:GOLD}},'NOTIFICATIONS'),
            notifs.length===0?e('div',{style:{padding:12,color:TEXT_D,fontSize:12}},'No notifications'):
            notifs.slice(0,10).map(function(n,i){
              return e('div',{key:i,style:{padding:'8px 12px',borderBottom:'1px solid '+BORDER,fontSize:11,color:n.read?TEXT_D:TEXT}},
                e('div',{style:{fontWeight:n.read?'normal':'bold'}},n.message||n.title||'Notification'),
                n.timestamp?e('div',{style:{fontSize:10,color:TEXT_D,marginTop:2}},new Date(n.timestamp).toLocaleString()):null
              );
            })
          ):null
        )
      ),
      // Module content
      renderModule()
    )
  );
}

ReactDOM.render(e(App),document.getElementById('root'));
</script>
</body>
</html>
